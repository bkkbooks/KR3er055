body:
  text: 卷之四敘傷風論經云春傷風夏飧泄此乃四時之序也或表中風在經絡中循經流注以日傳變與傷寒無異但寒泣血無汗惡寒風散氣有汗惡風為不同仲景正以此格量太陽經傷寒傷風用藥不同而纂集者不識門類遂雙編二證使後學混濫卒不知歸甚者以傷風暑濕時氣疫疹凡曰太陽病者皆謂之傷寒晉人不經類皆如此固不足道但名義乖錯惑於後世不可不與之辨今別立傷風一門於四淫之前且依先哲以太陽為始分注六經學者當自知傷風證治足太陽膀胱經傷風有汗惡風不惡寒頭項強腰脊痛以其脈從巔入絡腦還出別下項循肩膊內挾脊抵腰中故太陽諸證如是治之宜桂枝湯桂枝湯治太陽傷風脈陽浮陰弱榮弱衛強頭痛鼻鳴乾嘔發熱自汗惡風或煩熱汗出則解有如瘧狀脈浮洪虛大者桂枝去皮生薑芍藥各一兩半甘草炙一兩大棗六枚擘上㕮咀每服五錢水一盞半煎八分去滓食前服溫覆令遍身微汗愈或發汗漏不止惡風小便難四肢拘急者加熟附子一分或項背強𠘧𠘧反汗出惡風者加葛根一兩三錢或汗出後身疼痛脈沉遲者加芍藥生薑各半兩人參一兩半或下後脈促胸滿者去芍藥若微寒乃加附子或下後頭項強痛翕翕發熱無汗心下滿微痛小便不利者去桂加茯苓白朮各一兩半太陽外證未除而數下之挾熱利不止心下痞硬表裡不解加人參一兩或下之微喘者加厚朴六錢三字杏仁十七粒因燒針令汗針處被寒核起而赤必發奔豚灸其核各一壯加桂一兩與服因燒針煩躁者去芍藥減桂一兩牡蠣龍骨各一兩可代救逆湯足陽明胃經傷風口燥煩渴自汗嗜臥身重小便難以其脈俠鼻絡目下膈屬胃絡脾俠臍入氣街故陽明諸證如是治之宜杏子湯杏子湯治陽明傷風能食口苦咽乾腹滿微喘發熱惡風自汗嗜臥身重小便難潮熱而噦其脈浮弦長而數悉主之杏仁去皮尖半夏湯去滑五味子各二錢半芍藥桂心細辛乾薑炮大黃蒸甘草炙各三錢茯苓四錢上㕮咀每服四錢水一盞半煎至七分去滓食前服足少陽膽經傷風身熱惡風自汗項強脅滿以其脈起於目兌眥上抵頭角交出入缺盆下胸中貫膈絡肝循脅裡出氣街合髀厭中故少陽諸證如是治之宜柴胡加桂湯柴胡加桂湯治少陽傷風四五日身熱惡風頸項強脅下滿手足溫口苦而渴自汗其脈陽浮陰弦或發汗多亡陽譫語可以此和其榮衛通其津液自愈柴胡一兩三錢半夏湯去滑四錢一字甘草炙三錢一字芍藥黃芩人參桂各半兩上㕮咀每服五錢匕水一盞半薑五片棗一個煎七分去滓食前溫服足太陰脾經傷風自汗胸滿腹痛四肢倦怠以其脈入腹絡胃上膈俠咽連舌本散舌下故太陰諸證如是治之宜桂枝芍藥湯桂枝芍藥湯治太陰傷風自汗咽乾胸腹滿自利不渴四肢倦怠手足自溫其脈弦大而緩者桂心半兩白芍藥三兩上㕮咀每服五錢匕水一盞半薑三片棗一個煎七分去滓溫服腹痛甚者加大黃一兩足少陰腎經傷風口燥舌乾咽痛胸滿心煩自汗腰連胻骨痠痛以其脈貫脊屬腎上貫肝膈入肺中循喉嚨俠舌本故少陰諸證如是治之宜桂附湯桂附湯治少陰傷風胸滿心煩咽喉痛自汗腰疼連胻骨痠痛嘔吐涎沫頭痛其脈沉弦者附子生去皮臍桂心乾薑炮芍藥甘草炙茯苓桃仁去皮尖麵炒各一兩上㕮咀每服四錢水三盞煎七分去滓食前服或咽喉痛加桂枝足厥陰肝經傷風自汗惡風而倦小腹急滿以其脈循股入毛中環陰器抵小腹俠胃絡膽布脅與督脈會故厥陰諸證如是治之宜八物湯八物湯治厥陰傷風惡風而倦自汗小腹急痛寒熱如瘧骨節煩疼其脈尺寸俱微而遲者桂心當歸川芎前胡防風各三分芍藥一兩半甘草炙茯苓各半兩上㕮咀每服四錢水一盞半薑五片棗三個煎八分去滓食前服敘傷寒論經云冬傷於寒春為溫病以冬不即病其寒毒藏於風府之上至春溫暖之氣發而為病故曰溫病或愈或死死則六七日間愈則多出旬日之外世號為大病要當隨此經絡傳變仍以脈證別之乃可施治治傷寒法蓋盡於此至晉集仲景論於太陽經出麻黃桂枝二方治傷寒傷風並録預備救失加減之法甚詳至陽明少陽與三陰經傷風證治則蔑聞矣故知仲景只就太陽一經格量二病令勿差互編集既不詮辨後學懵無所知昏翳典墳千有餘載略不加省良可嘆息今輒提其六經傷寒合用對治諸方以為宗兆其如壞證治法除各見本門外編集於後使皂白自分初不敢取諸胸臆蓋有所本於聖經也傷寒辨正內經論傷寒惟説足三陰三陽六經傳受愈否日數及各隨其臟腑經絡流注去處而證以行汗下並兩感脈應病形而已至張長沙以伊尹湯液作治法兼述傷風暑濕等詳略不同格量互顯使後學舉隅而反至晉不解其義隨行編集遂行於世此後蹈襲者不可勝計所謂百問證治提綱目録撮要備全活人書傷寒論乃至圖形指脈皆剝採晉集初無反隅雖有意於廣傳皆未明其義類緣晉集不識偏正以此類預備之方雜於正治而正治之方多所簡脫故使典籍愈翳後學固封不削繁蕪罔知樞要因別論於後云傷寒證治足太陽膀胱經傷寒頭項強腰脊痛無汗惡寒其經絡流注去處與傷風同但脈浮洪緊數為異耳惟足太陽寒水為諸陽主氣故寒先傷之麻黃湯治太陽傷寒脈浮緊而數頭痛身疼發熱惡寒無汗胸滿而喘者麻黃去節桂心各一兩甘草炙半兩杏仁二十五粒上㕮咀每服五錢水一盞半煎八分去滓食前服覆取微汗夏則加知母半兩石膏一兩黃芩一分或汗出後無大熱而喘者去桂加石膏四兩小青龍湯治傷寒表未解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利小腹滿而喘者麻黃去節細辛去苗乾薑炮甘草炙桂心芍藥各三兩半夏湯去滑五味子各二兩半上㕮咀每服五錢水二盞煎八分去滓食前溫服噎者去麻黃加熟附子一錢若小便不利小腹滿者加茯苓一錢喘者加杏仁七枚去皮尖溫粉凡發汗不欲多多則亡陽宜用此粉撲之即愈效如神白朮藁本川芎白芷上為末每末一兩入米粉三兩和勻撲之大青龍湯治太陽中風傷寒脈緊發熱惡寒身疼不汗出而煩渴或脈浮緩身不疼但重乍有輕時或傷寒見風脈傷風見寒脈麻黃去節三兩桂心甘草炙各一兩杏仁去皮尖一兩石膏一兩上為銼散每服五錢匕水一盞半薑五片棗一個煎七分去滓食前服足陽明胃經傷寒身熱目痛而鼻乾不得臥不惡寒腹滿咽乾口燥而渴其脈流注與傷風同以陽明主肉故次傳之大承氣湯治陽明傷寒脈長身熱不惡寒目疼鼻乾不得臥腹滿咽乾渴大便硬譫語或汗後脈沉實或下利心下堅或已經下其脈按之浮沉尚有力者大黃酒洗半兩芒硝一分別研入厚朴薑製一兩枳實一分銼炒去瓤上為粗末每服五錢水二盞煎八分去滓入硝再煎服若脈遲而滑汗出身重時發潮熱並得病二三日無太陽證煩躁心下硬下利後譫語者去芒硝名小承氣或發汗不解蒸蒸發熱溫溫欲吐胸中痛大便反溏及吐利後腹脹厥煩譫語去厚朴枳實入甘草半兩芒硝一分煎名調胃承氣或結熱膀胱如狂狀下血小腹急結者去厚朴枳實加桃仁十二個桂甘草各半兩硝一分名桃核承氣大柴胡湯治證狀大略與大承氣湯同輕則柴胡重則承氣柴胡四兩黃芩赤芍藥各一兩半半夏湯去滑一兩一分枳實麩炒一分上為粗末每服三大錢水一盞半薑五片棗一枚煎八分去滓食後溫服若內熱裡實身體疼痛是表證未解不可服足少陽膽經傷寒胸脅痛耳聾口苦咽乾往來寒熱目眩乾嘔其脈流注與傷風同以少陽主膽屬半表半裡故三傳之小柴胡湯治少陽傷寒脈弦或沉緊往來寒熱胸脅苦滿默默不欲食心煩喜嘔或渴腹痛或脅下痞硬或心悸小便不利或咳有微熱亦有不渴不嘔者又治婦人傷風傷寒經水適斷發熱惡寒晝日明瞭暮則譫語此為熱入血室其血必結故使如瘧狀得七分熱除脈遲身涼胸滿譫語如結胸狀前刺期門隨其實而取之投此湯即愈又太陽病不解轉入少陽並陽明傷寒脈反弦浮身目悉黃小便黃潮熱時噦柴胡二兩半夏湯去滑六錢一字黃芩人參甘草炙各三分上為銼散每服五錢水一盞半生薑五片棗一枚煎七分去滓食前服若腹痛去黃芩加芍藥三分心下悸小便不利加茯苓一兩若不渴則有微熱去人參加桂三分若咳嗽去棗加五味子三分乾薑半兩胸中煩不嘔者去半夏加栝蔞實一枚四分之一若渴去半夏加栝蔞根一兩胸中痞硬去棗加牡蠣一兩若過經不解日晡發熱已而微利加芒硝一兩足太陰脾經傷寒手足溫自利不渴腹滿時痛咽乾其脈流注與傷風同治之各有正方治中湯治太陰傷寒手足溫自利不渴腹滿時痛咽乾其脈尺寸俱沉細人參乾薑炮白朮甘草炙陳皮青皮各等分上銼散每服四錢水一盞半煎七分去滓食前服五積散治太陰傷寒脾胃不和及有積聚腹痛蒼朮泔浸一宿二十兩桔梗十兩陳皮六兩白芷甘草炙各三兩當歸二兩川芎一兩半芍藥白茯苓半夏湯去滑各一兩麻黃去節春夏二兩秋冬三兩乾薑春夏兩半秋冬二兩枳殼湯浸去瓤銼炒四兩厚朴薑製炒二兩桂心春夏三兩秋冬四兩上先將前十二味㕮咀微炒令香取出當風涼之入後枳殼桂朴三味同為細末每服三錢水一盞薑三片棗二枚煎七分食前溫服傷寒手足逆冷自汗不止脈沉細面青嘔逆加順元散一錢同煎熱服産婦陳疏難産經三兩日不生胎死腹中或産母氣乏委頓産道乾澀加順元散水七分酒三分煎相繼兩服氣血內和即産胎死者不過三服當下其順元散多少量産母虛實加減傷寒發熱俠內寒者加蔥白二寸豉七粒同煎相繼服當以汗解順元散烏頭炮去皮尖二兩附子炮去皮臍天南星炮各一兩木香半兩上為末同前法煎此藥治內外感寒脈沉伏遲細手足冷毛髮恂栗傷寒陰證大啜一二杯氣和汗出即愈足少陰腎經傷寒口燥舌乾而渴背惡寒反發熱倦怠其脈流注與傷風同附子細辛湯治少陰傷寒口中和而背惡寒反發熱倦怠自汗而渴其脈尺寸俱沉而緊者麻黃去節細辛附子炮去皮臍各半兩上粗末每服四錢水一盞半煎七分去滓食前服手足厥冷者去麻黃細辛加乾薑半兩甘草一分或口燥舌乾而渴宜急下之足厥陰肝經傷寒煩滿發熱惡寒往來如瘧或囊縮小腹急痛其脈流注與傷風同本論用小建中湯方見九痛門去遠志即是麻黃桂枝各半湯治厥陰傷寒煩滿發熱惡寒往來如瘧或囊縮其脈尺寸俱微緩者主之若脈沉短其囊必縮急以大承氣下之可保五死一生承氣湯乃利陽明藥耳若病到厥陰其勢已甚蓋陽明養宗筋為熱毒所攻乃以承氣瀉其能養故利陽以救陰此猶假虞伐虢圍魏救趙之意也桂心四錢一字芍藥麻黃去節杏仁十二個去皮尖甘草炙各半兩上粗末每服五錢水一盞半煎八分去滓食前服入薑棗煎亦得大承氣湯方見足陽明經小建中湯方見九痛門傷寒傳變次序內經熱論論傷寒云太陽為諸陽主氣傷寒必先自太陽始至漢諸師凡外所因皆曰太陽病未為了義足太陽寒水其位居辰辰為六氣化原故丙辛遁起戊子至辰為壬辰水而太陽正化居焉在天為寒在地為水寒喜歸水故寒必首傷太陽以此例推寒既自太陽入風當自少陽入濕當自陽明入經曰陰為之主陽與之正別於陽者知病從來別於陰者知死生之期此之謂也或問傳變次序當如何耶然陰陽流行出入次序固有定説及其中病或喜入或成虛或成兩感或守一經其可拘也但當以脈證分別陰陽表裡盛衰為治尤不可以日數期也料簡論曰有汗不得服麻黃無汗不得服桂枝切忌不得誤若寒證見風脈風證見寒脈卻以麻黃桂枝各半湯古人治傷風熱多寒少惡風脈浮緊無汗用青龍湯蓋先傷風而後傷寒風證尚在而寒脈已行故有是備也若先傷寒而後傷風寒多熱少不煩躁微厥脈當浮緩弱而自汗即傷寒見風脈但青龍緊暴不若各半湯平和無悔吝也諸經皆仿此六經傷寒用藥格法夫傷寒始自太陽逆傳陽明至於厥陰而止六經既別治法不同太陽屬膀胱非發汗則不愈必用麻黃者以麻黃生於中牟雪積五尺有麻黃處雪則不聚蓋此藥能通內陽氣卻外寒也陽明屬胃非通泄則不愈必用大黃芒硝以利之少陽屬膽無出入道柴胡與半夏能利能汗佐以子芩非此不解太陰屬脾中州土也性惡寒濕非乾薑白朮不能溫燥少陰屬腎性畏寒燥非附子則不能溫厥陰屬肝藏血養筋非溫平之藥不能潤養此經常之道也後學不知倫類妄意進餌遂致錯亂諸證蜂起夭傷人命可不究辨且三陽病汗下和解人心知之至太陰脾經溫燥不行亦當溫利自陽明出如溫脾丸用大黃者是也少陰腎經雖用附子復使麻黃則知少陰亦自太陽出厥陰用桂自少陽出明矣及其二陽鬱閉皆當自陽明出故三陰皆有下證如少陰口燥咽乾下利清水太陰腹滿時痛厥陰舌卷囊縮皆當下之學者宜審詳不可率易投也溫脾丸治久病虛羸脾氣弱食不消喜噎黃柏大麥糵炒吳茱萸桂心乾薑炮細辛附子炮去皮臍當歸大黃蒸神麯炒黃連各一兩上為末蜜和丸如梧子大每服三十丸空腹酒飲任下三陽合病脈證治三陽有合病三陰無合病所謂三陽合者有太陽陽明有少陽陽明自太陽傳至陽明頭疼腰痛者太陽也肌熱目痛鼻乾者陽明也尚惡寒脈必浮大而長浮者太陽脈也長者陽明脈也當隨證調之本太陽證因發汗多則譫語屬陽明故有太陽陽明也少陽證未罷猶當和解不可便作陽明下之葛根湯治太陽病項背強𠘧𠘧然無汗惡寒並治三陽合病自利方葛根一兩麻黃去節三分桂心半兩甘草炙芍藥各半兩上銼散每服五錢匕水一盞半薑五片棗一枚煎七分去滓食前溫服三陽合病不下利但嘔者加半夏六錢兩感證論並治法兩感傷寒者表裡俱病也一日太陽與少陰俱病頭痛口乾咽滿而渴二日陽明與太陰俱病腹滿身熱不食譫語三日少陽與厥陰俱病耳聾囊縮而厥兩病俱作治有先後先宜救里臟氣內正急宜攻表救內固宜急而表亦不可緩也救里解表各隨諸證而善用之自非精妙甄別其孰能與於此也四逆湯治少陰傷寒自利不渴嘔噦不止或吐利俱發小便不利或汗出過多脈微欲絶腹痛脹滿手足冷及一切虛寒厥冷凡病傷寒有此證候皆由陽氣虛有寒雖更覺頭痛體疼發熱惡寒四肢拘急表裡悉具者未可攻表宜先服此藥以助陽救里甘草炙一分乾薑二錢炮附子炮去皮臍半兩上銼散每服五錢匕水一盞半煎七分去滓食前服強人加乾薑一錢或惡寒脈微而利利止仍亡血者加人參半兩或發汗若下之病仍不能解煩躁者仍加茯苓半兩面赤者加連須蔥九莖腹中痛者去蔥加芍藥一兩嘔者加生薑一兩咽痛者去芍藥加桔梗半兩兩感治法料簡桂枝麻黃皆攻太陽經表藥方各見太陽經其如陽明太陰少陽厥陰並可於風寒二方論中隨證施治陰毒證治陰毒為病手足冷腰背強頭疼腹痛或煩渴精神恍惚額與手背時出冷汗音聲鄭重爪甲面色青黑多因脾腎虛寒伏陰重感於寒所致附子散治陰毒傷寒唇青面黑身重強四肢冷或因服冷藥過度心腹脹滿昏沉不識人附子炮去皮臍三分桂心半兩當歸白朮各半兩半夏湯洗去滑乾薑各一分炮上為末每服三錢水二盞生薑三片煎六分不以時熱服衣覆取汗返陰丹治陰毒傷寒心神煩躁頭痛四肢逆冷面青腹脹脈沉伏者硫黃通明五兩別研硝石別研太陰玄精各二兩別研乾薑炮桂心附子炮各半兩上用鐵銚先鋪玄精次下硝末各一半中間鋪硫黃末又將二石余末蓋上以小盞合著熟炭火三斤燒令得所勿令煙出急取瓦盆合著地上四面灰蓋勿令煙出候冷取出研細入後藥為末同研勻米糊丸如梧子大每服二三十丸煎艾湯下頓服汗出為度未退乃大著艾炷灸臍下丹田氣海更不退則以蔥啖尉之蔥啖尉法治氣虛陽脫體冷無脈氣息欲絶不省人事及傷寒陰厥百藥不效者蔥一束以索纏如餅餡大去根葉唯存白長二寸許先以火熁一面令通熱勿至灼人乃以熱處著病人臍下上以尉斗盛火尉之令蔥餅熱氣透入腹中更作三四餅遇一餅壞不可尉即易一餅候病人醒手足溫有汗乃瘥更服四逆湯良陽毒證治陽毒為病躁熱面赤咽痛身斑色如錦紋下利赤黃內外結熱舌焦鼻黑類如煙煤妄言狂走多因腸胃燥熱陽氣獨盛陰氣暴絶妄服燥藥熱食所致升麻湯治陽毒傷寒一二日便成陽毒或服藥吐下後變成陽毒腰背痛煩悶不安面赤狂言或走或見鬼或下利面赤斑斑如錦紋咽喉痛下膿血脈大浮數五日可治七日不可治升麻半兩犀角屑射干黃芩人參甘草炙各一分上為銼散每服五錢匕水一盞煎七分去滓熱服並進三四服溫覆汗出為度梔子仁湯治陽毒傷寒壯熱百節疼痛梔子仁炒赤芍藥大青知母各一兩升麻黃芩石膏杏仁去皮尖各二兩柴胡一兩半甘草炙半兩上銼散每服四大錢水一盞薑三片豉二十粒同煎七分去滓不以時服結胸證治結胸證者心下堅滿按之石硬而痛心膈高起手不得近項強如柔痓狀此本傷寒身熱醫下之早熱氣乘虛而入痞結不散之所致也若脈浮大皆不可下下之則死尚宜發汗若沉緊者宜以大小陷胸湯量輕重而下之又結胸有不按而痛者有按而痛者有水結在胸脅間但頭汗出者有熱實結者有寒實結者治之不可不知其輕重也各有正方大陷胸湯治傷寒表未解而醫反下之鬲內拒痛手不可近短氣煩躁心中懊憹心下硬大便不通舌燥而渴熱實脈沉而緊又治身無大熱有水結在胸脅間者大黃半兩芒硝四錢甘遂半錢上各為末水三盞先煮大黃至一大盞入硝煮熔下甘遂末煮一沸分二服得利止小陷胸湯治結胸病正在心按之則痛脈浮滑者黃連一分半夏湯洗去滑六錢栝蔞實不用四分之一上為銼散水二盞先煎栝蔞至盞半入前藥煎至六分去滓分二服利黃涎沫即安大陷胸丸治病發於陽而反下之熱入因作結胸以下之太早故也其病項強如柔痓狀下之則和大黃二兩葶藶炒杏仁去皮尖炒芒硝各三分上前二味為末將杏仁芒硝合研為脂和藥取如彈子大一枚別杵甘遂末一錢匕白蜜一大匕水二盞煎至七分頓服之一宿乃下如不下更服取下為效甘遂性猛宜斟酌虛實入之胸痞證治胸痞證者胃中不和心下堅硬乾嘔惡寒汗出噫氣不除亦有因傷寒身冷醫反下之遂成胸痞枳實理中丸治傷寒及諸吐利後胸痞欲絶膈高起急痛手不得近枳實去瓤麵炒茯苓人參白朮乾薑炮甘草炙各等分上為末蜜和一兩作四丸熱湯化下渴加栝蔞根下利加牡蠣粉各等分桔梗枳殼湯治中寒氣痞胸滿欲死桔梗枳殼麩炒去瓤各一分上為銼散每服五錢匕水一盞半煎七分去滓食前服三黃湯治傷寒陰證下之太早致心下痞按之軟其脈關上浮者主之若表未解未可攻宜先隨風寒二證投桂枝麻黃湯表解已即服此方大黃蒸黃連黃芩上為銼散每服五錢沸湯二盞熱漬之一時久去滓分二服暖服或汗出惡寒加附子別煎汁入一合同服半夏瀉心湯治心下痞滿而不痛者半夏湯洗七次一兩一錢黃芩人參甘草炙乾薑炮各兩半黃連半兩上銼散每服五錢水盞半薑五片棗一個煎七分去滓溫服或傷寒中風醫反下之下利日數十行穀不化腹中鳴心下痞硬乾嘔心煩者加甘草半兩人參一兩名甘草瀉心湯或汗出解後胃中不和心下痞硬干噎食臭脅下水鳴下利者加生薑一兩減乾薑一兩余如正方名生薑瀉心湯勞復證治傷寒新瘥後不能將攝因憂愁思慮勞神而復或梳沐洗浴作勞而復並謂之勞復或飲食不節謂之食復此皆大病後精神血氣腸胃並虛之所致也論有正方可依證調治唯犯房室為女勞復多死不治白朮散治傷寒氣脈不和憎寒壯熱鼻塞腦悶涕唾稠黏痰嗽壅滯或冒涉風濕憎寒發熱骨節煩痛或中暑嘔吐眩暈及大病後將理失宜食復勞復病證如初悉主之又治五勞七傷氣虛頭眩精神恍惚睡臥不寧肢體倦怠潮熱盜汗脾胃虛損面色痿黃飲食不美口吐酸水臟腑滑泄腹內虛鳴反胃吐逆心腹絞痛久瘧久利及膈氣咽塞上氣喘促坐臥不安或飲食所傷胸膈痞悶腹脅䐜脹婦人産前産後血氣不和霍亂吐瀉氣厥不省人事常服闢四時不正之氣及山嵐瘴疫神效不可具述白芷甘草炒青皮陳皮白茯苓桔梗山藥香附去毛各三兩乾薑半兩白朮一兩上為末每服二錢匕水一盞薑三片棗一個木瓜幹一片紫蘇兩三葉煎七分食前服若吐瀉入白梅煎喘入桑白皮杏仁煎傷寒勞復入薄荷膈氣入木通三寸麝香少許中暑嘔逆入香薷産前産後血氣不和入荊芥煎霍亂入藿香煎氣厥入鹽湯調下陰陽易證治陰陽易者其男子病新瘥未平復而婦人與之交接得病名曰陽易裡急腰踝連腹內痛婦人病新瘥未平復而男子與之交接得病名曰陰易身重少氣陰腫入里腹內絞痛熱上衝胸頭痛不欲舉眼中生花蓋男女病相換易故謂之陰陽易證治燒裩散治傷寒陰易其人身體重少氣小腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急悉主之婦人裩襠燒灰上細研以方寸匕水調服小便利陰頭痛即愈猳鼠糞湯治丈夫傷寒病後女人與之交接名曰陽易韭根去青一握約徑寸半猳鼠糞十四枚兩頭尖者是上二味水一盞煎至半盞去滓溫溫頓服黏汗出為效未知再作發斑證治傷寒發斑者蓋不當下而下之熱則乘虛入胃當下而失下則胃熱不得泄二者皆能發斑其狀如錦紋赤者易治黑者難治蓋熱毒入胃深也玄參升麻湯治傷寒失下不當下而下之熱毒在胃發斑如錦紋甚則煩躁譫語兼治喉閉腫痛玄參升麻甘草炙各半兩上為銼散每服五錢匕水盞半煎七分去滓溫服溫毒亦能發斑
