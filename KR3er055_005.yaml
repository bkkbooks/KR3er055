body:
  text: 卷之五壞傷寒證治壞傷寒者以醫者不辨陰陽錯謬下汗置病不解壞證亂經又傷寒過經熱留臟腑病候數變久而不瘥陰陽無復紀律皆名壞病知母麻黃湯治壞傷寒以傷寒瘥後經久精神不守言語錯謬或潮熱頰赤寒熱如瘧昏沉不愈皆由汗下不止毒在心包間所致也知母半兩麻黃去節甘草炙芍藥黃芩桂心各半兩上為銼散每服五錢水一盞半煎七分去滓溫服日三四服若心煩欲飲水稍稍與之無憂散治傷寒調理失序毒氣內結胸腹脹滿坐臥不安日久不瘥狂躁妄語大小便不通或復吐逆臘月黃牛膽以天南星為末入膽內縛令緊當風避日懸之候乾取用上為末以人參半兩煎湯七分盞調末二錢乘熱服遲頃更以熱人參湯投之或睡便溺下黃黑惡物是效黑奴丸治傷寒調理失序醫所不治及時行疫病六七日不汗脈洪數面赤目瞪身熱煩躁狂言欲走大渴或口噤精魂已散但心下暖斡開口灌藥下咽即活治陽毒發斑麻黃去節大黃各二兩芒硝釜底煤別研梁塵別研小麥奴灶突墨各一兩別研上為末煉蜜丸彈子大新汲水研下一丸渴者與冰水盡飲之須臾當寒寒竟汗出便瘥若日移五尺不汗依前法服一丸瘥須病人大渴乃可與之不渴者莫服狐惑證治狐惑證者默默欲眠目不得瞑惡飲食面目乍赤乍白乍黑齒無色舌上白聲嗄咽乾此因大病後腸胃空虛三蟲求食食人五臟食其喉則為惑其聲嗄食下部則為狐其咽乾當看上唇有瘡蟲食其臟下唇有瘡蟲食其肛桃仁湯桃仁去皮尖槐子碎艾各一兩上銼散每服五錢水大盞薑三片棗兩枚煎七分去滓食前服之黃連犀角湯治傷寒及諸病後內有瘡出下部黃連半兩犀角一兩無則以升麻代烏梅七個木香一分上為銼散每服五錢水盞半煎七分去滓食前服雄黃兌散治下部𧈟瘡雄黃研青葙子苦參黃連各二分桃仁去皮尖研一分上為末以生艾搗汁丸如棗核大綿裹納下部扁竹汁更加無艾只用綿裹散子納下部亦得譫語證治病有言語錯謬者其證有二有虛有實虛則鄭聲實則譫語傷寒胃實及三陽合病婦人熱入血室及下利而譫語者皆屬實大小便利手足逆冷脈微細言語鄭重者皆屬虛寒治之各有方虛寒當溫之如四逆湯之類胃實宜下承氣湯婦人熱入血室下小柴胡湯若譫語而反四逆脈沉細者不治四逆湯方見兩感門柴胡湯方見少陽經大承氣湯方見陽明經病後虛煩證治大病後心虛煩悶發熱與傷寒相類但不惡寒與不頭疼為異汗與人參竹葉湯嘔者橘皮湯諸病後多有此證各見本門人參竹葉湯治汗下後表裡虛煩不可攻者竹葉二把人參甘草炙各二兩半夏二兩半石膏麥門冬各五兩上為銼散每服四大錢水一盞半薑五片粳米一撮煎米熟去滓食前服橘皮湯治動氣在下不可發汗發之反無汗心中大煩骨節疼痛目瞤惡寒食則反嘔谷不得入宜服此方橘皮一兩半甘草炙半兩人參一分竹茹半兩上銼散每服五錢水一盞薑三片棗一個煎至七分去滓食前服之料簡凡傷寒中雜病證狀非一當隨門類量酌施治可也如發黃則多用五疸中藥只依黃疸治之發狂已見陽毒門吐衄便利瘀血見失血門下痢見滯下奔豚見五積陰陽厥見厥論嘔噦喘咳各見本門其他更不繁録傷暑敘論傷暑者乃夏至前後各三十日有奇少陽相火用事之時也炎熱大行爍石流金草萎河涸人或傷之則發熱自汗面垢背寒倦怠少氣以暑消氣氣消血散與傷寒相類此是夏間即病非冬傷寒至夏發為熱病也當以脈別之傷暑脈虛無力蓋因氣血消散致血虛弱傷寒則泣血而閉脈緊而有力大不同也要略言傷寒家別有暍病蓋詮次者見其一條別在後故有是説輕重不同識者當自知之傷暑證治病者身熱惡寒頭疼狀如傷寒或往來寒熱如瘧煩躁渴甚眩暈嘔吐背寒面垢泄瀉昏悶不清其脈陰陽俱虛緩而微弱皆由傷暑之所致也卻暑散治冒暑伏熱頭目眩暈嘔吐泄利煩渴背寒面垢赤茯苓甘草生各四兩寒食麵生薑各一斤切搜面令勻上為末每服兩錢新汲水調下或湯點服不拘時候五苓散治傷暑煩渴引飲無度兼治傷寒溫熱表裡未解煩渴引水水入即吐或小便不利及汗出表解煩渴不止又治霍亂吐利黃疸濕疫澤瀉二兩半桂心一兩豬苓去皮赤茯苓白朮各一兩半上為末每服二錢沸湯下不以時服訖多飲熱湯汗出即愈桂苓丸治煩渴消痰飲寬胸膈桂心白朮各二兩赤茯苓三兩烏梅肉兩半乾生薑一兩甘草炙半兩上為末蜜丸彈子大每一丸至二丸嚼細熟水下香薷丸治大人小兒傷暑伏熱躁渴瞀悶頭目昏眩胸膈煩滿嘔噦噁心口苦舌乾肢體困倦不思飲食或發霍亂吐利轉筋並宜服之香薷去梗紫蘇去梗乾木瓜各一兩丁香甘草炙檀香白茯神去木藿香各半兩上為末蜜丸彈子大每一丸至二丸熟水嚼下或新汲水化下亦得小兒半丸消毒丸治中暑煩渴暈眩寒熱半夏一斤七次湯去滑米醋煮令透茯苓甘草生各半斤上為末蜜丸梧子大每服三十丸新汲水不以時服傷濕敘論經云濕為停著凡關節疼痛重痹而弱皆為濕著若氣不平亦使人半身不遂口眼喎斜涎潮昏塞此中濕之候也夫寒熱風濕皆能併合為病所謂風濕寒濕濕溫者其證各不同為治亦別不可不辨若治風濕寒濕當發其汗但微微似汗出則風濕俱去若大汗出風去濕不去則不能愈若治單單中濕只宜利小便忌不得以火攻並轉利濕家下之額上汗出微喘小便不利者死若下利不止者亦死論曰治濕不利小便非其治也傷濕證治病者身重腳弱關節重疼發熱惡寒小便祕澀大便飧泄自汗腰腳冷痹腿膝浮腫小便或自利不渴皆久坐卑濕或為雨露所襲或汗出衣里受濕漸漬得之名曰濕痹腎著湯治身重腰冷痹如坐水中形如水狀反不渴小便自利食飲如故病屬下焦以身勞汗出衣里冷濕久而得之腰以下冷痛腰重如帶五貫錢甘草炙白朮各二兩乾薑炮茯苓各四兩上為銼散每服四大錢水一盞半煎七分去滓食前服滲濕湯治坐臥濕地或為雨露所襲身重腳弱關節重疼發熱惡寒或小便祕澀大便飧泄或汗出衣里濕漬得之腿膝或腫小便利反不渴蒼朮米泔浸白朮甘草炙各二兩乾薑炮茯苓各四兩陳皮丁香各半兩上銼散每服四錢水盞半薑三片棗二枚煎七分去滓溫服寒濕證治病者身體煩疼無汗惡寒發熱脈浮緩細皆寒濕相併所致也麻黃白朮湯治寒濕身體煩疼無汗惡寒發熱者麻黃去節三兩桂心二兩甘草炙一兩杏仁二十粒去皮尖白朮四兩上為銼散每服四錢水盞半煎七分去滓食前溫服風濕證治病者身疼日晡發熱不能轉側短氣汗出惡風不欲去衣或身微腫脈浮弦細此風濕相搏或汗出當風所致也桂枝附子湯治風濕相搏身體煩疼掣痛不得屈伸汗出短氣小便不利惡風不欲去衣或身微腫桂枝去皮四兩白朮附子炮去皮臍各三兩甘草炙三兩上為銼散每服四大錢水盞半薑五片棗兩個煎七分去滓空心溫服或大便祕則去桂小便不利悸氣加茯苓三兩痹加防己四兩腹痛加芍藥四兩風濕寒證治病者汗出身重惡風喘滿腹內不和下氣上衝臍下連腳冷痹不能自屈伸骨節煩疼近之則痛極如癧節狀此由冒風濕寒三氣雜至而為病也防己黃耆湯治傷風濕寒脈浮緊細身重汗出惡風並治風水脈浮身重不渴防己四兩黃耆五兩甘草炙二兩白朮三兩上為銼散每服五錢水盞半薑五片棗兩枚煎七分去滓空腹服喘者加麻黃胃中不和加芍藥氣上衝加桂下有陳寒加細辛服藥後當如蟲行皮中從腰以下如水後坐被上又以一被繞腰以溫下令微汗瘥風濕溫證治病者煩渴引飲心腹冷痛躁悶口乾面垢惡寒惡風飢不能食眩暈嘔噦此伏暑中風濕所致也治之各有方法白朮茯苓乾薑湯治伏暑中風濕煩渴引飲心腹疼躁悶口乾面垢灑灑惡寒淅淅惡風微汗飢不能食白朮乾薑茯苓細辛桂心乾葛甘草炙橘皮烏梅京豉上等分為細末每服二錢白湯點下暑濕風溫證治暑者六氣之一能與風濕併合為病循經流入諸臟但與寒不相得故有暑濕風溫之證暑濕者惡寒反熱自汗關節盡痛頭目昏眩手足倦怠不自勝持此並傷暑濕所致也風溫者頭痛身熱常汗出體重喘息四肢不收默默欲眠此由先傷風后傷暑所致也治之各有方法茯苓白朮湯治冒暑毒加以著濕或汗未乾即浴皆成暑濕茯苓乾薑炮甘草炙白朮桂心各一兩上為銼末每服四錢水一盞煎七分去滓食前服葳蕤湯治風溫兼療冬溫及春月中風傷寒發熱頭眩痛咽喉干舌強胸內疼痛痞滿腰背拘急葛根麻黃去節湯焙乾稱甘草炙白薇川芎羌活杏仁各半兩去皮尖石膏一兩碎葳蕤三分青木香一分上銼散每服五錢水盞半煎七分去滓食前服之木香冬用一兩春用半兩君火論五行各一唯火有二者乃君相之不同相火則麗於五行人之日用者是也至於君火乃二氣之本源萬物之所資始人之初生必投生於父精母血之中而成形精屬腎腎屬水故天一而生水血屬心心屬火故地二而生火識為玄玄屬水故天三而生木乃太一含三引六之義也亦道生一一生二二生三之數也則知精血乃財成於識以識動則暖靜則息靜息無象暖觸可知故命此暖識以為君火正內典所謂暖識息三連持壽命者是也然其所以謂之君者以不行炎暑象君之德萬物資始象君之化位居少陽象君之政神明出入象君之令故君亦天也天亦君也乾以元亨利貞而運行於其上君以德化政令而輔成於其下天道順序則生長化收藏不失其時君道助順故進退存亡不失其正其實皆一理也成象取法雖主配於心腎推而明之一點精明無物不備是宜君火之用上合昭昭下合冥冥與萬物俱生而無所間斷也醫者苟不明此皆墮於術數伎藝與夫瞽史之用易拘拘於卜筮休咎之中吾見其大蔽聖人之道未聞有益於天下後世也悲夫五運論夫五運六氣乃天地陰陽運行升降之常道也五運流行有太過不及之異六氣升降則有逆從勝復之差凡不合於德化政令者則為變眚皆能病人故經云六經波蕩五氣傾移太過不及專勝兼併所謂治化人應之也或遇變眚聿興災沴因郁發以亂其真常不德而致折復隨人臟氣虛實而為病者謂之時氣與夫感冒中傷天行疫沴顯然不同前哲知夫天地有餘不足違戾之氣還以天地所生德味而平治之經論昭然人鮮留意恐成湮沒故敘而紀之五運時氣民病證治凡遇六壬年發生之紀歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴脅支滿甚則忽忽善怒眩冒癲疾為金所復則反脅痛而吐甚則衝陽絶者死苓朮湯治脾胃感風飧泄注下腸鳴腹滿四肢重滯忽忽善怒眩冒顛暈或左脅偏疼白茯苓厚朴薑汁製炒白朮青皮乾薑炮半夏湯泡去滑草果去皮甘草炙各等分上銼散每服四錢水盞半薑三片棗兩枚煎七分去滓食前服之凡遇六戊年赫曦之紀歲火太過炎暑流行肺金受邪民病瘧少氣咳喘血溢泄瀉嗌燥耳聾中熱肩背熱甚胸中痛脅支滿背髀並兩臂痛身熱骨痛而為浸淫為水所復則反譫妄狂越咳喘息鳴血溢泄瀉不已甚則大淵絶者死麥門冬湯治肺經受熱上氣咳喘咯血痰壅嗌乾耳聾泄瀉胸脅滿痛連肩背兩臂膊疼息高麥門冬去心香白芷半夏湯洗去滑竹葉甘草炙鍾乳粉桑白皮紫菀取茸人參各等分上銼散每服四錢水盞半薑兩片棗一枚煎七分去滓食前服凡遇六甲年敦阜之紀歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤甚則肌肉痿足痿不收行善瘈腳下痛中滿食減四肢不舉為風所復則反腹脹溏泄腸鳴甚則大溪絶者死附子