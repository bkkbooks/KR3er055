泉氣化運行後天初之氣太陰濕土加厥陰木此下克上民病中熱脹面目浮腫善眠鼽衄嚏欠嘔吐小便黃赤甚則淋二之氣少陽相火加少陰君火此臣居君位民病癘大至善暴死三之氣陽明燥金加少陽相火燥熱交合民病寒熱四之氣太陽寒水加太陰濕土此下土克上水民病暴僕振栗譫妄少氣咽乾引飲心痛癰腫瘡瘍寒瘧骨痿便血五之氣厥陰風木加陽明燥金民氣和終之氣少陰君火加太陽寒水此下克上民病溫治法宜鹹寒以抑火辛甘以助金汗之清之散之安其運氣審平湯治卯酉之歲陽明司天少陰在泉病者中熱面浮鼻鼽小便赤黃甚則淋或癘氣行善暴僕振栗譫妄寒瘧癰腫便血遠志去心薑製炒紫檀香各一兩天門冬去心山茱萸各三分白朮白芍藥甘草炙生薑各半兩上銼散每服四錢水盞半煎七分去滓食前服自大寒至春分加白茯苓半夏湯洗去滑紫蘇生薑各半兩自春分至小滿加玄參白薇各半兩自小滿至大暑去遠志山茱萸白朮加丹參澤瀉各半兩自大暑至秋分去遠志白朮加酸棗仁車前子各半兩自秋分直至大寒並依正方寅申之歲少陽相火司天厥陰風木在泉氣化運行先天初之氣少陰君火加厥陰木民病溫氣拂於上血溢目赤咳逆頭痛血崩脅滿膚腠中瘡二之氣太陰土加少陰火民病熱鬱咳逆嘔吐胸臆不利頭痛身熱昏憒膿瘡三之氣少陽相火加相火民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死四之氣陽明金加太陰土民病滿身重五之氣太陽水加陽明金民避寒邪君子周密終之氣厥陰木加太陽水民病開閉不禁心痛陽氣不藏而咳治法宜鹹寒平其上辛溫治其內宜酸滲之泄之漬之發之升明湯治寅申之歲少陽相火司天厥陰風木在泉病者氣鬱熱血溢目赤咳逆頭痛脅滿嘔吐胸臆不利聾瞑渴身重心痛陽氣不藏瘡瘍煩躁紫檀香車前子炒青皮半夏湯洗酸棗仁薔蘼生薑甘草炙各半兩上為銼散每服四錢水盞半煎七分去滓食前服自大寒至春分加白薇玄參各半兩自春分至小滿加丁香一錢自小滿至大暑加漏蘆升麻赤芍藥各半兩自大暑至秋分加茯苓半兩自秋分至小雪依正方自小雪至大寒加五味子半兩丑未之歲太陰濕土司天太陽寒水在泉氣化運行後天初之氣厥陰風木加風木民病血溢筋絡拘強關節不利身重筋痿二之氣大火正乃少陰君火加君火民病溫癘盛行遠近咸若三之氣太陰土加少陽火民病身重胕腫胸腹滿四之氣少陽相火加太陰土民病腠理熱血暴溢瘧心腹䐜脹甚則浮腫五之氣陽明燥金加陽明燥金民病皮膚寒氣及體終之氣太陽寒水加寒水民病關節禁固腰脽痛治法用酸以平其上甘溫治其下以苦燥之溫之甚則發之泄之贊其陽火令御其寒備化湯治丑未之歲太陰濕土司天太陽寒水在泉病者關節不利筋脈拘急身重萎弱或溫癘盛行遠近咸若或胸腹滿悶甚則浮腫寒瘧血溢腰脽痛木瓜干茯神去木各一兩牛膝酒浸附子炮去皮臍各三分熟地黃覆盆子各半兩甘草一分生薑三分上為銼散每服四大錢水盞半煎七分去滓食前服自大寒至春分依正方自春分至小滿去附子加天麻防風各半兩自小滿至大暑加澤瀉三分自大暑直至大寒並依正方子午之歲少陰君火司天陽明燥金在泉氣化運行先天初之氣太陽水加厥陰木民病關節禁固腰脽痛中外瘡瘍二之氣厥陰風木加少陰君火民病淋目赤氣鬱而熱三之氣少陰君火加少陽火民病熱厥心痛寒熱更作咳喘目赤四之氣太陰土加濕土民病黃疸鼽衄嗌乾吐飲五之氣少陽火加陽明金民乃康終之氣陽明金加太陽水民病上腫咳喘甚則血溢下連少腹而作寒中治法宜咸以平其上苦熱以治其內咸以軟之苦以發之酸以收之正陽湯治子午之歲少陰君火司天陽明燥金在泉病者關節禁固腰痛氣鬱熱小便淋目赤心痛寒熱更作咳喘或鼻鼽嗌咽吐飲發黃疸喘甚則連小腹而作寒中悉主之白薇玄參川芎桑白皮炙當歸芍藥旋覆花甘草炙生薑各半兩上為銼散每服四錢水盞半煎七分去滓食前服自大寒至春分加杏仁升麻各半兩自春分至小滿加茯苓車前子各半兩自小滿至大暑加杏仁麻仁各一分自大暑至秋分加荊芥茵陳蒿各一分自秋分至小雪依正方自小雪至大寒加紫蘇子半兩巳亥之歲厥陰風木司天少陽相火在泉氣化運行後天初之氣陽明金加厥陰木民病寒於右脅下二之氣太陽水加少陰火民病熱中三之氣厥陰木加少陽火民病淚出耳鳴掉眩四之氣少陰火加太陰土民病黃疸肘腫五之氣太陰土加陽明金燥濕相勝寒氣及體終之氣少陽火加太陽水此下水克上火民病瘟癘治法宜用辛涼平其上鹹寒調其下畏火之氣無妄犯之敷和湯治巳亥之歲厥陰風木司天少陽相火在泉病者中熱而反右脅下寒耳鳴淚出掉眩燥濕相搏民病黃疸浮腫時作瘟癘半夏湯洗棗子五味子枳實麩炒茯苓訶子炮去核乾薑炮橘皮甘草炙各半兩上為銼散每服四錢水盞半煎七分去滓食前服自大寒至春分加鼠黏子一分自春分至小滿加麥門冬去心山藥各一分自小滿至大暑加紫菀一分自大暑至秋分加澤瀉山梔仁各一分自秋分直至大寒並依正方六氣凡例凡六氣數起於上而終於下歲半之前自大寒後天氣主之歲半之後自大暑之後地氣主之上下交互氣交主之司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯司氣同其主亦無犯異主則少犯之是謂四畏若天氣反時可依時及勝其主則可犯以平為期不可過也
