body:
  text: 卷之六敘疫論夫疫病者四時皆有不正之氣春夏有寒清時秋冬亦有暄熱時一方之內長幼患狀率皆相類者謂之天行是也若春時應暖而清氣折之則責邪在肝病曰青筋牽夏時應暑而寒氣折之則責邪在心病曰赤脈㩌秋時應涼而熱氣抑之則責邪在肺病曰白氣貍冬時應寒而暖氣抑之則責邪在腎病曰黑骨溫土無正形因火而名故附金木水火而變病曰黃肉隨其天行之病大則流毒天下次則一方一鄉或偏著一家悉由民庶同業所召故天地靈祗假斯不正之氣而責罰且人命有遭逢時有否泰故有偏著一家者天地既有斯害氣還以天地所生之物而防備之命曰賢人知方四季疫證治病者發熱腰痛強急腳縮不伸胻中欲折目中生花或澀澀憎寒復熱頸中雙筋牽不得屈伸項直背強眼赤黃欲轉動合目回側病名青筋牽者由春三月其源從厥陰涉足少陽少陽之氣始發少陰之氣始衰陰陽怫鬱於腠理臟腑受厲而生若腑虛則為陰邪所傷故發熱若臟實則為陽毒所損故憎寒治青筋牽二方肝腑臟溫病陰陽毒膽腑虛為陰邪所傷腰脅強急腳縮不伸胻中欲折目中生花色蒼蒼者柴胡去苗五兩茯苓梔子仁半夏湯洗大青各三兩桂心竹茹香豉甘草炙各一兩上銼散每服五錢水兩盞姜五片煎七分去滓空心溫服治青筋牽肝腑臟溫病陰陽毒肝臟實為陽毒所傷澀澀惡寒翕翕發熱頸外雙筋牽不得屈伸項直背強眼赤黃轉動則合身回側色蒼蒼者玄參一兩細辛二兩梔子仁黃芩升麻芒硝各三兩石膏煅八兩上為銼散每服五錢水兩盞入車前草三葉淡竹葉七片煎七分去滓空心服病者脈促身顫掉不能禁或肉熱口乾舌破咽塞聲嘶病名赤脈㩌者以夏三月其病從少陰太陽之氣相搏而停則榮衛不通皮肉痛起太陽發動少陰淫邪之氣因而作厲則臟腑隨時受夏疫病也若腑虛為陰邪所傷則寒戰若臟實為陽毒所侵則內熱治赤脈㩌心腑臟溫病陰陽毒心臟實則為陽毒所傷內熱口乾舌破咽塞聲嘶色焦赤者天門冬去心麥門冬去心車前子炮梔子仁黃芩升麻寒水石煅甘草炙各等分上為銼散每服五錢水兩盞煎七分去滓食前服病者頭重頸直皮肉強痹或蘊而結核起於喉頸之側布熱毒於皮膚分肉之中上散入髮際下貫顳顬隱隱而熱不相斷離病名黃肉隨以四季各十八戊己日其病從太陽陽明相格寒濕不調關節格滯若腑虛則皮肉強痹若臟實則布毒熱於皮膚治黃肉隨二方脾腑臟溫病陰陽毒胃腑虛則為陰邪所傷頭重頸直皮肉強痹䐜脹色黃黑者厚朴薑製炒一兩半白朮陳皮各一兩乾薑炮紫蘇甘草炙半夏湯洗各三兩上為銼散每服五錢水兩盞煎七分去滓食前服治黃肉隨脾腑臟溫病陰陽毒臟實為陽毒所傷蘊熱結核起於喉頸之側布毒熱於皮膚分肉之中散入髮際下貫顳顬蓄熱不散色黃者葛根蒼朮泔浸升麻白芷桔梗青皮各一兩大黃半兩上為銼散每服五錢水兩盞煎七分去滓食前服病者乍寒乍熱損肺傷氣暴嗽嘔逆或體熱發斑喘咳引氣名白氣貍以秋三月源從陽明系手太陰受疫淫邪之氣若腑虛為陰邪所傷則乍寒乍熱臟實為陽毒所傷則體熱發斑治白氣貍二方肺腑臟溫病陰陽毒大腸腑虛為陰邪所傷寒熱互作上氣咳逆大腸飧泄色皓皓白者白朮人參各一兩乾薑炮麥糵炒各三分白茯苓五味子肉豆蔻草果烏梅甘草炙各半兩上為銼散每服五錢水盞半煎七分去滓食前服治白氣貍肺腑臟溫病陰陽毒臟實為陽毒所傷體熱肌膚髮斑氣喘引飲色昏白者紫菀茸一兩梔子仁升麻前胡各三分石膏煅半兩葶藶炒一分杏仁去皮尖甘草炙各半兩上為銼散每服五錢水兩盞煎七分去滓食前服病者裡熱外寒意欲守火而反引飲腰痛欲折或胸脅切痛類如刀刺不得轉動熱彭彭服冷多則洞瀉病名黑骨溫以冬三月源從足太陽少陰相搏蘊積壅塞若腑虛為陰毒所傷則裡熱外寒若臟實為陽毒所損則彭彭發熱治黑骨溫二方腎腑臟溫病陰陽毒膀胱腑虛為陰邪所傷裡熱外寒煩渴引飲喜火腰脅滿痛小便赤黃面與腳俱黑附子炮去皮臍茯苓各一兩山茱萸細辛各半兩麻黃三分山藥澤瀉各半兩杏仁去皮尖一分上為銼散每服五錢水兩盞煎七分去滓食前服治黑骨溫腎腑臟溫病陰陽毒腎臟實為陽毒所傷腰脅切痛不得轉動大小便秘澀小腹脹食冷則洞泄色燻黑吳茱萸黑牽牛炒桃仁去皮尖萆薢大黃杜仲去皮銼薑汁製炒絲斷上為銼散每服五錢水兩盞煎七分去滓食前服料簡諸疫證治凡春分以前秋分以後天氣合清寒忽有溫暖之氣折之則民病溫疫春分以後秋分以前天氣合濕熱忽有清寒之氣折之則民病寒疫治之各有法不可拘以日數汗下此且據方論一體而分既有寒溫二疫風濕亦宜備論如己未年京師大疫汗之死下之死服五苓散遂愈此無他濕疫也以此為法每年遇有不正之氣即當紀而用之假如冬合寒時有溫暖之氣則春必患溫疫春合溫而有清涼之氣則夏必患燥疫夏合熱而有寒氣折之秋必病寒疫秋合清而反淫雨冬必病濕疫此亦一途而推之更須以時斟酌不可偏執況疫之所興或溝渠不泄滀其穢惡熏蒸而成者或地多死氣郁發而成者或官吏枉抑怨讟而成者世謂獄溫傷溫墓溫廟溫社溫山溫海溫家溫灶溫歲溫天溫地溫等不可不究古法闢之用屠蘇酒務成子螢火丸李子建殺鬼煎老君神明散皆闢法惟劉根別傳令於州治太歲六合處穿地深三尺闊亦如之取淨沙三斛實之以醇酒三升沃其上俾使君祝之此亦消除疫氣之良術所謂太歲六合者歲泄氣之所在故以厭禳屠蘇酒闢疫氣令人不染及闢溫病傷寒大黃桔梗川椒白朮桂心各一兩八分菝葜一兩二錢烏頭炮去皮尖六錢上為銼散縫袋盛以十二月晦日日中懸沉井中令至泥正月朔旦出藥置酒中煎數沸於東向戶中飲之先從少起多少自在一方有防風一兩太一流金散闢溫氣雄黃三兩羖羊角燒雌黃各二兩礬石枯鬼羽箭各半兩上為末以縫袋盛一兩帶心前並掛門戶上若逢大疫年以月旦青布袋一刀圭中庭燒之溫病人亦熏之敗毒散治傷寒溫疫風濕頭痛目昏眩四肢疼痛憎寒壯熱項強眼睛痛尋常風眩拘急風痰並宜服之羌活獨活人參甘草炙柴胡前胡茯苓枳殼麩炒川芎桔梗各等分上為銼散每服四錢匕水一盞姜三片薄荷五葉煎七分去滓熱服寒多則熱服熱多則溫服傷濕加白朮腳痛加天麻本方為細末亦可點服初虞氏究其方知出道藏乃敘云自非異人傑出志與神會則莫之敢為良可嘆服煙瘴之地或溫疫時行或人多風多痰多氣或處卑濕腳弱此藥不可缺也世人不師故常務作新奇蔽於俗學故備論之此藥治腳氣下注焮熱赤腫加大黃棋子大煎並進兩服立效應夢人參散治傷寒體熱頭疼及風壅痰嗽咯血白芷乾葛青皮桔梗炒白朮人參各三分甘草炙兩半乾薑炮一錢三字上為末每服二錢水一盞姜三片棗二枚煎七分通口服如傷寒入豉數粒同煎熱服大有效不拘時崇寧癸未米芾為太常博士始造待漏冒寒得疾痰嗽如膠有血更三醫不退一日謁太尉蔡元度取人參散一帖並棗見授繼歸有客承議郎薛道至留食藥熟進一服良久痰嗽立止而客怪曰公氣色頓快何藥也為道其由求方蔡公又送一帖越三日病全除往見蔡公公曰此藥僧伽也元祐中泗守劉士彥病八日不汗女求僧伽甚確夜夢告曰翌日塔中取藥遂於大聖缽中取得此藥題印云太平州楊家人參散今太醫局中亦賣無甘草乾葛兼無分兩疑非真方喝起散蒼朮泔浸麻黃去節荊芥各二兩石膏煅三兩大黃兩半栝蔞根乾葛芍藥白芷甘草各一兩上為末每服二錢水盞半姜三片蔥白三寸煎至七分食前服入瘟家令不相染著雄黃上研細水調以筆濃蘸塗鼻竅中與病人同床亦不相染初洗面後及臨臥時點之凡疫家自生惡氣聞之即入上元宮遂散百脈而成斯病宜即以紙捻探鼻嚏之為佳如以雄黃點鼻則自不聞並闢諸惡夢神良聖散子方東坡敘云昔嘗觀千金方三建散於病無所不治而孫思邈著論以謂此方用藥節度不近人情至於救急其驗特異乃知神物效靈不拘常制至理關感智不能知今予所得聖散子殆此類也自古論病唯傷寒至為危急表裡虛實日數證候應汗應下之法差之毫釐輒至不救而用聖散子者一切不問陰陽二感男女相易狀至危篤者連飲數劑則汗出氣通飲食漸進神宇完復更不用諸藥連服取瘥其餘輕者額微汗正爾無恙藥性小熱而陽毒發狂之類入口即覺清涼此殆不可以常理詰也時疫流行平旦輒煮一釜不問老少良賤各飲一大盞則時氣不入其門平居無病能空腹一服則飲食快美百疾不生真濟世衛生之寶也其方不知所從來故巢君數世寶之以治此疾百不失一余既得之謫居黃州連歲大疫所全活者至不可數巢君初甚惜此方指江水為盟約不傳人餘切隘之乃以傳蘄水龐君安常龐以醫聞於世又善著書故授之且使巢君之名與此方同不朽也用藥於後草豆蔻十個木豬苓去皮石菖蒲茯苓高良薑銼炒獨活柴胡吳茱萸附子炮去皮臍麻黃去節厚朴薑汁製炒藁本芍藥枳殼麩炒去瓤白朮蒼朮泔浸半夏湯洗去滑澤瀉各半兩藿香防風細辛各半兩甘草炙一兩上為銼散每服五錢水盞半煎七分去滓熱服空腹此藥以治寒疫因東坡作序天下通行辛未年永嘉瘟疫被害者不可勝數往往頃時寒疫流行其藥偶中抑未知方土有所偏宜未可考也東坡便謂與三建散同類一切不問似太不近人情夫寒疫亦能自發狂蓋陰能發躁陽能發厥物極則反理之常然不可不知今錄以備療寒疫用者宜審之不可不究其寒溫二疫也辛巳年余嘗作指治至癸巳復作此書見石林避暑錄亦云宣和間此藥盛行於京師太學生信之尤篤殺人無數醫頓廢之然不妨留以備寒疫無使偏廢也凡例夫疫雖以三事鍾成若天行多假六淫反錯郁折而致之者既有寒溫兩疫風濕其可不辨但證似傷濕而脈色不同與夫一方相染長幼同病即當作疫治除闢法外治濕用五苓散加炙甘草治風用桂枝湯加黃芩無不愈者其如淫邪交絡互織當以類推之五苓散治傷寒溫熱病表裡未解頭痛發熱口燥咽乾煩渴引水水入即吐或小便不利及汗出表解煩渴不止者宜服之又治霍亂吐利方見傷暑門加甘草一兩炙桂枝黃芩湯治風疫脈浮數而不弱頭項疼腰脊痛發熱惡風其證皆如太陽傷風但脈陰不弱相傳染為異耳桂枝去皮芍藥黃芩各半兩甘草炙一兩上為銼散每服五錢水盞半姜三片棗一枚煎至七分去滓食前服沃雪湯治傷寒溫疫濕疫熱疫蒼朮乾薑炮甘草炙各六兩防風乾葛厚朴制炒芍藥各四兩上為銼散每服三錢半重水兩盞煎七分去滓服瘧敘論夫瘧備內外不內外三因外則感四氣內則動七情飲食飢飽房室勞逸皆能致瘧經中所謂夏傷暑秋痎瘧者此則因時而序耳不可專隅以此論之則知瘟病飧泄咳嗽不可拘也夫瘧之始發先起於毫毛伸欠乃作寒慄鼓頷腰脊俱痛寒去則內外皆熱頭痛而渴惟欲飲冷者以陰陽上下交爭虛實更作若陽並於陰則陰實而陽虛陽明虛則寒慄鼓頷太陽虛則腰背頭項俱痛少陽虛則身體解㑊心惕惕然三陽俱虛則陰氣勝骨寒而痛陰並於陽則陽實而陰虛太陰虛則不嗜食善嘔嘔已乃衰少陰虛則熱多寒少嘔甚其病難已厥陰虛則腰腹痛小便不利如癃三陰俱虛則陽氣勝熱盛悒唈不樂陰盛則內寒陽虛則外寒寒生於內故中外皆寒陽盛則外熱陰虛則內熱熱生於外故中外皆熱此皆因外感寒暑風濕內郁喜怒憂驚蘊積涎飲乃至飲食飢飽勞逸之所為也病氣與衛氣並居故病作衛氣晝行陽夜行陰得陽而外出得陰而內搏所以日作其氣內搏於五臟橫連於募原其道遠其氣深其行遲不能與衛氣俱出故間日作以衛氣一日一夜大會於風府日下一節以此日作稍晏至二十五日至骶骨二十六日入脊內其氣上行故作日益早也瘧氣所以更盛更虛當氣之所在者在陽則熱躁在陰則寒靜極則陰陽俱衰衛氣相離則病休衛氣集則復病也於是有日作間作早晏不同又邪氣中於頭項者氣至頭項則作中於背者氣至背則作中於腰脊者至腰脊即作各隨其所中而作但衛氣之所在與邪氣相合則病作也更有疫瘧鬼瘴等瘧亦以邪氣中衛氣之所為也除癉瘧純熱溫瘧先熱牝瘧無熱外諸瘧皆先寒而後熱又經曰無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗為其病逆未可治也知此則病方來與正作與將過皆不可治以反傷真氣不可不知所因備列於後瘧病外所因證治病者先寒後熱寒則湯火不能溫熱則冰水不能寒以先傷寒後傷風故先寒而後熱名曰寒瘧病者先熱後寒躁煩自汗惡風以先傷風後傷寒風為陽寒為陰故先熱而後寒名曰溫瘧病者但熱不寒陰氣孤絕陽氣獨發少氣煩冤手足熱而欲嘔必渴以傷於暑熱名曰癉瘧病者寒熱身重骨節煩疼脹滿濈濈自汗善嘔因汗出復浴濕舍皮膚及冒雨濕名曰濕瘧病者寒多不熱但慘慼振慄病以時作此以陽虛陰盛多感陰濕陽不能制陰名曰牝瘧五種瘧疾以外感風寒暑濕與衛氣相併而成治之各有方法白虎加桂湯治溫瘧先熱後寒惡風多汗石膏四兩半知母一兩半甘草炙半兩桂心一兩粳米一合上銼散每服四錢水盞半煎七分去滓未發前進三服朮附湯治冒雨濕著於肌膚與胃氣相併或腠開汗出因浴得之附子炮去皮臍白朮各一兩甘草炙茯苓桂心各半兩上銼散每服四大錢水盞半姜五片棗兩枚煎七分去滓食前服麻黃白朮湯治傷風寒暑濕不留經絡與衛氣相併病以日作寒熱交煎麻黃去節湯浸白朮茯苓桂心各一兩陳皮青皮桔梗白芷甘草半夏曲紫蘇烏梅各三分乾薑半兩上為銼散每服四錢重水二盞姜三片棗二枚煎七分去滓當發日空心一服臨發一服尤妙亦治時疫太醫常山飲治諸瘧先寒後熱或先熱後寒或寒熱獨作或連日併發或間日一發頭疼噁心煩渴引飲氣息喘急口苦咽乾諸藥不效川常山知母甘草炙草果不去皮各二兩烏梅一兩良薑一兩半上為銼散每服四錢水盞半棗五枚同煎七分去滓溫服未發前進三服桂薑湯治牝瘧寒多微熱或但寒不熱柴胡八兩桂心一兩黃芩三兩牡蠣煅甘草炙乾薑炮各三兩栝蔞根一兩上為銼散每服四錢水二盞煎七分去滓空心服日三服初服微煩汗出愈一法有半夏三兩瘧病內所因證治病者寒熱顏色蒼蒼然善太息如死狀以蓄怒傷肝氣鬱所致名曰肝瘧病者心煩欲飲清水反寒多不甚熱乍來乍去以喜傷心心氣耗散所致名曰心瘧病者寒多腹中熱痛或渴或不渴不熱不泄腸鳴汗出以思傷脾氣鬱涎結所致名曰脾瘧病者心寒寒甚則發熱熱間善驚如有所見以憂傷肺肺氣凝痰所致名曰肺瘧病者手足寒灑然腰脊痛發熱大便難目眴以失志傷腎名曰腎瘧上五種瘧疾以臟氣不和鬱結涎飲所致治之各有方七棗湯治五臟氣虛陰陽相勝作為痎瘧不問寒熱先後與夫獨作疊間日悉主之附子一枚炮製以鹽水浸再炮如此凡七次至第七次不浸去皮臍上銼散水一碗姜七片棗七個煎至八分盞當發日空心溫服仍吃三五個棗子忌如常良方用烏頭兼不用鹽水浸不特服之僭燥亦不能分利陰陽去滓服四獸飲治五臟氣虛喜怒不節勞逸兼併致陰陽相勝結聚涎飲與衛氣相得發為瘧疾悉主之兼治瘴癘最效半夏湯去滑茯苓人參草果陳皮甘草烏梅肉白朮生薑棗子各等分上為銼散鹽少許淹食頃厚皮紙裹水淹入慢火煨香熟焙乾每服秤半兩水二盞煎至七分去滓未發前並進三服交解飲治脾胃氣弱陰陽勝復發為痎瘧肉豆蔻半生半面裹煨草豆蔻如上法甘草半生半炙厚朴半生半薑製炒上等分銼散每服四錢水兩盞煎七分去滓空心服草果飲治脾寒等瘧草果川芎白芷紫蘇葉良薑甘草炙青皮去白炒各等分上為粗末每服二大錢水一盞煎七分去滓熱服當發日連進三服驅瘧飲子前胡柴胡各四兩桂心桔梗厚朴薑製半夏湯洗去滑各三兩黃耆乾薑炮甘草各二兩上銼散每服四大錢水盞半姜三片棗兩枚煎至七分去滓溫服瘧病不內外因證治病者發寒熱一歲之間長幼相若或染時行變成寒熱名曰疫瘧以歲運推之病者寒熱日作夢寐不祥多生恐怖名曰鬼瘧宜用禁避厭禳之法病者乍寒乍熱乍有乍無南方多病此名曰瘴瘧當隨方土所宜治之病者寒熱善飢而不能食食已支滿腹急㽲痛病以日作名曰胃瘧六腑無瘧唯胃有者蓋飲食飢飽所傷胃氣而成世謂之食瘧或因諸瘧飲食不節變為此證病者經年不瘥瘥後復發遠行久立下至微勞力皆不任名曰勞瘧亦有數年不瘥百藥不斷結成癥癖在腹脅名曰老瘧亦曰母瘧以上諸證名狀不同各有治方宜推而用之麻黃白朮湯治一切疫瘧方見外所因門紅效瘧丹治鬼瘧殊效真阿魏半兩桃枝柳枝各長一尺七莖雄黃通明好者半兩別研辰砂一錢別研留一半上為末以重午日五家粽角為丸如梧桐子大辰砂所留一半為衣遇發時用淨器水摩一丸塗鼻尖並人中未退以冷水服一丸合時須用五月五日大正氣散治山嵐瘴氣發作寒熱遂成瘧疾附子炮去皮臍厚朴薑汁製桂心甘草炙乾薑炮陳皮各一兩茱萸半兩微炒上為細末每服二大錢水盞半姜五片棗一枚同煎至七分熱服不拘時兼治霍亂嘔瀉一切氣疾清脾湯治胃瘧發作有時先覺伸欠乃作寒慄鼓振頤頷中外皆寒腰背俱痛寒戰既已內外皆熱頭疼如破渴欲飲冷或痰聚胸中煩滿欲嘔或先熱後寒先寒後熱寒多熱少寒少熱多或寒熱相半或但熱不寒但寒不熱或隔日一發一日一發或三日五日一發者悉主之厚朴四兩薑製炒烏梅打去仁半夏湯去滑青皮良薑各二兩草果去皮一兩甘草炙半兩上為銼散每服四錢水二盞姜三片棗一枚煎七分去滓未發前並三服忌生冷油膩時果此藥溫脾化痰治胸膈痞悶心腹脹滿噫醋吞酸自可常服常山飲治勞瘧虛人老人皆可服常山穿山甲醋炙木通秦艽各一分辰砂半字別研甘草炙半兩上為銼散作一劑水三盞烏梅棗子各七枚煎半盞再入酒一盞煎至八分去滓入辰砂溫服老瘧飲治久瘧結成癥瘕癖在腹脅諸藥不去者蒼朮泔浸草果去皮桔梗青皮陳皮良薑各半兩白芷茯苓半夏湯洗去滑枳殼麩炒去瓤甘草炙桂心乾薑炮各三錢紫蘇葉川芎各二錢上為銼散每服四大錢水二盞鹽少許煎七分去滓空心服日三夜一仍吞下後紅丸子紅丸子治食瘧尤妙蓬莪朮京三稜各二兩醋煮一伏時胡椒一兩青皮三兩炒香阿魏一分醋化上為末別研倉米末用阿魏醋煮米糊搜和丸如梧子大炒土朱為衣每服五十丸至百丸以老瘧飲下古方雖有鱉甲煎等不特服不見效抑亦藥料難備妙應丹治諸瘧無問寒溫久近悉主之黃丹三分炒木香半兩碾為細末青皮陳皮吳茱萸各半兩米醋二升熬青皮以下三味至一升去滓再熬醋成膏上以黃丹木香為末入醋膏內搜和為丸梧子大辰砂為衣每服十丸當未發前一食頃白湯下再將前三件滓添木香半兩為末別研入黃丹三分和勻以醋糊為丸如梧子大每服三五十丸治瘧亦妙名曰捷丹紅散子須當發日早晨服黃丹炒色變上入好建茶合和二錢匕白湯調下或溫酒調不入茶瘧丹二方雄黑豆四十九粒重午日井水浸次日取去皮拭乾研為膏真砒一錢研細入豆膏內研勻上五月五日午時丸如綠豆大控干辰砂為衣密器封之發日空心井花水下一丸忌見雞犬若女人病令男子閉目送入口忌熱食一日孕婦不得服於發日以縫帛系一丸於右臂上小兒不能吞隨男左女右系之又方黃丹不以多少上五月五日用獨頭蒜煨熟研細搜丸如梧子大每服五丸當發前一食頃桃柳枝煎湯調下塞耳丹青黛桂心砒巴豆硫黃等分上並不去皮殼不修治為末以五月五日五家灰粽角為丸棗核大綿裹定當發日塞耳中男左女右忌葷腥
