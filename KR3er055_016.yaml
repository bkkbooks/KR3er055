body:
  text: 卷之十六斑瘡證治夫斑瘡病內經與張仲景皆不載尋托方論蓋自魏朝方有以白頭赤根者俗呼為豌豆即斑瘡也細粟如麻者俗呼為麻即膚疹也又有大者俗呼為芋為萍此皆輕重之不齊故命名異耳百問云悔不得轉利以瘡疹發於表利之則毒氣入里龐安常云身疼壯熱須少解散臟閉毒攻非利不愈必令汗下初虞世亦云瘡疹發於肌肉屬陽明古人治法皆以承氣湯利之諸説矛盾不無疑誤今皆存之要當分其未發已發為治若其始發必作寒熱如傷寒狀方證所載耳冷尻冷痎嗽者皆瘡疹證又小兒初得手足搐搦如風癇者亦瘡疹候便可與宣熱拔毒必須利之千金治豌豆瘡初發欲發者單煮大黃服之即明文也若其已發只須解肌用升麻紫草輩是也如是分之諸説自泮又此病多因傷寒失於汗下或時氣勝復歲主客氣及天行疫病長幼相染者當隨因辨證治之其間為倒黶最危宜早為治三豆飲子治天行豆瘡但覺有此證預服則不發赤小豆黑豆緑豆各一升甘草半兩上淨淘豆入甘草以水煮熟逐日空心任性食豆飲汁七日瘡自不發升麻湯治大人小兒傷風寒溫疫頭痛寒熱體疼斑瘡已發未發並可服升麻乾葛甘草炙芍藥各等分上為銼散每服稱五錢重水二盞煎七分去滓熱服小兒量與一法加紫草茸煎鼠黏子散治傷寒斑瘡毒氣咽鬲不利聲不出疼痛鼠黏子炒丹參升麻甘草炙干薄荷炙等分上為銼散每服三錢水一盞半煎七分去滓不拘時小兒量與之龍腦膏治斑瘡倒黶豬心血調腦子成膏以紫草茸煎湯解開稀稠得所服無腦子用辰砂一法白蒻葉燒灰為細末每服二錢入麝香少許沸湯調下仙靈散治斑瘡入眼仙靈脾威靈仙各等分上為末每服二錢食後米湯調下豆皮飲子治小兒因出瘡毒入眼生翳真緑豆皮白菊花真穀精草去根各等分上為末每服一大錢乾柿一個粟米泔一盞同煎候泔盡只將乾柿去核日服三丹毒敘論經云諸痛癢瘡皆屬心心虛寒則癢心實熱則痛丹毒之病由心實熱也心生血主於脈血熱肌浮陰滯於陽即發丹毒方論有云以其色赤如丹砂塗故得丹名然又有水丹白丹五色油丹豈專以赤為名也又有赤硫天火殃火尿灶廢灶野火等古方以為小兒出入遊行觸犯所致此因容或有之若小兒在襁褓中未能出入亦患此者是豈因觸犯耶大率皆血熱之所為也敘例於後丹毒證治天火丹者肉中忽赤如丹塗之色痛癢不定甚至遍身白丹者肉中腫起癢痛如吹狀雞冠丹者亦名茱萸丹肉上粟起如雞冠水丹者遍體熱起黃色如水在皮中五色油丹者亦名油腫赤硫丹腫熱赤色流入四肢以上皆不問大小如天火骨火殃火尿灶朱田野火等丹多著少小但自腹內生出四肢者則易愈自四肢生入腹者則難治香欒皮湯治諸種丹毒發於四肢腹背頭面或赤或白或癢或痛或寒或熱香欒皮一兩上以一大碗水同煎取半碗以翎毛刷患處神效伏龍肝散治少小諸種丹毒伏龍肝不拘多少上為末以雞子白和敷之日三次金花散治一切丹毒鬱金黃芩甘草山梔大黃黃連糯米上七味各一兩生為末蜜和冷水調以鵝毛上患處料簡治丹毒方千金外臺甚多無出用至冷物凡至冷物無過藻菜如有患丹毒熱腫等取渠中藻菜細切熟搗敷丹上厚三分干則易之最良癮疹證治世醫論癮疹無不謂是皮膚間風然既分冷熱冷熱即寒暑之證又有因浴出湊風冷而得之者豈非濕也則知四氣備矣經云諸痛癢瘡皆屬於心心實熱則痛虛寒則癢又陽明主肌肉屬胃與大腸亦有冷熱分痛癢不可不審世人呼白者為婆膜赤者為血風名義混淆當以理曉內則察其臟腑虛實外則分其寒暑風濕隨證調之無不愈加味羌活飲治風寒暑濕外搏肌膚發為癮疹憎寒發熱遍身瘙癢隨臟氣虛實或赤或白心迷悶亂口苦咽乾羌活前胡各一兩人參桔梗甘草炙枳殼麩炒川芎天麻茯苓各半兩蟬蛻去頭足薄荷各三錢上為末每服二大錢水一盞薑三片煎七分不以時服加味烏荊丸治癮疹上攻頭面赤腫瘙癢搔之皮便脫落作瘡作癢或痛淫液走注有如蟲行川烏湯洗浸三五次去皮尖焙乾稱荊芥穗各半斤杜當歸水浸三日洗焙乾稱一斤薄荷五兩上為細末好醋煮米粉糊為丸梧子大每服五十丸溫酒茶清下曲術湯治因浴出湊風冷遍身癮疹搔之隨手腫突及眩暈嘔噦白朮一兩神麯二兩炒甘草一分上為末每服二錢米飲調下一方以土朱研炒冷酒調下二錢不飲以茶調之敷藥景天一斤細搗取汁敷上熱炙手摩之再三度瘥胡臭漏腋證治胡臭與漏腋雖不害人性命而害人身奉親事居乃至交遊皆非所宜修身之士務為清潔者或得此患不可不思有以去之夫胡臭者多因勞逸汗漬以手摸而嗅之致清氣道中受此宿穢故傳而為病方論有天生臭之説恐未必皆然多見為人相染者蓋其氣吸上元宮遂散百脈多相沾染忌之為得漏腋者亦由腋下挾汗致汙衣數重皆透然未必臭以二證致之其病自別古方共作一病未為至論蜘蛛散治胡臭燻人不可向邇者大蜘蛛一個以黃泥入少赤石脂搗羅極細入鹽少許杵煉為一窠蜘蛛在內焚以火近燒令通紅候冷剖開上一味研細臨臥入輕粉一字用釅醋調成膏敷腋下明早登廁必瀉下黑汁臭穢不可聞於遠僻處傾棄埋之免致染人神良六物散治漏腋腋下足心手掌陰下股里常如汗濕汙衣者干枸杞根干薔薇根甘草各半兩胡粉商陸根滑石各一分上治下篩以苦酒少許和塗當微汗出易衣更塗之不過三著便愈或一歲復發又塗之頭痛證治頭者諸陽之會上丹産於泥丸宮百神所集凡頭痛者乃足太陽受病上連風府眉角而痛者皆可藥愈或上穿風府陷入於泥丸宮而痛者是為真頭疼不可以藥愈夕發旦死旦發夕死責在根氣先絶也原其所因有中風寒暑濕而疼者有氣血食飲厥而疼者有五臟氣鬱厥而疼者治之之法當先審其三因三因既明則所施無不切中芎辛湯治傷風寒生冷及氣虛痰厥頭疼如破兼眩暈欲倒嘔吐不定附子生去皮臍烏頭生去皮尖天南星乾薑甘草炙川芎細辛各等分上為銼散每服四大錢水二盞薑五片茶芽少許煎七分去滓食後藿香散治傷風挾涎飲上厥頭疼偏正夾腦諸風藿香半兩川烏頭湯浸七次去皮尖一兩乳香三皂角子大草烏頭炮製去皮尖半兩上為末每服一字薄荷茶清調下食後服惺惺散治傷寒發熱頭疼腦痛石膏甘草生麻黃去節湯各等分上為末每服二錢水一小盞茶半錢蔥白三寸碎擘煎三五沸先嚼蔥白細咽下去枕仰臥如發熱再投一服出汗立愈玉屑散治傷寒發熱涎潮上厥伏留陽經頭疼眩暈不可忍者石膏煅上研細每服蔥白點茶調下二錢小兒量大小加減與之芎術湯治著濕頭重眩暈苦極不知食味暖肌補中益精氣川芎半兩白朮半兩附子生去皮尖半兩甘草桂心一分上為銼散每服四大錢水二盞薑七片棗一個煎七分去滓食前服救生散治外傷風冷內積憂思氣鬱聚涎隨氣上厥伏留陽經頭疼壯熱眩暈或胸膈塞痞兼服寬中丸並攻之菊花蒂川芎石膏煅各一兩甘草一分上日乾為末每服三錢煎蔥湯調下如覺胸痞即調此下寬中丸不計時服寬中丸治氣滯不快飲食不消胸膈痞塞凝痰聚飲狀如傷寒頭疼胸痞大附子炮去皮臍木香炮青皮大黃濕紙裹煨各等分上為末醋煮糊丸如梧子大每服十丸薑湯下頭疼甚則調救生散送下天南星丸治腎厥頭疼不可忍硫黃石膏天南星炮焰硝各等分上為末糊丸如梧子大每服三十丸空心食前溫酒下硫朱丸治腎厥及痰厥頭疼諸藥不效硫黃川烏頭炮去皮各半兩硃砂水飛二兩天南星一兩炮製上為末薑汁煮糊丸梧子大每服十五丸生薑薄荷湯下葫蘆巴散治氣攻頭痛如破者葫蘆巴炒三稜銼醋浸一宿各一兩乾薑炮一分上為末每服二錢生薑湯或酒調下雄黃丸治八般頭風及眩暈噁心吐逆諸藥不治通明雄黃一兩川烏頭生去皮尖一兩半上二味為末滴水丸如梧子大每服十丸煨蔥白茶清下即用後藥搐鼻搐鼻藥蓽茇良薑各一分白芷一錢細辛半錢上為末每服一小字先含水一口分搐鼻內吐水即止大附丸治元氣虛壅上攻偏正頭疼不可忍大附子炮去皮臍一枚上為末蔥汁糊丸緑豆大每服十丸至十五丸茶清下一法以川烏頭炮去皮尖為末用韭葉自然汁和丸治風虛痰涎頭疼如聖餅子治氣厥上盛下虛痰飲風寒伏留陽經偏正頭疼痛連腦巔吐逆噁心目瞑耳聾常服清頭目消風痰暖胃氣川烏頭生去皮天南星乾薑各一兩甘草川芎各二兩天麻防風半夏洗去滑各半兩上為末湯浸蒸餅和丸雞頭大捻作餅子曬乾每服五餅同荊芥三五穗細嚼茶酒任下熟水亦得不拘時候眼敘論夫眼者五臟之精明一生之至寶如天之有日月其可不保護之然骨之精為瞳子屬腎筋之精為黑眼屬肝血之精為絡果屬心氣之精為白眼屬肺肉之精為約束屬脾裹擷筋骨血氣之精與脈併為系繫上屬於腦後出於項中故六淫外傷五臟內郁飲食房室遠視悲泣抄寫雕鏤刺繡博奕不避煙塵刺血發汗皆能病目故方論有五輪八廓內外障等各各不同尤當分其所因及臟腑陰陽不可混濫如目決其面者為兌眥屬少陽近鼻上為外眥屬太陽下為內眥屬陽明赤脈從上下者太陽病從下上陽明病從外走內者少陽病此三陽病不可混也睛色赤病在心色白病在肺色青病在肝色黑病在腎色黃病在脾色不可名者病在胃中此五臟三陽病不可混也仍敘三因於後三因證治病者喜怒不節憂思兼併致臟氣不平鬱而生涎隨氣上厥逢腦之虛侵淫眼系蔭注於目輕則昏澀重則障翳眵淚努肉白膜漫睛皆內所因或數冒風寒不避暑濕邪中於項乘虛循系以入於腦故生外翳翳論中所謂青風緑風紫風黑風赤風白風白翳黃翳等隨八風所中變生諸證皆外所因或嗜欲不節飲酒無時生食五辛熟啖炙爆馳騁田獵冒涉煙塵勞動外精喪明之本所謂恣一時之遊佚為百歲之固愆皆不內外因治之各有方千金神麯丸明目百歲可讀細書常服益眼力神麯四兩磁石二兩煅醋淬七次光明砂一兩上為末煉蜜為丸梧子大米飲服五丸食前日三服羌活散治風毒氣上攻眼目昏澀翳膜生瘡及偏正頭疼目小黑花纍纍者羌活川芎天麻旋覆花青皮天南星炮藁本各一兩上為末每服二錢水一盞薑三片薄荷七葉煎七分食後服一法入牽牛末二兩以生薑汁煮糊丸如梧子大酒任下二三十丸白蒺藜散治腎臟風毒上攻眼目赤腫熱淚昏澀胬肉攀睛白蒺藜炒去角防風甘草生殭蠶去絲觜各一兩直者南星一兩半黑豆二合青鹽半兩水煮透取出焙稱不用鹽豆甘菊花三兩生上為末每服二錢煎甘草湯下食後服忌炙爆洗肝散治肝熱赤脈貫睛澀痛衝風淚下兼治熱血攻心白蒺藜一兩半防風羌活各半兩馬牙硝二兩甘草一分上為末每服二錢白湯調下食後服椒紅丸明目暖水臟補虛方久服駐顏縮小便川椒取紅四兩巴戟去心金鈴子銼炒茴香炒附子炮去皮臍各一兩上為末山藥三兩為末酒煮糊搜為丸梧子大空心鹽湯下三五十丸煮肝散治眼赤有耳癢證則用四生散入羊子肝煮甚妙四生散方見癲風門每服四錢匕鹽酒入羊子肝煮空心溫服羊子肝即羊肝上小片子者是驅風散治風毒上攻眼腫癢澀痛不可忍或上下瞼眥赤爛翳肉侵睛五倍子一兩去塵土蔓荊子一兩半洗上為銼散每服三錢水二盞銅石器內煎及一盞澄清熱洗留滓二服再煎立勝散治風毒攻眼及時眼隱澀羞明腫痛黃連黃柏秦皮去粗皮甘草等分上為銼散每服四錢水一盞棗一枚燈芯七莖煎數沸去滓以新羊毫筆蘸刷眼候溫即用手沃之一法不用黃柏甘草有黃芩防風神仙照水膏治障翳蠟一兩黃丹一兩水飛蛇蛻一分燭燒水銀一錢初生烏雞殼一個上用柳木槌研細滴蠟為餅臨臥用之候天明將水照眼藥墮水中膜盡去柏竹瀝膏治一切赤眼障翳慈竹一段去兩頭節黃柏去粗皮刮細者滿填竹內上用磚對立置竹磚上兩頭各安淨碗以干竹火燒令瀝出盡收之以叉股銅箸點通利膏治眼赤澀翳膜遮障時多熱淚杏仁二十一個口去皮尖嚼細乳香皂子大輕粉一字上旋入口中都嚼候津液滿口吐出瓷器中置火上令四邊沸以綿濾別盞中入生腦子如皂子大研勻再濾過以銅箸點之通神膏治眼生翳膜赤脈胬出澀癢疼痛有淚沙蜜四兩青鹽麝香各一字乳香硇砂滴淋過枯礬各半字當歸半錢黃連一錢上件乳鉢內研破同蜜入青竹筒內密封閣定煮半日厚綿濾過點眼蛤粉丸治雀目不拘久近但日落便不見物上色蛤粉細研黃蠟等分上熔蠟搜粉為丸如棗子大每用豬肝一片二兩許批開裹藥一丸麻線纏甕器內水一碗煮熟取出乘熱熏眼至溫吃肝以知為度鼻病證治肺為五臟華蓋百脈取氣於肺鼻為肺之閶闔吸引五臭衛養五臟升降陰陽故鼻為清氣道或七情內郁六淫外傷飲食勞逸致清濁不分隨氣壅塞遂為清涕鼻洞濁膿腦絲衄血瘜肉久而為齆雖種種不同未始不涉三因有致泥丸汩亂變生諸證羊肺散治肺虛壅鼻生瘜肉不聞香臭羊肺一具洗白朮四兩蓯蓉木通乾薑川芎各二兩為細末上以水量打稀稠得所灌肺中煮熟細研焙乾為末食後米飲服一二錢細辛膏治鼻塞腦冷清涕出不已細辛川椒乾薑川芎吳茱萸附子去皮臍各三分皂角屑半兩桂心一兩豬脂六兩上煎豬脂成油先一宿以苦酒浸前八味取入油煎附子黃色止以綿惹塞鼻孔通草散治鼻齆氣息不通不聞香臭並有瘜肉木通細辛附子炮去皮臍各等分上為末蜜和綿裹少許納鼻中一法以瓜蒂為末綿裹納鼻中或吹入亦可一法以枯礬研為面脂和綿裹少許納入鼻中數日瘜肉與藥消落粉黃膏治肺熱鼻發赤瘰俗謂酒皶硫黃一分為末蘿蔔切去蓋剜作甕子入硫黃在內以竹針蓋定正安粳火煨一宿取出研細輕粉烏頭尖各少許為末上研勻以面油調臥時敷早晚洗去以酥調尤佳一法用乳香硫黃細辛輕粉等分為末水調敷一法梔子為末蠟丸小彈子大茶酒任下一丸凡鼻頭微白者亡血也赤者血熱也酒客多有之若時行衄血不宜斷之或出至二三升不已即以龍骨為末吹入凡九竅出血皆用此法甚良余衄方見失血門唇病證治唇者脾之候也意舍之所榮燥則干熱則裂風則瞤動寒則揭氣鬱則生瘡血枯則沉而無色治之之法內則隨證調其脾外當以藥敷之清脾湯治意思過度蘊熱於脾口乾唇燥沉裂無色黃耆香白芷升麻人參甘草炙半夏湯去滑等分上為銼散每服四錢水一盞半薑五片棗二個小麥三十粒煎七分去滓不以時服羌活散治風濕入脾致唇口瞤動唇揭頭疼目眩及四肢浮腫如風水狀羌活三兩茯苓薏苡仁各一兩上為末每服二錢水一大盞煎七分入淡竹瀝一匙許再煎服菊花丸治脾肺氣虛憂思過度榮衛枯耗唇裂沉緊或口吻生瘡容色枯悴男子失精女子血衰悉主之甘菊花枸杞子肉蓯蓉酒浸洗切巴戟去心各等分上為末蜜丸梧子大每服三五十丸米湯下青灰散治唇緊燥裂生瘡面無顏色青布燒灰上研細以豬脂調夜敷睡一法以頭垢敷之凡沉唇緊唇唇上生瘡唇裂並以甲煎敷之彌效口病證治夫口乃一身之都門出入榮養之要道節宣微爽病必生焉故熱則苦寒則咸宿食則酸煩躁則澀虛則淡疸則甘五味入口藏於胃脾行其精華分布津液於五臟臟氣偏勝味必偏應於口或勞鬱則口臭凝滯則生瘡不可失睡失睡則愈增龍石散治上鬲壅毒口舌生瘡咽嗌腫痛以少許摻患處咽津寒水石煅三兩辰砂二錢半別研生腦子半字上為末日夜數次用小兒瘡疹攻口先以五福化毒丹掃卻用此藥摻立效赴筵散治口瘡疼痛五倍子一兩洗黃柏蜜塗炙紫色滑石各半兩上研細末每服半錢許摻患處咽津不妨便可飲食緑雲膏治口瘡臭氣瘀爛久而不瘥黃柏半兩螺青二錢上研細臨臥置一字在舌下不妨咽津遲明瘥一法以銅緑易螺青兼金散治蘊毒上攻或下虛邪熱病口生瘡細辛黃連各等分上為末先以熟水搵帛揩淨摻藥患處良久涎出吐之杏粉膏治口瘡以涼藥敷之不愈者杏仁十粒去皮尖輕粉一字上研杏仁細調勻臨臥敷瘡上少頃吐之勿咽生香膏治口氣熱臭甜瓜子去殼上一味研細蜜熬少許調成膏食後含化或敷在齒間一方用香附子炒去毛為末每早晚揩少許牙上齒病證治齒為關門腎之榮骨之餘也腎衰則齒豁精固則齒堅又大腸支脈在牙齦主灌注於牙大腸壅則齒為之浮大腸虛則宣露挾風則攻目頭面疳𧈟則齲脫為痔皆氣鬱而生諸證不同治之各有方安腎丸八味丸並治虛壅牙齒痛疼浮腫安腎丸方見腰疼門八味丸方見腳氣門西嶽蓮華峰神傳齒藥方豬牙皂角及生薑西國升麻熟地黃木律旱蓮槐角子細辛荷葉要相當剪荷葉心用青鹽等分同燒煅研細將來使最良揩齒牢牙髭鬢黑誰知世上有仙方常用齒藥牢牙去風冷蚛蝺宣露不問老少用之甚效槐枝柳枝各長四寸一握切碎皂角不種者七莖鹽四十文重上同入瓷瓶內黃泥固濟粳火燒一夜候冷取出研細用如常法有石佛庵主年七十餘云祖上多患齒疼脫落得此方藥數世用之齒白齊密乃良方也玉池散治風蚛牙疼腫癢動搖牙齦潰爛宣露出血口氣等疾地骨皮香白芷川升麻防風細辛川芎槐花當歸藁本甘草各等分上為末每用一字許揩牙或大段痛即取二錢水一盞半黑豆半合生薑三片煎至一盞稍溫漱候冷吐之殊效或用金沸草散熏漱亦佳舌病證候附失欠舌者心之官主嘗五味以榮養於身資於脾以分布津液於五臟故心之本脈繫於舌根脾之絡脈繫於舌傍肝脈循陰器絡於舌本凡此三經或為風寒濕所中使人舌捲縮而不能言或憂怒思恐所郁則舌腫滿而不得息心熱則破裂生瘡肝壅則出血如湧脾閉則白胎如雪諸證雖異治之各有方升麻柴胡湯治心脾虛熱上攻舌上生瘡舌本強頰兩邊腫痛柴胡升麻芍藥梔子仁木通各一兩黃芩大青杏仁去皮尖各三分石膏煅二兩上為銼散每服四大錢水一盞薑五片煎七分去滓食後服金沸草散治風寒傷於心脾令人憎寒發熱齒浮舌腫荊芥穗四兩旋覆花前胡麻黃去節各三兩甘草炙芍藥赤者半夏湯七次各一兩上為銼散每服四大錢水一盞半薑七片棗二個煎七分去滓漱口吐一半吃一半世醫用此發散傷風傷寒及加杏仁五味子治咳嗽皆效獨未知治舌腫牙疼辛未年有人患舌腫如吹滿塞其中粥藥不入其熱甚危大煎一劑乘熱以紙籠氣熏之遂愈又一婦人牙疼治療不瘥致口頰皆腫亦以此藥熏漱而愈故特記之烙腫法凡舌腫舌下必有噤蟲狀如螻蛄臥蠶有頭尾頭小白可燒鐵烙烙頭上即消黑散子治舌忽然腫破釜底煤研細上以醋調敷舌上下脫去更敷能先決出血竟敷之彌佳一法用鹽等分調薄荷蜜治舌上生白胎乾澀語話不真薄荷自然汁白蜜等分上先以生薑片蘸水揩洗竟敷之良文蛤散治熱壅舌上出血如泉五倍子洗白膠香牡蠣粉各等分上為末每用少許摻病處或燒鐵箄熱烙孔上礬石散治風濕寒舌強不能語枯礬桂心各等分上為末每一錢安舌下或用正舌散治之方見中風門凡失欠頰車蹉但開不能合以酒飲之令大醉睡中吹藥搐其鼻嚏透即自正咽喉病證治附哽夫喉以候氣咽以咽物咽接三脘以通胃喉通五臟以系肺氣谷攸分皎然明白有為水喉谷喉之説者謬説也千金復云喉嚨候脾胃咽門候肝膽亦非至論智者當以理推不可強存乎人矣諸臟熱則腫寒則縮皆使喉閉風燥亦然五臟久咳則聲嘶嘶者喉破也非咽門病咽腫則不能吞干則不能咽多因飲啖辛熱或復嘔吐烙傷致咽系乾枯之所為也與喉門自別又有懸癰暴腫閉塞喉嚨亦如喉閉但懸癰在上齶俗謂鶯翁又謂之鵝聚俗語聲訛不可不備識小續命湯治卒喉痹不得語方見中風門加杏仁去皮尖七個煎甚效玉鑰匙治風熱喉痹及纏喉風焰硝一兩半硼砂半兩腦子一字白殭蠶一分上為末研勻以竹管吹半錢許入喉中立愈神效散治喉閉熱腫語聲不出荊芥穗別為末萆麻生去皮別研各等分上入生蜜少許丸如皂子大以綿裹含化急則嚼化一法用朴硝不用荊芥蜜附子治腑寒咽門閉不能咽大附子生去皮臍上切作大片蜜塗炙令黃含咽津甘味盡更塗炙用玉屑無憂散治纏風咽喉疼痛語聲不出咽物有礙或風涎壅滯口舌生瘡大人酒癥小兒奶癖或誤吞骨屑哽塞不下玄參貫衆滑石縮砂仁黃連甘草茯苓山豆根荊芥穗各半兩寒水石煅硼砂各三錢上為末每服一錢先抄入口以新水咽下此藥除三尸去八邪殺九蟲闢瘟療渴荊芥湯治風熱肺壅咽喉腫痛語聲不出喉中如有物哽咽之則痛甚荊芥穗半兩桔梗二兩甘草一兩上為銼散每服四錢水一盞薑三片煎六分去滓溫服一法去荊芥穗名如聖湯解毒雄黃丸治纏喉風及急喉痹卒然倒僕失音不語或牙關緊急不省人事或上膈壅熱痰涎不利咽喉腫痛雄黃飛一分鬱金一分巴豆去皮出油二七個上為末醋糊丸緑豆大熱茶清下七丸吐出頑涎立省未吐再服如未至死心頭尚溫灌藥下喉無有不活乾薑散治懸癰壅熱卒暴腫大乾薑半夏湯洗去滑等分上為末以少許著舌上咽津一法用鹽抹箸頭張口拄之日五六次麻仁散治谷賊尸咽咽喉中癢此因誤吞谷芒搶刺癢痛脂麻炒不以多少上為末湯點服凡谷賊屬咽馬喉風屬喉不可不分馬鞭草散治馬喉痹洪腫連頰吐氣數者馬鞭草根上搗自然汁每服咽一合許一法用馬銜鐵汁服亦妙凡治哽之法皆以類推如鸕鷀治魚哽磁石治針哽發灰治發哽貍虎治骨哽亦各隨其類也蜜綿薤白引法通治諸哽煮薤白令半熟以線系定手捉線少嚼薤白咽之度薤至哽處數牽引哽即出矣一法綿一小塊以蜜煮如用食薤法玉屑無憂散治一切物哽方見前耳病證治腎雖寄竅於耳當知耳為聽會主納五音外則宮商角徵羽內則唏噓呵吹呬內關五臟外合六淫故風寒暑濕使人聾聵耳鳴憂思喜怒多生內塞其如勞逸不言而喻復有出血生膿聤耳底耳或耵聹上直庚切下乃頂切不出飛走投入諸證既殊治各有法菖蒲丸治耳卒痛及聾塞不聞聲菖蒲附子炮去皮臍各等分上為末以醋丸如杏仁大綿裹納耳中日二易之補腎丸治腎虛耳聾或勞頓傷氣中風虛損腎氣升而不降致耳內虛鳴山茱萸乾薑炮巴戟芍藥澤瀉石斛菟絲子酒浸遠志去心桂心黃耆細辛乾地黃附子炮當歸牡丹皮蛇床子甘草蓯蓉酒浸人參各二兩菖蒲一兩防風一兩半茯苓半兩羊腎二枚上為末以羊腎研細酒煮麵糊為丸如梧子大食前鹽酒任下三十丸至五十丸蠟彈丸治耳虛聾白茯苓二兩山藥炒三兩杏仁去皮尖炒一兩半黃蠟二兩上以前三味為末研勻熔蠟為丸如彈子大鹽湯嚼下有人止以黃蠟細切嚼點好建茶送下亦效乾蠍散治耳聾因腎虛所致十年內一服效乾蠍黃色小者並頭尾用四十九個生薑切如蠍大四十九片二味銀石器內炒至干為細末上向晚勿食初夜以酒調作一服至二更以來徐徐儘量飲五更耳中聞百十攢笙響便自此聞聲解倉飲子治氣虛熱壅或失飢冒暑風熱上壅耳內聾閉徹痛膿血流出赤芍藥白芍藥各半兩當歸甘草炙大黃蒸木鱉子去殼各一兩麝香散治聤耳底耳耳內膿出桑螵蛸一個慢火炙及八分熟存性麝香一字別研上為末研令勻每用半字摻耳內如有膿先用綿捻紙以藥摻之一法用染坯枯礬等分為末以葦管吹入耳內即愈或入麝香更佳諸百蟲入耳用麻油灌之即效諸耳中出血以龍骨末吹入即止
