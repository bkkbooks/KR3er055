body:
  text: 卷之十二滯下敘論經中所載有血溢血泄血便注下古方則有清濃血及泄下近世併為痢疾其實一也但以寒熱疳蠱分為四門未為至當且疳蝕瘡膿中蠱下血與利膿血證狀大別疳蝕雖下赤白當在疳濕瘡門蠱利清血當在中毒蠱門今之滯下赤白者至多皆是冷熱相搏非乾疳濕蝕瘡類下利清血亦多與中蠱毒者大異臨視須詳不可道聽治法差互立見夭傷勉之勉之滯下三因證治病者滯下人皆知赤為熱白為寒而獨不知純下清血為風下如豆羹汁為濕夫六氣之傷人初無輕重以暑熱一氣燥濕同源收而為四則寒熱風濕不可偏廢古方云風停於膚腠後乘虛入客腸胃或下瘀血或下鮮血注下無度濕毒下如豆羹汁皆外所因之明文也古方有五泄因臟氣鬱結隨其所發便利膿血作青黃赤白黑之不同者即內所因也又飲服冷熱酒醴醯醢縱情恣欲房室勞逸致損精血腸胃枯澀久積冷熱遂成毒痢皆不內外因治之先推其歲運以平其外察其鬱結以調其內審其所傷以治不內外使條然明白不至妄投也白頭翁湯治熱痢滯下下血連月不瘥白頭翁二兩黃連柏皮秦皮各二兩上為銼散每服四大錢水一盞半煎七分去滓服桃花丸治冷痢腹痛下如魚腦白物赤石脂煅乾薑炮等分上為末蒸餅糊丸米飲下三五十丸胃風湯治風冷乘虛入客腸胃水穀不化泄瀉注下腹脅虛滿腸鳴㽲痛及腸胃濕毒下如豆汁或下瘀血日夜無度並宜服之方見失血門風痢下血證露宿湯治風痢純下清血杏仁七粒去皮尖若木瘡一掌大烏梅兩個草果一個酸石榴皮半個青皮兩個甘草二寸上為銼散作一劑水二碗生薑三片煎七分碗露星宿次早空心服苦散治脾受濕氣泄利不止米穀不化黃連去須銼如豆吳茱萸白芍藥銼如豆各二兩同炒令赤色上為末每服二錢水一盞煎至七分溫服駐車丸治冷熱下痢腸滑赤白如魚腦日夜無度腹痛不可忍者黃連六兩阿膠麩炒當歸各三兩乾薑炮二兩上為末醋煮米糊為丸如梧子大米飲下五十丸至一百丸萬金散治冷熱痢罌粟殼一兩赤用蜜炙白不炙赤白雜半生半炙橘皮甘草並如上法各一兩上為銼散每服四錢以百沸湯七分盞急用盞蓋之候溫澄清者服血痢入烏梅一個罌粟殼本草不說治痢近用之極效其功不下地榆黃柏秦皮但性緊澀服之則嘔不可不知固腸湯治腸虛下痢赤白頻並日久無度老幼產婦俱可服之罌粟殼三兩醋浸炙稍黃枳殼麩炒去瓤白芍藥各二兩橘紅當歸甘草炙各一兩訶子煨去核木香煨人參白姜炮各半兩上為銼散每服四錢水一盞半煎七分去滓食前服三聖丸治下痢赤白日夜無度及泄瀉注下柏皮大厚者去粗皮切大蒜細切研罌粟殼去瓣細切各等分上三物一處搗篩過粗者更搗同淹一宿次日慢火炒香熟亦旋篩取細者余更炒不爾則細者焦碾為末粟米飲糊丸如梧子大每服五十丸米湯下斷下湯治下痢赤白無問久近長幼皆可服罌粟殼炙十四個去瓣草果一個不去皮炒白朮一錢甘草炙半錢茯苓一錢上為銼散作一劑水一大碗姜七片棗七個煎至一大盞分二服空腹或下純赤加黑豆二十七粒白則加炮乾薑一錢厚腸湯治下痢赤白罌粟殼八兩銼炒地榆六兩白朮紫蘇葉木瓜干各二兩上為銼散每服四錢水盞半姜七片棗二個煎七分去滓空腹服水煮木香丸治腸胃虛弱風濕進襲泄瀉水穀滯下膿血㽲刺疼痛裡急後重日夜無度當歸洗芍藥甘草炙訶子去核各半兩厚朴去粗皮切薑製青皮陳皮各一兩縮砂仁木香炮各一分罌粟殼切醋淹炒五兩上為末蜜丸一兩作五丸每服一丸水一盞煎七分食前溫服料簡凡血得熱則淖溢故鮮得寒則凝泣故瘀當審其風熱風冷二證與蠱利大別外有血痔血枯內衄酒利肺疽腸胃蓄瘀遠近血等各有門類不可混雜古方云積冷積熱及水穀實而下利者並以大黃湯下之養生方亦云大則疏滌之更不知有寒熱風濕虛實之不同後人尋即妄用被害者多矣籲可傷哉秘結證治夫胃大小腸膀胱者倉廩之本營之居也名曰器能化糟粕轉味入出者也人或傷於風寒暑濕熱盛發汗利小便走枯津液致腸胃燥澀秘塞不通皆外所因或臟氣不平陰陽關格亦使人大便不通名曰臟結背內所因或飲食燥熱而成熱中胃氣強澀大便堅秘小便頻數謂之脾約屬不內外因既涉三因亦當隨其所因而治之燥則潤之澀則滑之秘則通之約則緩之各有成法神功丸治氣壅風盛大便秘澀後重疼痛煩悶此藥當量虛實加減大黃四兩麩煨蒸亦可人參二兩訶子皮四兩麻仁二兩別研上為細末煉蜜丸梧子大每服二十丸溫湯溫酒米飲皆可下食後臨臥服麻子仁丸治趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約大便堅小便利而不渴麻子仁五兩研芍藥枳實麩炒各八兩大黃蒸一斤厚朴薑製炒半兩杏仁去皮尖炒別研五兩半上為末煉蜜丸如梧子大每服二十丸溫水下未知加五十丸一法麻仁一兩半杏仁三分大黃一兩枳實芍藥厚朴各半兩此依局方出本是漢方合用大黃枳實一斤正得今二兩厚朴當用四兩杏仁當用六錢一字麻仁一兩二錢半芍藥一兩乃均制合理用當以理推半桃丸治年高風秘冷秘心腹一切痃癖冷氣暖元臟止泄瀉進飲食硫黃研細半夏湯洗七次焙乾為末上等分以生薑汁同熬炊餅末攪勻杵數百下丸如梧子大空心溫酒薑湯下三十丸胃氣丸治虛人老人風秘不通不可服涼藥用此甚效方見霍亂門蜜兌法蜜三合鹽少許煎如餳出冷水中捏如指大長三寸許納下部立通脫肛證治肛門為肺下口主大腸肺臟實則熱熱則肛門閉塞腑虛則大腸寒寒則肛門脫出又婦人產蓐用力過多及小兒叫呼及久利後皆使肛門滯出蝟皮散治肛門或因洞泄或因用力脫出不收蝟皮燒存性用一個磁石半兩煅碎桂心半兩上為末飲方寸匕忌舉重及房室肘後治婦人陰脫加鱉頭一枚燒灰研入香荊散治肛門脫出大人小兒悉主之香附子荊芥穗各等分上為末每用三匙水一大碗煎十數沸淋又方用五倍子為末每三錢水二碗煎減半入白礬一塊安小桶子內洗之立效鐵粉散治脫肛歷年不愈鐵粉研細每用少許摻之按令入即愈又方用木賊不以多少燒存性上為細末摻肛門上按之水聖散子治小兒脫肛不收用浮萍草不以多少上杵為細末有患用藥干貼又方用磨刀水洗亦效淋閉敘論淋古謂之癃名稱不同也癃者罷也淋者滴也今名雖俗於義為得古方皆云心腎氣鬱致小腸膀胱不利復有冷淋濕淋熱淋等屬外所因既言心腎氣鬱與夫驚憂恐思即內所因況飲啖冷熱房室勞逸及乘急忍溺多致此病豈非不內外因三因備明五淋通貫雖證狀不一皆可類推所謂得其要者一言而終也淋證治諸淋大率有五曰冷曰熱曰膏曰血曰石五種不同皆以氣為本多因淫情交錯內外兼併清濁相干陰陽不順結在下焦遂為淋閉生附散治冷淋小便秘澀數起不通竅中疼痛憎寒凜凜多因飲水過度或為寒泣心虛志耗皆有此證附子去皮臍生用滑石各半兩瞿麥木通各三分半夏湯洗七次三分上為末每服二大錢水二盞姜七片燈芯二十莖蜜半匙煎七分空心服石韋散治熱淋多因腎氣不足膀胱有熱水道不通淋瀝不宣出少起數臍腹急痛蓄作有時勞倦即發或尿如豆汁或便出沙石木通石韋去毛各二兩甘草當歸王不留行各一兩滑石白朮瞿麥芍藥葵子各三兩上為細末每服二錢煎小麥湯調下食前日三兼治大病餘熱不解後為淋者地膚子湯治下焦有熱及諸淋閉不通地膚子三兩知母黃芩豬苓去皮瞿麥枳實麩炒升麻通草葵子炒海藻洗去腥各二兩上為銼散每服四錢水一盞半煎七分去滓空心服大便俱閉者加大黃女人房勞小便難大腹滿痛脈沉細者用豬腎半隻水二盞煎盞半去腎下藥煎七分服鹿角霜丸治膏淋多因憂思失志意舍不寧濁氣干清小便淋閉或復黃赤白黯如脂膏狀疲劇筋力或傷寒濕多有此證鹿角霜白茯苓秋石各等分上為末糊丸梧子大每服五十丸米湯下葎草汁治膏淋及尿血葎草上搗汁二升醋二合和空腹服一盞又濃煮汁飲亦治淋瀝尿血立效散治血淋多因下焦結熱小便黃赤淋閉疼痛所出如血或外挾風冷風熱或內傷志勞神或房室過度丹石發動便鮮赤者為風熱傷心瘀血者為風冷傷腎及大小便俱出血者瞿麥穗一兩甘草炙三分山梔子半兩炒上同為末每五錢至七錢水一碗入連須蔥根七個燈芯五十莖生薑五片同煎至七分時時溫服不拘時候既云血寒則瘀此藥末必勻治宜煎木通湯下麝香鹿茸丸菟絲子丸等所以養生方云不可專以血得熱則淖溢為說於理甚明不復詳引鹿茸丸菟絲子丸方見後虛損門石燕丸治石淋多因憂鬱氣注下焦結所食鹹氣而成令人小便磣痛不可忍出沙石而後小便通石燕子燒令通赤水中淬一兩次搗研水飛焙乾滑石石韋子去毛瞿麥穗各一兩上為末糊為丸如梧子大煎瞿麥燈芯湯下十丸食前服日二三甚即以石韋去毛瞿麥穗木通各四錢陳皮茯苓各三錢為末每服三錢以水一盞煎七分去滓服瞑眩膏治諸淋疼痛不可忍受及沙石淋大蘿蔔切一指厚四五片好白蜜淹少時安淨鐵鏟上慢火炙干則又蘸蜜取盡二兩蜜番覆炙令香軟不可焦候溫細嚼以鹽湯一盞送下立效沉香散治氣淋多因五內鬱結氣不得舒陰滯於陽而致壅閉小腹脹滿使溺不通大便分泄小便方利沉香不焙石韋去毛滑石王不留行當歸炒各半兩葵子炒白芍藥各三分甘草炙橘皮各一分上為細末每服二錢煎大麥飲調下飲調亦得食前發灰散治飲食忍小便或走馬及房勞皆致胞轉臍下急滿不通亂髮不拘多少燒為灰上研細每用二錢米醋二合湯少許調服一法與葵子等分為末飲服二錢服訖即炒黑豆葉存其上則通豬苓散治傷風感寒脈浮發熱渴欲飲水小便不利獵苓去皮茯苓澤瀉阿膠炒滑石碎研各等分上為銼散每服四大錢水一盞半煎七分去滓不以時五苓散治傷暑疸熱小便不利煎茅根湯調尤佳方見傷暑門料簡方書中所出淋病證狀不一所謂諸淋亦不能備盡若隨其所因而命名如勞如驚如寒如濕如風如暑以至暴淋等雖無定論皆不出三因之所致也當詳此推治無施不可又有轉胞以胞系了戾小便不通證狀自別不可不辨然治之亦當利其小便古方令服腎氣八味丸其中有茯苓故也遺尿失禁證治經云膀胱不利為癃不約為遺溺者乃心腎氣傳送失度之所為也故有小澀而遺者有失禁而出不自知又婦人產蓐產理不順致傷膀胱遺尿無時又小兒胞冷尿床亦著成人者治之各有方家韭子丸治少長遺尿及男子虛劇陽氣衰敗小便白濁夜夢泄精此藥補養元氣進美飲食家韭子六兩炒鹿茸四兩酥炙蓯蓉酒浸牛膝酒浸熟地黃當歸各二兩巴戟去心菟絲子酒浸各一兩半杜仲去皮銼制炒絲斷石斛去苗桂心乾薑炮各一兩上為末酒糊為丸如梧子大每服五十丸加至百丸空心食前鹽湯溫酒下小兒遺尿者多因胞寒亦稟受陽氣不足故也別作一等小丸服阿膠飲治小便遺失不禁阿膠二兩炒牡蠣煅取粉鹿茸切酥炙各四兩上為銼散每服四大錢水一盞煎七分空心服或作細末飲調亦好張真君茯苓丸治心腎氣虛神志不守小便淋瀝或不禁及遺泄白濁赤茯苓白茯苓各等分上為末以新汲水挪洗澄去新沫控干別取地黃汁同與好酒銀石器內熬成膏搜和為丸如彈子大空心鹽酒嚼下常服輕身延年雞內金散治溺床失禁雞䏶胵一具並腸淨洗燒為灰男用雌者女用雄者上研細每服方寸匕酒飲調服又方用羊肚系盛水令滿線縛兩頭熟煮取中水頓服又方用豬胞洗淨鐵鏟上炙香熟嚼細溫酒下九蟲論古方論列臟腑中九蟲雖未必皆有亦當備識其名狀若蛔蟲則固不待言而知其他皆由臟虛雜食甘冷肥膩節宣不時腐敗凝滯之所生也又有神志不舒精魄失守及五臟勞熱又病餘毒氣血積鬱而生或食果蓏與夫畜獸內臟遺留諸蟲子類而生不可具載亦猶生瘕殆非九數可盡姑列諸例為學者備九蟲例九蟲者一曰伏蟲長四分為群蟲之長二曰白蟲長一寸相生至多其母長至四五丈則殺人三曰內蟲狀如爛杏令人煩滿四曰肺蟲其狀如蠶令人咳五曰胃蟲狀如蝦蟆令人吐逆嘔噦六曰弱蟲狀如瓜瓣令人多唾七曰赤蟲狀如生肉令人腸鳴八曰蟯蟲至微細狀如菜蟲居洞腸間多則為痔漏癰疽諸瘡無所不為九曰蛔蟲長一尺貫心則殺人又有屍蟲與人俱生狀如犬馬尾或如薄筋依脾而居長三寸許大害於人然多因臟虛寒勞熱而生治之各有方九蟲治法烏梅丸治蛔厥令病者靜而復煩此為臟寒蛔上入隔故煩須臾復上得食而嘔又煩者蛔聞食臭出其人自吐蛔烏梅一百五十個當歸川椒去目汗細辛附子炮去皮臍桂心人參黃柏各三兩乾薑炮五兩黃連八兩上為末以苦酒漬烏梅一宿去核蒸之五斗米下熟搗成泥和藥相得納臼中與蜜杵一二千下丸如梧子大食前飲服十丸稍加至三十丸集效丸治因臟腑虛弱或多食甘肥致蛔蟲動作心腹絞痛發則腫聚往來上下痛有休止腹中煩熱口吐涎沫是蛔咬宜服此藥若積年不瘥服之亦愈又治下部有蟲生痔痔癢痛木香鶴蝨炒檳榔訶子煨去核蕪荑炒研附子炮去皮臍乾薑炒各七錢半大黃銼炒一兩半上為細末蜜丸如梧子大每服三十丸食前橘皮湯下婦人醋湯下化蟲丸治寸白蟲兼治諸蟲硫黃一兩別研木香半兩蜜陀僧三分別研附子生用一個去皮臍為末上先以附子末用好醋一升熬成膏入三藥和丸如綠豆大每服二十丸食前荊芥茶清放冷下蟲即化為清水檳榔散治諸蟲在臟腑久不瘥檳榔一兩上為末每服一錢至二錢煎茶蜜湯調下空心食前服咳嗽敘論人之所以滋養其身者唯氣與血呼吸定息衛氣之常失常則為咳嗽津液流潤榮血之常失常則為痰涎咳嗽吐痰氣血已亂矣顧世治嗽之藥極多而卒不能遍效者蓋其致病之因不一世謂五嗽且以五臟而言之要之內因七情外合六淫飲食起居房勞叫呼皆能單復倚互而為病故經云五臟六腑感寒熱風濕皆令人咳又微寒微咳厲風所吹聲嘶發咳熱在上焦咳為肺痿秋傷濕冬咳嗽皆外所因喜則氣散怒則氣激憂則氣聚思則氣結悲則氣緊恐則氣卻驚則氣亂皆能發咳即內所因其如飲食生冷房勞作役致嗽尤多皆不內外因其可一法而治之治之當推其三因隨脈證治療散之下之溫之吐之以平為期外因咳嗽證傷風咳者憎寒壯熱自汗惡風口乾煩躁傷寒咳者憎寒發熱無汗惡寒煩躁不渴傷暑咳者煩熱引飲口燥或吐涎沫聲嘶咯血傷濕咳者骨節煩疼四肢重著洒洒淅淅並屬外所因診其脈浮為風緊為寒數為熱細為濕隨其部位與人迎相應推其臟腑則見病源也內因咳嗽證喜傷心者咳而喉中介介如腫狀甚則咽腫喉痹名為心咳不已則小腸受之小腸咳狀與氣俱失怒傷肝者咳而兩脅下痛甚則不可以轉轉則兩胠下滿名為肝咳不已則膽受之膽咳之狀咳嘔膽汁思傷脾者咳而右脅下痛陰陰引肩背甚則不可以動名為脾咳不已則胃受之胃咳之狀咳而嘔嘔則長蟲出憂傷肺者咳而喘息有聲甚則唾血名為肺咳不已則大腸受之大腸咳狀咳而遺失恐傷腎者咳而腰背相引痛甚則咳涎名為腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食此等皆聚於胃關於肺肺取脰俞最近故內因多先有所感世人併名肺咳嗽也並屬內所因診其脈隨其部位與氣口相應浮緊則虛寒沉數則實熱弦澀則少血洪滑則多痰以此類推無施不可不內外因咳嗽病者咳嗽發作寒熱引腰背痛或復喘滿此因房勞傷腎病者中滿腹脹搶心痛不欲食此因飢飽傷脾病者咳嗽左脅偏痛引小腹並膝腕疼此因疲極傷肝病者咳嗽吐白涎口燥聲嘶此因叫呼傷肺病者咳嗽煩熱自汗咽乾咯血此因勞神傷心並屬不內外因診其脈隨其類假如尺脈浮澀而數則知傷腎右關脈濡則知飲食傷脾左關脈弦短則知疲極傷肝但不應人迎氣口者即是不內外因皆類推咳嗽治法華蓋散治肺虛或感風寒暑濕及勞逸抑鬱憂思喜怒飲食飢飽致臟氣不平咳唾膿血漸成肺痿憎寒發熱羸瘦困頓皮膚甲錯將成勞瘵甜葶藶半兩苦葶藶半兩並用紙隔炒茯苓人參細辛乾薑炮桔梗銼炒杏仁去皮尖麩炒紫菀款冬花甘草炙陳皮各一分上為細末用羊肺一個心血不透者切細研爛旋旋入藥摻肺內再研勻藥盡為度泥土牆上以濕紙七重蓋覆每日去紙一重七日藥就候乾刮下再研羅為細末每服二錢溫酒鹽湯調下米飲亦得空心日二服五味子湯治秋冬之交皮膚為寒濕所搏寒氣內折咳嗽晝夜不已陳橘皮二兩麻黃去節甘草炙杏仁去皮尖麩炒五味子白茯苓各一兩上為末每服二錢水一盞煎七分去滓帶熱服食後臨臥日三服白朮湯治五臟傷濕咳嗽痰涎憎寒發熱上氣喘急白朮二兩五味子茯苓各一兩甘草一分半夏四個洗去滑切作十六片上為銼散分作十六服水一盞半姜五片入半夏一片煎七分空腹服丁香烏梅丸治膈氣壅蔽外感風寒咳嗽痰涎白沫胸背痛不能俯仰口乾咽燥烏梅肉四兩紫蘇木瓜各二兩茯苓二兩四錢甘草三兩三錢檀香半兩人參七錢麝香一字上為末用蜜一斤蠟二兩為丸如櫻桃大含化不以時人參散治咳嗽肺虛不能制下大腸泄瀉上氣喘咳服熱藥不效人參款冬花罌粟殼等分醋炙上為銼散每服四大錢水一盞半阿膠一片烏梅半個同煎七分去滓睡正著時急喚醒服太白丹治肺感寒發熱咳嗽無度通明白礬枯成煉鍾乳寒水石煅水飛過各等分上研勻炊餅糊丸如雞頭大每服一丸先嚼生薑胡桃各一片令細吸太陽氣和藥咽仍用茶清或溫酒送下阿膠散治一切咳嗽虛人老人皆可服阿膠麩炒馬兜鈴各一兩五靈脂研桑白皮各半兩甘草炙一分上為末每服一錢水一盞煎六分通口食後夜臥服平氣飲治一切咳嗽吐痰涎惡風不能食人參白朮川芎當歸五味子甘草炙一分木瓜干紫蘇子炒茯神烏藥去木杏仁去皮尖麩炒桂心白芷各等分上為末每服二錢水一盞姜三片棗一個煎七分溫服杏仁煎治暴咳失聲不語杏仁去皮尖研三兩桑白皮生薑取汁蜜砂糖各一兩半木通貝母各一兩三錢紫菀茸五味子各一兩上將桑白皮木通貝母紫菀五味子為銼散以水三升慢火熬取一升裂去滓入杏仁糖蜜薑汁慢火敖成膏旋含化蛤蚧散治元氣虛寒上氣咳嗽久年不瘥蛤蚧一對炙成煉鍾乳款冬花肉桂白礬飛過別研甘草炙各半兩上為末每服半錢用蘆管吸之或覺咽乾即用米飲調下空心食前款冬花散治傷風冷嗽諸未效者款冬花不拘多少上一味為粗末爐上燒以酒漏蓋吸咽煙覺咽乾口燥以茶清送下白散子治久年咳嗽不愈者附子一枚煨熟新水浸一時久去皮臍焙乾上為末每服一錢白砂蜜二錢水一盞煎七分通口服青金丹治肺虛壅咳嗽喘滿咯痰血杏仁去皮尖一兩牡蠣煅取粉入杏仁同炒黃色去牡蠣粉不用青黛一兩上研勻入黃蠟一兩熔搜和丸如彈子大壓匾如餅每用中日柿一個去核入藥在內濕紙裹煨約藥熔方取出去火毒細嚼糯米飲送下一方名甲乙餅治咳出血片兼涎內有血條不問年久月深但聲在一服效用青黛一分牡蠣粉二錢匕杏仁七粒去皮尖研蠟丸了湯使並同前應夢人參散治風壅痰嗽咯血及傷寒體熱頭痛方見疫病門神效散治老少喘嗽神效杏仁去皮尖炒一兩半甘草炙旋覆花各三兩白朮蓮肉去心皮射干米泔浸前胡御米略炒百合水浸去沫白扁豆略炒川芎各三兩人參白茯苓各四兩神麯炒五兩桑白皮炙乾葛各六兩桔梗七兩上為細末每服二錢水一盞姜三片棗一個煎七分食前溫服
