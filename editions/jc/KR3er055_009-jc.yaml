body:
  text: 卷之九胸痞證治病者心下堅滿痞急痛肌中苦痹緩急如刺不得俯仰其胸前皮皆痛手不得犯胸中愊愊中而滿短氣咳唾引痛咽塞不利習習如癢喉中乾燥時欲吐嘔煩悶白汗時出痛引徹背不治則數日殺人病名胸痞由下虛極氣上控膈使然其脈陽微陰結栝蔞丸治胸痞胸中痛徹背氣塞喘息咳喘心腹痞悶栝蔞去瓤取子炒香熟留皮與瓤別用枳殼麩炒去瓤各等分上二味為細末先取栝蔞皮瓤研末水熬成膏和二物末為丸如梧子大熱熟水下二十五丸日二食後服橘皮生薑湯治胸痞胸中噫塞愊愊如滿習習如癢喉中澀咳唾燥沫橘皮一兩枳實麩炒去瓤二錢生薑半兩上為銼散分二服水二盞煎七分為一服去滓食前服梔子湯治胸痞切痛方此方與倉卒散煮制不同故別出之梔子二兩燒存性附子炮三兩上為銼散每服三錢水一大盞薤白三寸同煎至五分食前溫服健忘證治脾主意與思意者記所往事思則兼心之所為也故論云言心未必是思言思則必是心破外人議思心同時理甚明也今脾受病則意舍不清心神不寧使人健忘盡心力思量不來者是也或曰常常喜忘故謂之健忘二者通治小定志丸治心氣不定五臟不足甚者憂憂愁愁不樂忽忽喜忘朝瘥暮劇暮瘥朝發及因事有所大驚夢寐不祥登高涉險致神魂不安驚悸恐怯菖蒲炒遠志去心薑汁淹各二兩茯苓茯神人參各三兩辰砂為衣上為末蜜丸如梧子大每服五十丸米湯下一方去茯神名開心散飲服二錢匕不以時菖蒲益智丸治喜忘恍惚破積聚止痛安神定志聰明耳目菖蒲炒遠志去心薑汁淹炒人參桔梗炒牛膝酒浸各一兩一分桂心三分茯苓一兩三分附子炮去皮臍一兩上末蜜丸如梧子大每服三十丸溫酒米湯下食前服虛煩證治虛煩者方論中所謂心虛煩悶是也大抵陰虛生內熱陽盛生外熱外熱曰燥內熱曰煩此不分而分也傷寒大病不復常霍亂吐瀉之後皆使人心虛煩悶婦人產蓐多有此病其證內煩身不覺熱頭目昏疼口乾咽燥不渴清清不寐皆虛煩也方例有虛煩近傷寒之說不可不辨又平人自汗小便頻並遺泄白濁皆憂煩過度之所致傷寒屬外因憂煩屬內因霍亂兼不內外因學者當辨析而調治淡竹茹湯治心虛煩悶頭疼短氣內熱不解心中悶亂及婦人產後心虛驚悸煩悶欲絕麥門冬去心小麥各二兩半甘草炙一兩人參白茯苓各一兩半半夏湯洗七次二兩上為銼散每服四大錢水二盞姜七片棗三枚淡竹茹一塊如指大煎七分去滓食前服虛勞煩悶尤宜服之溫膽湯治大病後虛煩不得眠此膽寒故也此藥主之又治驚悸半夏湯洗七次竹茹枳實麩炒去瓤各二兩陳皮三兩甘草一兩炙茯苓一兩半上為銼散每服四大錢水一盞半姜五片棗一枚煎七分去滓食前服酸棗仁湯治霍亂吐下增劇虛勞煩擾奔氣在胸中不得眠或發寒熱頭疼暈悶酸棗仁炒一兩三分人參桂心各一分知母茯苓各三錢三字石膏煅半兩甘草炙二錢上銼散每服四錢水一盞半姜三片棗一枚煎七分去滓食前服五痿敘論夫人身之有皮毛血脈筋膜肌肉骨髓以成形內則有肝心脾肺腎以主之若隨情妄用喜怒不節勞佚兼併致內臟精血虛耗榮衛失度發為寒熱使皮血筋骨肌肉痿弱無力以運動故致痿躄狀與柔風腳弱皆相類以脈證並所因別之不可混濫柔風腳氣皆外所因痿躄則屬內臟氣不足之所為也審之五痿證例病者肺熱皮虛弱薄著足痿躄其色白而毛敗名曰皮痿由肺熱葉焦使然也肺為五臟長有所失亡所求不得則發肺鳴肺鳴則肺葉焦論曰五臟因肺熱焦發為痿躄病者心下熱膝腕樞紐如折去而不相提挈脛筋縱緩不能任其地其色赤而絡脈溢名曰脈痿由悲哀太甚陽氣內動數溲血故本病論曰大經空虛發為肌痹傳為脈痿病者肝熱口苦筋膜乾筋急而攣其色蒼而爪枯名曰筋痿由思想無窮所願不得意淫於外入房太甚宗筋弛縱及為白淫故下經曰筋痿者生於肝使內也病者脾熱胃干而渴肌肉不仁其色黃而肉蠕動名曰肉痿由漸於濕地以水為事居處下澤濡漬痹而不仁故下經曰肉痿者得之濕地也病者腎熱腰脊不舉骨枯而髓減其色黑而齒槁名曰骨痿因有所遠行勞倦遇大熱而渴陽氣內乏熱舍於腎致水不勝火則骨枯而髓虛故下經曰骨痿者生於大熱也五痿治法諸治痿法當養陽明與衝脈陽明主胃乃五臟六腑之海主潤宗筋束骨以利機關衝脈者諸經之海主滲灌溪谷與陽明合養於宗筋會於氣街屬於帶脈絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也治之各補其榮而通其輸調其虛實和其逆順至筋脈骨肉各得其旺時病乃已矣加味四斤丸治肝腎臟虛熱淫於內致筋骨痿弱不自勝持起居須人足不任地驚恐戰掉潮熱時作飲食無味不生氣力諸虛不足蓯蓉酒浸牛膝酒浸天麻木瓜干鹿茸燎去毛切酥炙熟地黃菟絲子酒浸通軟別研細五味子酒浸各等分上為末蜜丸如梧子大每服五十丸溫酒米湯食前下一法不用五味子有杜仲麋角丸治五痿皮緩毛瘁血脈枯槁肌肉薄著筋骨羸弱飲食不滋庶事不興四肢無力爪枯發落眼昏唇燥疲憊不能支持麋角鎊一斤酒浸一宿熟地黃四兩大附子生去皮臍一兩半上用大麥米二升以一半藉底一半在上以二布巾隔覆炊一日取出藥與麥別焙乾為末以浸藥酒添清酒煮麥粉為糊搜和得所杵三千下丸如梧子大每服五十丸溫酒米湯任下食前服王啟玄傳玄珠先生耘苗丹三方序曰張長沙戒人妄服燥烈之藥謂藥勢偏有所助勝克流變則真病生焉猶憫苗不長而揠之者也若稟氣受血不強合服此而不服反忽略之是不耘苗者也上丹養五臟補不足秘固真元均調二氣和暢榮衛保神守中久服輕身耐老健力能食明目降心火交腎水益精氣男子絕陽庶事不堪女子絕陰乃不能妊腰膝重痛筋骨衰敗面色黧黑心勞志昏寤寐恍惚煩憒多倦餘瀝夢遺膀胱邪熱五勞七傷肌肉羸瘁上熱下冷難任補藥服之半月陰陽自和容色肌肉光潤悅澤開心意安魂魄消飲食養胃氣五味子半斤百部酒浸一宿焙菟絲子酒浸別研肉蓯蓉酒浸杜仲炒斷絲巴戟去心遠志去心枸杞子防風去叉白茯苓蛇床子炒山藥柏子仁別研各二兩上為末蜜丸梧子大食前溫酒鹽湯任下三十丸春煎乾棗湯夏加五味子四兩四季月加蓯蓉六兩秋加枸杞子六兩冬加遠志六兩食後兼服衛生湯衛生湯補虛勞強五臟除煩養真退邪熱順血脈緩中安和神志潤澤容色常服通暢血脈不生癰瘍養胃益精當歸白芍藥各四兩黃耆八兩甘草炙一兩上為銼散每服四錢水盞半煎七分去滓不以時年老加酒半盞煎中丹補百損體劣少氣善驚昏憒上焦客熱中脘冷痰不能多食心腹弦滿脾胃氣衰精血妄行容色枯悴黃耆白芍藥當歸各四兩白茯苓人參桂心各二兩川椒炒出汗一兩大附子炮去皮臍黃芩各一兩為末薑汁和作餅上為末粟米飲搜和得所搗千杵丸如梧子大酒飲任下三五十丸食前服小丹補勞益血去風冷百病諸虛不足老人精枯神耗女子絕傷斷緒久服益壽延年安寧神志魂魄流滋氣血脈絡開益智慧釋散風濕耳目聰明筋力強壯肌膚悅澤氣宇泰定熟地黃肉蓯蓉酒浸各六兩五味子菟絲子酒浸各五兩柏子仁別研天門冬去心蛇床子炒覆盆子巴戟去心石斛各三兩續斷澤瀉人參山藥遠志去心炒焦山茱萸菖蒲桂心白茯苓杜仲銼炒絲斷各二兩天雄炮去皮臍一兩煉成鍾乳粉扶衰三兩續老二兩常調一兩氣完則刪去上為末蜜丸如梧子大食前酒服三十丸至五十丸忌五辛生蔥蕪荑餳鯉虛人多起去鍾乳倍地黃多忘倍遠志茯苓少氣神虛倍覆盆子欲光澤倍柏子仁風虛倍天雄虛寒倍桂心小便赤濁三倍茯苓一倍澤瀉吐逆倍人參芎桂散治四肢疼痛軟弱行履不便方見中風門藿香養胃湯治胃虛不食四肢痿弱行立不能皆由陽明虛宗筋無所養遂成痿躄藿香白朮白茯苓神麯炒烏藥去木縮砂仁薏苡仁炒半夏曲人參各半兩蓽澄茄甘草炙各三錢半上為粗末每服四錢水一盞半生薑五片棗二枚同煎七分去滓不以時服失血敘論夫血猶水也水由地中行百川皆理則無壅決之虞血之周流於人身榮經府俞外不為四氣所傷內不為七情所郁自然順適萬一微爽節宣必至壅閉故血不得循經流注榮養百脈或泣或散或下而亡反或逆而上溢乃有吐衄便利汗痰諸證生焉十種走失無重於斯隨證別之乃可施治外因衄血證治病者因傷風寒暑濕流傳經絡陰陽相勝故血得寒則凝泣得熱則淖溢各隨臟腑經絡湧泄於清氣道中衄出一升一斗者皆外所因治之各有方桂枝栝蔞根湯治傷風汗下不解鬱於經絡隨氣湧泄衄出清血或清氣道閉流入胃管吐出清血遇寒泣之色必瘀黑者桂心白芍藥栝蔞根甘草炙川芎各等分上為銼散每服四大錢水一盞半姜三片棗一枚煎至七分去滓服頭痛加石膏麻黃升麻湯治傷寒發熱解利不行血隨氣壅世謂紅汗者是也麻黃去節湯二兩半升麻一兩一分黃芩芍藥甘草生石膏煅茯苓各一兩上銼散每服四大錢水一盞半姜三片煎七分去滓熱服微汗解五苓散治伏暑飲熱暑氣流入經絡壅溢發衄或胃氣虛血滲入胃停留不散吐出一二升許方見傷暑門治衄則以茆花煎湯下屢用得效除濕湯治冒雨著濕鬱於經絡血溢作衄或脾不和濕著經絡血流入胃胃滿吐血茯苓乾薑各四兩甘草炙白朮各二錢上為銼散每服四錢水一大盞煎六分去滓服加川芎二錢最止浴室中發衄內因衄血證治病者積怒傷肝積憂傷肺煩思傷脾失志傷腎暴喜傷心皆能動血蓄聚不已停留胸間隨氣上溢入清氣道中發為鼻衄名五臟衄止衄散治氣鬱發衄無比神方黃耆六錢赤茯苓白芍藥各三錢當歸生乾地黃阿膠炙各三錢上為細末煎黃耆湯調下二錢匕未知再作不內外因證治病者飲酒過多及啖炙爆五辛熱食動於血血隨氣溢發為鼻衄名酒食衄或墮車馬打撲傷損致血淖溢發為鼻衄名折傷衄加味理中丸治飲酒過多及啖炙爆熱食動血發為鼻衄人參白朮甘草炙乾薑炮乾葛川芎各等分上為銼散每服四錢水一盞煎七分去滓溫服花蕊石散治一切金瘡打撲傷損貓犬咬傷並於傷處糝敷或內損血入臟腑壅溢作衄及婦人產後敗血不散花蕊石細研一斤上色硫黃研細四兩上二味拌勻入藏瓶中以紙筋搗黃泥固濟候乾焙令熱透以磚藉用白炭一秤頂上發火燒灰盡候冷取出再研極細諸臟傷及婦人產後瘀血不行並用童子小便溫酒調一二錢匕取瘀血即效白芨散治鼻衄立效白芨不拘多少上為末冷水調用紙花貼鼻窊中一法用黃膠湯令軟貼鼻窊中三因吐血證治病者諸血積聚合發為衄而清氣道閉濁道湧溢停留胸胃中因即滿悶吐出數斗至於一石者名曰內衄或因四氣傷於外七情動於內及飲食房勞墜墮傷損致榮血留聚膈間滿則吐溢世謂妄行桂枝栝蔞根湯治傷風吐血方見外因衄血證治五苓散治傷暑吐血方見外因衄血證治除濕湯治傷濕吐血方見外因衄血證治金屑丹治三因吐血及衄血下血一切血溢妄行葉子雌黃上一味為粗末入棗肉內線系定滿著湯煮用黑錫對雌黃斤兩熔作汁傾入湯煮一日添湯候冷取出雌黃洗淨乾研為細末卻以煮藥棗肉和丸如梧子大每服五七丸黑錫煎湯下傷胃吐血證治病者因飲食過度傷胃或胃虛不能消化致翻嘔吐逆物與氣上衝蹙胃口決裂所傷吐出其色鮮紅心腹絞痛白汗自流名曰傷胃吐血理中湯能止傷胃吐血者以其功最理中脘分利陰陽安定血脈方證廣如局方但不出吐血證學者當自知之人參白朮甘草炙白姜炮各等分上為銼散每服四錢水一盞煎七分去滓不以時服或只煮乾薑甘草湯飲之亦妙方見養生必用肺疽吐血證治病者因飲啖辛熱熱燥傷肺血得熱則溢因作嘔吐出血一合或半升許名曰肺疽傷於腑則屬胃傷於臟則屬肺上以此分不可不究二灰散治肺疽吐血並妄行紅棗和核燒存性百藥煎煅各等分上為細末每服二錢米湯調下折傷吐血證治病者因墜閃肭致傷五臟損裂出血停留中脘臟熱則吐鮮血臟寒則吐瘀血如豆羹汁此名內傷治之各有方加味芎藭湯治打撲傷損敗血流入胃脘嘔吐黑血或如豆羹汁川芎當歸白芍藥百合水浸半日荊芥穗各等分上為銼散每服四錢水一盞酒半盞同煎七分去滓不以時服折傷瘀血證治病者有所墜墮惡血留內或因大怒汗血洴溫停蓄不散兩脅疼痛腳善瘈骨節時腫氣上不下皆由瘀血在內治之各有方雞鳴散治從高墜下及木石所壓凡是傷損血瘀凝積氣絕欲死並久積瘀血煩躁疼痛叫呼不得並以此藥利去瘀血即愈此藥推陳致新治折傷神效大黃一兩酒蒸杏仁三七粒去皮尖上研細酒一碗煎至六分碗裂去滓雞鳴時服次日取下瘀血即愈若便覺氣絕不能言取藥不及急掰口開以熱小便灌之病餘瘀血證治病者或因發汗不徹及吐衄不盡瘀蓄在內使人面黃唇白大便黑腳弱氣喘甚則狂悶皆瘀血所致治之各有方犀角地黃湯治傷寒及溫病應發汗而不汗內蓄為瘀血及鼻衄吐血不盡余血停留致面黃大便黑犀角一兩生地黃八兩芍藥三兩牡丹皮二兩上為銼散每服四錢水一盞半煎七分去滓狂者加大黃二兩黃芩三兩其人脈大來遲腹不滿自言滿為無熱但依方不須加也汗血證治病者汗出正赤汙衣名曰汗血皆由大喜傷心喜則氣散血隨氣行婦人產蓐多有此證葎草汁治產婦大喜汗出汙衣赤色及膏淋尿血葎草不拘多少上搗取汁二升醋二合和空腹飲一杯或濃煮汁飲亦治淋瀝尿血便血證治病者大便下血或清或濁或鮮或黑或在便前或在便後或與泄物並下此由內外有所感傷凝停在胃隨氣下通亦妄行之類故曰便血伏龍肝湯治先便後血謂之遠血兼治吐衄伏龍肝半斤甘草炙白朮阿膠乾地黃千金作乾薑黃芩各三兩上為銼散每服五錢水一盞煎七分去滓空腹溫服一法有附子三兩炮入當歸赤小豆散治先血而後便謂之近血赤小豆五兩浸令芽出曬乾一法熬令拆當歸一兩上為末漿水服方寸匕日三四服風痢下血證治病者因風停於膚腠乘虛入腸胃風動血故便清血或下瘀血注下無度名曰風利古方以此為蠱痢非也胃風湯治大人小兒風冷乘虛入客腸胃水穀不化泄瀉注下及腸胃濕毒下如豆汁或下瘀血日夜無度人參白茯苓芎藭桂心當歸白芍藥白朮上等分為銼散每服四錢水一盞半入粟米百餘粒同煎七分去滓空心稍熱服料簡夫便血有腸痔蠱毒熱痢酒痢血枯肺痿等別有門類其如風痢亦當在痢門以純下清血故附於此不可不知尿血證治病者小便出血多因心腎氣結所致或因憂勞房室過度此乃得之虛寒故養生云不可專以血得熱為淖溢為說二者皆致尿血與淋不同以其不痛故屬尿血痛則當在血淋門發灰散治小便尿血或先尿而後血或先血而後尿亦遠近之謂也發灰本草云能消瘀血通關格利水道破癥瘕癰腫及狐尿刺屍疰雜瘡療轉胞通大小便止咳嗽鼻衄上一味每服二錢以米醋二合湯少許調服以井花水調亦得兼治肺疽心衄內崩吐血一兩口或舌上血出如針孔若鼻衄吹內立已一法棕櫚燒灰米飲調下大治大小便下血又一法同葵子等分為末飲服二錢治轉胞尤妙玉屑膏治尿血並五淋砂石疼痛不可忍受者黃耆人參各等分上為末用蘿蔔大者切一指厚三指大四五片蜜淹少時蘸蜜炙乾復蘸盡蜜二兩為度勿令焦炙熟點黃耆人參末吃不以時仍以鹽湯送下癥瘕證治癥瘕積聚隨氣血以分門故方云以癥瘕屬肝部積聚屬肺部不亦明矣況七者火數屬心蓋血生於心八者木數屬肝蓋血歸於肝雖曰強分理似不混夫癥者堅也堅則難破瘕者假也假物成形然七癥八瘕之名經論亦不詳出雖有蛟龍魚鱉肉發蝨米等七證初非定名偶因食物相感而致患耳若婦人七癥八瘕則由內外不內外因動傷五臟氣血而成古人將婦人病為痼疾以蛟龍等為生瘕然亦不必如此執泥婦人癥瘕並屬血病龍蛇魚鱉等事皆出偶然但飲食間誤中之留聚腹臟假血而成自有活性亦猶永徽中僧病噎者腹有一物其狀如魚即生瘕也與夫宿血停凝結為痞塊雖內外所感之不同治法當以類相從所謂醫者意也如以敗梳治蝨瘕銅屑治龍瘕曲糵治米瘕石灰治發瘕如此等類方論至多不復繁引學者可以理解大硝石丸治七癥八瘕聚結痞塊及婦人帶下絕產並欲服丹藥腹中有癥瘕者當先下之此藥但去癥瘕不令人困硝石六兩大黃八兩人參甘草各三兩上為末以三年苦酒三升置銅器中以竹作準每一升作一刻拄器中納大黃常攪不息使微沸盡一刻乃納余藥又盡一刻極微火熬使可丸則丸如雞子中黃若不能服大丸則作小丸如梧子大米湯下三十丸四日一服婦人服之或下如雞肝或如米泔正赤黑等三二升下後忌風冷自養如產婦小三稜煎治食癥酒癖血瘕氣塊時發刺痛全不思食及積滯不消心腹堅脹痰逆嘔噦噫酢吞酸脅肋刺痛胸膈痞悶並脾氣橫泄京三稜蓬莪朮各四兩芫花一兩去梗葉上同入瓷器中用米醋五升浸滿封器口以灰火煨令乾取出稜術將芫花以余醋炒令微焦焙乾為末醋糊丸如綠豆大每服十五丸生薑湯下婦人血分男子脾氣橫泄腫滿如水用桑白皮煎湯下三聖丸治積年癥瘕癖塊諸藥療理不瘥至效舶上硫黃一兩水銀半兩硇砂去砂石一分上三物乳盆內袞研如粉卻以生鐵銚內用文武火熬熔成汁以火箸攪令勻停冷刀劃下以紙裹置地坑內埋一宿取出再研細次以赤芍藥當歸荊三稜蓬莪朮紅花各一分同用並細銼以法酒一升煎及一半漉出砂盆內研生布裂汁再熬放冷入飛羅面為糊搜丸如綠豆大治因產後傷於飲食結伏在腹脅時發疼痛不可忍者當歸浸酒一升逐旋取酒暖下七丸至十丸每服磨癖塊空心溫酒下三丸至五丸所餘藥滓裂了焙乾為末別入乾地黃真蒲黃芫花各一分醋炒焦黃上為末以前一般糊丸如綠豆大治女人血臟冷氣攻心疼及一切血疾溫酒下十丸一握七丸治臟腑宿蘊風冷氣血不和停滯宿飲結為癥瘕痞塊及婦人血瘕腸胃中塞飲食不下咳逆脹滿及下利赤白霍亂轉筋及踒躄拳攣腰脊腳膝疼痛行步不能常服健脾暖胃堅骨強陽神麯半斤炒黃大附子二隻炮去皮臍甘草二兩炙上末蜜丸每左手一握分作七丸每服一丸細嚼米飲下妙應丹治諸臟氣虛積聚煩悶及飲食中蠱毒或食水陸果蓏子卵入腹而成蟲蛇魚鱉或宿食留飲婦人產後敗血不消女子月水不通結為癥瘕時發寒熱唇口焦黑肢體瘦削嗜臥多魘食少腹痛大便糟粕變成冷痢附子四個六七錢重者生去皮臍剜作甕入硇砂共一兩七錢半面劑裹煨熟去面不用蓽茇木香炮青皮破故紙炒各三兩半上為末麵糊搜丸如梧子大每服三十丸生薑橘皮湯下泄利米湯下加至五十丸癲癇敘論夫癲癇病皆由驚動使臟氣不平鬱而生涎閉塞諸經厥而乃成或在母胎中受驚或少小感風寒暑濕或飲食不節逆於臟氣詳而推之三因備具風寒暑濕得之外驚恐震懾得之內飲食飢飽屬不內外三因不同忤氣則一傳變五臟散及六腑溢諸絡脈但一臟不平諸經皆閉隨其臟氣證候殊分所謂象六畜分五聲氣色脈證各隨本臟所感所成而生諸證古方有三癇五臟癇六畜癇乃至一百二十種癇以其稟賦不同臟腑強弱性理躁靜故諸證蜂起推其所因無越三條病由都盡矣癲癇證治病者旋暈顛倒吐涎沫搐搦騰踴作馬嘶鳴多因挾熱著驚心動膽懾郁涎入之所致也名曰馬癇以馬屬在午手少陰君火主之故其病生於心經病者暈眩四肢煩疼昏悶顛倒掣縱吐沫作羊叫聲多因少小臍瘡未愈數洗浴濕襲脾經之所致也名曰羊癇以羊屬未坤位足太陰濕土主之故其病生於脾經病者昏暈顛倒兩手頻伸叫作雞聲須臾即醒醒後復發多因少小燥氣傷胃煩毒內作郁涎入胃之所致也名曰雞癇以雞屬酉足陽明燥金主之故其病生於胃經病者眩暈顛倒眼目相引牽縱急強作豬叫鳴吐涎沫食頃方已多因少小吐利挾風之所致也名曰豬癇以豬屬亥手厥陰心胞風木主之故其病生於右腎經病者眩暈顛倒目反口噤瘈縱吐沫作牛吼聲多因少小濕熱傷肺涎留肺系遇燥熱則發動名曰牛癇以牛屬醜手太陰濕土主之故其病生於肺經六珍丹治風癇失性顛倒欲死或作牛吼馬嘶雞鳴羊叫豬嗥等聲腑臟相引氣爭掣縱吐沫流涎久而方蘇通明雄黃葉子雌黃未鑽真珠各一兩鉛二兩熬成屑丹砂半兩水銀一兩半上研令極勻蜜丸如梧子大每服三丸至五丸薑棗湯下須搗二三萬杵乃可丸礬丹治五癲百癇無問陰陽冷熱虢丹晉礬各一兩上用磚鑿一窠可容二兩許先安丹在下次安礬在上以白炭五斤煅令炭盡取出細研以不經水豬心血為丸如綠豆大每服十丸至二十丸橘皮湯下大鎮心丹治一百二十種癲癇驚狂譫妄顛倒昏不知人噴吐涎沫及治心驚膽寒清清不睡可左脅偏疼辰砂用黃松節酒煮龍齒用遠志苗醋煮上只取辰砂龍齒各等分為末豬心血為丸如雞頭大每服一丸以麥門冬葉綠豆燈芯生薑白蜜水煎豆熟為度臨臥嚥下小兒磨化半丸量歲數與之蛇黃丹治五臟六腑諸風癲癇掣縱吐涎沫不識人及小兒急慢驚風蛇含四枚建盞內煅紅以楮樹汁一碗淬干天南星炮白附子辰砂別研麝香別研各半兩上為末糯米糊丸如梧子大每服溫湯磨化一丸量大小與服大人嚼細三五丸溫酒米湯任下凡例夫五癇合屬五臟而無腎有胃者以腎屬鼠非畜養物神無主治故不作癇胃屬雞系六畜物故有象兼胃為五臟海非余腑比又犬屬戌手少陽小腸經主之雖屬六畜初無犬癇者以辰戌為魁罡四殺沒處不興癇象古方類例未之究也學者宜知之狂證論夫三陽並三陰則陽虛而陰實故癲三陰並三陽則陰虛而陽實故狂論曰陽入陰其病靜陰入陽其病怒怒則狂矣病者發狂不食棄衣奔走或自稱神聖登高笑歌逾牆上屋所至之處非人所能罵詈妄言不避親屬病名狂多因陽氣暴折蓄怒不決之所致故經曰陽明常動太陽少陽不動不動而動為大疾此其候也鎮心丹治心氣不足病苦驚悸自汗心煩悶短氣喜怒悲憂悉不自知亡魂失魄狀若神靈所憑及治男子遺泄女子帶下光明辰砂研白礬煅汁盡各等分上為末水丸如雞頭大每服一丸煎人參湯下食後服大補心丹治憂思惡慮過多致神志不寧魂魄失守虛陽外泄則自汗嘔吐瀉利頻數諸陰不生則語言重複忪悸眩暈兼治大病後虛煩不得眠羸瘦困乏及婦人胎前產後悉能主之常服安心神調血脈鎮驚補心黃耆蜜炙茯神人參酸棗仁炒熟地黃各一兩遠志去心炒五味子柏子仁各半兩別研上為末蜜丸如梧子大用辰砂為衣每服三十丸米湯溫酒任下盜汗不止麥麩湯下亂夢失精人參龍骨湯下卒暴心痛乳香湯下肌熱虛煩麥門冬湯下吐血人參卷柏湯下大便下血當歸地榆湯下小便尿血赤茯苓湯下中風不語薄荷牛黃湯下風癇涎潮防風湯下礬丹亦治狂方見癲癇門凡傷寒陽毒及蓄瘀血皆發狂各見本門九痛敘論夫心痛者在方論則曰九痛內經則曰舉痛一曰卒痛種種不同以其痛在中脘故總而言之曰心痛其實非心痛也若真心痛則手足青至節若甚夕發晝死晝發夕死不在治療之數方中所載者乃心主包絡經也若十二經絡外感六淫則其氣閉塞鬱於中焦氣與邪爭發為疼痛屬外所因若五臟內動汨以七情則其氣痞結聚於中脘氣與血搏發為疼痛屬內所因飲食勞逸觸忤非類使臟氣不平痞隔於中食飲遁疰變亂腸胃發為疼痛屬不內外因治之當詳分三因通中解散破積潰堅隨其所因無使混濫依經具錄諸證以備治法云爾外所因心痛證治足厥陰心痛兩脅急引小腹連陰股相引痛手心主心痛徹背心煩掌中熱咽乾目黃赤脅滿足太陰心痛腹脹滿澀澀然大便不利膈閉咽塞手太陰心痛短氣不足以息季脅空痛遺失無度胸滿煩心足少陰心痛煩劇面黑心懸若飢胸滿腰脊痛背輸諸經心痛心與背相引心痛徹背背痛徹心諸腑心痛難以俯仰小腹上衝卒不知人嘔吐泄瀉此皆諸經諸俞諸腑涉邪所致病屬外所因內所因心痛證治肝心痛者色蒼蒼如死灰狀終日不得太息真心痛者手足青至節旦發夕死夕發旦死脾心痛者如針錐刺其心腹蘊蘊然氣滿肺心痛者若從心間起動作痛益甚色不變腎心痛者與背相引善瘛如物從後觸其心身傴僂胃心痛者腹脹滿不下食食則不消皆臟氣不平喜怒憂鬱所致屬內所因不內外因心痛證久積心腹痛者以飲啖生冷果實中寒不能消散結而為積甚則數日不能食便出乾血吐利不定皆由積物客於腸胃之間遇食還發名積心痛及其臟寒生蛔致心痛者心腹中痛發作腫聚往來上下痛有休止腹熱涎出病屬不內外因方證中所謂九種心痛曰飲曰食曰風曰冷曰熱曰悸曰蟲曰注曰去來痛者除風熱冷屬外所因余皆屬不內外更有婦人惡血入心脾經發作疼痛尤甚於諸痛更有卒中客忤鬼擊屍疰使人心痛亦屬不內外因三因心痛總治蜜附湯治心腹疼痛或吐或泄狀如霍亂及療冒涉濕寒賊風入腹拘急切痛附子生去皮臍切作四片以白蜜煎令附子變色以湯洗去蜜切半兩桂心芍藥各三分甘草炙四錢上為銼散每服四大錢水一盞姜五片棗二枚煎七分去滓食前服大便秘結入白蜜半匙同煎麻黃桂枝湯治外因心痛惡寒發熱內攻五臟拘急不得轉動麻黃去節湯浸焙乾桂心白芍藥細辛去苗乾薑炮甘草炙各三分半夏湯洗七次香附炒去毛各半兩上為銼散每服四大錢水盞半姜五片煎七分去滓食前服大便秘入大黃如博棋大兩枚煎加味小建中湯治心腹切痛不可忍按輕卻痛按重則愈皆虛寒證服熱藥並針灸不瘥此藥主之桂心三分甘草炙半兩白芍藥一兩半遠志去心半兩上為銼散每服四大錢水一盞半姜五片棗一枚煎七分去滓入餳糖一塊如皂莢子大煎令熔食前溫服雞舌香散治心腹卒痛安胃進食調冷熱定泄瀉老少通用丁香一百枚甘草半兩高良薑一兩白芍藥二兩上為細末每服二錢匕陳米飲調下空心食前服王啟玄子序云初余為禁隊因此證處與御醫使令施用後至富貴乃由此始訶子散治心脾冷痛不可忍一服見效及老幼霍亂吐瀉其效如神訶子炮去核甘草炙厚朴薑製炒乾薑炮草果去皮陳皮良薑炒茯苓神麯炒曲糵炒各等分上為末每服二錢候發刺不可忍時用水一盞煎七分入鹽服如速則鹽點九痛丸治九種心痛蟲痛疰痛風痛悸痛食痛飲痛冷痛熱痛往來痛兼治卒中惡腹脹痛口不能言又治連年積冷流在心胸並冷腫痛上氣落馬墜車瘀血等疾附子三兩炮去皮臍狼毒炙香巴豆去皮心膜炒秤一兩人參乾薑炮吳茱萸浸洗各一兩炒上為末煉蜜丸如梧子大每服空腹溫酒下三丸卒中惡心痛不能言服三丸蘇合香丸治傳屍骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐利時氣鬼魅瘴瘧赤白暴利瘀血月閉痃癖疔腫驚癇鬼忤中人小兒吐乳大人狐貍等病方蘇合香油入安息香內薰陸香別研龍腦各一兩白朮丁香硃砂研水飛青木香白檀香沉香烏犀鎊安息香別為末用無灰酒一升熬膏香附子去毛訶子煨去核麝香蓽茇各二兩上為末用安息香等膏同煉蜜旋丸如梧子大早朝井花水溫冷任意化下四丸老人小兒一丸溫酒化服亦得辟邪用蠟紙裹一丸如彈子大縫袋盛帶之撞氣阿魏丸治九種心痛五種噎疾痃癖氣塊冷氣攻刺及脾胃停寒胸滿膨脹腹痛腸鳴嘔吐酸水丈夫小腸氣婦人血氣血刺等阿魏二錢半酒浸一宿以面為糊胡椒二錢半甘草茴香炒川芎青皮陳皮丁香皮炒蓬朮各一兩炒縮砂仁桂心白芷炒各半兩生薑四兩切作片用鹽一兩淹一宿炒黑色上為末阿魏糊為丸如雞頭大每藥一斤用硃砂七錢為衣丈夫氣痛炒姜鹽湯下二粒至三粒婦人血氣醋湯下常服茶酒任下二粒並嚼細嚥食前倉卒散治氣自腰腹間攣急疼痛不可屈伸腹中冷重如石痛不可忍白汗如洗手足冰冷久不瘥垂死方山梔子四十九個連皮燒半過附子一枚炮去皮臍上為末每服二錢酒一小盞入鹽少許煎七分溫服又治胸痞切痛失笑散方見前疝門
