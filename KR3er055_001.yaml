body:
  text: 卷之一脈經序學醫之道須知五科七事五科者脈病證治及其所因七事者所因中復分為三博約之說於斯見矣脈為醫門之先雖流注一身其理微妙廣大配天地變化合陰陽六氣緯虛五行麗地無不揆度是以聖人示教有精微氣象之論後賢述作為太素難經之文仲景類集於前叔和詮次於後非不昭著六朝有高陽生者剽竊作歌訣劉元賓從而解之遂使雪曲應稀巴歌和衆經文溺於覆甕正道翳於詖辭良可嘆息今乃料簡要義別白討論分人迎氣口以辨內外因列表里九道以敘感傷病六經不昧五臟昭然識病推因如指諸掌類明條備文略義詳倘能留神則思過半矣學診例凡欲診脈先調自氣壓取病人脈息以候其遲數過與不及所謂以我醫彼智與神會則莫之敢違凡診脈須先識脈息兩字脈者血也息者氣也脈不自動為氣使然所謂長則氣治短則氣病也凡診須識人迎氣口以辨內外因其不與人迎氣口相應為不內外因所謂關前一分人命之主凡診須先識五臟六經本脈然後方識病脈歲主臟害氣候逆傳陰陽有時與脈為期此之謂也凡診須認取二十四字名狀與關前一分相符推說證狀與病者相應使無差忒庶可依源治療總論脈式經云常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻乃可診有過之脈或有作為當停寧食頃俟定乃診師亦如之釋曰停寧俟定即不拘於平旦況倉卒病生豈待平旦學者知之經云切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰可以參決死生之分釋曰切脈動靜者以脈之潮會必歸於寸口三部診之左關前一分為人迎以候六淫為外所因右關前一分為氣口以候七情為內所因推其所自用背經常為不內外因三因雖分猶乃未備是以前哲類分二十四字所謂七表八里九道七表者浮芤滑實弦緊洪八里者微沉緩澀遲伏濡弱九道者細數動虛促結代革散雖名狀不同證候差別皆以人迎氣口一分而推之與三部相應而說證故脈贊曰關前一分人命之主左為人迎右為氣口神門決斷兩在關後而漢論亦曰人迎緊盛傷於寒以此推明若人迎浮盛則傷風虛弱沉細為暑濕皆外所因喜則散怒則激憂澀思結悲緊恐沉驚動皆內所因看與何部相應即知何經何臟受病方乃不失病機也其如診按表裡名義情狀姑如後說但經所述謂脈者血之腑也長則氣治短則氣病數則煩心大則病進文藻雖雅義理難尋動靜之辭有博有約博則二十四字不濫絲毫約則浮沉遲數總括綱紀故知浮為風為虛沉為濕為實遲為寒為冷數為熱為燥風濕寒熱屬於外虛實冷燥屬於內內外既分三因穎別學者宜詳覽不可憚煩也經中所謂視精明者蓋五臟精明聚於目精全則目明神定則視審審視不了則精明敗矣直視上視眩瞑眊瞑皆可兼脈而論病狀也所謂察五色者乃氣之華也赤欲如帛裹朱不欲如赭白欲如白璧之澤不欲如堊青欲如蒼玉之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如漆重澤不欲如炭五色精敗壽不久矣所謂觀五臟有餘不足者候之五聲五聲者臟之音中之守也中盛則氣勝中衰則氣弱故聲如從室中言者是氣之澀也言微終日乃復言者是氣之奪也譫妄不避善惡神明之亂也鄭聲言意不相續陰陽失守也故曰得守者生失守者死所謂六腑強弱以候形之盛衰頭者精明之府頭傾視深精神奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之腑屈伸不能筋將憊矣骨者髓之府也行則振掉骨將憊矣倉廩不藏者腸胃不固也水泉不止者膀胱不藏也得強者生失強者死此等證狀醫者要門在脈難明惟證易辨是故聖智備論垂教學者宜兼明之不可忽也三部分位三部從魚際至高骨得一寸名曰寸口從寸口至尺名曰尺澤故曰尺中寸後尺前名曰關陽出陰入以關為界又云陰得尺內一寸陽得寸內九分從寸口入六分為關分從關分又入六分為尺分故三部共得一寸九分六經所屬心部在左手寸口屬手少陰經與小腸手太陽經合肝部在左手關上屬足厥陰經與膽足少陽經合腎部在左手尺中屬足少陰經與膀胱足太陽經合肺部在右手寸口屬手太陰經與大腸手陽明經合脾部在右手關上屬足太陰經與胃足陽明經合右腎在右手尺中屬手厥陰心包經與三焦手少陽經合手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目其直者復從心系卻上肺出腋下下循臑內後廉行太陰心主之後下肘內廉循臂內後廉抵掌後兌骨之端入掌內廉循小指之內出其端手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支別者從缺盆循頸上頰至目兌眥卻入耳中其支者別頰上䪼抵鼻至目內眥足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中環陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支從目系下頰裡環唇內其支復從肝別貫膈上注肺足少陽之脈起於目兌眥上抵頭角下耳後循頸行手少陽之脈前至肩上卻交出少陽之後入缺盆其支者從耳中出走耳前至目兌眥後其支者自兌眥下大迎合手少陽於䪼下交頰車下頸合缺盆下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中直者從缺盆下腋循胸過季脅下合髀厭中以下循髀太陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者從跗上入大指循歧骨內出其端還貫入爪甲出三毛足少陰之脈起於小指之下斜趨足心出然谷之下循內踝之後別入跟中上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支從肺出絡心注胸中足太陽之脈起於目內眥上額交巔上其支者從巔至耳上角其直行者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外後廉下合膕中下貫腨內出外踝之後循京骨至小指外側端手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃肩骨之前廉上出柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰下入齒縫中還出挾口交人中左之右右之左上挾鼻孔足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中足陽明之脈起於鼻交頞中下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直行者從缺盆下乳內廉下挾臍入氣衝中其支者起胃下口循腹裹下至氣衝中而合以下髀關抵伏兔下入膝臏中下循䯒外廉下足跗入中指內間其支者下膝三寸而別以下入大指間出其端手厥陰之脈起於胸中出屬心包下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間入肘內下臂行兩筋之間入掌中循中指出其端其支者從掌中循小指次指出其端手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆交膻中散絡心包下膈遍屬三焦其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中卻出至目鋭眥五臟所屬左寸外以候心內以候膻中右寸外以候肺內以候胸中左關外以候肝內以候膈中右關外以候脾內以候胃脘左尺外以候腎內以候腹中右尺外以候心主內以候腰釋曰六臟六腑十二經絡候之無逾三部要之前布六經乃候淫邪外入自經絡而及於臟後說六臟乃候情意內郁自臟腑出而應於經內外所因穎然明白學診之道當自此始外因雖自經絡而入必及於臟須識五臟部位內因鬱滿於中必應於經亦須徇經說證不可偏局故經云上竟上胸喉中事也下竟下腰足中事也不可不通五臟本脈體人之脈者乃血之隧道也非氣使則不能行故血為脈氣為息脈息之名自是而分呼吸者氣之橐籥動應者血之波瀾其經以身寸度之計十六丈二尺一呼脈再動一吸脈再動呼吸定息脈五動閏以太息則六動一動一寸故一息脈行六寸十息六尺百息六丈二百息十二丈七十息四丈二尺計二百七十息漏水下二刻盡十六丈二尺營周一身百刻之中得五十營故曰脈行陽二十五度行陰二十五度也息者以呼吸定之一日計一萬三千五百息呼吸進退既遲於脈故八息三分三毫三釐方行一寸八十三息三分三毫行一尺八百三十三息三分行一丈八千三百三十三息行十丈餘六丈二尺計五千一百六十七息通計一萬三千五百息方行盡十六丈二尺經絡氣周於一身一日一夜大會於風府者是也脈屬陰陰行速猶太陰一月一周天息屬陽陽行遲猶太陽一歲一周天如是則應天常度故春肝脈弦細而長夏心脈浮大而洪長夏脾脈軟大而緩秋肺脈浮澀而短冬腎脈沉濡而滑各以其時而候旺相休囚脈息無不及太過之患故曰平人平人常氣稟於胃必以胃氣為本取其資成也合本臟氣三分微似弦洪緩澀沉則為平脈若真臟脈見則不佳矣廣如後說六經本脈體六經所以分手足陰陽者以足為本手為標如足厥陰風木肝與足少陽相火膽為表裡同在一處足太陰濕土脾與足陽明燥金胃足少陰君火腎與足太陽寒水膀胱皆相附近至於手三陰三陽相去頗遠蓋足陰陽本乎地奠方有常手陰陽法乎天變化無定足為常度手為揆度體常盡變故為奇度奇常揆度其道一也足厥陰肝脈在左關上弦細而長足少陰腎脈在左尺中沉濡而滑足太陰脾脈在右關上沉軟而緩足少陽膽脈在左關上弦大而浮足陽明胃脈在右關上浮長而澀足太陽膀胱脈在左尺中洪滑而長手厥陰心主包絡在右尺中沉弦而數手少陰心脈在左寸口洪而微實手太陰肺脈在右寸口澀短而浮手少陽三焦脈在右尺中洪散而急手陽明大腸脈在右寸口浮短而滑手太陽小腸脈在左寸口洪大而緊此手足陰陽六經脈體及其消息盈虛則化理不住運動密移與天地參同彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之應者乃氣候之至脈也故要論云厥陰之至其脈弦一云沉短而數少陰之至其脈鉤一云緊細而微太陰之至其脈沉一云緊大而長少陽之至大而浮一云乍疏乍數乍短乍長陽明之至短而澀一雲浮大而短太陽之至大而長本脈至脈雖識體狀又須推尋六氣交變南政北政司天在泉少陰之脈應與不應如要論所詮乙庚丙辛丁壬戊癸金水木火四運者皆曰北政少陰在泉故寸不應甲己土運德流四政譬如巡狩而居南面北謂之南政少陰在天故寸亦不應若北政厥陰在泉則右不應太陰在泉則左不應若南政厥陰司天則右不應太陰司天則左不應諸不應者反其診則見矣此乃常度合不應而反應是謂太過應而不應是謂不及皆為外淫所因所以欲知少陰應否者以君火為萬物資始不可不知此且以一歲而論之若細推尋當以日論精微之道不可不知若歲主臟害自當揆度平治不能反隅則不復也五臟傳變病脈右手關前一分為氣口者以候臟氣鬱發與胃氣兼併過與不及乘克傳變也以內氣鬱發食氣入胃淫精於脈自胃口出故候於氣口以五臟皆稟氣於胃胃者五臟之本臟氣不能自致於手太陰必因胃氣而至邪氣勝胃氣衰故病甚胃氣絶真臟獨見則死假如春肝脈弦多胃少曰肝病但弦無胃氣曰死若其乘克春雖有胃氣而有澀脈見則秋必病澀甚則今病夏心脈洪多胃少曰心病但洪無胃氣曰死如乘克見微沉則冬病沉甚則今病秋肺脈澀多胃少曰肺病但澀無胃氣曰死秋見洪為夏病洪甚為今病冬腎脈沉多胃少曰腎病但沉無胃氣曰死冬見濡為長夏病濡甚為今病長夏脾脈濡多胃少曰脾病但濡無胃氣曰死長夏見弦脈為春病弦甚為今病又如春肝脈合弦細而長太過則實強令人善怒忽忽眩冒癲疾不及則微虛令人胸痛引背兩脅胠滿夏心脈合洪而微實太過則來去皆盛令人身熱膚痛為浸淫不及則來不盛去反盛令人煩心上咳唾下氣泄秋肺脈合浮而短澀太過則中堅傍虛令人逆氣背痛慍慍然不及則毛而微令人呼吸少氣上咯血下喘聲冬腎脈合沉而緊實太過則如彈石令人解㑊脊脈痛少氣不欲言不及則其去如數令人心懸如飢眇中清脊中痛少腹滿小便變長夏脾脈當沉而濡長太過則如水之流令人四肢不舉不及則如烏之喙令人九竅不通名曰重強太過不及脈之大要迫近而微不可失機又人之五臟配木火土金水以養魂神意魄志生怒喜思憂恐故因怒則魂門弛張木氣奮激肺金乘之脈必弦澀因喜則神廷融泄火氣赫羲腎水乘之脈必沉散因思則意舍不寧土氣凝結肝木乘之脈必弦弱因憂則魄戶不閉金氣澀聚心火乘之脈必洪短因恐則志室不遂水氣旋卻脾土乘之脈必沉緩此蓋五情動不以正侮所不勝既不慕德反謂能勝而乘之侮反受邪此之謂也其病有五五五二十五變若其能所傳授勝克流變又當詳而論之故經曰五臟受氣於其能生傳之於其所勝氣舍於其所生死於其所不勝如肝受氣於心傳於脾氣舍於腎至肺而死心受氣於脾傳於肺氣舍於肝至腎而死脾受氣於肺傳於腎氣舍於心至肝而死肺受氣於腎傳於肝氣舍於脾至心而死腎受氣於肝傳於心氣舍於肺至脾而死則知肝死於肺候於秋庚篤辛死余皆仿此又如甲乙主寅卯丙丁主巳午庚辛主申酉壬癸主亥子戊己主辰戌丑未一日一夜五分則可以占死者之早暮此病之次也然卒發者不必治於傳或其傳化不以次不以次入者憂恐怒喜思令不得以其次故令人有大病矣此五臟傳變之大要學者幸留神焉六經中傷病脈左手關前一分為人迎者以候寒暑燥濕風熱中傷於人其邪咸自脈絡而入以迎納之故曰人迎前哲方論謂太陽為諸陽主氣凡感外邪例自太陽始此考尋經意似若不然風喜傷肝寒喜傷腎暑喜傷心包濕喜傷脾熱傷心燥傷肺以暑熱一氣燥濕同源故不別論以類推之風當自少陽入濕當自陽明入暑當自三焦入寒卻自太陽入故經曰陰為之主陽與之正別於陽者知病從來此之謂也諸太陽傷寒主左手尺中與人迎皆浮緊而盛浮者足太陽脈也緊者傷寒脈也盛者病進也其證頭項強腰脊痛無汗惡寒不惡風陽明傷濕右手關上與人迎皆澀細而長澀者足陽明脈也細者傷濕脈也長者病襲也其證關節疼痛重痹而弱小便澀祕大便飧泄少陽傷風左手關上與人迎皆弦浮而散弦者足少陽脈也浮者傷風脈也散者病至也其證身熱惡風自汗項強筋滿手少陽傷暑右手尺中與人迎皆洪虛而數洪者手少陽脈也虛者傷暑也數者病增也其證身熱惡寒頭痛狀如傷寒煩渴足太陰傷濕右手關上與人迎皆濡細而沉濡者足太陰脈也細者濕脈也沉者病著也其證身重腳弱關節煩疼冷痹脹滿足少陰傷寒左尺中與人迎皆沉緊而數沉者足少陰脈也緊者寒脈也數者病傳也其證口燥舌乾而渴背惡寒反發熱倦怠足厥陰傷風左關上與人迎皆弦弱而急弦者厥陰脈也弱者風脈也急者病變也其證自汗惡風而倦小腹急痛手厥陰心包傷暑在右尺中與人迎皆沉弱而緩沉者心包脈也弱者傷暑也緩者病倦也其證往來寒熱狀如痎瘧煩渴眩暈背寒面垢此乃分布六經感傷外邪除燥熱外敘此四氣以為宗兆若其傳變自當依六經別論所傷隨經說證對證施治或燥熱傷心肺亦當依經推明理例調治如四氣兼併六經交錯亦當隨其脈證審處別白或先或後或合或並在絡在經入表入里四時之動脈與之應氣候以時自與脈期微妙在脈不可不察察之有紀從陰陽始始之有經從陰陽生此之謂也五用乖違病脈察脈必以人迎氣口分內外所因者乃學診之要道也所以脈贊云關前一分人命之主然既有三因固不可盡詳而考之於理自備且如疲極筋力盡神度量飲食飢飽叫呼走氣房室勞逸及金瘡踒折虎狼毒蟲鬼疰客忤畏壓溺等外非六淫內非七情內外不收必屬不內不外雖漢論曰人迎緊盛傷於寒氣口緊盛傷於食殊不知飲食入胃能助發宿蘊其所以應於氣口者正由七情郁發因食助見本非宿食能應氣口且如宿食脈有浮大而微澀者有數而滑實者在陰則澀在陽則滑宿食不化脈則沉緊宿食成瘕脈則沉重此等名證皆曰傷胃胃何關於氣口耶其如疲極筋力其脈弦數而實筋痛則動皆傷肝也凝思則滑神耗則散皆傷心也弦誦耗氣脈濡而弱叫呼走氣脈散而急皆傷肺也房勞失精兩尺浮散男子遺精女子半産弦大而革皆傷腎也上件明文氣口何與況臟寒蛔厥脈自微浮及為緊滑胃虛不食其脈必緩亦有微濡五飲停伏浮細而滑久蓄沉積沉細而軟形虛自汗脈皆微濡揮霍變亂脈自沉伏僵仆墜下脈則細滑踒折傷損瘀血在內疝瘕癥癖五內作痛脈皆弦緊中寒癥結脈則遲澀五積六聚食飲痰氣伏留不散隧道節滯脈皆促結三消熱中尺中洪大癲狂神亂關上洪疾氣實脈沉血實脈滑氣血相搏脈亦沉實婦人妊娠脈則和滑遁尸尸疰脈沉而不至寸或三部緊急鬼祟附著脈兩手乍大乍小乍短乍長陽邪來見脈則浮洪陰邪來見脈則沉緊鬼疰客忤三部皆滑洪大嫋嫋沉沉澤澤但與證不相符者皆五尸鬼邪遁疰之所為也如診得此等脈證雖與人迎氣口相應亦當分數推尋三因交結四句料簡所謂單內單外不內不外亦內亦外亦不內外脈理微妙藝能難精學然後知不足教然後知困此之謂也然形於朕兆墮於數義未有不學而能者未有學而不成者學者宜留心焉又如忽見異像驚惑眩亂脈多失序急虛卒中五臟閉絶脈不往來譬如墮溺脈不可察與夫金瘡踒折頓走血氣脈亦無准學者當看外證不必拘脈脈偶名狀浮者按之不足舉之有餘與人迎相應則風寒在經與氣口相應則榮血虛損沉者舉之不足按之有餘與人迎相應則寒伏陰經與氣口相應則血凝腹臟遲者應動極緩按之盡牢與人迎相應則濕寒凝滯與氣口相應則虛冷沉積數者去來促急一息數至與人迎相應則風燥熱煩與氣口相應則陰虛陽盛虛者遲大而軟按之豁然與人迎相應則經絡傷暑與氣口相應則榮衛走本實者按舉有力不疾不遲與人迎相應則風寒貫經與氣口相應則氣血壅脈緩者浮大而軟去來微遲與人迎相應則風熱入臟與氣口相應則怒極傷筋緊者動轉無常如紉單線與人迎相應則經絡傷寒與氣口相應則臟腑作痛洪者來之至大去之且長與人迎相應則寒壅諸陽與氣口相應則氣攻百脈細者指下尋之來往如線與人迎相應則諸經中濕與氣口相應則五臟凝涎滑者往來流利有如貫珠與人迎相應則風痰潮溢與氣口相應則涎飲凝滯澀者參伍不調如雨沾沙與人迎相應則風濕寒痹與氣口相應則津汗血枯弦者端緊徑急如張弓弦與人迎相應則風走注痛與氣口相應則飲積溢疼弱者按之欲絶輕軟無力與人迎相應則風濕緩縱與氣口相應則筋絶痿弛結者往來遲緩時止更來與人迎相應則陰散陽生與氣口相應則積阻氣節促者往來急數時止復來與人迎相應則痰壅陽經與氣口相應則積留胃腑芤者中空傍實如按慈蔥與人迎相應則邪壅吐衄與氣口相應則榮虛妄行微者極細而軟似有若無與人迎相應則風暑自汗與氣口相應則微陽脫泄動者在關如豆厥厥不行與人迎相應則寒疼冷痛與氣口相應則心驚膽寒伏者沉隱不出著骨乃得與人迎相應則寒濕痼閉與氣口相應則凝思滯神長者往來流利出入三關與人迎相應則微邪自愈與氣口相應則臟氣平治短者按舉似數不及本部與人迎相應則邪閉經脈與氣口相應則積遏臟氣濡者按之不見輕手乃得與人迎相應則寒濕散漫與氣口相應則飧泄緩弱革者沉伏實大如按鼓皮與人迎相應則中風著濕與氣口相應則半産脫精散者有陽無陰按之滿指與人迎相應則淫邪脫泄與氣口相應則精血敗耗代者臟絶中止餘臟代動無問內外所因得此必死七表病脈浮為在表為風應人迎為氣應氣口為熱為痛為嘔為脹為痞為喘為厥為內結為滿不食浮大為鼻塞浮緩為不仁浮大長為風眩癲疾浮滑疾為宿食浮大而澀為宿食滯氣浮短為肺傷諸氣浮滑為飲為走刺浮細而滑為傷飲浮滑疾緊為百合病浮數大便堅小便數浮緊為淋為癃閉寸芤為吐血微芤為衄血關芤為大便出血尺芤為下焦虛小便出血滑為吐為滿為咳為熱為伏痰為宿食為蓄血為經閉為鬼疰為血氣俱實滑散為癱緩滑數為結熱滑實為胃熱和滑為妊娠滑而大小不均必吐為病進為泄利滑而浮大小腹痛溺則陰中痛大便亦然實為熱為嘔為痛為氣塞為喘咳為大便不禁實緊為陰不勝陽為胃熱為腰痛弦為寒為痛為飲為瘧為水氣為中虛為厥逆為拘急為寒癖弦緊為惡寒為疝瘕為癖為瘀血雙弦脅急痛弦而鉤為脅下刺痛弦長為積隨左右上下緊為寒為痛頭骨肉等為咳為喘為滿浮緊為肺有水緊滑為蛔動為宿食為吐逆緊急為遁尸緊數為寒熱洪為脹為滿為痛為熱為煩洪實為癲洪緊為癰疽為喘急亦為脹洪大為祟洪浮為陽邪來見八里病脈微為虛為弱為衄為嘔為泄為亡汗為拘急微弱為少氣為中寒沉為在裡為實為水為寒為喘為癥為瘕沉弱為寒熱沉細為少氣臂不能舉沉滑為風水為下重沉緊為上熱下冷沉重而直前絶者為瘀血沉重而中散為寒食成瘕沉重不至寸徘徊絶者為遁尸沉緊為懸飲沉遲為痼冷沉重為傷暑發熱緩為在下為風為寒為弱為痹為疼為不仁為氣不足為眩暈緩而滑為熱中緩而遲為虛寒相搏食冷則咽痛澀為少血為亡汗為氣不足為逆冷為下痢為心痛澀而緊為痹為寒濕遲為寒為痛遲而澀為癥瘕咽酸伏為霍亂為疝瘕為水氣為溏泄為停痰為宿食為諸氣上衝為惡膿貫肌濡為虛為痹為自汗為氣弱為下重濡而弱為內熱外冷自汗為小便難弱為虛為風熱為自汗九道病脈細為氣血俱虛為病在內為積為傷濕為後泄為寒為神勞為憂傷過度為腹滿細而緊為癥瘕積聚為刺痛細而滑為僵仆為發熱為嘔吐數為熱為虛為吐為痛為煩渴為煩滿動為痛為驚為攣為泄為恐虛為寒為虛為腳弱為食不消化為傷暑促經並無文釋曰其促有五一曰氣二曰血三曰飲四曰食五曰痰但臟熱則脈數以氣血痰飲留滯不行則止促止促非惡脈也結為痰為飲為血為積為氣釋曰氣寒脈緩則為結數則為促雖緩數不同結亦當如促脈分別可也散經無文釋曰六腑氣絶於外則手足寒上氣五臟氣絶於內則下利不禁甚者不仁其脈皆散散則不聚病亦危矣革為滿為急為虛寒相搏婦人半産漏下釋曰革者革也固結不移之狀三部應之皆危脈也代者一臟絶他臟代至釋曰代真死脈不分三部隨應皆是如前所例皆本聖經學者當熟讀令心開眼明識取體狀然後交絡互織所謂六經流注五臟相傳各以部位推尋使瞭然不昧其如隨病分門諸脈證狀尤當參對審詳之如是精誠方可為醫者之萬分不爾則倚傍聖教欺罔賢良為含靈之巨賊幸宜勉旃
