body:
  text: 卷之八內所因論夫臟腑合手足三陰三陽為十二經各有所主故為十二官心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉脾者諫議之官公正出焉腎者作強之官伎巧出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉小腸者受盛之官化物出焉大腸者傳送之官變化出焉胃者倉廩之官五味出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣故五臟為陰六腑為陽此十二官不得相失者正由陰陽消息盈虛當隨四序而調養之不可使其偏勝偏勝則偏復偏復則偏害勝克流變則真病生焉夫陰陽虛實者乃臟腑更相勝復也若其子母相感則母虛能令子虛子實能令母實經曰實則瀉其母虛則補其子如肝實則瀉腎肝虛則補心如百姓足君孰與不足此經之本意也難經則反是及觀金匱之論其得為多肝虛補用酸助用焦苦益用甘味之藥酸入肝焦苦入心甘入脾脾能制腎腎氣微弱則水不行水不行則心火盛心火盛則肺金受制肝氣乃舒肝氣舒則肝病自愈此補子之意也肝虛則用此實則反之千金亦云肝虛當補心心旺則感於肝皆此類也此正本藏十二官冷熱盈虛而為病非外感淫邪及故為背理者之比然內所因惟屬七情交錯愛惡相勝而為病能推而明之此約而不濫學者宜留神焉內所因治說論云治傷寒有法醫雜病有方方即義方法即法令外病用法令猶奸邪外擾非刑不除內病用義方猶父子兄弟不足以禮格之而已故內外之治由是而分外邪難辨當以例明內證易知只敘方證學者不可不審肝膽經虛實寒熱證治瀉肝湯治肝實熱陽氣伏邪脅痛忿忿悲怒發熱喘逆滿悶目痛視物不明狂悸非意而言乍寬乍急所作反常前胡去苗柴胡秦皮去粗皮細辛去苗梔子仁黃芩升麻蕤仁決明子各等分上銼散每服四錢水兩盞苦竹葉車前葉各五片煎至盞半納藥再煎至八分去滓入芒硝一錢匕煎熔不以時服瀉膽湯治膽實熱反灑灑惡寒腹中氣滿脅下硬口苦咽乾頭痛不欲食半夏三兩湯洗去滑生地黃五兩酸棗仁二兩半黃芩一兩遠志去心薑汁合炒茯苓各二兩甘草炙一兩上銼散長流水一斗糯米一升煮蟹眼沸揚二三千遍澄清每用二盞抄藥四錢匕姜七片煎七分去滓不以時服補肝湯治肝虛寒兩脅滿筋急不得太息寒熱腹滿不欲飲食悒悒不樂四肢冷發搶心腹痛目視䀮䀮或左脅偏痛筋痿腳弱及治婦人心痛乳癰膝熱消渴爪甲枯口面青山茱萸甘草炙桂心各一兩細辛去苗茯苓桃仁麩炒去皮尖柏子仁防風各二兩川烏頭炮去皮臍半兩上銼散每服四大錢水盞半姜五片棗三枚煎至七分去滓空心服溫膽湯治膽虛寒眩厥足痿指不能搖躄不能起僵仆目黃失精虛勞煩擾因驚膽懾奔氣在胸喘滿浮腫不睡半夏湯洗去滑麥門冬去心各一兩半茯苓二兩酸棗仁三兩炒甘草炙桂心遠志去心薑汁合炒黃芩萆薢人參各一兩上為銼散每服四大錢用長流水一斗糯米煮如瀉膽湯法一方見虛煩門心小腸經虛實寒熱證治瀉心湯治心實熱心下痞滿身重發熱乾嘔不安腹中雷鳴涇溲不利水穀不消欲吐不吐煩悶喘急黃連去毛二兩半夏湯洗七次三兩黃芩甘草炙人參各一兩乾薑炮一兩半上為銼散每服四大錢水兩盞棗三枚煎七分去滓服並治霍亂若寒加附子一枚炮去皮臍若渴加栝蔞根嘔加橘皮痛加當歸客熱以生薑代乾薑清脈湯治小腸實熱身熱手足心熱汗不出心中煩滿結塞不通口瘡身重柴胡澤瀉橘皮芒硝枳實麩炒去瓤黃芩升麻旋覆花生地黃各等分上銼散每服四錢水盞半煎七分去滓下芒硝再煎熱服不以時茯苓補心湯治心虛寒病苦悸恐不樂心腹痛難以言心寒恍惚喜悲愁恚怒衄血面黃煩悶五心熱渴獨語不覺咽喉痛舌本強冷汗出善忘恐走及治婦人懷妊惡阻吐嘔眩暈四肢怠惰全不納食白茯苓人參前胡半夏湯洗七次去滑川芎各三分橘皮枳殼麩炒去瓤紫蘇桔梗甘草炙乾薑各半兩當歸一兩三分白芍藥二兩熟地黃一兩半上銼散每服四大錢水盞半姜五片棗一枚煎七分去滓食前服分氣補心湯治心氣鬱結忪悸噎悶四肢浮腫上氣喘急大腹皮炒香附炒去毛白茯苓桔梗各一兩木通甘草炙川芎前胡去苗青橘炒枳殼麩炒去瓤白朮各三分細辛去苗木香各半兩上銼散每服四大錢水一盞姜三片棗一枚煎七分去滓食前溫服溫脾湯治小腸虛寒苦頭偏痛耳頰疼下痢赤白腸滑腹中㽲痛裡急後重乾薑一兩半當歸黃柏地榆各二兩阿膠麩炒焦茴香炒石榴皮黃連各一兩上銼散每服四錢水盞半煎七分去滓溫服脾胃經虛實寒熱證治清脾湯治脾濕熱病苦足寒脛熱腹脹滿煩擾不得臥舌本強體重面黃頭痛右脅滿痛偏脹口唇乾裂寒熱如瘧茯苓橘皮草果去皮白朮各二兩人參桂心白芷甘草炙川芎各一兩半夏三兩洗七次上為銼散每服四大錢水二盞姜七片紫蘇三葉煎七分去滓服欲通利加大黃平胃散治胃實熱口唇乾嘔噦煩悶大小便祕澀及熱病後餘熱不除蓄於胃中四肢發熱口渴胸滿無汗厚朴去皮薑製炒射干米泔浸升麻茯苓各一兩半芍藥二兩枳殼麩炒去瓤大黃蒸甘草炙各一兩上為銼散每服四錢水一盞煎七分去滓空心熱服補脾湯治脾虛寒病泄瀉腹滿氣逆嘔吐心煩不得臥腸鳴虛脹飲食不消勞倦虛羸喜噫四肢逆冷多臥少起情意不樂人參茯苓草果去皮乾薑炮各一兩麥糵炒甘草炙各一兩半厚朴去皮薑製炒橘皮白朮各三分上為銼散每服四錢水一盞半煎七分去滓食前服養胃湯治胃虛寒脛寒不得臥淅淅惡風灑灑惡寒腹中痛虛鳴寒熱如瘧唇口乾面目虛浮嘔噦吐瀉四肢疼痛不思飲食或傷寒濕骨節皆痛厚朴薑製炒藿香去梗半夏湯洗七次茯苓各一兩人參甘草炙附子炮去皮臍橘皮各三分草果去皮白朮各半兩上銼散每服四錢水盞半姜五片棗一枚烏梅半個煎七分去滓空心服常服溫胃消痰進食下氣闢寒疫肺大腸經虛實寒熱證治清肺湯治肺實熱肺壅汗出若露上氣喘逆咳嗽咽中塞如嘔狀短氣客熱或唾膿血薏苡仁防己杏仁冬瓜子仁三分雞子白皮一分上為銼散每服四錢先以葦葉切半握水二盞煎盞半入藥同煎至七分去滓食前服瀉白湯治大腸實熱腹脹不通俠臍痛食不化喘不能久立口生瘡橘皮淡竹茹黃芩梔子仁柏皮炙各半兩茯苓芒硝各一錢生地黃五兩上為銼散每服四錢水盞半薑棗煎七分空心服補肺湯治肺寒虛逆滿上氣咽中悶塞寒從背起口中如含冰雪語無音聲舌本乾燥吐沫唾血不能飲食款冬花桂心各一兩桑白皮炙四兩人參紫菀茸白石英各一兩五味子鍾乳粉各一兩半麥門冬去心二兩上銼散每服四大錢水一盞半姜五片棗三枚粳米一撮同煎七分去滓食前服固腸湯治大腸虛寒利下青白腸中雷鳴相逐大便不節小便赤黃氣上衝胸不能久立身腫腹急當臍痛悉主之酸石榴皮半兩黃連炒地榆各一兩罌粟殼醋炙茯苓各一兩半上銼散每服四錢水盞半姜五片烏梅一個煎七分去滓空心服腎膀胱經虛實寒熱證治清源湯治腎實熱小腹脹滿四肢正黑耳聾骨熱小便赤黃腰脊離解及伏水等茯苓黃芩菖蒲各五兩玄參細辛各四兩大黃水浸一宿甘草炙各二兩磁石八兩煅醋淬上為銼散每服四錢水一盞煎七分去滓熱服瀉脬湯治膀胱實熱腰脊痛閉塞不通舌乾咽腫悉主之茯苓梔子仁知母各三兩生地黃淡竹葉各五兩石膏八兩煅上為銼散每服四錢水盞半煎七分入蜜半匙煎兩沸熱服須利加芒硝一錢匕溫腎散治腎虛寒陰痿腰脊痛身重緩弱足腰不可以按語音混濁陽氣頓絶熟乾地黃一斤蓯蓉酒浸麥門冬去心牛膝酒浸五味子巴戟去心甘草炙各八兩茯神去木乾薑炮各五兩杜仲去粗皮銼薑汁淹炒絲斷三兩上為末每服二錢溫酒調下空心日二三服補脬湯治膀胱虛冷腳筋急腹痛引腰背不可屈伸耳聾目䀮䀮坐欲倒小便數遺白面黑如炭黃耆白茯苓各一兩半杜仲去皮銼薑汁淹炒斷絲三兩磁石煅淬五味子各三兩白朮白石英捶碎各二兩半上為銼散每服四錢水盞半煎七分去滓空心溫服心主三焦經虛實寒熱證治清膻湯治右腎實熱身熱脊脅相引痛足冷小便黃赤如梔子柏汁每欲小便即莖頭痛榆白皮冬葵子各五兩石葦四兩去毛黃芩通草瞿麥各三兩上為粗末先以水二盞入車前葉數片煎至盞半入藥末四錢再煎七分去滓熱服潤焦湯治三焦實熱目兌眥急痛腰脅熱脊背連膻中煩悶飲食未定頭面汗出關格不通不吐不下或氣逆不續走哺不禁或泄瀉溺澀遺瀝地骨皮半夏湯洗七次柴胡去苗澤瀉各五兩茯苓麥門冬去心甘草炙人參各一兩上銼散每服四錢水二盞姜五片竹茹如指大煎七分去滓空心服益志湯治右腎虛寒小便數腰脅引痛短氣咳逆四肢煩疼耳鳴面黑骨間熱夢遺白濁目眩諸虛困乏鹿茸酥塗炙去毛盡巴戟去心熟乾地黃酒浸枸杞子蓯蓉酒浸牛膝酒浸附子炮去皮臍桂心不焙山茱萸白芍藥防風去叉甘草炙各等分上銼散每服四大錢水盞半姜五片鹽少許煎七分去滓食前服安中散治三焦虛寒短氣不續腹不安食隨即洞下小便赤濁精泄不禁腳脛痠疼小腹脹滿熟地黃巴戟天去心龍骨各二兩半遠志去心炒茯苓各三兩天雄炮去皮臍五味子山藥各三兩半蓯蓉酒浸續斷各四兩蛇床子略炒菟絲子酒浸各四兩半上為細末每服二錢匕溫酒調下夫三焦屬精腑藏精以養身繫纍於心脾腎三經人多以醉飽心虛而合陰陽故此病作唯謹之為得三焦精腑辨正古人謂左腎為腎臟其腑膀胱右腎為命門其腑三焦三焦者有脂膜如手大正與膀胱相對有二白脈自中出夾脊而上貫於腦所以經云丈夫藏精女子系胞以理推之三焦當如上說有形可見為是扁鵲乃云三焦有位無形其意以為上中二焦如漚如霧下焦如瀆不可遍見故曰有位無形而王叔和輩失其旨意遽云無狀空有名俾後輩承繆不已且名以名實無實奚名果其無形尚何以藏精系胞為哉其所謂三焦者何也上焦在膻中內應心中焦在中脘內應脾下焦在臍下即腎間動氣分布人身有上中下之異方人湛寂欲想不興則精氣散在三焦榮華百脈及其想念一起欲火熾然翕撮三焦精氣流溢並命門輸瀉而去故號此腑為三焦耳學者不悟可為長太息痼冷積熱證治夫以臟腑稟賦不同亦有將理失宜遂致偏冷偏熱故方論中有痼冷積熱之說痼冷者中寒也多因真氣既微胃氣不實復啖生冷冰雪之屬致腸胃虛寒陰既停凝陽不能正大便洞泄小便頻並鼻多清涕嘔吐涎沫水穀不化灑灑淅淅皆陽虛陰盛之所為也積熱者臟腑燥也多因精血既衰三焦煩壅復餌丹石酒炙之屬致腸胃蘊毒陽既熾盛陰不能制大便祕澀小便赤淋口苦咽乾涎稠眵淚飲食無度輝輝熇熇皆陰虛陽盛之所為也治各有方金液丹固真氣暖丹田堅筋骨壯陽道除久寒痼冷補勞傷虛損治男子腰腎久冷心腹積聚脅下冷癖腹中諸蟲失精遺溺形羸力弱腳膝疼痛冷風頑痹上氣衄血咳逆寒熱霍亂轉筋虛滑下利又治痔瘻濕䘌生瘡下血不止及婦人血結寒熱陰蝕疽等硫黃十斤先飛煉去砂石稱研為末用瓷合盛以水和赤石脂封口鹽泥固濟曬乾地內先埋一小罐子盛水令滿安合子在上用泥固濟訖慢火養七日七夜候足加頓火一煅候冷取出上研為細末每一兩用炊餅一兩湯浸握去水脈為丸如梧子大每服三十丸多至百丸溫米飲下空心服之又治傷寒陰證身冷脈微手足厥逆或吐或利自汗不止或小便不禁不拘丸數並服得身熱脈出為度震靈丹補虛壯氣暖腎祛邪益精髓溫脾胃進飲食悅顏色治真氣虛憊臍腹冷痛肢體痠疼腰背拘急腳膝緩弱面色痿黃目眩耳鳴心怔氣短大便自利小便頻數口乾煩渴飲食無味大治婦人崩中帶下三十六病小兒驚疳及一切痼冷風虛悉主之常服育神養氣輕身延年此藥制合陰陽功侔造化留心服餌百疴不生真濟世衛生之寶也丁頭代赭石禹餘糧石揀紅紫色無金絲者紫石英赤石脂各四兩上各為細末併入砂合內用赤石脂固口縫以炭一稱簇頂煅候火消及七分存三分火取出合子令冷開卻合先於地上掘一坑深尺余用厚紙兩重襯定傾藥在上以新瓦盆子覆之四畔將黃土遍壅一宿取出再入乳香沒藥二兩五靈脂二兩都為細末一處將前藥合和勻再研極細煮糯米糊和勻杵數千下丸如雞頭大每服二丸或五丸空心濃煎薑棗湯下忌六畜血涼膈散治大人小兒臟腑積熱煩躁多渴面熱頭昏唇焦咽燥舌腫喉閉目赤鼻衄頷頰結硬口舌生瘡痰實不利涕唾稠黏睡臥譫妄及腸胃燥澀便溺祕結一切風壅大黃蒸朴硝甘草各三兩山梔子仁黃芩薄荷各一兩連翹四兩上為末每服二錢水一盞竹葉七片蜜少許同煎七分去滓食後服洗心散治風雍壯熱頭目昏痛肩背拘急肢節煩疼熱氣上衝口苦唇焦咽喉腫痛痰涎壅滯涕唾稠黏心神煩躁眼澀睛疼及大小便祕澀大黃蒸甘草炙當歸芍藥麻黃去節荊芥穗各六兩白朮一兩半上為末每服一錢水一盞生薑薄荷各少許煎七分去滓溫服小兒豆瘡欲發先狂語多渴及驚風積熱可服一錢臨臥服如大人五臟壅實欲要溏轉加至四五錢乘熱服五積證治五積者五臟之所積皆臟氣不平遇時相逆而成其病如憂傷肺肺以所勝傳肝遇長夏脾旺傳克不行故成肝積名曰肥氣肥氣者以其積氣藏於肝木之下猶肥遁于山林也失志傷腎腎以所勝傳心遇秋肺旺傳克不行故成心積名曰伏梁伏梁者以其積氣橫架於肓原也怒則傷肝肝以所勝傳脾遇冬腎旺傳克不行故成脾積名曰痞氣者以積氣痞塞中脘也喜則傷心心以所勝傳肺遇春肝旺傳克不行故成肺積名曰息賁息賁者以積氣喘息賁溢也思則傷脾脾以所勝傳腎遇夏心旺傳克不行故成腎積名曰奔豚奔豚者猶水蓄奔衝於心火也難經以肥氣成於戊己伏梁成於庚辛以至奔豚成於丙丁者正合陰陽施化休旺乘克之大義也又論曰病有積有聚有㯏氣積者臟病也終始不移聚者腑病也發無定處展轉痛移為可治㯏氣者即宿食也由㯏飪之邪從口入更有息積病乃氣息癖滯於脅下非導引不行肥氣丸治肝之積在左脅下如覆杯有頭足如龜鱉狀久久不愈發咳逆嘔痎瘧連歲月不已其脈弦而細青皮炒二兩當歸鬚蒼朮各一兩半蛇含石煅醋淬三分蓬朮切三稜切鐵孕粉各三兩與三稜蓬朮同入醋煮一伏時上為末醋煮米糊丸緑豆大每服四十丸當歸浸酒下伏梁丸治心之積起於臍上上至心大如臂久久不已病煩心身體髀股皆腫環臍而痛其脈沉而芤茯苓厚朴薑汁製炒人參枳殼麩炒去瓤白朮半夏湯洗七次三稜慢火煨熟乘熱溫治上等分為末煮糊丸梧子大米飲下二十丸食前日兩服作散酒調服絶勝痞氣丸治脾之積在胃脘覆大如盤久久不愈病四肢不收黃疸飲食不為肌膚心痛徹背背痛徹心脈浮大而長大烏頭一分炮去皮尖附子半兩炮去皮臍赤石脂煅醋淬川椒炒出汗乾薑炮各二兩桂心半兩上為末蜜丸如梧子大硃砂為衣每服五七丸米湯下漸至十丸息賁湯治肺之積在右脅下大如覆杯久久不愈病灑灑寒熱氣逆喘咳發為肺癰其脈浮而毛半夏湯七次吳茱萸湯洗桂心各二兩半人參甘草炙桑白皮炙葶藶炒各二兩半上為銼散每服四錢水一盞半姜七片棗兩枚煎七分去滓食前服奔豚湯治腎之積發於小腹上至心如豚奔走之狀上下無時久久不已病喘逆骨痿少氣其脈沉而滑甘李根皮焙乾乾葛各一兩一分當歸川芎白芍藥甘草炙黃芩各二兩半夏湯洗七次四兩上為銼散每服四錢水半盞煎七分去滓服六聚證治六腑者大小腸胃膽膀胱三焦者也屬於三陽太陽利清氣陽明泄濁氣少陽化精氣如都會之府主轉輸以為常也六腑失常則壅聚不通故實而不轉虛而輸隨氣往來痛無定處在上則格在下則脹傍攻兩脅如有痞塊易於轉變非五臟比散聚湯治久氣積聚狀如癥瘕隨氣上下發作有時心腹絞痛攻刺腰脅上氣窒塞喘咳滿悶小腹䐜脹大小便不利或腹泄瀉淋瀝無度遺精白濁狀若虛勞半夏湯洗七次檳榔當歸各三分橘皮杏仁麩炒去皮尖桂心各二兩茯苓甘草炙附子炮去皮臍川芎枳殼麩炒去瓤厚朴薑汁製吳茱萸湯洗各一兩上銼散每服四錢水一盞半煎七分去滓食前服大便不利加大黃息積證治病者脅下滿氣逆息難頻歲不愈名曰息積因氣留滯癖於脅下不在臟腑榮衛之間積久形成氣不幹胃故不妨食灸之則火熱內爍刺之則反動其經雖服消化之藥不能獨治宜消積以導引助而行之磨積丸治腸胃因虛氣癖於盲膜之外流於季脅氣逆息難愒日頻年醫所不治久則榮衛停凝一旦敗濁潰為癰膿多致不救胡椒一百五十粒木香一分全蠍十個去毒上為末粟米飲丸如緑豆大每服十五丸橘皮湯下化氣湯治息積癖於腹脅之下偏脹膨滿不妨飲食諸藥不能取轉及治心脾疼痛嘔吐酸水丈夫小腸氣婦人脾血氣縮砂仁桂心木香各一分甘草炙茴香炒丁香皮青皮炒陳皮生乾薑蓬朮炮各半兩胡椒沉香各一錢一字上為末每服二錢姜蘇鹽湯調下婦人醋湯調服導引法以兩手母指壓無名指本節作拳按髀趺坐扣齒三十六屏氣二十一息咽氣三口再屏息再咽如是三作以氣通為效遇子午卯酉時則行然按摩導引之法甚多隨意行之皆可不必拘此法五勞證治五勞者皆用意施為過傷五臟使五神不寧而為病故曰五勞以其盡力謀慮則肝勞曲運神機則心勞意外致思則脾勞預事而憂則肺勞矜持志節則腎勞是皆不量稟賦臨事過差遂傷五臟以臟氣本有虛實因其虛實而分寒熱世醫例以傳尸骨蒸為五勞者非也彼乃瘵疾各一門類不可不知豬膏湯治肝勞實熱關格牢澀閉塞不通毛悴色夭豬膏生薑汁各二升青蒿汁天門冬汁各一升上以微火銀石器內熬成膏每服一匙酒湯調下不拘時候虎骨酒治肝勞虛寒口苦關節疼痛筋攣縮煩悶虎骨五兩炙焦碎如豆大丹參二兩地骨皮乾薑芎藭各一兩熟地黃一兩三分豬椒根五加皮枳實麩炒去瓤白朮各一兩一分上為銼散以絹袋盛淳酒四斗浸四日初服二三合漸加至一盞日再服食前泄熱湯治心勞實熱口舌生瘡大便閉澀不通心滿痛小腸熱澤瀉梔子仁黃芩各三兩桂心通草各二兩石膏八兩大黃蒸甘草炙各一兩上為銼散每服四錢水盞半煎七分去滓食後熱盛者煎熟加芒硝一錢煎不以時服定心湯治心勞虛寒驚悸恍惚多忘夢寐驚魘神志不定茯苓四兩桂心甘草炙白芍藥乾薑炮遠志去心炒人參各二兩上銼散每服四錢水盞半棗兩枚煎七分去滓食前溫服半夏湯治脾勞實熱四肢不和五臟乖戾脹滿肩息氣急不安茯苓白朮杏仁麩炒去皮尖各一兩半橘皮芍藥各二兩半夏湯洗七次四兩上銼散每服四錢水盞半生薑七片棗兩枚煎七分去滓不以時服茱萸膏治脾勞虛寒氣脹咽滿食不下通噫宿食臭吳茱萸湯洗一兩三分白朮五兩一分豬膏五兩宿薑汁八兩上搗茱萸白朮二味為末納薑汁膏中煎成膠飴每服一大匙食前溫酒調下引氣湯治肺勞實熱氣喘鼻張面目苦腫橘皮半兩細辛去苗白朮桂心各三分紫蘇一兩麻黃去節湯洗杏仁麩炒去皮尖半夏湯洗七次去滑各一兩一分石膏八兩上銼散每服四錢水兩盞姜七片竹葉五片煎七分去滓食後服人參厚朴湯治肺勞虛寒心腹冷氣逆遊氣胸脅氣滿從胸達背痛嘔逆飲食即吐虛乏不足人參厚朴薑製炒甘草炙各二兩桂心四兩半夏湯洗五兩橘皮麥門冬去心各三兩上銼散每服四錢水兩盞姜七片去滓食前服腹痛加當歸梔子湯治腎勞實熱小腹脹滿小便赤黃末有餘瀝數而少莖中痛陰囊生瘡梔子仁芍藥通草石葦各三兩滑石八兩紫芩四兩熟地黃榆白皮各五兩上銼散每服四錢水盞半淡竹葉七片同煎七分去滓不以時服五加皮湯治腎勞虛寒恐慮失志傷精損髓噓吸短氣遺泄白濁小便赤黃陰下濕癢腰脊如折顏色枯悴五加皮十兩丹參八兩石斛酒浸六兩杜仲酒浸炒絲斷附子炮去皮臍各五兩牛膝酒浸秦艽川芎防風桂心獨活各四兩茯苓四兩麥門冬去心地骨皮各三兩薏苡仁一兩上為銼散每服四大錢水盞半姜五片大麻子一撮研破同煎七分去滓食前服六極證治臟猶庫藏主祕藏腑如會府主轉輸臟實則腑無不實腑虛則臟亦因而致虛故六極者由腑虛致臟虛陰陽失度榮衛走散無以養筋脈皮肉骨髓故六物皆極極者窮絶之謂也與洪範六極同意犀角地黃湯治筋實極咳而兩脅下痛不可轉動腳下滿不得遠行腳心痛不可忍手足爪甲青黑四肢筋急煩滿生地黃犀角鎊各一兩乾葛玄參梔子仁升麻各三分大黃半兩蒸芍藥一兩半上為銼散每服四錢水盞半煎七分去滓不以時服惡寒體痛加麻黃頭疼加石膏煎半兩烏麻酒治筋虛極好悲思四肢噓吸腳手拘攣伸動縮急腹內轉痛十指甲痛數轉筋甚則舌卷卵縮唇青面色蒼白不得飲食烏麻十兩人參防風茯苓細辛秦椒炒出汗黃耆當歸牛膝桔梗各一兩半乾地黃丹參薯蕷礬石煅各三兩山茱萸川芎各二兩麻黃去節白朮各二兩半五加皮生乾薑各五兩大棗鍾乳粉各三兩別以小袋子盛上為銼散用清酒二斗半同浸五宿溫服三合日再服地黃湯治脈實極氣衰血焦發落好怒唇舌赤甚則言語不快色不澤飲食不為肌膚麥門冬去心生地黃干各五兩人參茯苓芍藥各三兩葳蕤四兩石膏六兩遠志去心十兩甘草三兩白朮三兩上銼散每服四錢水盞半煎七分去滓不以時服防風丸治脈虛極則咳咳則心痛喉中介介如哽甚則咽腫防風桂心通草茯苓人參遠志去心炒甘草炙白石英麥門冬去心上為細末蜜丸如梧子大食前酒服三十丸石南散治肉實極肌痹淫淫如鼠走津液脫腠理開汗大泄或不仁四肢急痛或復緩弱唇口壞皮膚變色石南一兩一分天雄炮去皮臍山藥桃仁制炒去皮尖芍藥甘菊花甘草炙各一兩升麻葳蕤各一兩半黃耆辰砂別研各三分石膏煅二兩山茱萸一兩三分上為細末每服二大錢食前溫酒調下大黃耆湯治肉虛極體重怠惰四肢不欲舉關節疼痛不嗜飲食食則咳咳則右脅下痛陰引背及肩不可轉動黃耆桂心巴戟去心石斛酒浸澤瀉茯苓乾薑炮各三兩防風獨活人參各二兩天雄炮去皮臍芍藥附子炮去皮臍半夏湯洗七次細辛去苗白朮黃芩栝蔞根各一兩上為銼散每服四錢水二盞生薑七片煎七分去滓食前服前胡湯治氣實極喘息沖胸常欲自恚心腹滿痛內外有熱煩嘔不安甚則唾血氣短乏不欲食口燥咽乾前胡八兩半夏湯洗七次去滑麻黃去節湯芍藥各四兩黃芩三兩枳實麩炒去瓤一兩上銼散每服四錢水二盞姜七片棗一個煎七分去滓不以時服鍾乳散治氣虛極皮毛焦津液不通力乏腹脹甚則喘急氣短息塞晝瘥夜甚煉成鍾乳別研乾薑炮桔梗茯苓附子炮去皮臍細辛去苗桂心人參各一兩一分白朮一兩防風牡蠣煅栝蔞根各二兩半上為末每服二大錢溫酒調下食前竹葉湯治精實極眼視不明齒焦發落形衰通身虛熱甚則胸中㾓痛煩悶泄精生乾地黃五兩芍藥四兩黃耆茯苓澤瀉甘草炙麥門冬去心各三兩上銼散每服四錢水盞半姜三片淡竹葉十片煎七分去滓不以時服磁石丸治精虛極尫羸驚悸夢中遺泄尿後遺瀝小便白濁甚則莖弱核微小腹裡急磁石煅醋淬龍齒煅蓯蓉酒浸茯苓各二兩人參麥門冬去心遠志去心續斷赤石脂煅醋淬鹿茸酥炙各一兩半地黃乾者三兩韭子炒柏子仁丹參各一兩一分上為末蜜丸梧子大食前溫酒下三十丸至五十丸三黃丸治骨實極熱耳鳴面色焦枯隱曲膀胱不通牙齒腦髓苦痛手足痠疼大小便閉黃芩六兩冬用三兩大黃二兩冬用四兩夏用三兩黃連春用四兩夏用七兩秋用六兩冬用二兩上三味搗和蜜丸豆大每服十丸至十五丸米飲下麋角丸治骨虛極面腫垢黑脊痛不能久立氣衰發落齒槁腰背相引痛甚則喜唾不了方見五痿門七氣敘論夫五臟六腑陰陽升降非氣不生神靜則寧情動則亂故有喜怒憂思悲恐驚七者不同各隨其本臟所生所傷而為病故喜傷心其氣散怒傷肝其氣擊憂傷肺其氣聚思傷脾其氣結悲傷心胞其氣急恐傷腎其氣怯驚傷膽其氣亂雖七診自殊無逾於氣黃帝曰余知百病生於氣也但古論有寒熱憂恚而無思悲恐驚似不倫類於理未然然六腑無說惟膽有者蓋是奇恆淨腑非轉輸例故能蓄驚而為病七氣證治夫喜傷心者自汗不可疾行不可久立故經曰喜則氣散怒傷肝者上氣不可忍熱來蕩心短氣欲絶不得息故經曰怒則氣擊一作上憂傷肺者心系急上焦閉榮衛不通夜臥不安故經曰憂則氣聚思傷脾者氣留不行積聚在中脘不得飲食腹脹滿四肢怠惰故經曰思則氣結悲傷心胞者善忘不識人置物在處還取不得筋攣四肢浮腫故經曰悲則氣急恐傷腎者上焦氣閉不行下焦回還不散猶豫不決嘔逆噁心故經曰恐則精卻驚傷膽者神無所歸慮無所定說物不竟而迫故經曰驚則氣亂七者雖不同本乎一氣臟氣不行鬱而生涎隨氣積聚堅大如塊在心腹中或塞咽喉如粉絮吐不出咽不下時去時來每發欲死狀如神靈所作逆害飲食皆七氣所生所成治之各有方七氣湯治臟腑神氣不守正位為喜怒憂思悲恐驚忤郁不行遂聚涎飲結積堅牢有如坯塊心腹絞痛不能飲食時發時止發則欲死半夏湯洗去滑五兩人參桂心甘草炙各一兩上銼散每服四錢水盞半姜七片棗一枚煎七分去滓食前服大七氣湯治喜怒不節憂思兼併多生悲恐或時振驚致臟氣不平憎寒發熱心腹脹滿傍沖兩脅上塞咽喉有如炙臠吐咽不下皆七氣所生半夏湯洗七次五兩白茯苓四兩厚朴薑製炒三兩紫蘇二兩上銼散每服四錢水盞半姜七片煎七分去滓食前服五噎證治夫五噎者即氣噎憂噎勞噎思噎食噎雖五種不同皆以氣為主所謂氣噎者心悸上下不通噫噦不徹胸背痛憂噎者遇天陰寒手足厥冷不能自溫勞噎者氣上鬲脅下支滿胸中填塞攻背疼痛思噎者心怔悸喜忘目視䀮䀮食噎者食無多少胸中苦寒疼痛不得喘息皆由喜怒不常憂思過度恐慮無時鬱而生涎涎與氣搏升而不降逆害飲食與五膈同但此在咽嗌故名五噎五噎散治五種噎食飲不下胸背痛嘔噦不徹攻刺疼痛淚與涎俱出人參茯苓厚朴去粗皮銼薑汁製炒枳殼麩炒去瓤桂心甘草炙訶子炮去核白朮橘皮白姜炮三稜炮神麯炒麥糵炒各二兩木香炮檳榔蓬朮炮各半兩上為末每服二錢水一盞生薑三片棗子一枚煎七分空心溫服鹽湯點亦得沉香散治五噎五膈胸中久寒諸氣結聚嘔逆噎塞食飲不化結氣不消常服寬氣通噎寬中進食白朮茯苓各半兩木通當歸橘皮青皮大腹子大腹皮檳榔芍藥各一兩甘草炙一兩半白芷三兩紫蘇葉四兩枳殼麩炒去瓤取三兩上為末每服二錢水一盞姜三片棗一枚煎七分空腹溫服嘉禾散治中滿下虛五噎五膈脾胃不和胸膈痞悶脅肋脹滿心腹刺痛不思飲食如中焦虛痞不任攻擊臟腑虛寒不受峻補或因病氣衰不復常稟受怯弱不能多食尤宜服之枇杷葉去毛薑汁塗炙薏苡仁微炒縮砂仁人參茯苓各一兩石斛細銼用酒拌和微炒大腹子微炒沉香木香藿香杜仲去皮姜酒塗炙微焦隨風子如無陳緊小訶子代各三分谷糵微炒白豆蔻五味子微炒桑白皮丁香檳榔青皮各半兩半夏餅炙黃神麯各一分甘草炙兩半陳皮三分白朮炒二兩上為末每服二錢水一盞生薑三片棗三枚煎至七分溫服不計時五噎入乾柿一枚同煎十服見效膈氣吐逆羸困入薤白三寸棗五枚同煎鹽津丸治五瘧八痞獨頭蒜不拘多少每個開七竅入去皮江子七粒濕紙裹煨研為膏非大蒜也丁香橘紅木香蓽茇胡椒上等分為末用蒜膏為丸如梧子大先嚼鹽少許令生津液乾咽二粒漸加至三五丸臨臥服廣五行記永徽中有僧維則病噎不能食語弟子曰吾死之後便可開吾胸喉視有何物言絶而卒弟子果開視胸中得一物形似魚而有兩頭遍體皆有肉鱗弟子置器中跳躍不止戲以諸味皆隨化盡時夏中藍盛作澱有一僧以澱置器中此蟲遂繞器中走須臾化為水此乃生瘕非五噎比後人因以藍治噎誤矣五膈證治病有五膈者胸中氣結津液不通飲食不下羸瘦短氣名憂膈中脘實滿噎則醋心飲食不消大便不利名曰思膈胸脅逆滿噎塞不通嘔則筋急惡聞食臭名曰怒膈五心煩熱口舌生瘡四肢倦重身常發熱胸痹引背不能多食名曰喜膈心腹脹滿咳嗽氣逆腹下若冷雷鳴繞臍痛不能食名曰恐膈此皆五情失度動氣傷神致陰陽不和結於胸膈之間病在膻中之下故名五膈若在咽嗌即名五噎治之五病同法五膈丸治憂恚思慮膈塞不通及食冷物即發其病苦心痛不得氣息引背痛如刺心下堅大如粉絮緊痛欲吐吐即瘥食飲不下甚者手足冷短氣或上氣喘急嘔逆悉主之麥門冬去心甘草炙各五兩人參四兩川椒炒出汗遠志去心炒細辛去苗桂心各三兩乾薑炮二兩附子炮一兩上為末蜜丸彈子大含化日三夜二胸中當熱七日愈亦可丸如梧子大米湯下二三十丸延年方夏加麥門冬甘草人參各一兩經心録以吳茱萸代桂治遇寒冷則心痛咽中有物吐不出咽不入食飲減少並可服之不拘時候寬膈丸治氣不升降胸膈結痞木香京三稜炮青皮各半兩半夏三兩湯洗七次大腹子一分上為細末薑汁糊為丸梧子大食後米湯下二三十丸嘉禾散沉香散並治五膈方見前五噎門
