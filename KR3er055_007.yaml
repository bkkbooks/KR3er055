body:
  text: 卷之七疝敘論經論雖云七疝諸疝等更不見名狀但出寒疝㿗疝而已唯大奇論列五臟脈為五疝證所謂腎脈大急沉為腎疝肝脈大急沉為肝疝心脈搏滑急為心疝肺脈沉搏為肺疝三陰急為脾疝三陰即太陰脾脈也大抵血因寒泣則為瘕氣因寒聚則為疝但五臟脈理不同不可不辨且腎脈本沉心脈本滑受寒則急於理乃是肝脈本弦肺脈本澀並謂之沉未為了義又脾不出本脈但云急為疝亦文義之缺也凡云急者緊也緊為寒亦可類推且賊風入腹亦為疝冒暑履濕皆能為疝當隨四氣改易急字風則浮弦暑則洪數濕則緩細於理甚明要知疝雖兼臟氣皆外所因也諸疝證治疝之為病隨臟氣虛實感傷外邪寒泣風散暑郁濕著絞刺擊搏無有定處倉卒之際痛不堪忍世人稱為橫弦豎弦膀胱小腸氣賊風入腹等名義不同證狀則一寒則溫之風則散之暑則利之濕則燥之各有成法大烏頭桂枝湯治風寒疝腹中痛逆冷手足不仁身體疼痛灸刺諸藥不能療及賊風入腹攻刺五臟拘急不得轉側發作叫呼陰縮悉主之大烏頭五枚實者去皮尖蜜一大盞煎減半漉出湯切洗桂心芍藥各三錢三字甘草一分炙上為銼散每服四大錢水一盞半姜五片大棗三個入前煎烏頭蜜半合同煎至七分盞去滓食前服一法用附子一個不使烏頭為蜜附湯走馬湯治卒疝無故心腹痛陰縮手足厥逆並治飛尸鬼巴豆二個去皮心炒杏仁二個去皮尖上二味取綿纏捶令碎熱湯二合捻取白汁飲之當下老少量與倉卒散治寒疝入腹心腹卒痛及小腸膀胱氣絞刺脾腎氣攻攣急極痛不可忍屈伸不能腹中冷重如石白汗出山梔子四十九個燒半過附子一枚炮上為末每服二錢水一盞酒半盞煎至七分入鹽一捻溫服即愈蔥白散治一切冷氣不和及本臟膀胱氣攻刺疼痛及治婦人産前産後腹痛胎不安或血刺者兼能治血臟宿冷百骨節倦痛肌瘦怯弱傷勞帶癖久服盡除但婦人一切疾病最宜服之川芎當歸枳殼麩炒去瓤厚朴薑製炒官桂去皮青皮乾薑炮茴香炒川楝炒神麯炒麥糵炒三稜炮蓬朮醋浸一宿焙人參茯苓芍藥木香炮乾地黃各一兩上為末每服三錢水一盞蔥白二寸煎七分入鹽少許熱服大便祕澀加大黃煎大便自利加訶子煎食前服失笑散治小腸氣痛及婦人血痛心腹絞痛欲死十餘日百藥不驗五靈脂蒲黃炒等分上末每服二錢先用釅醋一合熬藥成膏水一盞煎至七分熱呷服神應散治諸疝心腹絞痛不可忍玄胡索胡椒等分上為末每服二大錢酒半盞水半盞煎七分食前溫服大烏頭湯治寒疝繞臍發白汗出手足厥其脈沉弦悉主之大烏頭五個洗淨細沙炒令黑不㕮咀上一味水三盞煎取八分去烏頭入蜜半盞以下煎七分早上空腹服牡丹丸治寒疝心腹刺痛休作無時及治婦人月病血刺疼痛川烏頭炮令焦黑去皮尖牡丹皮四兩桂心五兩桃仁炒去皮尖五兩別研上為末煉蜜丸梧子大每服五十丸溫酒下婦人醋湯下小茴香丸治小腸氣腹痛茴香胡椒等分上為末酒糊丸如梧子大每服五十丸空心溫酒下苦楝丸治肝腎氣虛風冷相搏心腹絞痛攻刺腰背不能禁受下注陰器腫癢疼痛久服養腎活血駐顏輕身耐老進美飲食川楝一十一個銼碎分三去一用巴豆十粒去皮同炒焦黑色去巴豆不用又用斑蝥七個同炒焦去斑蝥又用海金沙七錢重同炒去海金沙不用茴香炒破故紙炒葫蘆巴炒木香炮各一兩烏藥二兩上為末酒糊丸如梧子大每服三五丸湯酒任下補腎湯治寒疝入腹上實下虛小腹㽲痛時復泄瀉胸膈痞滿不進飲食常服溫脾補腎人參茯苓白朮黃耆附子炮去皮臍各一兩沉香四錢木瓜一兩半羌活半兩甘草炙芎藭各一分紫蘇三分上為銼散每服三錢水一盞姜三片棗一枚煎七分去滓食前服嘔加半夏半兩添水作盞半姜七片煎敘厥論經云厥者逆也有寒厥有熱厥有六經厥有尸厥寒厥者陰氣起於足五指之裡集於膝下聚於膝上故陰氣勝則從五指至膝上寒陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒名曰寒厥熱厥者陽氣起於足五指之表集於足下聚於足心故陽氣勝則從五指至足心熱熱入於胃絡脈滿經脈虛陰虛陽入腎氣衰陽氣獨勝故手足為之熱名曰熱厥六經厥者頭重足弱發為瞑僕名太陽厥妄言走呼腹滿面赤名陽明厥暴聾頰腫脅胻拘痛名少陽厥腹脹後閉食為寒嘔名太陽厥口乾溺赤腹滿心痛名少陰厥涇溲不利胻熱陰縮名厥陰厥尸厥者脹滿暴不知人或至半日遠至一日此以陰氣盛於上則下虛下虛則腹脹腹脹則下氣重上而邪氣逆逆則陽氣亂而不知人矣名曰尸厥經論如此雖粗分六經殊不出寒熱二證所因欲求備治當歷明之寒厥則因多欲而奪其精故致陽衰陰盛熱厥則因醉飽入房精虛則熱入故致陰虛陽盛考其厥因多以不勝乘其所勝氣不得行遂致於逆如腎移寒於脾則水乘於土水既不行乃成寒厥如心移熱於腎則火寒於水火既不行乃成熱厥六經皆然可次第論也所謂得其要者一言而終矣尸厥亦然正由臟氣相刑或與外邪相忤則氣遏不行閉於經絡諸脈匿伏昏不知人唯當隨其臟氣而通之寒則熱熱則寒閉則通如經所謂盛則瀉虛則補不盛不虛以經取之其旨一也經中以數醉為熱厥之因學者不可拘此蓋傷寒溫病皆有熱厥仲景所謂熱深厥深聖意以酒能發百脈熱故舉此以為例耳不可不知陰陽厥脈證治陰陽相乘而生寒熱厥者脈證似同而大異寒厥者初得之四肢冷脈沉微而不數多惡寒引衣自覆下利清穀外證多惺惺熱厥者初得之必發熱頭疼脈雖沉伏按之必數其人或畏熱喜冷揚手掉足煩躁不眠大小便祕赤外證多昏冒傷寒亦然治之各有方四逆湯治寒厥或表熱裡寒下利清穀食入則吐或乾嘔或大汗大吐大下之後四肢冰冰五內拘急舉體疼痛不渴脈沉伏大附子去皮臍生用半兩乾薑半兩甘草炙一分上銼散每服四錢水二盞煎七分去滓食前溫服並進取效白虎湯治熱厥腹滿身重難以轉側面垢譫語遺溺手足厥冷自汗脈沉滑里有熱也石膏四兩椎碎知母一兩半甘草炙半兩上為銼散每服四大錢水二盞粳米一撮煮米熟去滓取七分清汁服可並進服承氣湯亦治熱厥方見傷寒門舉此為例當觀病淺深量多寡以飲之方見第四卷卒厥尸厥脈證治追魂湯治卒厥暴死及主客忤鬼擊飛尸奄忽氣絶不覺口噤麻黃去節三兩杏仁去皮尖二百八十個甘草炙一錢上為銼散每服四錢水一盞半煎七分去滓灌之通治諸感忤或口噤拗口不開去齒下湯湯入口活不下分病人發左右捉搦肩引之藥下漸令服盡取效千金有桂心二兩金匱云寸脈沉大而滑沉則為實滑則為氣實氣相搏血氣入臟則死入腑則愈若卒厥唇口青身冷為入臟即死身和汗出則愈內鼻散治尸厥脈動而無氣氣閉不通靜而若死亦名卒厥菖蒲上為末納兩鼻孔中吹之令入仍以桂末安舌下眩暈證治方書所謂頭面風者即眩暈是也然眩暈既涉三因不可專為頭面風如中傷風寒暑濕在三陽經皆能眩人頭重項強但風則有汗寒則掣痛暑則熱悶濕則重著吐逆眩倒屬外所因喜怒憂思致臟氣不行鬱而生涎涎結為飲隨氣上厥伏留陽經亦使人眩暈嘔吐眉目疼痛眼不得開屬內所因或飲食飢飽甜膩所傷房勞過度下虛上實拔牙金瘡吐衄便利去血過多及婦人崩傷皆能眩暈眼花屋轉起而眩倒屬不內外因治之各有法大豆紫湯治中風頭眩惡風自汗吐冷水及産後百病或中風痱痙背強口噤直視煩熱獨活一兩半大豆半升酒三升上先以酒浸獨活煎一二沸別炒大豆極焦煙出急投酒中密封候冷去豆每服一二合許得少汗則愈日數十服此湯能去風消血結如妊娠折傷胎死腹中服此得瘥三五七散治感寒頭眩惡寒口眼喎斜耳聾大附子三兩炮去皮臍山茱萸五兩山藥七兩上為末每服二錢匕酒調服或㕮咀每服四大錢水盞半姜五片棗一個煎七分去滓服黃龍丸治感暑眩暈昏不知人方見中暑門曲術散治冒濕頭眩暈經久不瘥嘔吐涎沫飲食無味主之神麯二兩炒白朮三兩上為末每服二錢生薑煎湯調下或以酒糊丸如梧子大每服三五十丸湯飲任下薯蕷湯治七情致臟氣不行鬱而生涎涎結為飲隨氣上厥伏留陽經心中忪悸四肢緩弱翕然面熱頭目眩暈如欲搖動薯蕷人參麥門冬去心各四兩前胡白芍藥熟地黃各二兩枳殼麩炒去瓤遠志去心薑汁製炒各三分白茯苓茯神各一兩半半夏湯洗去滑一兩一分甘草半兩炙黃耆一兩炙上為銼散用千里流水一盞半姜七片秫米一撮煎七分去滓食前服白散子治上實下虛眩暈昏塞方見中風門芎藭湯治産後去血過多運悶不省及傷胎去血多崩中去血多金瘡去血多拔牙齒去血多不止懸虛心煩眩暈頭重目暗耳聾舉頭欲倒芎藭三兩當歸三兩去蘆洗去土切焙乾上為銼散每服四錢水一盞半煎七分去滓熱服不以時候黑錫丹治陰陽不升降上熱下冷頭目眩暈病至危篤或服暖藥僭上愈甚者當服此藥已經增損硫黃二兩椎如皂莢子大候鉛成汁入硫黃在內勿令焰起候硫黃化傾出於九重紙納入一地坑以碗蓋火出川楝子黑鉛不夾錫者先熔成汁各二兩陽起石煅木香沉香青皮炒各半兩肉豆蔻一兩茴香炒官桂去皮不見火附子炮去皮臍葫蘆巴炒破故紙炒各一兩烏藥去木銼一分上為細末酒糊為丸如梧子大每服三五十丸至一百丸濃煎人參茯苓薑棗湯吞下食前服痓敘論痓亦作痙夫人之筋各隨經絡結束於身血氣內虛外為風寒濕熱之所中則痓故寒則緊縮熱則弛張風則弦急濕則脹緩四氣兼併當如常說以風散氣故有汗而不惡寒曰柔痓寒泣血故無汗而惡寒曰剛痓熱消氣故為瘈縱濕溢血故為緩弱經中所謂大筋軟短小筋弛長軟短為拘弛長為痿皆濕熱不攘之所為也原其所因多由亡血筋無所營故邪得以襲之所以傷寒汗下過多與夫病瘡人及産後致斯病者概可見矣診其脈皆沉伏弦緊但陽緩陰急則𠘧𠘧拘攣陰緩陽急則反張強直二證各異不可不別痓敘例治法破傷風破傷濕並附病者身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭動搖卒口噤背反張以發熱惡寒不惡寒有汗無汗分剛柔者風寒痓也脈沉細即為濕痓瘡瘍未合風入為破傷風濕入為破傷濕二者害人最急倉卒不知其因甚難忍癰疽瘰癧膿潰之後尤宜謹之産婦汗多或因怒厥皆成此病治之各有方法栝蔞桂枝湯治柔痓身體強𠘧𠘧然脈反沉遲自汗栝蔞根二兩桂心白芍藥各三兩甘草炙二兩上為銼散每服四大錢水盞半姜五片棗二枚煎七分去滓溫服汗不透食頃啜熱粥發之葛根麻黃湯治剛痓無汗小便少氣上衝胸口噤不能語主之葛根四兩麻黃去節三兩桂心白芍藥甘草上銼散每服四大錢水盞半姜五片棗三枚煎七分去滓食前服小承氣湯治剛痓胸滿口噤臥不著席腳攣急齘齒主之方大黃四兩蒸厚朴八兩薑製枳殼二兩麩炒去瓤上銼散每服四大錢水盞半煎七分去滓入芒硝二錢匕煎熔服得利止後服此以陽明養宗筋陽明者胃也風濕寒入於胃則熱甚宗筋無以養故急直利陽明以治其能養也參桂湯治卒半身不遂手足拘急不得屈伸身體冷或智或癡或身強直不語或生或死狂言不可名狀角弓反張或欲得食或不用食或大小便不利悉主之人參桂心當歸獨活黃芩乾薑炮甘草炙各一分石膏一兩半杏仁一百六十個麩炒去皮尖上銼散每服四大錢水一盞半煎七分去滓服無汗加麻黃去節三分倉公當歸酒主賊風口噤角弓反張痓者當歸防風各三分獨活一兩半麻黃去節一兩一分細辛去苗半兩附子一個六錢重炮去皮臍上為銼散每服四錢水酒各半盞同煎七分去滓口不開者抉開口納湯一服蘇二服少汗三服大汗愈破傷風濕治法防風散治風自諸瘡口入為破傷風項強牙關緊欲死防風去叉天南星湯各等分上為末每服三錢童子小便一大盞煎至七分熱服牡蠣散治破傷濕口噤強直牡蠣取末粉敷瘡口仍以末二錢煎甘草湯調下香膠散治破傷風口噤強直魚膠燒七分留性上研細入麝香少許每服二錢酒調下不飲酒米湯下又一方以蘇木煎酒下
