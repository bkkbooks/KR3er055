body:
  text: 卷之二太醫習業國家以文武醫入官蓋為養民設未有不自學古而得之者學古之道雖別而同為儒必讀五經三史諸子百家方稱學者醫者之經素問靈樞是也史書即諸家本草是也諸子難經甲乙太素中藏是也百家鬼遺龍樹金鏃刺要銅人明堂幼幼新書産科保慶等是也儒者不讀五經何以明道德性命仁義禮樂醫不讀靈素何以知陰陽運變德化政令儒不讀諸史何以知人材賢否得失興亡醫不讀本草何以知名德性味養生延年儒不讀諸子何以知崇正衛教學識醇疵醫不讀難素何以知神聖工巧妙理奧義儒不讀百家何以知律歷制度休咎吉凶醫不讀雜科何以知脈穴骨空奇病異證然雖如是猶未為博況經史之外又有文海類集如漢之班馬唐之韓柳及我大宋文物最盛難以概舉醫文漢亦有張仲景華他唐則孫思邈王冰等動輒千百卷其如本朝太平聖惠乘間集效神功萬全備見崇文名醫別録豈特汗牛充棟而已哉使學者一覽無遺博則博矣倘未能反約則何以適從豫今所述乃收拾諸經筋髓其亦反約之道也讀醫方者當推上聖養民設教為意庶不負於先覺也五科凡例凡學醫必識五科七事五科者脈病證治及其所因七事者所因復分為三故因脈以識病因病以辨證隨證以施治則能事畢矣故經曰有是脈而無是診者非也究明三因內外不濫參同脈證盡善盡美凡學脈須先識七表八里九道名體證狀瞭然分別然後以關前一分應動相類分別內外及不內外又須知二十四脈以四脈為宗所謂浮沉遲數分風寒暑濕虛實冷熱交結諸脈隨部説證不亦乎凡審病須先識名所謂中傷寒暑風濕瘟疫時氣皆外所因臟腑虛實五勞六極皆內所因其如金瘡踒折虎狼毒蟲涉不內外更有三因備具各有其名所謂名不正則言不順言不順則事不成學不可不備凡學審證須知外病自經絡入隨六經所出井營輸源經合各有穴道起沒流傳不可不別內病自五臟郁發證候各有部分溢出諸脈各有去處所謂上竟上頭項胸喉中事也下竟下腹肚腰足中事也凡用藥須熟讀本草廣看方書雷公炮灸隨方過制汗下補吐輕重澀滑燥潤等性量病淺深飲服多寡五德五味七情八反升合分兩朝代不同一一備學將欲對治須識前後故經曰先去新病病當在後凡治病先須識因不知其因病源無目其因有三曰內曰外曰不內外內則七情外則六淫不內不外乃背經常金匱之言實為要道巢氏病源具列一千八百餘件蓋為示病名也以此三條病源都盡不亦反約乎凡學醫既明五科每科須識其要脈有浮沉遲數病有風勞氣冷證有虛實寒熱治有汗下補吐若於三因推明外曰寒熱風濕內曰喜怒憂思不內外曰勞逸作強各有證候詳而推之若網在綱有條不紊凡看古方類例最是朝代沿革升合分兩差殊若數味皆用分兩不足較也第中間有用升合枚數大段不同升斗稱尺本自積黍黍自不可見度量衡卒亦難明今以錢譜推測粗知梗概凡度者分寸尺丈引本以一黍之廣為分十分為寸十寸為尺十尺為丈十丈為引觀今之尺數等不同如周尺長八尺京尺長一尺六寸淮尺長一尺二寸樂尺長一尺二寸五分並以小尺為率小尺既自三微起卻自可準唐武德年鑄開元錢八分當十二錢半得一尺排錢比之十一個已及一尺又不知唐用何尺顧漢唐籥量並用尺寸分布尺寸如是不齊將何憑據博古君子必有説矣凡量者籥合升斗斛本以黃鐘籥容十二銖合籥為合重二十四銖今以錢準則六銖錢四個比開元錢三個重升斗斛皆纍而成數漢唐同用至宋紹興升容千二百銖則古文六銖錢二百個開元二百二十個以紹興一升得漢五升其餘私用不足計也凡衡者銖兩斤鈞石亦以黃鐘籥所容重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石每兩則古文六銖錢四個開元錢三個至宋廣稱以開元錢十個為兩今之三兩得漢唐十兩明矣千金本草皆以古三兩為今一兩以古三升為今一升諸藥類例尤為難辨且如半夏一升準五兩不知用何升何兩此修合制度之要務不可不知漢銅錢質如周錢文曰半兩重如其文孝文五年錢益多而輕乃更鑄四銖其文為半兩雜以鉛鐵錫非淆雜為巧則不得贏而姦或盜磨錢質取熔有司言錢輕重請郡國鑄五銖錢周郭有質令不得磨取熔則知漢以二半兩錢為兩重十銖明矣漢唐例以二十四銖為一兩抑未知修史人改作唐例亦不可知觀錢譜漢無六銖錢至唐方有今以五銖錢十六個正得開元錢十個重又以六銖錢十二個正得開元錢九個重則知開元錢每個以重八銖唐武德四年鑄開元通寶徑八分重二銖四纍積十錢為兩似難考據明食貨者必有説焉按藥書漢方湯液大劑三十餘兩小劑十有餘兩用水六升或七升多煎取二升三升並分三服若以古籥量水七升煎今之三十兩未淹得過況散末藥只服方寸刀圭匕丸子如梧桐子大極至三十粒湯液豈得如此懸絶又如風引湯一劑計五十五兩每兩隻用三指撮水三升煮三沸去滓溫服一升觀其煮制每隻三指撮未應料劑如此之多此又可疑也今以臆説漢方當用半兩錢二枚為一兩且以朮附湯方較若用漢兩計一百八十銖得開元錢二十二個半重若分三服已是今之七錢半重一服若以唐方準計三百三十六銖得開元錢四十二個重每服計今之十四錢重大略可知若以開元錢準得一百單五個重分三服每服計三十五錢重此猶是小劑況有大劑各件兩數之多者未易概舉留心此道幸少詳焉凡古書所詮不出脈病證治四科而撰述家有不知此多致顯晦文義重復要當以四字類明之四字者即名體性用也如脈浮則為名舉有餘按不足為體為風為虛曰性可補可汗曰用如病太陽傷風為名感已嗇嗇為體惡風自汗為性傳變經絡為用如證太陽風證為名頭項疼腰腳痛為體不與諸經濫為性候其進退為用如治藥桂則為名出處形色為體德味備缺為性汗下補吐為用以此推之讀脈經看病源推方證節本草皆用此法無餘蘊矣紀用備論夫陰陽運五氣行乎天地之間則神明為之紀故有德化政令變眚之異物類稟五行孕於八方之內則生靈賴其資故有功能氣味性用之殊苟氣運之失常非藥石則不療所謂功奪造化恩備裁成者無逾於藥石也故敷和彰顯溽蒸清潔淒滄者五氣之德也安魂育神益氣定魄守志者百藥之功也生榮蕃茂豐備緊斂清謐者五氣之化也通潤悅懌輕身潤澤益精者百藥之能也舒啓明曜安靜徑切凝肅者五氣之政也開明利脈滑膚堅肌強骨者百藥之氣也風熱濕燥寒者五氣之令也酸苦甘辛鹹者百藥之味也顧茲氣運與萬物雖種種不齊其如成象效法無相奪倫一一主對若合符契至於勝復盛衰不能相多往來升降不能相無故各從其動而興災變亦不相加也於是有振發銷鑠驟注肅殺凜冽者五氣之變也在藥則有收斂乾焦甜緩斂澀滋滑者百藥之性也散落燔炳霜潰蒼隕冰雪者五氣之眚也在藥則有鼽衄溢汗嘔吐涎湧泄利者百藥之用也德化者氣之祥功能者藥之良政令者氣之章氣味者藥之芳古之治法遇歲主臟害雖平治之不同必以所勝而命之故經曰上淫於下所勝平之平天氣也下淫於內所勝治之治地氣也故司天之氣風淫所勝平以辛涼諸氣在泉風淫於內治以辛涼此之謂也至於折抑主客郁發勝復治之亦莫越於功能氣味蓋從其德化政令之所為也今則不然惟取其性用之所利而治其災變之所傷寒者熱之熱者寒之溫者清之清者溫之散者收之收者散之滑者澀之澀者滑之燥者潤之急者緩之堅者耎之脆者柔之衰者補之強者瀉之故略去功能氣味隨其性用以備治法之總目合和修治之大綱備禦災變之要略爾衛生明哲之士當不拘於此也夫五味各隨其所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣則臟氣偏勝偏勝則有偏害偏害則致偏絶夭之由也是以政理觀化藥集商量服餌云藥不具五味五氣而久服之雖且獲勝久必暴夭此之謂也近世庸俗為治使人單服附子為害滋多可不謹乎臟腑配天地論韓子曰形而上者謂之天形而下者謂之地介於其兩間者謂之人人受天地之中以生莫不稟二氣以成形是以六氣緯空五行麗地人則默而象之故足厥陰肝居於巳手厥陰右腎居於亥巳亥為天地之門戶故風木化焉足少陰腎居於子手少陰心居於午子午得天地之正中故君火位焉足太陰脾居於未手太陰肺居於醜丑未為歸藏之標本故濕土守焉足少陽膽居於寅手少陽三焦居於申寅申握生化之始終故相火麗焉足陽明胃居於酉手陽明大腸居於卯卯酉為日月之道路故燥金行焉足太陽膀胱居於辰手太陽小腸居於戌辰戌為七政之魁罡故寒水注焉此三才應奉二氣相須不刊之説如指諸掌至於五行六氣第相資生亦莫不有自然之序如厥陰風木生少陰君火君火生太陰濕土濕土生少陽相火相火生陽明燥金燥金生太陽寒水順天道而右旋所謂運行也或問君火生土土復能生相火火復生金其義何在此生成之道也相火既已發焰暈暈灰滅非土不成未見虛空能聚火金在礦非火不能煅出所以河圖火七居西室金九居南室蓋互顯其成能也若以一性而推之無所不備故木焚則為火絞則為水石擊則為火熔則為水洲澶之內江河競注大海之中火光常起此皆性之本有也又何疑土中火火中金夫木火土金水此乃常度人皆知之至於風暑濕燥寒謂之揆度鮮有能明其狀者故以木比風以火比暑以土比濕以金比燥以水比寒仍以上下二氣而配手足三陰三陽則謂之奇度又況五行各各不同有正氣有太過有不及天地氣化既然人之臟腑亦然感而為病或外邪或本氣或稟賦必當推類隨三度而調之非究心明道之士孰能與此三因論夫人稟天地陰陽而生者蓋天有六氣人以三陰三陽而上奉之地有五行人以五臟五腑而下應之於是資生皮肉筋骨精髓血脈四肢九竅毛髮齒牙唇舌總而成體外則氣血循環流注經絡喜傷六淫內則精神魂魄志意思喜傷七情六淫者寒暑燥濕風熱是七情者喜怒憂思悲恐驚是若將護得宜怡然安泰役冒非理百疴生焉病診既成須尋所自故前哲示教謂之病源經不云乎治之極於二者因得之閉戶塞牖系之病者數問其經以從其意是欲知致病之本也然六淫天之常氣冒之則先自經絡流入內合於臟腑為外所因七情人之常性動之則先自臟腑郁發外形於肢體為內所因其如飲食飢飽叫呼傷氣盡神度量疲極筋力陰陽違逆乃至虎狼毒蟲金瘡踒折疰忤附著畏壓溺等有背常理為不內外因金匱有言千般疢難不越三條以此詳之病源都盡如欲救療就中尋其類例別其三因或內外兼併淫情交錯推其深淺斷其所因為病源然後配合諸證隨因施治藥石針艾無施不可外所因論夫六淫者寒暑燥濕風熱是也以暑熱一氣燥濕同源故上經收而為四即冬傷寒春溫病春傷風夏飧泄夏傷暑秋痎瘧秋傷濕冬咳嗽此乃因四時而序者若其觸冒則四氣皆能交結以病人且如溫病憎寒發熱不特拘傷寒也冒風暑濕皆有是證但風散氣故有汗暑消氣故倦怠濕溢血故重著雖折傷諸證不同經絡傳變咸爾不可不知飧泄亦然經曰寒甚為腸癖又熱濕久客腸胃滑而下利亦不止於傷風痎瘧諸證亦以寒暑風濕互絡而為病因初不偏勝於暑也咳論以微寒為咳熱在上焦咳為肺痿厲風所吹聲嘶發咳豈獨拘於濕也由是觀之則知四氣本乎六化六化本乎一氣以運變而分陰陽反則為六淫故經曰陰為之主陽與之正逆之則為病乃亂生化之常矣常則天地四塞矣治之必求其本當隨交絡互織而推之所謂風寒風溫風濕寒濕濕溫五者為並風濕寒風濕溫二者為合乘前四單共十一變倘有所傷當如是而推之又兼三陽經絡亦有併合能所簡辨甄別脈證毫釐不濫乃可論治非通明淫化邪正之精微其孰能與於此敘中風論夫風為天地浩蕩之氣正順則能生長萬物偏邪則傷害品類人或中邪風鮮有不致斃者故入臟則難愈如其經絡空虛而中傷者為半身不遂手腳癱瘓涎潮昏塞口眼喎斜肌膚不仁痹瘁攣僻隨其臟氣所為不同或左或右邪氣反緩正氣反急正氣引邪喎僻不遂蓋風性緊暴善行數變其中人也卒其眩人也暈激人涎浮昏人神亂故推為百病長聖人先此以示教太醫編集所以首論中風也然四氣皆能中人在證亦有緩縱攣急搐搦痹瘁奄忽不知人者不可不以脈別故論曰寒熱諸痹所有證候皆如風狀須得脈別可也要知脈浮則為風緊則為寒細則為濕數則為熱外證走注自汗則為風疼痛無汗則為寒緩弱熱頑則為暑停著腫滿則為濕隨其併合尤宜歷辨唯詳其所因合以脈診在絡在經入腑入臟依而調之乃可為治五臟中風證肝中風者人迎並左關上脈浮而弦在天為風在地為木在人臟為肝肝虛喜中風為類相從故脈應在左關肝風之狀多汗惡風色微蒼頭目瞤左脅偏痛嗜甘如阻婦狀筋急攣痹不伸診在目其色青心中風者人迎與左寸口脈洪而浮在天為熱在地為火在人臟為心心虛因中邪風乃子母相因故脈應在左寸口心風之狀多汗惡風色微赤翕翕發熱喑不能言欲飲食食則嘔診在舌其色赤焦脾中風者人迎與右關上脈浮而微遲在天為濕在地為土在人臟為脾脾虛因中風邪為勝克故脈應在右關上脾風之狀多汗惡風薄黃四肢怠墮皮肉瞤動發熱短氣不欲飲食嗜臥如醉人診在唇其色黃肺中風者人迎與右寸口脈浮澀而短在天為燥在地為金在人臟為肺肺虛因中邪風為乘克故脈應在右手寸口肺風之狀多汗惡風色皓然而白口燥而喘逆氣肩息身重背痛面脹腫晝瘥暮甚診在鼻其色白腎中風者人迎與左尺中脈浮而滑在天為寒在地為水在人臟為腎腎虛因中邪風為母子相感故脈應在左尺中腎風之狀多汗惡風色如炲面龐然浮腫腰脊痛引小腹隱曲不利昏寢汗愈多志意惶惑診在耳其色黑胃中風者人迎與兩關上脈並浮而大六腑無中風論惟胃有者以胃為臟海納五味以滋養五臟虛而中邪風故其狀額多汗食飲不下隔塞不通腹善滿失衣則䐜脹張口肩息心下淡淡食寒則泄中風治法生薑生附湯治卒中風涎潮昏塞不知人並主瘀冷癖氣胸滿嘔沫頭痛飲食不消大附子一枚生去皮臍切作八片上以水二碗生薑一兩切同煎至一大盞去滓溫冷服一法加沉香一錢一法加辰砂末少匕凡中風無問冷熱虛實皆可服蓋此藥能正氣消痰散風神效白散子治肝腎虛為風所襲卒中涎潮昏塞不語嘔吐痰沫頭目眩暈上實下虛真陽耗竭兼治陰證傷寒六脈沉伏昏不知人又治霍亂吐瀉飲食不進及小便淋瀝不通眼赤口瘡咽喉冷痛大附子生去皮臍桂府滑石各半兩圓白半夏湯洗二十一次三分上為末每服二錢水二盞薑七片蜜半匙煎七分空腹冷服霍亂加藿香小便不利加木通燈芯茅根煎此藥就有差互亦無所苦紅龍散治中風開關竅硃砂別研五靈脂各半兩茯神去心中木萆薢各一兩全蠍半兩腦麝各一錢別研上為末每服二錢酒調服先服此次服神異溫風丹神異溫風丹治中風一切諸疾麻黃五兩不去節擇淨生用人參白朮乾薑炮各二兩茯神附子炮去皮臍白膠香別研甘草炙各兩半乳香別研全蠍炒各一兩上將麻黃細銼用水五升熬去半入蜜六兩又熬成膏入前件藥末和丸如彈子大每服一丸溫酒下日三服排風湯治風虛濕冷邪氣入臟狂言妄語精神錯亂肝風發則面青心悶吐逆嘔沫脅滿頭眩不聞人聲偏枯筋急曲蜷而臥心風發則面赤翕然而熱悲傷嗔怒目張呼喚脾風發則面黃身體不仁不能行步飲食失味夢寐顛倒與亡人相隨肺風發則面白咳逆唾膿血上氣奄然而極腎風發則面黑手足不隨腰痛難以俯仰冷痹骨疼諸有此證令人心驚志意不定恍惚多忘服此湯安心定志聰耳明目通臟腑諸風疾悉主之白鮮皮白朮芍藥桂心芎藭當歸杏仁湯去皮尖防風去叉甘草炙各二兩獨活麻黃去節湯茯苓各三兩上銼散每服四錢水盞半薑七片棗二枚煎七分去滓服小續命湯治卒中風欲死身體緩急口目不正舌強不能語奄奄忽忽神情悶死諸風服之皆驗不令人虛麻黃去節湯防己崔氏外臺不用人參黃芩桂心甘草炙白芍藥芎藭各一兩杏仁一兩湯去皮尖炒附子一枚炮去皮臍防風半兩上為銼散每服四大錢水一盞半薑七片棗二個煎七分去滓不以時服取汗隨人虛實與所中輕重有人腳弱服此六七劑得瘥有風疹家天陰節變輒合服之可以防喑一云恍惚加茯神遠志骨節疼有熱去附子芍藥古今録驗有白朮無杏仁救急無芎藭杏仁止十味延年無防風一云遺失便利産後失血並老人小兒用麻黃桂心甘草各二兩一法治或歌哭或笑語無所不及用麻黃三兩人參桂枝白朮各二兩無防風附子生薑有當歸一兩獨活丹治風懿不能言四肢不收手足嚲曳白芍藥栝蔞根獨活桂心各二兩甘草三兩上為銼散每服四錢匕薑五片水二盞煎六分去滓入生葛汁一合和勻服三黃湯治中風手足拘攣百節疼痛煩熱心亂惡寒不欲飲食兼治賊風偏風猥退風半身不遂失音不言麻黃去節湯一兩一分黃耆半兩黃芩三分獨活一兩上為銼散每服四錢水盞半煎七分去滓不以時服取汗為效心熱加大黃半兩脹滿加枳實一分氣逆加人參三分心悸加牡蠣三分渴加栝蔞根寒加附子一枚炮熟入小竹瀝湯治中風涎潮譫語昏塞四肢緩縱不收秦艽去苗土銼防風去蘆銼附子炮去皮臍獨活銼各一分上水四盞煎二盞入生地黃汁竹瀝各半盞煎三五沸去滓分四服不拘時熱服病去以它藥扶持未知再作燒竹瀝法新竹截尺許長用兩磚對立相去八寸置竹在上每截破作二片仰安磚上急著火磚外兩頭各置碗以盛瀝瀝盡以絹濾澄清夏秋須沉冷水中防瀝酸大熱有風人亦可單服冷暖隨人勿過度荊瀝亦然獨活散治男子婦人氣虛感風或驚恐相乘肝膽受邪使上氣不守正位致頭招搖手足顫掉漸成目昏獨活地骨皮細辛芎藭菊花防風去叉甘草炙上等分為末每服三錢水盞半煎一盞去滓取六分清汁入少竹瀝再煎食後溫服日兩服又法不用獨活有旋覆花雄朱丸治中風涎潮咽膈作聲目瞑不開口眼喎斜手足不隨但是一切風疾並宜服之雄黃別研辰砂龍骨麝香各一錢別研烏蛇酒浸炙去皮骨白殭蠶生去絲觜天南星生白附子生各半兩上為未煉蜜丸梧桐子大如中風涎潮牙關不開先用大蒜一瓣搗爛塗在兩牙關外腮上用豆淋酒化一丸揩牙齦上即開續用薄荷酒化下一丸如丈夫風氣婦人血氣牙關緊急只用豆淋酒化一丸揩牙如頭風目眩暗風眼黑欹倒者急嚼一二丸薄荷湯下仁壽丸治肝腎氣虛風冷所中筋脈瞤動口眼喎斜常服補肝元行榮衛養氣血附子炮熟去皮臍一兩桂心白茯苓山茱萸五味子杜仲去皮薑製炒絲斷續斷枸杞子熟地黃洗巴戟去心菟絲子酒浸濕研防風各半兩牛膝酒浸二兩上為末蜜丸梧子大每三五十丸溫酒鹽湯食前任下鐵彈丸治男子婦人一切風疾無問遠近癱瘓中風口眼喎斜言語謇澀手足嚲曳難以稱舉或發搐瘈或如蟲行或失音不語牙關緊急腳不能行身體頑麻百節疼痛精神不爽頭虛煩悶夜臥不安多涎胸膈不利口乾眼澀多困少力如破傷風身如角弓口噤不開作汗如油及洗頭風腦重眉梁骨痛卒中不語迷悶兼白癜風遍身癮疹鼻多清涕耳作蟬鳴小兒驚風天吊搐搦婦人血風手足煩熱夜多虛汗頭旋倒地並皆治之白附子沒藥別研虎脛骨酒浸一宿炙乾全蠍烏頭炮去皮尖麻黃不去節自然銅燒存性醋浸一宿各一兩白花蛇酒浸半兩辰砂別研一分五靈脂一分木鱉子二十個去皮別研不入羅腦麝各一分別研乳香柳木捶研一分上為末蜜丸彈子大用無灰酒一升浸一丸分二十服傷風鼻塞分三十服空心臨臥各一服大風五丸可安活絡通經丸治半身不遂口眼喎斜癱瘓諸風通活經絡宣導凝滯常服壯筋骨助血脈起偏廢之疾其效如神川烏頭二兩一兩生不去皮尖一兩炮去皮尖草烏二兩制如上法木鱉子三兩三分別研斑蝥百個去頭足並翅醋煮香熟焙乾烏蛇酒浸去皮骨焙白花蛇酒浸去皮骨焙好墨火煅白膠香各一兩別研當歸兩半五靈脂三兩三分上為末將木鱉子末醋研為膏和黑豆末一斤好醋拌一兩作十丸以墨為衣空心食前溫酒鹽湯嚼下一丸烏藥順氣散治風氣不順手腳偏枯流注經絡並濕毒進襲腿膝攣痹筋骨疼痛烏藥去木麻黃去節湯橘皮各二兩甘草炙川芎枳殼麩炒去瓤桔梗白殭蠶炒去絲觜白芷各一兩白薑炮半兩上為末每服二錢匕水一盞薑三片薄荷七葉煎七分空心服治氣去薄荷用棗子二枚同煎舒筋保安散治左癱右瘓筋脈拘攣身體不遂腳腿少力乾溼腳氣及濕滯經絡久不能去宣導諸氣乾木瓜五兩萆薢五靈脂牛膝酒浸天麻續斷白殭蠶炒去絲松節白芍藥烏藥去木威靈仙黃耆川當歸防風去叉虎骨各一兩上用無灰酒一斗浸上件藥二十七日緊封扎日數足取藥焙乾搗為細末每服二錢用浸藥酒半盞調下吃酒盡用米湯調下又方添金毛狗脊一兩卻將乳香白膠香各一兩同研入干藥末內松節散治風寒冷濕搏於筋骨使筋攣掣痛行步艱難但是諸筋攣縮疼痛悉主之茯神中心木銼如米一兩乳香一錢研上入銀石器內炒留兩分性為末每服二錢木瓜酒下芎桂散治中風四肢疼痛及兩足俱軟行履不便川烏頭二兩切作片水浸一宿切作算子條更以米泔浸一宿不洗日乾麩炒微赤為度幹了稱川芎兩半桂心一兩甘草炙乾薑炮各一分上為末每服二錢溫鹽酒調下日三服趁風膏治中風手足偏廢不舉穿山甲左癱用左足右癱用右足紅海蛤如棋子者川烏頭大者生用各二兩上為末每用半兩搗烈蔥白汁和成厚餅約徑一寸半貼在所患一邊腳中心用舊帛裹緊縛定於無風密室中椅子上坐椅前用湯一盆將貼藥腳於湯內浸仍用人扶病人恐汗出不能支持候汗出即急去了藥汗欲出身麻木得汗周遍為妙切宜避風自然手足可舉如病未盡除候半月二十日以後再依此法用一次自除根本仍服治風補理藥忌口遠欲以自養附子酒治中風風冷痰癖脹滿諸痹大附子一枚去皮臍切作四片上用醇酒一升春浸五日夏三日秋冬七日每服一合日二三服以痹住為效未知再作小黃耆酒大治風虛痰癖四肢偏枯兩腳弱手不能上頭或小腹縮痛脅下攣急心下有伏水脅下有積飲夜夢悲愁不樂恍惚善忘此由風虛五臟受邪所致或久坐腰痛耳聾卒起眼眩頭重或舉體流腫疼痛飲食惡冷澀澀惡寒胸中痰滿心下寒疝及婦人産後余疾風虛積冷不除黃耆附子去皮臍川椒去目併合口者桂心秦艽牛膝防風去叉烏頭集驗方用山藥白朮川芎獨活細辛去苗甘草各三兩大黃葛根山茱萸乾薑各二兩當歸二兩半上為銼散少壯人無熬煉虛老人微熬之以絹袋盛用清酒二斗漬之春夏五日秋冬七日可先服食一合不知至四五合日三服此藥攻痹尤佳亦不令人吐悶小熱宜冷飲食也大虛加蓯蓉二兩下利加女萎三兩多忘加石斛菖蒲紫石英各二兩心下多水加茯苓人參各二兩山藥三兩酒盡可更以酒二斗重漬滓服之不爾可曝滓搗下篩酒服方寸匕不知稍增之服一劑得力令人耐寒冷補虛治諸風冷神妙仙酒方竇朝議經進治大風及偏風一切風疾延年益壽牛蒡根牛膝各一斤秦艽鼠黏子各二兩枸杞子炒一斗蒼朮蒸爛二斤防風蠶砂各二兩大麻子炒別研去殼一升桔梗羌活各二兩上為銼散無灰酒二斗淨瓷器內浸密封七日開開時不得對瓶口日進三服每服一大盞溫服常令面有酒色甚者不過一斗忌麵食並魚肉動風物料簡類例且人之冒風也輕則為傷重則為中蓋風散氣動於陽腠理開故自汗而惡風其色診皆隨臟氣而言六腑無論惟胃有中者蓋飲食所致故孫真人曰新食竟取風為胃風瘧論亦然然六腑經絡邪既能中豈不能中諸腑也雖曰轉輸在大小腸則有朏脹在胞則有轉戾在膽則有攝縮但文缺不論或謂竟中諸臟故不論諸腑此亦一説故兩存之諸方論中所謂左癱右瘓者蓋邪氣中人邪氣反緩正氣即急正氣引邪喎僻不隨為風懿者以心肺間閉不能言但噫噫作聲蓋肺氣入心則能言邪中心肺涎潮逼塞故使然也四肢緩縱為風痱者以風散涎注於關節氣不能行故使四肢不遂也舌強不能言者以風入心脾經心之別脈繫於舌本脾之脈絡胃挾咽連舌本散舌下風涎入其經絡故舌不轉而不能言也四肢拘攣者以中風冷邪氣入於肝臟使諸筋攣急屈不可伸也風柔者以風熱入於肝臟使諸筋弛張緩而不收也故經云寒則攣急熱則弛張風顫者以風入於肝臟經絡上氣不守正位故使頭招搖而手足顫掉也風喑者以風冷之氣客於中滯而不能發故使口噤不能言也與前所謂涎塞心肺同候此以口噤為瘥耳猥退風者半身不遂失音不語臨事不前亦偏中於心肺經所致也諸證類例可推而治之不內外因中風凡例凡因不內不外而致風中者亦各從其類也如新沐中風名曰首風飲酒中風名曰漏風又曰酒風入房中風名曰內風又曰勞風治之各有方附子摩頭散治因沐頭中風多汗惡風當先風一日而病甚頭痛不可以出至日則少愈名曰首風大附子一個炮去皮臍鹽等分上二味為散沐了以方寸匕摩疢上令藥力行麋銜湯治因醉中風惡風多汗少氣口乾善渴近衣則身熱如火臨食則汗流如浴骨節懈惰不欲自勞名曰漏風澤瀉白朮各一兩麋銜半兩上為末每服二錢酒飲任調下食前服附子湯治房室竟中風惡風多汗汗出沾衣口乾上瀆不能勞事身體盡疼名曰內風附子生去皮臍人參各半兩茴香炒茯苓山藥各一分甘草炙乾薑炮各三分上為銼散每服四大錢水二盞薑三片鹽少許煎至七分去滓食前服敘中寒論夫寒者乃天地殺厲之氣在天為寒在地為水在人臟為腎故寒喜中腎腎中之多使攣急疼痛昏不知人挾風則眩暈兼濕則腫疼治之唯宜溫劑不可吐下皆逆也然寒性雖喜歸腎五臟皆能中之若中於經絡之表則易散入里則不消與傷寒脈證無異但輕重不同其有本臟即中寒者經論既載不可不辨明也詳論在傷寒門五臟中寒證肝中寒者人迎與左關上脈緊而弦肝虛中寒乃母子相因弦多則吉但緊不弦舌卷囊縮為不利故使本部脈緊如切繩肝中寒之狀其人灑灑惡寒翕翕發熱熏然面赤漐漐如有汗胸中煩熱脅下攣急足不得伸心中寒者人迎與左寸口脈緊而洪心虛中寒賊邪相剋脈應本部洪滑則吉但緊舌乾焦為不利心中寒之狀其人如啖韭齏狀劇則心痛掣背背痛掣心猶如蠱疰惡寒四肢厥自吐少間頃時復發休作不已昏塞不知人脾中寒者人迎與右關上脈緊而沉細脾虛中寒寒邪乘克脈應本部長則吉沉緊唇揭為不利脾中寒之狀心腹䐜脹四肢攣急噯噫不通臟氣不傳或祕或泄肺中寒者人迎與右寸口脈緊而澀肺虛中寒母子相感脈應本部浮者為吉但緊而澀鼻乾燥為不利肺中寒之狀喜吐濁涎氣短不能報息灑灑而寒吸吸而咳腎中寒者人迎與左尺中脈沉緊而滑腎虛中寒寒喜中腎以類相從脈應本部沉滑者吉緊澀耳輪黑目睛眣為不利腎中寒之狀色黑氣弱吸吸少氣耳聾腰痛膝下清拘攣而疼昏不知人余例見傷寒門中寒治法附子理中湯治五臟中寒口噤四肢強直失音不語昔有武士守邊大雪出帳外觀瞻忽然暈倒時林繼作隨行醫官灌以此藥兩劑遂醒大附子炮去皮臍人參乾薑炮甘草炙白朮各等分上為銼散每服四大錢水一盞半煎七分去滓不以時服口噤則斡開灌之乾薑附子湯治中寒卒然暈倒或吐逆涎沫狀如暗風手腳攣搐口噤四肢厥冷或復燥熱乾薑炮附子炮去皮臍等分上為銼散每服四錢水盞半煎七分去滓食前服入肝加木瓜入肺加桑白皮入脾加朮入心加茯苓隨證加之敘中暑論中暑其脈陽弱而陰虛微遲似芤夫暑在天為熱在地為火在人臟為心故暑喜歸心中之使人噎悶昏不知人入肝則眩暈頑痹入脾則昏睡不覺入肺則喘滿痿躄入腎則消渴利小便凡中暍死治之切不得用冷惟宜溫養得冷則死道塗無湯即以熱土尉臍中仍使更溺概可見矣若發其汗則惡寒甚加溫針則發熱甚下之則淋甚治之不可不謹也然傷暑中暍其實一病但輕重不同新校正要略者乃云傷寒家別有暍病非也詳論治法見傷暑門中暑治法大黃龍丸治中暑眩暈昏不知人或身熱惡寒頭痛狀如傷寒或往來寒熱煩躁渴甚嘔吐泄瀉常服去暑毒分利陰陽硫黃硝石各一兩雄黃通明者滑石白礬各半兩寒食麵四兩上為末滴水為丸如梧子大每服五丸至七丸漸加至二十丸新汲水下昏塞不知人則以水化開灌之中暑忌得冷此藥卻以冷水下之乃熱因寒用疑者釋之中暑凡例中暑悶倒急扶在陰涼處切不可與冷當以布巾衣物等蘸熱湯尉臍中及氣海續以湯淋布上令徹臍腹暖即漸惺如倉卒無湯處掬道上熱土於臍以多為佳冷即易古法道塗無湯即掬熱土於臍上仍撥開作窩子令人更溺於其中以代湯續與解暑毒藥如白虎竹葉石膏湯凡覺中暑急嚼生薑一大塊冷水送下如已迷亂悶嚼大蒜一大瓣冷水送下如不能嚼即用水研灌之立醒路中倉卒無水渴甚急嚼生蔥二寸許津同咽可抵飲水二升敘中濕論中濕者脈沉而細微緩以濕溢人肌肌浮脈則沉細夫濕者在天為雨在地為土在人臟為脾故濕喜歸脾脾虛喜中濕故曰濕流關節中之多使人䐜脹四肢關節疼痛而煩久則浮腫喘滿昏不知人挾風則眩暈嘔噦兼寒則攣拳掣痛治之不得猛發汗及灼艾泄瀉惟利小便為佳故論云治濕不利小便非其治也大汗大下皆死詳論治法見傷暑門中濕治法白朮酒治中濕口噤不知人白朮半兩上酒三盞煎一盞頓服不能飲酒以水代之日三夜一四氣兼中證論風寒暑濕本乎一氣性中相同用中相背風寒既能中五臟暑濕其可不論方論有肝著其人常欲蹈其胸上未苦時但欲飲熱脾著四肢浮腫身重如石不能自反身腎著身重腰中冷如坐水中形如水狀反不渴小便自利食飲如故心肺不見明文恐文簡脫難以臆補或云濕惟中足三陰故不及心肺然五臟有本病並乘克勝克相感相因而得之假如風中肝為本病中脾為勝克中肺為乘克中心為相因中腎為相感則無所不通謂濕不及心肺未為確論故缺以俟明哲暑病亦然況六淫均被四氣皆能中人中風則有汗脈必浮弦惡風走注中寒則無汗脈必緊數惡寒疼痛中暑則昏憒面垢脈必虛緩倦怠中濕則重著脈必輕緩四肢癧節疼痛皆能交絡互織所謂風寒風濕風溫寒濕濕溫等當以人迎脈證別之令無差誤更有七情內忤亦能涎潮昏塞手足嚲曳一如中風不可例作六淫氣治其至夭枉及素蓄痰涎隨氣上厥使人眩暈昏不知人半身不遂口眼喎斜手足嚲曳者故有中氣中痰之別猶當詳辨毋使混濫除外所因方見於此後內所因各見本門四氣兼中治法附子湯治五臟中風寒手足不仁口面喎斜昏暈失音眼目瞤動牙車緊急不得轉動附子炮去皮臍桂心各半兩細辛去苗防風去叉人參乾薑炮各六錢上為銼散每服四錢水一盞半薑五片棗一枚煎七分去滓食前服或為末酒調二錢服防風湯治中風挾暑卒然暈倒面青黑四肢緩弱喜呻欠口喎斜四肢不仁好笑防風去叉澤瀉桂心杏仁麩炒去皮尖乾薑炮甘草炙各等分上為銼散每服四錢水一盞半煎七分去滓食前服生附白朮湯治中風濕昏悶恍惚脹滿身重手足緩縱漐漐自汗失音不語便利不禁附子生去皮臍乾薑各半兩白朮一兩甘草一分炙上為銼散每服四錢水盞半煎七分去滓食前服附子麻黃湯治寒濕所中昏暈緩弱或腰背強急口喎語聲混濁心腹䐜脹氣上喘不能轉動附子炮去皮臍麻黃去節湯白朮乾薑甘草炙人參等分上為銼散每服四錢水盞半煎七分去滓食前服苓朮湯治冒暑遭雨暑濕鬱發四肢不仁半身不遂骨節離解緩弱不收或入浴暈倒口眼喎斜手足嚲曳皆濕溫類也附子炮去皮臍茯苓白朮乾薑炮澤瀉桂心等分上為銼散每服四錢水盞半煎至七分去滓食前服
