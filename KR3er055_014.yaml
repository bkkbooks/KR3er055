body:
  text: 卷之十四水腫敘論夫腎主元氣天一之水生焉肺主沖化地四之金屬焉元氣乃水中之火所以太陽合少陰主精髓以滋血沖化乃土中之金所以太陰合陽明主肌肉以養氣今腎虛則火虧致陽水凝滯肺滿則土溢使陽金沉潛沉潛則氣閉凝滯則血淖經絡不通上為喘急下為腫滿故經曰腎為少陰肺為太陰其本在腎其末在肺皆至陰以積水也所以能聚水而生病者蓋腎為胃關關鍵不利樞機不轉水乃不行滲透經絡皮膚浮腫諸證不同廣如經說治法曰平治權衡者察脈之浮沉也去莞陳莝者疏滌腸胃也開鬼門潔淨府者發汗利小便也原其所因則冒風寒暑濕屬外喜怒憂思屬內飲食勞逸背於常經屬不內外皆致此疾治之當究其所因及諸禁忌而為治也水腫證治脈例古方十種證候以短氣不得臥為心水兩脅疼痛為肝水大便鴨溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水乍虛乍實為大腸水腹急肢瘦為膀胱水小便祕澀為胃水小腹急滿為小腸水各隨其經絡分其內外審其脈證而甄別之然此十水謂之正水外有風水皮水石水黃汗以義考之風合歸肝皮合歸肺黃汗歸脾石合歸腎雖名理不逾奈證候少異古方備列不可不辨但風水脈浮必惡風皮水亦浮按不沒指不惡風石水脈沉腹滿不喘黃汗脈沉遲發熱多涎久而不愈必致癰膿正水寸口脈浮而遲浮則熱遲則潛熱潛相搏名曰沉趺陽脈浮而數浮則熱數則止止熱相搏名曰伏沉伏相搏名曰火沉則絡脈虛伏則小便難虛難相搏水走皮膚即為正水此金匱節文所以用寸口趺陽二脈者蓋水氣不在一經也大抵浮脈帶數即是虛寒潛止於其間久必沉伏沉伏則陽虛陰實為水必矣要知水脈必沉論曰脈出者死與病不相應也諸唇黑則傷肝缺盆平則傷心臍出則傷脾足平則傷腎背平則傷肺凡此五傷必不可療也治法曰腰以上腫宜發汗腰以下腫宜利小便學者當知之復元丹治水腫夫心腎真火能生脾肺真土今真火氣虧不能滋養真土故土不制水水液妄行三焦不瀉氣脈閉塞樞機不通喘息奔急水氣盈溢滲透經絡皮膚溢滿足脛尤甚兩目下腫膇股間冷口苦舌乾心腹堅脹不得正偃偃則咳嗽小便不通夢中虛驚不能安臥附子炮二兩南木香煨茴香炒川椒炒去汗獨活厚朴去皮銼薑製炒白朮略炒陳橘皮吳茱萸炒桂心各一兩澤瀉一兩半肉豆蔻煨檳榔各半兩上一十三味為末糊丸梧子大每服五十丸紫蘇湯下不以時此藥世傳屢驗未嘗示人其間君臣佐使與造物同妙服者自知要當屏去諸藥一日三服先次旋利如傾次乃腫消喘止蓋藥能助真火以養真土運動樞機安平必矣法當禁欲並絶咸半年乃不再作當歸散治如前當歸洗木香煨赤茯苓桂心檳榔赤芍藥牡丹皮陳皮木通白朮各銼焙乾等分上為末腳膝頭面腫大小便不快每服二錢水一盞紫蘇二葉淡木瓜一片如指大同煎八分溫服日三如已愈常服早晚二覺氣下或小便快是效臟寒去檳榔臍已凸添大腹皮木豬苓各一兩忌烏雞肉鹹酸海味物正陽丹治水腫宣木瓜干四兩濕者一個銼童子小便法酒各一升煮爛絞汁人參一兩大豆煮去皮干十兩附子炮半兩銀硃二錢上為末入銀硃研勻以木瓜膏丸如梧子大每服五十丸米湯下消腫丸治水腫喘滿小便不利滑石木通白朮黑牽牛炒通脫木茯苓茯神去木半夏湯去滑陳皮各一分木香半分瞿麥穗丁香各半錢上為末酒糊丸如梧子大每服三十丸燈芯麥門冬湯溫服消腫散治水氣浮腫喘呼不得睡煩熱躁擾渴燥大小便不利大黃蜜蒸山梔炒甘草炙乾葛橘皮麻黃去節湯馬牙硝川芎各等分上為細末蜜湯調下二錢棗仁散治水氣浮腫無問久新老少悉可服唯禁鹽必效棗仁赤茯苓桂心各等分上為末每服二錢米飲調下禹餘糧丸治十腫水氣凡腳膝腫上氣喘滿小便不利但是水氣悉皆主之蛇黃大者三兩以新鐵銚盛入一稱炭火中燒蛇黃與銚子一般通赤用鉗取銚子出便傾蛇黃入釅醋二升中候冷取出研極細則止即含石禹餘糧三兩用真針沙五兩先以水淘淨控干更以銚子炒乾入禹餘糧一處用米醋二升就銚內煮醋乾為度卻用銚並藥入一稱炭火中燒通赤傾藥淨磚地上候冷研無聲即止以三物為主其次量人虛實入下項藥治水多是取轉唯此方三物既非大戟甘遂芫花之比又有下項藥扶持故虛老人可服羌活木香煨茯苓川芎牛膝酒浸白豆蔻炮土茴香炒蓬朮炮桂心乾薑炮青皮去瓤京三稜炮白蒺藜附子炮當歸酒浸一宿各半兩虛人老人全用半兩實壯人減之上為細末拌極勻以湯浸蒸餅捩去水和藥再搗極勻丸如梧子大食前溫酒白湯下三十丸至五十丸唯忌鹽雖毫末許不得入口若無以為味即水病去後且以醋少許調和食不能忌鹽勿服果欲去病切須忌鹽但試服藥即於小便內旋去不動臟腑病去日日三服兼以溫和調補氣血藥助之真神方也第一退水丸能化氣退水腫去苑莝利濕通小便蓬朮炮三稜煨桂心青皮益智各半兩巴豆二兩去皮出油別研上為末麵糊丸如梧子大用黃梔十個劈破荊芥黑牽牛酸漿草各少許煎湯空腹下二三十丸第二退水餅服前藥未效即服此方甘遂大戟各等分上為末入面打水調為餅如棋子大火煨熟五更淡茶湯嚼下一餅第三大腹子散取轉後調正胃氣進食大腹子炒桂心茴香炒陳皮各半兩上為末每服二錢米飲調下桃紅散治正水脹急大小便不利逆欲死方甘遂半兩半生半炮坯十文別研上為末研勻每用一錢以白麵四兩水調入藥搜和切作棋子白水煮浮更不得使鹽料物只淡食候大小便利去五六分卻用後藥調補平胃散一兩附子炮白朮各一兩丁香半兩上為末和勻每服二錢水一盞姜七片棗三枚煎七分不拘時候日三五服若腳未退可灸三陰交及風門穴腫退必矣大丸治通身腫滿及痰氣食積傷寒感風脾氣橫泄羌活白朮各半兩陳皮木通黃耆桑白皮各三分木香一分黑牽牛五兩炒五兩生上為末蜜丸如彈子大治風痰散腹脅壅滯清頭目濃煎生薑湯下取食傷止赤白痢煎棗湯下小便不利燈芯湯下傷寒蔥茶下如未快用稀粥投之用熱茶湯亦可須七日後方可服已得瀉急欲止之投冷白粥即自止婦人産前並宜服之既服此藥須住他藥三日及不得吃生冷葷腥及滋味一日只軟飯淡粥可也次日早進千金散藿香甘草炙乾薑炮神麯炒茯苓各一兩人參桂心各半兩陳皮厚朴制各二兩上為末每服二錢水一盞姜三片煎七分鹽一捻通口服葶藶大丸治腫滿腹大四肢枯瘦小便澀濁甜葶藶紙隔炒薺菜根等分上為末蜜丸如彈子大每服一丸陳皮湯嚼下只三丸小便清數丸腹當依舊料簡病有風水皮水石水黃汗皆與正水同為治自別大豆湯治風水通身腫骨節疼惡風自汗眼合不得短氣欲絶其脈浮大豆杏仁炒去皮尖麻黃去節防風防己豬苓去皮各四兩澤瀉黃耆烏頭炮各三兩半夏湯七次茯苓白朮各五兩甘遂炒甘草炙各二兩上㕮咀每服五錢水二盞酒半盞姜七片煎七分去滓不計時服以大小便利腫消則停藥未知加生大戟五兩葶藶二兩紙炒香無不快利甘草反甘遂似不當同用之卻效非人情所可測也五皮飲治皮水四肢頭面悉腫按之沒指不惡風其腹如故不喘不渴脈亦浮大腹皮炙桑白皮炙茯苓皮生薑皮陳橘皮各等分上㕮咀每服四錢水盞半煎七分去滓熱服日二三近人磨木香水同煎亦妙澤漆湯治石水四肢瘦腹腫不喘其脈沉澤漆洗去腥五兩桑白皮六兩炙射干泔浸黃芩茯苓白朮各四兩澤瀉防己各二兩上㕮咀每服五錢水三盞烏豆一合煎二盞納藥同煎七分去滓空腹溫服日三黃汗依五疽法治之用黃耆酒料簡病有水腫相類者曰膚脹鼓脹腸覃石瘕脾氣橫泄五種治法亦復不同除鼓脹見脹滿門腸覃石瘕見婦人門今具膚脹及脾氣橫泄如後附子緑豆湯治寒客皮膚殼殼然而堅腹大身腫按之陷而不起色不變病名膚脹一劑未知再作大附子重七錢者一隻生去皮臍半破緑豆二兩上以生薑一兩切水二碗煎至一碗絞去滓分三服空腹溫服次日將前附子破作四片再用緑豆二兩姜一兩如前煎服第三日復將附子作八片如前煎無礙丸治脾氣橫泄四肢浮腫心腹脹滿喘不得臥蓬朮煨三稜煨各一兩大腹皮炙二兩木香炮檳榔一分生上為末炒麥糵搗粉為丸如梧子大每服二十丸生薑湯下小三稜煎治如前方見癥瘕門茯苓分氣飲治脾胃不和胸膈噎塞腹脅疼痛氣促喘急心下脹滿飲食不進嘔吐不止兼脾氣橫泄四肢浮腫五味子桔梗茯苓甘草炙陳皮桑白皮草果大腹皮各二兩半紫蘇葉上為粗末每服四錢水一盞姜三片鹽少許煎七分去滓食前服麻黃甘草湯治氣急積久不瘥遂成水腫如此者衆諸皮中浮以水攻面目身體從腰以上腫當以此湯發汗麻黃二兩去節湯甘草一兩上為銼散每服四錢水一盞半煎七分去滓空腹溫服茯苓蘇子丸治面腫小便澀心腹脹滿茯苓蘇子杏仁去皮尖各二兩橘皮防己葶藶紙炒各一兩一分上為末蜜丸如小豆大以桑白皮湯下三十丸食後服料簡夫洪腫門類極多自正水之餘有風水皮水石水黃汗等分入水門如脾氣橫泄腳氣支滿膚脹鼓脹腸覃石瘕與夫造作干犯土氣皆作浮腫屬血屬氣理自不同奈外證相類未易甄別若不預學臨病必迷錯亂汗下皆醫殺之更有氣分血分亦入腫門類治法穎別其可不學古方類例雖明多見不學者抄寫數方一道施治倘非其病妄投其藥盛者致困困者必死況有飲食禁忌種種不同學者勉㫋不可輕玩以病試藥甚為不仁戒之戒之血分方見婦人門氣分方論附於後氣分證治氣分與胸痹中滿皆相類但胸痹屬氣實中滿為氣虛氣分則挾涎飲氣為涎飲所隔榮衛不利腹滿脅鳴相逐氣轉膀胱榮衛俱勞陽氣不通則身冷陰氣不通則骨疼陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣轉其氣乃散實則失氣虛則遺溺乃知氣挾涎飲之所為也其脈寸口遲而澀遲則為氣不足澀則為血不足趺陽脈微而遲微則為氣遲則寒斯證也名曰氣分桂附湯治心下堅大如盤邊如旋盤水飲所作名曰氣分桂心三兩甘草炙麻黃去節湯焙乾稱細辛去苗各二兩附子四個炮去皮臍上為銼散每服四錢水一盞半生薑七片棗三個煎七分去滓溫服汗出如蟲行皮中即愈枳朮湯治心下堅大如盤邊如旋盤水飲所作名曰氣分枳實一兩半白朮三兩上為銼散每服四錢水一盞半煎七分去滓溫服腹中軟即當散也陰㿗敘論夫陰㿗屬肝系宗筋胃陽明養之世多不識謂之外腎非特名義差錯亦使內臟不分其可不辨古方雖出四證但曰腸㿗氣㿗水㿗卵脹殊不別其所因如腸㿗則因房室過度元臟虛冷腸邊膋系不收墜入㿗中上下無定謂之腸㿗屬不內外因病者久蓄憂思恐怒兼併隨臟氣下墜陰㿗腫脹急痛名曰氣㿗屬內所因病者久坐冷濕濕氣下襲致陰腫脹名曰水㿗屬外所因病者勞役無節及跨馬坐車致卵核腫脹或偏有大小上下無常名曰卵脹亦屬不內外因有小兒生來便如此者乃宿疾也卵脹腸㿗皆難治氣㿗水㿗治之易愈又寒疝下注入於㿗中名曰狐疝亦屬㿗病世人因此並以㿗病為疝氣不審之甚婦人陰門挺出亦稱㿗病名義不分有如此者陰㿗證治凡㿗病唯腸㿗無問貴賤多有之有睡臥膋系延入脅下者有墜入囊中者或遇疲勞及天色變動逼上囊根腫急作痛過於寒疝得暖則下其如卵脹有作熱生膿為癰潰爛者比比有之茱萸內消丸治陰㿗偏大上攻臍腹㽲痛膚囊腫脹或生瘡瘍時出黃水腰腿沉重足脛腫滿行步艱辛服之內消不動腑臟川楝三兩銼炒大腹皮五味子海藻洗玄胡索各二兩半茴香炒桂心川烏炮去皮尖吳茱萸石茱萸白蒺藜各二兩枳實麩炒去瓤橘紅桃仁麩炒各一兩別研木香一兩半桔梗青皮各二兩山茱萸二兩上為末酒糊丸如梧子大溫酒下三十丸大戟丸治陰㿗腫脹或小腸氣痛大戟去皮銼炒黃半兩葫蘆巴四兩炒木香一兩附子炮去皮臍舶上茴香訶子煨去核檳榔各一兩川楝五兩後入麝香半錢別研上為末獨留川楝以好酒一二升蔥白七枚長三四寸煮川楝軟去皮核取肉和上件藥丸如梧子大空心溫酒下五七丸至十丸薑湯亦得潮發疼痛炒姜熱酒下十五丸煉陰丹治陰器下墜腫脹卵核偏大堅如石痛不可忍玄胡索微炒去殼海藻洗昆布洗青皮茴香炒川楝去核馬藺花各一兩木香半兩大戟酒浸三宿切片焙乾一分上為末別將硇砂阿魏安息香各一分用酒醋各一升淘三物去砂石熬成膏入麝香一錢沒藥一分入前藥和丸如緑豆大用綿灰酒下十丸至十五丸空心服抵聖丸治膀胱有熱多因天氣熱而發陰㿗腫滿赤痛大便祕欲飲水按之臍腹痛續隨子薏苡仁郁李仁茵芋白牽牛各一錢略炒上為末滴水丸如梧子大五丸用博濟方香姜散咽黃昏服五更利下惡物效兼金丸治熱入膀胱臍腹上下兼脅肋疼痛便燥欲飲水按之痛者大黃濕紙裹煨八錢硝石桂心甘草炙各四兩桃仁四十個去皮尖上為末蜜丸梧子大米飲下五七丸至十丸婦人血閉疼痛亦宜服之應痛丸治敗精惡物不去結在陰囊成疝疼痛不可忍久服去病阿魏二兩醋和用蕎麥麵作餅厚三指裹阿魏慢火煨熟檳榔大者二個刮作甕子滿盛的乳香將刮下末用蕎麥麵拌作餅子慢火煨熟上同研為末入硇砂末一錢赤芍藥末一兩同為麵糊搜和丸如梧子大溫酒鹽湯下十丸至二十丸食前服蒺藜丸治囊核堅大行動艱辛發作牽連偏墜疼痛白蒺藜微炒去刺海藻浸洗去咸澤瀉各一兩茴香炒一兩半桂心木通牛膝銼酒浸五味子木香煨檳榔各二兩茯神去木人參遠志水浸去心薑汁炒各三兩川楝去皮核麩炒桃仁去皮尖炒別研赤芍藥續斷山茱萸蓯蓉酒浸青皮各四兩上為末蜜丸梧子大空心食前溫酒鹽湯下三五十丸三白散治膀胱蘊熱風濕相乘陰㿗腫脹大小便不利白牽牛略炒二兩白朮半兩桑白皮陳皮木通各半兩上為末每服二錢薑湯調下空腹服初進一服未覺再進此藥不損臟氣只導利留滯疝方大率多用熱藥此方唯壅熱證宜服之蜘蛛散治陰狐㿗氣偏有小大時時上下脹人蜘蛛十四個熬焦桂心半兩上為末蜜丸梧子大米飲下十丸牡丹散治㿗偏大脹不能動坐臥不安牡丹皮防風等分上為末酒服方寸匕小品有桂枝豉鐵精共五味嬰兒以乳汁調一字許香附散治㿗脹香附子不拘多少上為末每用酒一盞煎海藻一錢重至半盞先撈海藻嚼細用所煎酒調香附末二錢服雄黃散治陰腫大如斗核痛人所不能治雄黃一兩研礬二兩研甘草生半兩上為銼散以水五升煎洗之癰疽敘論發背癰疽者該三因而有之論云癰疽瘰癧不問虛實寒熱皆由氣鬱而成經亦云氣宿於經絡與血俱澀而不行壅結為癰疽不言熱之所作而後成癰者此乃因喜怒憂思有所鬱而成也又論云身有熱被風冷搏之血脈凝泣不行熱氣壅結而成亦有陰虛陽氣湊襲寒化為熱熱成則肉腐為膿者此乃外因寒熱風濕所傷而成也又服丹石及炙爆酒面溫床厚被所致又盡力房室精虛氣節所致者此乃因不內外所傷而成也故知三因備矣又論云癤者節也癰者壅也疽者沮也如是但陰陽不平有所壅節皆成癰疽又曰陰滯於陽則發癰陽滯於陰則發疽而此二毒發無定處當以脈別之浮洪滑數則為陽微沉緩澀則為陰陰則熱治陽則冷治治之之要雖有四節八事所謂初覺則宣熱拔毒已潰則排膿止痛膿盡則消肌內塞惡肉盡則長肌敷痂次序固明若不別其因施治亦昧故治法中有用遠志宣熱者得非內因乎至於外因則用大黃不內外因則用甘草世醫但泥方書多用五香連翹與漏蘆二湯更不知三因所自其可守一法而普攻之既得其因又須觀病淺深與證候吉凶寒則溫之熱則清之虛則補之實則瀉之導以針石灼以艾炷破毒潰堅以平為期各有成法近胡丞得一方甚寶祕之持以獻洪丞相丞相與之作序言重於世已遍行矣其方乃千金內補散添黃耆加人參減桂間有輕者服之稍效若真癰疽為害反甚內補散當用在第四節當前服內消等藥俟膿盡方得投苟專用之亦所謂守一法也孔子不嘗未達之藥者良有旨哉士夫當深味斯言無輕信醫方誤天下後世謹之謹之癰疽證治病者脈數身無熱而反灑淅惡寒若有痛處背發其癰腫欲知有膿無膿以手掩腫上熱者為有膿不熱為無膿此亦大略說也自有脈不數不熱而疼者蓋發於陰也不疼尤是惡證不可不知凡熱盛脈數即用漏蘆並單煮大黃等湯不甚熱脈緩弱只投五香連翹湯其它依四節八事次序及推三因以用藥未有不全濟也遠志酒治一切癰疽發背癤毒惡候浸大有死血陰毒在中則不痛敷之即痛有憂怒等氣積而內攻則痛不可忍敷之即不痛或蘊熱在內熱逼人手不可近敷之即清涼或氣虛血冷潰而不斂敷之即斂此本韓大夫宅用以救人極驗若七情內郁不問虛實寒熱治之必愈遠志不以多少湯洗去泥捶去心上一味為末酒一盞調末三錢遲頃澄清飲之以滓敷病處大黃湯孫真人云緩急單煮大黃一味為湯服即快利此要法獨聖湯治服金石及食炙爆飲酒房勞為癰疽及諸惡瘡疼痛甘草半斤生銼上一味以水一斗浸一宿煎至五升以下去滓入銀石器煎熬為膏分二服溫酒下臨臥一服次日五更一服當取下惡物為效通聖雙行湯治傷風寒暑濕或泣或散使氣血滯凝肉腐為膿壅結成癰疽隨處發作大黃蒸一兩木鱉去殼切防風枳殼桔梗甘草各一分上為銼散每服四大錢水一盞煎七分去滓入朴硝兩錢重煎熔熱服得疏轉一兩次即服萬金湯若陰證只服萬金不可用通聖雙行也萬金湯治癰疽發背發眉發髭鬚發腦婦人乳癰等定痛去毒甘草半兩沒藥一分栝蔞一個去皮上為銼散以無灰酒三升煮至一升去滓隨量旋飲盡或出血或出黃水是效五香連翹湯治一切惡核瘰癧癰疽惡腫等病青木香即舶上木香沉香薰木香即乳香丁香麝香升麻桑生寄生獨活連翹射干木通各二兩大黃蒸三兩上為銼散每服四大錢水二盞煮一盞以上去滓取八分清汁空腹熱服半日以上未利再服以利下惡物為度未生肉前服不妨以折去熱毒之氣本方有竹瀝芒硝恐泥者不能斟酌故缺之知者自當量入漏蘆湯治癰疽發背丹痃惡肉時行熱毒發作赤腫及眼赤生瘡漏蘆白芨黃芩麻黃去節白薇枳殼麩炒升麻芍藥甘草炙各二兩大黃三兩蒸上為銼散每服四錢水二盞煎七分空腹熱服以快利為度本方有芒硝可去之只加大黃作五兩忍冬酒治癰疽腫毒甚效忍冬草取嫩苗一握甘草八錢炙銼上同研入酒一升半砂瓶塞口煮去滓溫服仍以滓敷腫毒上又木蓮葉四十九片揩去毛研細酒解溫服功與忍冬草不相上下又龍鱗薜荔一握細研以酒解汁溫服亦能瀉下惡物去其根本轉毒散治發背癰疽不問淺深大小利去根本不動元氣神效車螯紫背光厚者一名昌娥甘草生一分輕粉半錢重上以鹽泥固濟車螯火煅取末一兩入甘草末同輕粉研勻濃煎栝蔞酒調下四錢匕五更初服轉下惡物為度未知再作栝蔞每用一個酒一碗煎一盞為一劑靈寶膏治發背癰疽宣熱拔毒排膿止痛大栝蔞三十個去皮瓤取子炒香取仁細研乳香二兩胡桃六十個取肉去皮同栝蔞細研白蜜一斤上以銀石器內慢火熬成膏每服兩大匙溫酒調下不以時候服托裡散治癰疽欲發未潰及已潰服之內托不使透膜栝蔞子去瓤稱鬼腰帶皮皂角刺射干即仙人掌根紅花者是天羅瓜取子各一個茴香木鱉五個去殼漢椒各一兩上焙乾為末面薄糊調作餅炙乾為末每服二三錢酒調下不飲酒以木香湯下白玉膏收縮癰疽令不蔓衍切忌用冷藥外貼逼毒氣入里殺人杏仁二十一粒去皮尖別研川椒四十九粒去目出汗為末清油一兩酒蠟半兩上文武火熬用柳青枝打紫黑色綿濾過再熬滴水成珠收淨器內看瘡大小作新月樣紙花團丸貼候暈收更促小瘡頭聚用後藥敷檳連散治癰疽瘡腫未潰已潰皆可敷檳榔黃連各半兩穿山甲大者十片燒存性上為末先點好茶以翎毛刷過瘡仍以清茶調藥敷瘡上如熱甚則以雞子清調敷膿已潰則用長肌藥未快則用替針丸替針丸治癰疽雖潰而膿不出用之即快雄雀糞二十七個直者是硇砂一字匕別研陳倉米一字為末沒藥一字研上研勻以米飲丸如粟米每用一粒貼在瘡頭或瘡眼中即潰膿出生肌散敷癰疽瘡毒即生肌黃狗頭骨燒存性二兩膩粉一錢桑白皮炙一兩上為末生麻油調敷自通聖萬金神異白玉檳連替針生肌凡七方是一家行用均濟三因皆良藥也瞿麥散治癰疽已潰排膿止痛利小便瞿麥一兩芍藥桂心赤小豆酒浸炒川芎黃耆當歸白蘞麥門冬去心各二兩上為末每服二錢酒調下空腹服內塞散治癰疽熱退膿血不止排膿止痛防風茯苓白芷桔梗遠志甘草人參川芎當歸黃耆各一兩桂心半兩附子兩個炮厚朴薑製二兩赤小豆二兩半酒浸炒上為末每服二錢溫酒米湯調下千金內補散治癰疽發背惡肌不盡服此消肌生肉當歸桂心各二兩人參川芎厚朴薑製炒防風甘草炙白芷桔梗各一兩上為末每服二錢匕酒調空腹服不能飲酒以木香湯調下善應膏治癰疽潰後長肌敷瘕白芷黃耆各一兩甘草二錢黃蠟二兩黃丹二兩半上前三味為粗末春秋用麻油四兩半夏四兩冬五兩熬藥紫赤色綿濾去滓再入黃蠟黃丹以柳枝不住手攪滴水成珠即止用如常法豬蹄湯洗髮背癰疽豬蹄一具治如食法黃耆黃連芍藥各三錢三字黃芩一分薔薇根狼牙各一兩上銼散以水二斗煮豬蹄熟澄清得汁半許入藥煎至二三分去滓洗瘡以帛拭乾日二如疼痛加當歸甘草各一分外食散治癰腫惡肉不盡膿水淋漓敷此能消肌長肉白礬銀窩內用瓦蓋煅令性盡一兩好染坯血竭各一兩上研細用桑漿旋搜為膏量瘡大小貼之忌鯽魚酒面毒物等瘡漏脈例經云陷脈為漏留連肉腠脈得寒即下陷凝滯肌肉故曰留連肉腠肉冷亦能為膿血故為冷漏須用溫藥方如後陷脈散治漏瘡及二三十年癭瘤或大如杯盂久久不瘥致有漏潰令人骨消肉盡或堅或軟或潰令人驚惕寐臥不安體中掣痛愈而復作乾薑炮琥珀大黃附子炮各一兩丹參三分石硫黃白石英鍾乳粉烏賊魚骨各半兩上為末貯以瓷合韋囊勿令泄氣若瘡濕即敷無汁即煎豬脂和敷之以干為度或死肌不消加芒硝二兩益佳一法用胡燕屎一枚桂附丸治氣漏冷漏諸瘡桂心附子炮裂米醋中浸再炮淬三五次去皮尖厚朴薑製甘草炙白朮各一兩木香一分乳香二錢別研上為末煉蜜丸梧子大空腹米飲下二三十丸癰疽灸法夫癰則皮薄腫高疽則皮厚腫堅初發並宜灼艾唯癰成則宜針疽膿成則宜烙若能審其名證早早施治仍用藥以攻利其根補托其里不必告醫自料亦瘥但世人忽之耳醫方所以冠癰疽於雜病之先者知為大病也世醫失治療之序顛倒錯亂多致枉夭良可嘆息故備集得效灸法以貽學者庶不致妄投也治初生癰疽發背神效灸法纍試有驗江寧府紫極觀因掘得石碑載之凡人初覺發背欲結未結赤熱腫痛先以濕紙覆其上立視候之其紙先干處即是結癰頭也取大蒜切成片如當三錢厚薄安其頭上用大艾炷灸之三壯即換一蒜片痛者灸至不痛不痛灸至痛時方住最要早覺早灸為上一日二日十灸十活三日四日六七活五六日三四活過七日則不可灸矣若有十數頭作一處生者即用大蒜研成膏作薄餅鋪頭上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一片黃粟米頭子便用獨頭蒜切去兩頭取中間半寸厚薄正安於瘡上卻用艾於蒜上灸十四壯多至四十九壯
