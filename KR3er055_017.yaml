body:
  text: 卷之十七婦人論夫天地造端於夫婦乾坤配合於陰陽雖清濁動靜之不同而成象效法之有類原茲婦人之病與男子不同者亦有數焉古方以婦人病比男子十倍難治不亦言之深乎但三十六病産蓐一門男子無之其如外傷風暑寒濕內積喜怒憂思飲食房勞虛實寒熱悉與丈夫一同也依源治療可得而知之求子論夫有夫婦則有父子婚姻之後必求嗣續故聖人謂不孝有三無後為大者言嗣續之至重也凡欲求子當先察夫妻有無勞傷痼害之屬依方調治使內外和平則婦人樂有子矣蕩胞湯治婦人立身以來全不産及斷緒久不産三十年者朴硝牡丹皮當歸大黃蒸一飯久桃仁湯去皮尖麵炒各半兩細辛去苗厚朴去粗皮切薑製炒赤芍藥桔梗人參茯苓桂去皮甘草炙牛膝酒浸橘皮各三錢一字附子炮去皮臍一兩虻蟲去嘴翅炒焦人蛭切炒各四十枚上為銼散每服四大錢水酒各一盞半煎取六分去滓空腹服日三夜一溫覆得少汗必下積血及冷赤膿如小豆汁斟酌下盡若力弱大困不堪者只一二服止然恐惡物不盡不得藥力能盡服盡好不爾著坐導藥坐導藥治全不産及斷緒服前蕩胞湯惡物不盡用此方皂角去皮子吳茱萸當歸各一兩細辛去苗五味子乾薑炮各二兩大黃蒸礬石枯戎鹽蜀椒各半兩上為細末以絹袋盛大如指長三寸余盛藥令滿縛定納婦人陰中坐臥任意勿行走小便時去之更安一日一度易新者必下清黃冷汁汁盡止若未見病出可十日安之本為子宮有冷惡物故令無子值天陰冷則發疼痛須候病出盡方已不可中輟每日早晚用苦益菜煎湯熏洗秦桂丸治婦人無子昔金城範守進此方見經驗秦艽去蘆桂心不見火杜仲去皮薑製炒絲斷防風三分厚朴去皮薑製三分附子去皮臍生用茯苓各兩半白薇乾薑炮牛膝酒浸沙參半夏湯洗各半兩人參一兩細辛去苗二兩一分上為細末煉蜜為丸如赤豆大每服五十丸食前溫酒醋湯任下如未效更加丸數覺有則止神效並如彼說不復繁引探胞湯斷經三月不知是胎驗之方川芎不拘多少上為末濃煎艾湯調二錢空腹服微動則有胎脈例經云陰搏陽別謂之有子搏者近也陰脈逼近於下陽脈別出於上陰中見陽乃知陽施陰化法當有子又少陰脈動甚者妊子也手少陰屬心足少陰屬腎心主血腎主精精血交會識投於其間則有娠又三部脈浮沉正等無病者有妊也余並如脈經說惡阻婦人中脘宿有風冷痰飲經脈不行飲與血搏多喜病阻其狀顏色如故脈理順時不知病之所在但覺四肢沉重頭目眩暈惡聞食臭喜啖鹹酸至三四月則大劇吐逆不自勝持多臥少起此由經血既閉水漬於臟臟氣不得宣通頭潰悶經脈祕澀故使四肢沉重挾風則頭目眩暈留飲則嘔吐無時竹茹湯治妊娠擇食嘔吐頭疼顛倒痰逆四肢不和煩悶人參橘皮白朮麥門冬去心各一兩甘草炙一分白茯苓厚朴薑製各半兩上為銼散每服四大錢水一盞半姜五片入竹茹一塊如指大同煎至七分去滓空心服半夏茯苓湯治妊娠惡阻心中潰悶頭目眩暈四肢怠墮百節煩疼痰逆嘔吐嫌聞食氣好啖鹹酸多臥少起不進飲食半夏湯洗七次三兩茯苓熟地黃各一兩八錢橘皮細辛人參芍藥川芎紫蘇葉桔梗甘草炙各一兩二錢上為銼散每服四大錢水二盞姜七片煎七分去滓空腹服有客熱煩渴口生瘡者去橘皮細辛加前胡知母腹冷下利者去地黃入桂心炒胃中虛熱大便閉小便澀加大黃一兩八錢去地黃加黃芩六錢茯苓丸治妊娠阻病心中煩悶頭暈重憎聞飲食氣便嘔逆吐悶顛倒四肢重弱不自勝持服之即效要先服半夏茯苓湯兩劑後可服此方茯苓人參桂心炒乾薑炮半夏湯洗七次橘皮各一兩白朮葛根甘草炙枳實麩炒去瓤各二兩上為末蜜丸如梧子大每服三五十丸米飲下日三服小地黃丸治妊娠酸心吐清水腹痛不能食人參乾薑炮各等分上為末用生地黃汁丸如梧子大每服五十丸米湯下食前服養胎大論夫養胎須分能所母為能養子為所養名義既殊致養亦別故謂之重身父母交會之初子假父母精血投識於其間然後成妊元氣質始之謂也一月血聚謂之始衃二月精凝謂之始膏三月成形謂之始胎此亦無次第中次第也道生一一生二二生三三生萬物既以三而成故不得不數月而分也成形之後陰陽施化男女始分故隨見外象而有感於內四月始受少陰君火氣以養精五月受太陰濕土氣以養肉六月受少陽相火氣以養氣七月受陽明金氣以養骨八月受太陽水氣以養血九月受厥陰木氣以養筋十月臟腑俱備神明已全俟時而生此皆所養胎息之所成始成終也若能養者惟在乃母依經所載而時養之無妄服食針灸勞逸等不特傷胎亦乃自傷不可不備學也為保傅母尤宜熟識之謹備列母之能養避忌諸法以繼諸後避忌法一月足厥陰脈養內屬於肝肝藏血不可縱怒及疲極筋力冒觸邪風亦不可妄針灸其經二月足少陽脈養內屬於膽膽合於肝共榮於血不可驚動及針灸其經三月手心主脈養內屬右腎腎主精不可縱欲及悲哀觸冒寒冷亦不得針灸其經四月手少陽脈養內屬三焦三焦精府合腎以養精不可勞逸及針灸其經五月足太陰脈養內屬於脾脾養肉不可妄思及飢飽觸冒卑濕亦不可針灸其經六月足陽明脈養內屬於胃胃為臟腑海合於脾以養肉不得雜食及針灸其經七月手太陰脈養內屬於肺肺以養皮毛不可憂鬱及叫呼觸冒煩躁亦不得針灸其經八月手陽明脈養內屬於大腸合肺以養氣毋食燥物致氣澀及針灸其經九月足少陰脈養內屬於腎以養骨不可懷恐及房勞觸冒生冷亦不得針灸其經十月足太陽脈養內屬於膀胱以合腎太陽為諸陽生氣故使兒脈續縷皆成六腑通暢與母分氣神氣各全俟辰而生唯不說手少陰心養者蓋心為五臟大主如帝王不可有為也若將理得宜無傷胎臟更能知轉男胎教之法斯為盡善敘例於後轉女為男法論曰陽施陰化所以有娠遇三陰所會多生女子但懷娠三月名曰始胎血脈不流象形而變是時男女未定故今於未滿三月間服藥方術轉令生男也其法以斧置妊婦床下系刃向下勿令人知恐不信者令待雞抱卵時依此置窠下一窠盡出雄雞此雖未試亦不可不知凡受胎三月逐物變化故古人立胎教能令生子良善長壽忠孝仁義聰明無疾蓋須十月之內常見好境象無近邪僻真良教也如有觸忤傷胎治各有法據徐之才逐月養胎傷胎等方備則備矣事煩少用故不暇録識者當自閲今出安胎方如後安胎飲治妊娠胎寒腹痛或胎熱多驚舉重腰痛腹滿胞急卒有所下或頓僕閃朒飲食毒物或感時疾寒熱往來致傷胎臟川芎枳殼切麩炒去瓤各兩半熟地黃三兩糯米二合上為銼散每服四大錢水一盞半姜五片棗一枚金銀少許同煎至七分食前服白朮散治妊娠宿有風冷胎痿不長或失於將理動傷胎氣多致損墮常服保護胎臟白朮川芎各四兩川椒去合口者並子炒出汗三兩牡蠣粉煅二兩上為末每服二錢溫酒米湯任調下腹痛加白芍藥心下毒痛加川芎心煩嘔吐加細辛一兩半夏二十粒湯洗入若渴者以大麥汁調服病雖愈盡服勿置味惡多阻人宜作丸服亦治室女帶下諸疾罩胎散治妊娠傷寒大熱悶亂燥渴恐傷胎臟卷荷葉嫩者焙乾一兩蚌粉花半兩上為末每服二錢入蜜少許新汲水調下食前服漏阻例懷妊全假經血以養胎忽因事驚奔或從高墜下頓僕失據或冒涉風寒觸忤邪祟致暴下血胎幹不動奔上搶心腹中急逼或血從口出皆傷胎證也膠艾湯治妊娠不問月數深淺因頓僕胎動不安腰腹痛或有所下或胎奔上刺心短氣安胎熟地黃一兩艾葉炒當歸甘草炙芍藥川芎阿膠炙各一兩黃耆一兩上為銼散每服四錢水一盞半煎七分去滓食前溫服胸中逆冷加生薑五片棗三枚同煎苧根湯治胎無故下血腹痛不可忍或下黃汁如漆如小豆汁者野苧根二兩銼炒金銀各一兩上為一劑水酒各一盞煎至一盞去滓分二服不以時服桂枝茯苓丸治婦人宿有癥瘕妊娠經斷未及三月即動此癥也經斷三月而得漏下不止胎動在臍上者為癥痼害當去其癥又論妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以下血不止者其癥不去故也當下其癥桂心不焙茯苓牡丹皮桃仁去皮尖麩炒芍藥各等分上為末煉蜜丸如彈子大每服一丸嚼細溫酒米湯任下食前服千金保生丸養胎益血安和子臟治妊娠將理失宜或因勞役胎動不安腰腹痛重胞阻漏胎惡露時下子臟挾疾久不成胎或受妊不能固養痿燥不長過年不産日月雖滿轉動無力或致損墮及臨産節適乖宜驚動太早産時未至惡露先下胎胞枯燥致令産難或橫或逆痛極悶亂連日不産子死腹中腹上冰冷口唇青黑吐出冷沫新産惡血上衝運悶不省喘促汗出及瘀血未盡臍腹㽲痛寒熱往來或因産勞損虛羸未復面黃體瘦心怔盜汗飲食不進漸成蓐勞入月常服壯氣養胎正順産理潤胎易産産後常服滋養血氣和調陰陽密腠理實腑臟治風虛除痼冷甘草炙貝母秦椒去目炒出汗乾薑炮桂心炒黃芩石斛去根石膏煅糯米炒大豆卷炒各一分當歸酒浸一宿微炒半兩麻子仁兩半別研上為末煉蜜為丸如彈子大每服一丸並用溫酒或棗湯任下細嚼空心服子煩證治竹葉湯治妊娠苦煩悶者以四月受少陰君火氣以養精六月受少陰相火氣以養氣若母心驚膽寒多好煩悶名子煩防風去叉黃芩麥門冬去心各三兩白茯苓四兩上為銼散每服四大錢水一盞半竹葉十數片煎七分去滓溫服腹痛下利治法當歸芍藥散治妊娠腹中㽲痛心下急滿及産後血暈內虛氣乏崩中久痢常服通暢血脈不生癰瘍消痰養胃明目益津白芍藥八兩當歸茯苓白朮各二兩澤瀉四兩川芎四兩一法一兩半上為末每服二錢溫酒調下食前服元和紀用經云本六氣經緯丸能祛風補勞養真陽退邪熱緩中安和神志潤澤容色散邪寒溫瘴時疫安期先生賜李少君久餌之藥後仲景增減為婦人懷妊腹痛本方用芍藥四兩澤瀉茯苓川芎各一兩當歸白朮二兩亦可以蜜為丸服雞黃散治懷身下利赤白絞刺疼痛雞子一個烏者尤妙就頭作一竅傾出青者留黃黃丹一錢入前雞子殼內打令黃勻以厚紙裹黃泥固濟火上煅取焙乾上為末每服二錢米飲調下一服愈者是男兩服愈者是女凡冷熱利斷下門中選無毒者皆可用小便病證治凡妊娠胎滿逼胞多致小便不利者或心腎氣不足不能使胞冷清濁相干為諸淋病或胞系了戾小便不通名曰轉胞又胎滿尿出不知時名遺溺治之各有方苦參丸治妊娠小便難飲食如故當歸貝母炒苦參各三兩滑石半兩上為細末蜜丸小豆大米飲下二十丸不拘時服葵子散治妊娠小便不利身重惡寒起則眩暈及水腫者葵子五兩茯苓三兩上為末每服二錢匕米飲調下小水利則愈又方入榆白皮一兩八味丸治婦人病食飲如故煩熱不得臥而反倚息以胞系了戾不得溺故致此病名轉胞但利小便則愈以八味丸中有茯苓故也方見少陰腳氣門白薇芍藥散治妊娠遺尿不知出時白薇芍藥各等分上為末酒服方寸匕日二三服胎水證治凡婦人宿有風寒冷濕妊娠喜腳腫俗呼為皺腳亦有通身腫滿心腹急脹名曰胎水鯉魚湯治妊娠腹大胎間有水氣白朮五兩芍藥當歸各三兩茯苓四兩上銼散以鯉魚一頭修事如食法煮取汁去魚不用每服藥四錢入魚汁一盞半姜七片陳皮少許煎七分去滓空心服商陸赤小豆湯治妊娠手腳腫滿攣急赤小豆商陸干各等分上為銼散每一兩水一碗煎至七分盞汁清服腎著湯治妊娠腰腳腫痛茯苓白朮各四兩乾薑炮甘草各二兩炙杏仁去皮尖炒三兩上為銼散每服四錢水一盞半煎七分去滓食前服滑胎例凡懷妊已滿十月形體成就神識咸備分氣趣産宜服滑胎湯藥枳殼散瘦胎易産胡陽公主服效枳殼銼麩炒去瓤黑色四兩甘草二兩炙上為末每服二錢空心沸湯點服至七月方可服臨月忌登高廁榆白皮散治臨産預服滑胎榆白皮槐枝瞿麥木通大麻仁各等分上為銼散每服五大錢水二盞煎七分去滓日二服産難證治婦人懷憂無逾妊産頃刻之間便至夭害故以陳面見兒為比不亦危矣凡欲生産切不得喧鬧選一年高性善老娘並純謹家人扶持不可揮霍致令産婦憂恐如腹中痛甚且令扶行或痛多陳眼中出火方是兒轉至行不得方好上蓐産自有時痛不甚者名曰弄痛須且熟忍時至自産莫妄費力定是難産切忌喪孝穢汙家人來産訖亦不可見恐傷子須依産圖方位無致觸犯禁忌為佳産圖見太醫局方催生湯治産婦陳疏難産經三兩日不生或胎死腹中或産母氣乏委頓産道乾澀才覺陳痛破水便可投之蒼朮二兩米泔浸洗桔梗一兩陳皮六錢白芷桂心甘草炙各三錢當歸川烏頭炮去皮尖乾薑炮厚朴制芍藥半夏湯洗七次茯苓附子炮去皮臍南星炮各二錢川芎一錢半枳殼麩炒四錢南木香一錢杏仁炒去皮尖阿膠麩炒各二錢半上為末每服一大錢溫酒下覺熱悶用新汲水調白蜜服鉛丹催生及難産橫逆水銀二錢黑鉛一錢銚內熔投水銀結成砂子上用熟絹巾紐出水銀細研以汗衫角紐做丸子緑豆大臨坐草時香水吞一二丸立效仍須敬仰産科論序世傳産書甚多千金外臺會王産寶馬氏王氏崔氏皆有産書巢安世有衛生寶集子母祕録等備則備矣但倉卒之間未易歷試惟李師聖序郭稽中産科經驗保慶集二十一篇凡十八方用之頗效但其間敘論未為至當始用料理簡辨於諸方之下以備識者非敢好辨也産科二十一論評第一論曰熱病胎死腹中者何答曰因母患熱病至六七日以後臟腑極熱熏煮其胎是以致死緣兒身死冷不能自出但服黑神散暖其胎須臾胎氣暖即自出何以知其胎之已死但看産婦舌色青者是其候也黑神散桂心當歸芍藥甘草炙生乾地黃乾薑炮各一兩黑豆炒去皮二兩附子炮去皮臍半兩上為末每服二錢空心溫酒調下一法無附子有蒲黃評曰夫妊娠謂之重身二命系焉將理失宜皆能損胎不特病熏煮所致或因頓僕驚恐出入觸冒及素有癥瘕積聚壞胎最多候其舌青即知子死養胎論云面青舌赤母死子生唇青吐涎子母俱斃又有雙懷二胎或一死一活其候尤難知自非臨歧觀變未易預述不可不備學也然以黑神散溫胎未若補助産母使其氣正免致虛乏困頓胎自下矣催生湯殊勝黑神散催生湯治胎死腹中或産母氣乏委頓産道乾澀方見産難門第二論曰難産者何答曰胎側有成形塊為兒枕子欲生時枕破與敗血裹其子故難産但服勝金散逐其敗血即自生矣逆生橫生並皆治之勝金散麝香一錢鹽豉一兩舊青布裹了燒令紅急以乳捶研細上為末取稱捶燒紅以酒淬之調下一錢評曰産難不只胎側有兒枕破與敗血裹凝隨其胎息因緣自有難易其如橫逆多因坐草太早努力過多兒轉未逮或已破水其血必干致胎難轉若先露腳謂之逆先露手謂之橫法當以微針刺之使自縮入即服神應黑散以固其血必自轉生養生方云倉皇之間兩命所繫不可不廣傳蓋贊黑散之功也或以鹽塗兒腳底抓搔之神應黑散治橫生逆生難産百草霜香白芷各等分上為細末每服二錢童子小便好醋各一茶腳許調勻更以沸湯浸四五分服止一服見功甚者再服已分免矣一名烏金散第三論曰胎衣不下者何答曰母生子訖血流入衣中衣為血所脹是故不得下治之稍緩脹滿腹中以次上衝心胸疼痛喘急者但服奪命丹以逐去衣中之血血散脹消胎衣自下而無所患更有牛膝湯用之甚效録以附行奪命丹附子半兩炮去皮臍牡丹皮一兩乾漆一分搗碎炒煙盡上為末釅醋一升大黃末一兩同熬成膏和藥梧子大溫酒下五七丸不以時服牛膝湯治産兒已出胞衣不下臍腹堅脹急痛甚及子死腹中不得出牛膝酒浸瞿麥各四兩滑石八兩當歸酒浸木通各六兩葵子五兩上為銼散每服三錢水兩盞煎七分去滓不以時服第四論曰産後血暈者何答曰産後氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花極甚者令人悶絶不知人口噤神昏氣冷醫者不識呼為暗風若作此治之病必難愈但服清魄散自瘥清魄散澤蘭葉一分人參一分荊芥穗一兩川芎半兩上為末溫酒熱湯各半盞調一錢急灌之下咽即開眼氣定省人事評曰産後眩暈頃刻害人須量虛實為治若胸中宿有痰飲阻病不除産後多致眩暈又血盛氣弱氣不使血逆而上攻此等皆非清魄可療瘀暈仍用半夏茯苓湯血壅須用牡丹散但快藥尤難輒用當識輕重所謂擾乎可擾擾亦無擾若氣血平人因去血多致暈者芎藭湯尤佳半夏茯苓湯方見惡阻門牡丹散治産後血暈悶絶狼狽若口噤則拗開灌之必效牡丹皮大黃蒸芒硝各一兩冬瓜子半合桃仁三七粒去皮尖上為銼散每服五錢水三盞煎至盞半去滓入芒硝又煎分二服欲産先煎下以備緩急金匱以此治腸癰但分兩少異芎藭湯方見眩暈門第五論曰産後口乾痞悶者何答曰産後榮衛大虛血氣未定食麵太早胃不能消化面毒結聚於胃脘上熏胸中是以口乾燥渴心下痞悶醫者不識認為胸膈壅滯以藥下之萬不得一但服見哯丸見哯丸薑黃京三稜炮蓽澄茄陳皮人參高良薑蓬朮炮各一兩上為末用蘿蔔慢火煮爛研細將汁煮麵糊丸如梧子大用蘿蔔湯下三十丸評曰産後口乾痞悶未必止因食麵或産母內積憂煩外傷燥熱飲食甘辛使口乾痞悶當隨其所因調之可也煩心宜四物湯去地黃加人參烏梅煎若外傷燥熱看屬何經當隨經為治難以備舉飲食所傷見哯丸卻能作效增損四物湯方見下第六論第六論曰産後乍寒乍熱者何答曰陰陽不和敗血不散能令乍寒乍熱産後血氣虛損陰陽不和陰勝則乍寒陽勝則乍熱陰陽相乘則或寒或熱若因産勞臟腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫人若誤作瘧疾治之則謬矣陰陽不和宜增損四物湯敗血不散宜奪命丹又問二者何以別之答曰時有刺痛者敗血但寒熱無他證者陰陽不和增損四物湯不一皆隨病加減增損四物湯當歸人參芍藥川芎乾薑炮各一兩甘草炙四錢上銼散每服四錢水一盞姜三片煎六分去滓熱服不以時候評曰乍寒乍熱榮衛不和難以輕議若其敗血不散豈止入脾肺二臟耶大抵一陰閉一陽即作寒熱陰勝故寒陽勝故熱只可云敗血循經流入閉諸陰則寒閉諸陽則熱血氣與衛氣解則休遇再會而復作大調經散五積散入醋煎大調經散治産後血虛惡露未消氣為敗濁凝滯榮衛不調陰陽相乘憎寒發熱或自汗或腫滿皆氣血未平之所為也大豆炒去皮一兩半茯神一兩真琥珀一錢上為末濃煎烏豆紫蘇湯調下五積散方見傷寒太陰經入醋煎妙第七論曰産後四肢浮腫者何答曰産後敗血乘虛停積於五臟循經流入四肢留淫日深卻還不得腐壞如水故令四肢面目浮腫醫人不識便作水氣治之凡治水氣多用導水藥極虛人夫産後既虛又以藥虛之是謂重虛往往因致夭枉但服調經散血行腫消即愈調經散沒藥別研琥珀別研桂心赤芍藥當歸各一錢細辛麝香各半錢別研上為末每取半錢匕生薑汁溫酒各少許調勻服評曰産後浮腫多端有自懷妊腫至産後不退者亦有産後失於將理外感寒暑風濕內作喜怒憂驚血與氣搏留滯經絡氣分血分不可不辨要當隨所因脈證治之宜得其情調經散治血分固效但力淺難憑不若吳茱萸湯枳朮湯奪魂散大調經散皆要藥也加減茱萸湯治婦人臟氣本虛宿挾風冷胸鬲滿痛腹脅絞刺嘔吐噁心飲食減少身面虛浮惡寒戰栗或泄利不止少氣羸困及因生産臟氣暴虛邪冷內勝宿疾轉甚吳茱萸湯洗七次炒一兩半桔梗乾薑炮甘草炙麥門冬去心半夏湯洗七次防風細辛當歸酒浸炒茯苓牡丹皮桂心各半兩上為粗末每服四錢水一盞半煎七分去滓食前熱服枳朮湯治心下堅大如盤邊如旋盤水飲所作名曰氣分枳實麩炒去瓤一兩半白朮三兩上銼散每服四錢水盞半煎七分去滓溫服腹中軟即當散也奪魂散治婦人産後虛腫喘促利小便則愈生薑三兩取汁白麵三兩半夏七個湯洗去滑破上以生薑汁搜面裹半夏為七餅子炙焦熟為末熟水調一錢小便利為效大調經散最治産後腫滿喘急煩渴小便不利方見第六論第八論曰産後乍見鬼神者何答曰心主身之血脈因虛傷耗血脈心氣則虛敗血停積上干於心心不受觸遂致心中煩躁臥起不安乍見鬼神言語顛倒醫工不識呼為血邪如此治之必不得愈但服調經散每服加龍腦一捻得睡即安調經散方見第七論每服加龍腦一捻第九論曰産後不語者何答曰人心有七孔三毛産後虛弱多致停積敗血閉於心竅神志不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故令不語如此但服七珍散七珍散人參石菖蒲川芎生乾地黃各一兩細辛一錢防風硃砂各半兩別研上為末每服一錢薄荷湯調下不以時服第十論曰産後腹痛又瀉痢者何答曰産後腸胃虛怯寒邪易侵若未滿月飲冷當風乘虛襲留於肓膜散於腹脅故腹痛作陳或如錐刀所刺流入大腸水穀不化洞瀉腸鳴或下赤白胠脅䐜脹或走痛不定急服調中湯立愈若醫者以為積滯取之則禍不旋踵謹之謹之調中湯高良薑當歸桂心芍藥附子炮川芎各一兩甘草炙半兩上為銼散每服三錢匕水三盞煎至一盞去滓熱服評曰産後下痢非止一證當隨所因而調之既云飲冷當風何所不至寒熱風濕本屬外因喜怒憂思還從自性況勞逸飢飽皆能致病若其洞泄可服調中赤白滯下非此能愈各隨門類別有正方今録桃膠散白頭翁湯以備用余從滯下門選用之沉香桃膠散治産後利下赤白裡急後重㽲刺疼痛等證桃膠瓦上焙乾沉香蒲黃紙鬲炒各等分上為末每服二錢陳米飲調下食前服白頭翁湯治産後下利虛極白頭翁甘草炙阿膠各二兩黃連柏皮去粗皮秦皮去粗皮各三兩上為銼散每服四錢水一盞半煎七分去滓空心服第十一論曰産後遍身疼痛者何答曰産後百節開張血脈流走遇氣弱則經絡分肉之間血多流滯纍月不散則骨節不利筋脈急引故腰背不得轉側手腳不能動搖身熱頭痛也若醫以為傷寒治之則汗出而筋脈動搖手足厥冷變生他病但服趁痛散以默除之趁痛散牛膝酒浸甘草炙薤白各一分當歸桂心白朮黃耆各半兩獨活半兩生薑半兩上銼散每服半兩水五盞煎至二盞去滓食前分二次熱服評曰趁痛散不特治産後氣弱血滯兼能治太陽經感風頭疼腰背痛自汗發熱若其感寒傷食憂恐驚怒皆致身疼發熱頭痛況有蓐勞諸證尤甚趁痛散皆不能療不若五積散入醋煎用卻不妨五積散方見傷寒太陰經第十二論曰産後大便祕澀者何答曰産臥水血俱下腸胃虛竭津液不足是以大便祕澀不通也若過五六日腹中悶脹者此有燥糞在臟腑以其乾澀未能出耳宜服麻仁丸以津潤之若誤以為有熱而投以寒藥則陽消陰長變動百出性命危矣麻仁丸麻仁研枳殼麩炒人參大黃各等分上為末蜜丸如梧子大空心溫酒下二十丸未通又加丸數評曰産後不得利利者百無一生去血過多臟燥大便祕澀澀則固當滑之大黃似難輕用唯蔥涎調臘茶為丸復以蔥茶下之必通阿膠枳殼丸治産後虛羸大便祕澀阿膠枳殼麩炒去瓤等分上為末蜜丸如梧子大別研滑石為衣溫水下二十丸半日來未通又服第十三論曰産後血崩者何答曰産臥傷耗經脈未得平復而勞役損動致血暴崩淋瀝不止或因鹹酸不節傷蠹榮衛氣衰血弱亦變崩中若小腹滿痛肝經已壞為難治急服固經丸以止之固經丸艾葉赤石脂煅補骨脂炒木賊各半兩附子一個炮去皮臍上為末陳米飲和丸梧子大食前溫酒米湯下二十丸評曰血崩不是輕病況産後有此是謂重傷恐不止鹹酸不節而能致之多因憂驚恚怒臟氣不平或産後服斷血藥早致惡血不消鬱滿作堅亦成崩中固經丸似難責效不若大料煮芎藭當歸加芍藥湯候定續次隨證合諸藥治之為得芎藭當歸加芍藥湯方方見眩暈門加芍藥等分第十四論曰産後腹脹悶嘔吐不定者何答曰敗血散於脾胃脾受之不能運化精微而成腹脹胃受之則不得受納水穀而生吐逆醫者不識若以尋常治脹止吐藥療之病與藥不相干轉更傷動正氣疾愈難治但服抵聖湯抵聖湯赤芍藥半夏湯洗七次澤蘭葉人參陳皮各二錢甘草炙一錢上為銼散每作一劑用水二碗生薑半兩煎至二盞去滓分三次熱服第十五論曰産後口鼻黑氣起及鼻衄者何答曰陽明者經脈之海起於鼻交頞中還出挾口交人中左之右右之左産後氣消血散榮衛不理散亂入於諸經卻還不得故令口鼻黑起及變鼻衄此緣産後虛熱變生此證其疾不可治名胃絶肺敗此證不可治不出方第十六論曰産後喉中氣急喘者何答曰榮者血也衛者氣也榮行脈中衛行脈外相隨上下謂之榮衛因産所下過多榮血暴竭衛氣無主獨聚肺中故令喘也此名孤陽絶陰為難治若惡露不快敗血停凝上熏於肺亦令喘急但服奪命丹血去喘息自定奪命丹方見第二論評曰産後喘急固可畏若是敗血上熏於肺猶可責效奪命丹若感風寒或因憂怒飲食鹹冷等奪命丹末可均濟況孤陽絶陰乎若榮血暴絶宜大料煮芎藭湯亦自可救傷風寒宜旋覆花湯性理郁發宜大調經散用桑白皮杏仁煎湯調下傷食宜見哯丸五積散芎藭湯方見眩暈門旋覆花湯治産後傷風感寒暑濕咳嗽喘滿痰涎壅塞坐臥不寧旋覆花赤芍藥半夏曲前胡荊芥穗五味子甘草炙茯苓麻黃去節湯杏仁各等分上為銼散每服四大錢水一盞半姜五片棗一枚煎七分去滓食前服大調經散方見第七論五積散方見傷寒太陰經入醋煎見哯丸方見第五論第十七論曰産後中風者何答曰産後五七日內強力下床或一月之內傷於房室或懷憂發怒擾蕩沖和或因著艾傷艾傷動臟腑得病之初眼澀口噤肌內瞤搐漸至腰脊筋急強直者不可治此乃人作非偶爾中風所得也評曰問産後中風風是外邪血虛則或有中之者直答以人作不可治問答不相領解如何開示後人立論之難有如此者若是中風當以脈辨看在何臟依經調之強力下床月內房室憂怒著灸非中風類蓐勞性氣火邪治各有法非産後病不暇繁引學者識之第十八論曰産後心痛者何答曰心者血之主人有伏宿寒因産大虛寒搏於血血凝不得消散其氣遂上衝擊於心之絡脈故心痛但以大岩蜜湯治之寒去則血脈溫而經絡通心痛自止若誤以為所傷治之則虛極寒益甚矣心絡寒甚傳心之正經則變為真心痛朝發夕死夕發朝死藥不可輕用如此大岩蜜湯干熟地黃當歸獨活吳茱萸湯乾薑炮芍藥桂心甘草炙小草各一兩細辛半兩上銼散每服半兩用水三大盞煎至一盞去滓微熱服評曰産後心痛雖非産蓐常病庸或有之九痛未必便是血痛設是岩蜜湯豈可用熟地黃熟地黃泥血安能去痛此方本出千金用生乾地黃耳茱萸一升合準五兩乾薑三兩細辛治陳寒在下焦方本一兩卻減作半兩制奇制耦量病淺深自有品數不可妄意加減然以岩蜜湯治血痛不若失笑散用之有效失笑散治心腹痛欲死百藥不效服此頓愈五靈脂蒲黃微炒各等分上末先用釅醋調二錢熬成膏入水一盞煎七分食前熱服第十九論曰産後熱悶氣上轉為腳氣若何答曰産臥血虛生熱復因春夏取涼過多地之蒸濕因足履之所以著而為腳氣其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也可服小續命湯兩三劑必愈若醫者誤以逐敗血藥攻之則血去而疾益增劇小續命湯方見中風門評曰腳氣固是常病未聞産後能轉為者往往讀千金見有産婦多此疾之語便出是證文辭害意可慨見矣設是熱悶氣上如何令服續命湯此藥本主少陽經中風非均治諸經腳氣要須依腳氣方論陰陽經絡調之此涉專門未易輕論既非産後要病更不繁引第二十論曰産後汗出多而變痓者何答曰産後血虛肉理不密故多汗因遇風邪搏之則變痓也痓者口噤不開背強而直如發癇狀搖頭馬鳴身反折須臾十發氣息如絶宜速斡口灌小續命湯稍緩即汗出如雨手拭不及者不可治小續命湯方見中風門評曰産後汗出多變痓亦令服續命湯此又難信既汗多如何更服麻黃官桂防己黃芩輩不若大豆紫湯為佳太醫局方大聖散亦良藥也大豆紫湯方見眩暈門第二十一論曰産後所下過多虛極生風若何答曰婦人以榮血為主因産血下太多氣無所主唇青肉冷汗出目暝神昏命在須臾此但虛極生風也如此則急服濟危上丹若以風藥治之則誤矣濟危上丹乳香太陰玄精五靈脂硫黃陳皮桑上寄生阿膠炙卷柏生各等分上將前四味同研勻石器內微火炒勿令焦了又研極細復入余藥為末用生地黃汁和丸梧子大溫灑或當歸酒下二十丸食前服評曰所下過多傷損虛竭少氣唇青肉冷汗出神昏此皆虛脫證何以謂之生風風是外淫必因感冒中傷經絡然後發動臟腑豈能自生風也虛之說蓋因脈經云浮為風為虛此乃兩病合說在人迎則為風在氣口則為虛後學無識便謂風虛是一病謬濫之甚學者當知保慶集二十一論人用既多因評其說仍將得效方附行外有産科諸證並序於後
