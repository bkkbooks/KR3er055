body:
  text: 卷之十三痰飲敘論人之有痰飲病者由榮衛不清氣血敗濁凝結而成也內則七情泊亂臟氣不行鬱而生涎涎結為飲為內所因外有六淫侵冒玄府不通當汗不泄蓄而為飲為外所因或飲食過傷嗜欲無度叫呼疲極運動失宜津液不行聚為痰飲屬不內外因三因所成證狀非一或為喘或為咳為嘔為泄暈眩嘈煩忪悸愪㦜寒熱疼痛腫滿攣癖癃閉痞膈如風如癲未有不由痰飲之所致也痰飲證論古方唯分四飲六證不說三因不知其因病源無自觀夫治飲之法既用大小青龍桂枝防己五苓承氣得非外因參苓苓朮八味參蘇得非內因十棗葶藶大小半夏控涎破飲不內外因里固明矣以此推求頗得倫類今敘列諸證以為治門須原本因施用湯藥學者自宜詳審所謂四飲者即懸飲溢飲支飲痰飲是也懸飲者飲水流在脅下咳唾引痛溢飲者飲水流於四肢當汗出而不汗身體疼重支飲者咳逆倚息短氣不得臥其形如腫痰飲者其人素盛今瘦腸間漉漉有聲又有留飲者背寒如手大或短氣而渴四肢癧節疼脅下痛引缺盆咳嗽則轉甚又有伏飲者膈滿喘咳嘔吐發則寒熱腰背痛目淚出其人振振惡寒身瞤惕故曰四飲生六證或云五飲者即留飲伏飲合為一證是也其脈皆弦微沉滑治之之治懸飲當下之溢飲當發其汗支飲則隨證汗下痰飲則用溫藥從小便去之其間或隨氣上厥伏留陽經使人嘔吐眩暈背寒或一臂不隨有類風狀不可不知痰飲治法十棗湯治懸飲咳唾引脅下痛又治支飲咳煩胸中痛至百日一歲其脈弦者芫花微炒甘遂大戟炒上等分為末水一盞半棗十個煎至八分去棗調藥壯人一錢羸人半錢平旦溫服不下者次日更加半錢下後糜粥自養若已下不可與之大青龍湯治溢飲身體疼重汗不出拘急痛麻黃去節湯七錢半桂心甘草炙各二錢半石膏雞子大杏仁四十個炒去皮尖上為銼散每服四大錢水一盞半姜五片棗二枚煎七分去滓空腹服溫覆一服汗者勿再服復服汗出多亡陽虛逆惡風煩躁不得眠也小青龍湯治溢飲支飲倚息不得臥及喘滿者麻黃去節湯芍藥細辛桂心乾薑炮甘草炙各三錢三字五味子二錢半夏湯洗七次三錢上為銼散每服四大錢水一盞半煎七分去滓空腹服渴者去半夏加栝蔞根三錢三字微利去麻黃加芫花一雞子大炒入噎者去麻黃加附子一枚炮小便不利者去麻黃加茯苓半兩喘者去麻黃加杏仁三錢三字咳而上氣肺脹其脈浮心下有水氣者胸中痛引缺盆加石膏二錢半研防己桂枝湯治膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈漢防己三兩桂心二兩人參四兩石膏六兩上四味為銼散每服四大錢水一盞半煮七分去滓溫服虛者即愈實者三日復發再服不愈宜去石膏加茯苓四兩芒硝一兩半微利則愈小承氣湯治支飲胸滿厚朴四兩薑製大黃二兩蒸枳實一兩麩炒去瓤上為銼散每服四大錢水一盞半煎七分去滓不以時加減茯苓五味子湯治支飲手足冷多唾口燥氣從小腹上衝胸咽手足痹面熱翕然如醉因復下流陰股小便難時復眩冒嘔腫茯苓四兩桂心甘草炙各三兩五味子二兩半上為銼散每服四大錢水一盞半煎七分去滓空腹服服之沖氣即低反更咳滿者去桂加乾薑細辛各三兩咳滿止而復渴沖氣更發者以細辛乾薑為熱藥服之當遂渴反止者為支飲也支飲法當冒冒者必嘔嘔者復加半夏二兩半以去其飲飲去嘔則止其人形腫與痹加杏仁二兩半若面赤如醉以胃中熱上熏加大黃三兩須詳證加減大半夏湯治膈間有飲卒嘔吐心下痞眩悸半夏五兩湯洗茯苓三兩上為銼散每服四大錢水二盞姜七片煎七分去滓溫服小半夏湯治支飲嘔吐不渴半夏湯洗七次上為銼散每服四大錢水二盞姜十片煎七分去滓溫服葶藶大棗瀉肺湯治支飲不得息方見肺癰門五苓散治瘦人臍下有悸者挾涎沫而癲眩者飲也方見傷暑門茯苓湯治心氣不行鬱而生涎胸脅支滿目眩以胸中有痰飲也茯苓四兩桂心白朮各三兩甘草炙二兩上為銼散每服四大錢水一盞半煎七分去滓空腹服小便利即愈參苓飲治胸中停痰宿水自吐出痰後心胸間虛氣滿不能食茯苓人參白朮各三兩枳實麩炒去瓤二兩橘皮一兩半上為銼散每服四大錢水二盞姜三片煎七分去滓空腹溫服八味丸治失志腎虛鬱而生涎短氣喘咳當從小便去之中有茯苓故方見消渴參蘇飲治痰飲停積胸中中脘閉嘔吐痰涎眩暈嘈煩忪悸噦逆及痰氣中人停留關節手足嚲曳口眼喎斜半身不遂食已即嘔頭疼發熱狀如傷寒前胡人參紫蘇葉茯苓各三分桔梗木香各半兩半夏湯陳皮枳殼炒甘草炙各半兩上為銼散每服四錢水一盞半姜七片棗一枚煎至七分去滓空腹服噦者加乾葛腹痛加芍藥破飲丸治五飲停蓄胸腹結為癥癖支滿胸脅傍攻兩脅搶心疼痛飲食不下反胃吐逆九種心痛積年宿食不消久瘧久痢遁屍疰忤癲癇厥暈心氣不足憂愁思慮婦人諸疾但是腹中諸病悉能治療久服不傷臟氣蓽茇丁香胡椒縮砂仁烏梅肉青皮巴豆去皮木香蠍梢等分上以青皮同巴豆漿水浸一宿次日漉出同炒青皮焦去巴豆將所浸水淹烏梅肉炊一熟飯細研為膏丸如綠豆大每服五七丸臨臥薑湯下津液下尤佳控涎丹凡人忽患胸背手腳頸項腰胯隱痛不可忍連筋骨牽引釣痛坐臥不寧時時走易不定俗醫不曉謂之走注便用風藥及針灸皆無益又疑是風毒結聚欲為癰疽亂以藥貼亦非也此乃是痰涎伏在心鬲上下變為此疾或令人頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠黏夜間喉中如鋸聲多流睡涎手腳重腿冷痹氣脈不通誤認為癱瘓亦非也凡有此疾但以是藥不過數服其疾如失甘遂去心紫大戟去皮白芥子真者各等分上為末煮糊丸如梧子大曬乾食後臨臥淡薑湯或熟水下五七丸至十丸如疾猛氣實加丸數不妨其效如神強中丸治胃脘虛寒冷痰留滯痞塞不通氣不升降口苦無味不思飲食高良薑乾薑炮陳皮青皮各一兩半夏湯洗去滑二兩一法上件並不持擇上為末用生薑自然汁煮麵糊為丸如梧子大每服二十丸至三十丸生薑湯下凡中滿氣痞服之甚妙凡例前證用藥多出漢方但古科劑與今不同已詳酌改從今用其如校定備見前說唯外所因證候難明風燥寒凝暑爍濕滯皆能閉諸絡鬱而生涎不待飲水流入四肢而致支溢疼痛也當以理推無膠軌轍喘脈證治夫五臟皆有上氣喘咳但肺為五臟華蓋百脈取氣於肺喘既動氣故以肺為主病者右手寸口氣口以前脈陰實者手太陰經肺實也肺必脹上氣喘逆咽中塞如與嘔狀自汗皆肺實證若氣口以前脈虛者必咽乾無津少氣不足以息此乃肺虛氣乏也杏參散治上氣喘滿倚息不能臥杏仁桃仁並麩炒去皮尖桑白皮蜜炙三度白泔浸一宿控干各一兩人參一兩上為細末每服二錢水一盞姜三片棗一個煎七分不以時神秘散定喘補心腎下氣阿膠一兩三分炒雞䏶胵兩半白仙茆半兩米泔浸三宿曬乾炒團參一分上為末每服二錢糯米飲調空腹服真應散治遠年喘急不能眠臥百藥無效者白石英四兩通明者以生絹袋盛用雄豬肚一個以藥入線縫定煮熟取藥出再換豬肚一個如前法煮三煮了取藥出控乾研上為末以官局款冬花散二錢入藥末二錢更桑白皮二寸生薑三片棗子一個水一盞半煎至七分通口服豬肚亦可吃只不得用醬醋鹽椒姜等調和麥門冬湯治火逆上氣喘急咽喉不利止逆下氣麥門冬去心一兩一錢半夏湯洗六錢一字人參一分甘草炙一分粳米二錢上為粗散每服四大錢水三盞棗二個煎六分去滓空心服清肺湯治上氣脈浮咳逆喉中如雞聲喘息不通呼吸欲絕紫菀茸杏仁去皮尖訶子煨去核各二兩漢防己一兩上為銼散每服四錢水一盞半雞子白皮一片煎七分去滓食後服神秘湯治上氣不得臥橘皮桔梗紫蘇人參五味子各等分上為銼散每服四錢水一盞煎六分去滓食後皺肺丸貝母炒知母秦艽阿膠炒款冬花紫菀茸百部去心糯米炒各一兩杏仁去皮尖別研四兩上為末將羊肺一個先以水灌洗看容得水多少即以許水更添些煮杏仁令沸濾過灌入肺中系定以糯米泔煮熟研細成膏搜和前藥末杵數千下丸如梧桐子大每服五十丸食前桑白皮湯下理氣丸治氣不足動便喘咳遠行久立皆不任汗出鼻乾心下急痛苦悲傷臥不安杏仁去皮尖麩炒別研桂枝去皮各一兩益智去皮乾薑炮各二盛上為末蜜丸如梧桐子大以鍾乳粉為衣每服三十丸空腹米湯下黑錫丹方見眩暈門白散子方見中風門二藥皆可用肺痿肺癰敘論肺為五臟華蓋百脈取氣運動血脈衛養臟腑灌注皮毛將理失宜氣與血亂則成肺痿肺癰矣然五臟皆有痿癰而獨論此者以肺屬金數盡於陽九位最高而為五臟長多致此病故獨論此余如內癰及五痿說又此病多生喘咳故列於痰飲喘咳云肺痿證治病者寸口脈數而虛按之澀身冷內煩多唾唇燥小便反難大便如爛瓜豚腦狀欲咳不咳咳出干沫唾中出血心中溫溫液液上氣喘滿或燥而渴者多因發汗利小便或嘔吐消渴數服快藥重亡津液致熱在上焦故成肺痿甘草乾薑湯治肺痿多涎唾小便數肺中冷必眩不渴不咳必遺溺所以然者上虛不能制下也甘草炙四兩乾薑二兩炮上為銼散每服四錢水一盞半棗三個煎七分去滓溫服不拘時候人參甘草湯治肺痿咳唾涎沫不止咽燥而渴人參一兩甘草炙一兩三錢上為銼散每服四錢水一盞半姜五片棗三個煎七分去滓溫服溫液湯治肺痿涎唾多出血心中溫溫液液甘草炙上為銼散每服四錢水一盞半煎七分去滓溫服肺癰證治病者寸口脈數而實按之滑咳唾膿血口中辟辟燥胸中隱隱痛口乾喘滿咽燥不渴多唾濁沫腥臭時時振寒熱之所過血為凝滯蓄結癰膿吐如米粥故為肺癰始萌可救膿成則難治葶藶大棗瀉肺湯治肺癰胸滿脹一身並面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶藶炒令黃研細丸如彈子大上一味用水三盞煮棗十枚至一盞去棗入藥煎至七分食後服金匱令先投小青龍湯三服乃進此藥小青龍湯方見痰飲門如聖湯治咳而胸滿振寒脈數滑咽乾不渴時出濁唾腥臭久久吐膿若粥者為肺癰桔梗一兩甘草炙二兩上為銼散每服四錢水一盞煎七分去滓不以時服兼治喉痹咽痛葦葉湯治肺癰薏苡仁瓜瓣仁桃仁去皮尖各一兩上為銼散每服四大錢水二盞先以葦葉一握煎取一盞去滓入藥煎六分食後服或吐膿血勿怪腰痛敘論夫腰痛雖屬腎虛亦涉三因所致在外則臟腑經絡受邪在內則憂思恐怒以至房勞墜墮皆能致之方書五種之說未為詳論但去聖逾遠文籍簡脫難以討論雖是缺文不可棄置隨其有無提其綱目庶幾後學以類推尋為治療之典據耳外因腰痛論太陽腰痛引項脊尻背如重狀陽明腰痛不可以顧顧則如有所見善悲少陽腰痛如針刺其皮循循然不可俯仰不可以顧太陰腰痛煩熱腰下如有橫木居其中甚則遺溲少陰腰痛痛引脊內厥陰腰痛腰中強急如張弩弦狀此舉六經以為外因治備大抵太陽少陰多中寒少陽厥陰多中風熱太陰陽明多燥濕以類推之當隨脈別其如經中有解脈散脈同陰會陰陽維衡絡直陽飛陽肉裡尻交等穴皆不出六經流注但別行各有所主不欲繁引請尋內經刺腰痛論以備明之准此從所因汗下施治內因腰痛論失志傷腎鬱怒傷肝憂思傷脾皆致腰痛者以肝腎同系脾胃表裡脾滯胃閉最致腰痛其證虛羸不足面目黧黑遠行久立力不能盡失志所為也腹急脅脹目視䀮䀮所祈不得意淫於外宗筋弛縱及為白淫鬱怒所為也肌肉濡漬痹而不仁飲食不化腸胃脹滿閃墜腰脅憂思所為也准此從內所因調理施治不內外因腰痛論腎著腰痛腰冷如冰身重不渴小便自利食飲如故腰以下冷重如帶五千錢因作勞汗出衣里冷濕久久得之䐴公對切腰痛者傴僂腫重引季脅痛因於墜墮惡血流滯及房勞疲力耗竭精氣致腰疼痛准此從不內外因補瀉施治腰痛治法獨活寄生湯夫腰痛皆由腎氣虛弱臥冷濕地當風所得不時速治喜流入腳膝為偏枯冷痹緩弱疼重或腰痛攣腳重痹宜急服此獨活三兩桑生古今錄驗用續斷即寄生亦名非正續斷也杜仲制炒斷絲細辛去苗牛膝酒浸秦艽去土茯苓白芍藥桂心不見火芎藭防風去蘆甘草炙人參熟地黃當歸各二兩上為銼散每服四大錢匕水二盞煎七分去滓空腹服氣虛下利除地黃並治新產腹痛不得轉動及腰腳攣痛痹弱不得屈伸此湯最除風消血肘後有附子一枚無寄生人參甘草當歸近人將治癧節風並腳氣流注甚效小續命湯治風腰痛最妙方見中風門加桃仁炒去皮尖牛膝酒唐筠州刺史王紹顏傳信方云頃年予在姑蘇得腰痛不可忍醫以腎傷風毒攻刺此方即制一劑服之便減五分步履漸輕牛膝川芎羌活地骨皮五加皮薏苡仁各一兩甘草生地黃十兩海桐皮二兩上為銼散帛裹入無灰酒二斗浸冬二七日夏月分數服旋浸三五宿每服一杯日三四杯長令酒氣不絕為佳一法入杜仲一兩炒絲斷入杜仲酒風冷傷腎腰痛不能屈伸並補腎虛杜仲一斤切薑汁製炒去絲斷上用無灰酒三升浸十日每服二三合日四五服一方為末溫酒調一錢空心服腎著湯治腎虛傷濕停著為病身重腰冷如水洗狀不渴小便自利食飲如故腰以下冷痛重如帶五千錢乾薑炮茯苓各四兩一法茯苓白朮四兩乾薑甘草二兩甘草炙白朮各二兩上為銼散每服四大錢水一盞半煎七分空腹冷服又治體虛自汗甚效鹿角丸治腎虛傷冷冷氣入腎其痛如掣鹿角屑一兩酥炙方附子炮二兩桂心三分上為末酒糊丸如梧子大鹽酒下三五十丸空心服安腎丸治腎虛腰痛陽事不舉膝骨痛耳鳴口乾面色黧黑耳輪焦枯補骨脂炒葫蘆巴炒茴香炒川楝炒續斷炒各三兩桃仁麩炒去皮尖別研杏仁如上法山藥炒切茯苓各二兩上為末蜜丸如梧子大鹽湯五十丸空心服青娥丸治肝腎虛腰膇重痛並治風濕腳氣常服壯筋補虛填精益髓杜仲一斤炒生薑十兩炒破故紙一斤炒上為末用胡桃肉一百二十個湯浸去皮研成膏入少熟蜜丸如梧子大每服五十丸鹽酒鹽湯任下食前服神應丸治腎經不足風冷乘之腰痛如折或引背膂俯仰不利轉側亦難或役用過度勞傷於腎或寢臥冷濕地氣傷腰或墜墮傷損並宜服之威靈仙去土二兩桂心當歸各一兩上為末以酒煮糊丸如梧子大每服三五十丸煎茴香湯或炒茴香酒下食前服婦人煎桂心湯下有孕婦人不得服一方添破故紙桃仁地膚子等分立安丸治五種腰痛常服補腎強腰腳治腳氣破故紙生續斷木瓜干牛膝酒浸杜仲去皮銼薑製炒絲斷各一兩萆薢二兩上為末蜜丸如梧子大每服五十丸鹽湯鹽酒任下五積散治感寒濕與脾胃氣蔽腰痛最效方見傷寒加桃仁煎熟大黃湯治墜墮閃肭腰痛不能屈伸大黃切如豆大生薑各半兩切上同炒令焦黃以水一大盞浸一宿五更去滓頓服天明所下如雞肝者即惡物出橘子酒治打撲腰痛惡血蓄瘀痛不可忍橘子炒去皮上一味研細每服二錢匕酒調服未知再作或用豬腰子一隻去筋膜破開入藥同蔥白茴香鹽濕紙裹煨熟細嚼溫酒下桃仁酒治腎虛風勞所傷毒腫掣痛牽引小腹連腰痛桃仁麩炒去皮尖上一味研細每服抄四錢匕熱酒調下即汗愈虛損證治難經論損從皮毛至於筋骨者此乃辨氣脈淺深次第也原其所因屬不內外或大病未復便合陰陽或疲極筋力飢飽失節盡神度量叫呼走氣所以諸證蜂起百病交作吐血衄血便血瀉血遺泄白濁冷滑洞瀉白汗黃汗嘔吐咯啘涎沫痰飲遂使榮衛走本虛羸損傷皆自此始蓋由背於人身常理而致然也況婦人產蓐過於大病虛損尤多不可不知列而論之證狀非一姑舉數條以為治備要當考尋脈理推其元氣胃氣資始資成扶助陰陽辨別標本蓋不可隨證冷熱妄行施治要論曰粗工嘻嘻以為可之言熱未已寒病復始同證異形迷氣亂經學者謹之精思有靈正元散大治元氣虛臍腹脹滿心脅刺痛泄利嘔吐自汗陽氣漸微手足厥逆及傷寒陰證霍亂轉筋久下冷利少氣羸困一切虛寒方見自汗門麝香鹿茸丸治精氣耗散血少不增陽道不興服此調榮衛利腰腳補精血主諸虛百病鹿茸酥炙一兩半熟地黃一兩沉香三分麝香一兩別研上為末入麝香研勻蜜丸梧子大空心溫酒鹽湯任下三十丸大山芋丸治諸虛百損五勞七傷肢體沉重骨節痠疼心中煩悸唇口乾燥面體少色情思不樂咳嗽喘乏傷血傷氣夜多異夢盜汗失精腰背強痛臍腹弦急嗜臥少起善驚多忘飲食減少肌肉瘦瘁又治風虛頭目眩暈心神不寧及病後氣不復常漸成勞損久服補不足愈風氣百病山芋七兩半當歸桂心神麯炒熟地黃大豆卷各二兩半甘草人參一兩七錢川芎芍藥白朮麥門冬去心杏仁麩炒去皮各一兩半柴胡白茯苓桔梗各一兩一分阿膠麩炒一兩七錢半乾薑炮三分白蘞半兩防風去叉一兩半棗一百個炊去皮核上為末蜜丸與棗肉同和丸如彈子大每服一丸溫酒米湯任嚼下加琥珀一兩遠志去心炒二兩茯苓二兩半即是養心丹虛勞遺泄白濁加龍骨二兩羊肉丸治真陽耗竭下元傷憊耳輪焦枯面色黧黑腰重腳弱陽事不興常服壯元陽補真氣益精駐顏補骨脂炒葫蘆巴炒茴香炒川楝炒續斷附子炮去皮臍茯苓各三兩桃仁麩炒去皮尖別研杏仁同上法炒山藥炒各二兩上為末精羊肉四兩酒煮研細入面煮糊丸如梧子大鹽湯溫酒空心任下三五十丸大補丸治元臟虛憊血氣不足白濁遺泄自汗自利口苦舌乾四肢羸瘦婦人諸虛皆主之木香炮附子炮去皮臍茴香炒蓯蓉酒浸川椒炒去汗各十兩桃仁炒去皮尖葫蘆巴牛膝酒浸巴戟去心五味子黃耆白蒺藜炒去刺澤瀉各五兩羌活檳榔天麻川芎桂心各二兩上為末蜜丸梧子大鹽湯酒空腹任下三五十丸菟絲子丸治腎氣虛損五勞七傷小腹拘急四肢痠疼面色黧黑唇口乾燥目暗耳鳴心忪氣短夜夢驚恐精神困倦喜怒無常悲憂不樂飲食無味舉動乏力心腹脹滿腰膝緩弱小便滑數房室不舉股內濕癢水道澀痛小便出血時有遺瀝菟絲子酒浸桂心不焙鹿茸去毛切酥炙附子炮去皮臍澤瀉石龍芮去土各一兩蓯蓉酒浸杜仲去皮切薑汁製炒絲斷茯苓熟地黃巴戟去心山茱萸蓽澄茄沉香茴香炒補骨脂炒石斛牛膝酒浸續斷川芎五味子覆盆子桑螵蛸酒浸炒各半兩上為末酒糊丸如梧子大每服三十丸溫酒鹽湯任下腳膝無力木瓜湯下淋閉木通湯下妙應丹治脾元氣弱久積陰冷心腹滿痛面色青黃肌體瘦弱怠惰嗜臥食少多傷噫氣吞酸噦逆噁心腹中虛鳴大便泄利胸膈痞塞食飲不下霍亂嘔吐肌冷轉筋及五膈五噎久痛久痢方見癥瘕門增損樂令湯治諸虛不足小腹急痛脅肋䐜脹臍下虛滿胸中煩悸面色痿黃唇乾口燥手足逆冷體常自汗腰背強急骨肉痠疼咳嗽喘乏不能飲食或因勞傷過度或因病後不復黃耆人參橘皮當歸桂心細辛前胡甘草炙茯苓麥門冬去心芍藥各二兩附子炮去皮臍熟地黃各一兩半夏湯洗二兩半遠志三分去心上為銼散每服四錢水一盞半姜五片棗二個煎七分去滓食前服腹滿食少去棗下焦虛冷不甚渴小便數者倍人參當歸附子煩渴引飲加栝蔞根遺泄白濁加龍骨白蘞小腹急引心痛者加乾薑養榮湯治積勞虛損四肢沉滯骨肉痠疼吸吸少氣行動喘咳小便拘急腰背強痛心虛驚悸咽乾唇燥飲食無味陰陽衰弱悲憂慘慼多臥少起久者積年急者百日漸至瘦削五臟氣竭難可振復又治肺與大腸俱虛咳嗽下利喘乏少氣嘔吐痰涎黃耆當歸桂心甘草炙橘皮白朮人參各一兩白芍藥三兩熟地黃五味子茯苓各三分遠志去心炒半兩上為銼散每服四大錢水一盞半姜三片棗二個煎至七分去滓空腹服便精遺泄加龍骨一兩咳嗽加阿膠甚妙十補丸治真氣虛損下焦傷竭臍腹強急腰腳疼痛亡血盜汗遺泄白濁大便自利小便滑數或三消渴疾飲食倍常肌肉消瘦陽事不舉顏色枯槁久服補五臟行榮衛益精髓進飲食附子炮去皮臍乾薑炮桂心菟絲子酒浸軟別研厚朴去皮炒薑製巴戟去心遠志去心薑汁浸炒破故紙炒赤石脂煅各一兩川椒炒出汗去子併合口者二兩上為末酒糊丸如梧子大溫酒鹽湯任下遠志丸治心腎氣不足驚悸健忘夢寐不安遺精面少色足脛痠疼遠志去心炒山藥炒熟地黃天門冬去心龍齒水飛各六兩麥門冬去心五味子車前子炒白茯苓茯神去木地骨皮桂心各五兩上為末蜜丸梧子大每服三十丸至五十丸空心溫服酒米湯任下張走馬家秘真丹治房室過度或用意思維精泄自出腰背痠弱不能屈伸食不生肌兩腳㾓痛不能步履草烏頭或用川烏牡蠣粉炒烏頭一兩令裂去皮臍牡蠣不用五倍子半兩上為末糯米糊丸如梧子大空腹鹽湯下三五十丸蓮子丹治真氣虛憊口苦舌乾心常慘慼夜多異夢晝少精神或夢鬼交通遺泄白濁小便餘瀝陽事不舉目暗耳鳴面色黧黑新蓮肉四兩去心皮白龍骨一兩醋煮甘草一分上為末車前草汁入面少許煮麵糊丸如綠豆大每服三五十丸鹽湯酒任下家韭子丸方證見遺尿門威喜丸治精氣不固餘瀝常流小便白濁夢中頻泄及婦人血海久冷白帶白漏白淫身常濕小便如米泔或無子息白茯苓四兩木豬苓一分去皮煮茯苓數十沸黃蠟四兩上只以茯苓一味為末熔黃蠟為丸彈子大空心細嚼令口生津徐咽兼治兩耳虛鳴口乾鎖陽丹治脫精泄不禁桑螵蛸三兩瓦上焙燥龍骨一兩別研白茯苓一兩上為末麵糊為丸梧子大每服七十丸煎茯苓鹽湯下食前服一方用茯苓豬苓木饅頭和皮子切各等分為末又方用破故紙青鹽槌碎等分同炒香為末並每服二錢米飲調下十四友丸補心腎虛怔忪昏憒神志不寧睡臥不安故經曰臟有所傷情有所倚人不能懸其病則臥不安當歸洗熟地黃白茯苓白茯神去木人參黃耆阿膠蛤粉炒酸棗仁炒柏子仁別研紫石英同上遠志酒浸洗去心酒灑蒸炒乾肉桂各一兩辰砂一分別研龍齒二兩別研上為末別研五味蜜丸如梧子大每服三十丸食後棗湯下宣和賜耆絲丸治少年色欲過度精血耗竭心腎氣憊遺泄白濁腰背疼痛面色黧黑耳聾目昏口乾腳弱消渴便利夢與鬼交陽事不舉當歸酒浸焙軋半斤菟絲子酒浸去土乘濕研破焙乾秤一斤薏苡仁茯神去木石蓮肉去皮鹿角霜熟地黃各四兩上為末用耆二斤錐碎水六升浸一宿次早挼洗味淡去滓於銀石器中熬汁成膏搜和得所搗數千杵丸如梧子大每服五十丸加至百丸米湯溫酒任下空心食前服常服守中安神禁固精血益氣駐顏延年不老參香散治心氣不寧諸虛百損肢體沉重情思不樂夜多異夢盜汗失精恐怖煩悸喜怒無時口乾咽燥渴欲飲水飲食減少肌肉瘦瘁漸成勞瘵常服補精血調心氣進飲食安神守中功效不可盡述人參黃耆白茯苓白朮山藥蓮肉去心各一兩縮砂仁烏藥橘紅乾薑炮各半兩甘草炙三分南木香丁香檀香各一分沉香二錢上為粗末每服四錢水一大盞姜三片棗子一個煎七分去滓食前服一法有炮熟附子半兩
