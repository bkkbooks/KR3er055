body:
  text: 卷之三敘痹論夫風濕寒三氣雜至合而為痹雖曰合痹其用自殊風勝則為行痹寒勝則為痛痹濕勝則為著痹三氣襲人經絡入於筋脈皮肉肌膚久而不已則入五臟凡使人煩滿喘而吐者是痹客於肺煩心上氣嗌乾恐噫厥脹滿者是痹客於心多飲數小便小腹痛如懷妊夜臥則驚者是痹客於肝善脹尻以代踵脊以代頭者是痹客於腎四肢解惰發咳嘔沫上為大塞者是痹客於脾又有腸痹者數飲而小便不利中氣喘急時發飧泄又胞痹者小腹按之內痛若沃以湯澀於小便上為清涕又六腑各有俞風寒濕中其俞而食飲應之故循俞而入各舍其腑治之隨其腑俞以施針灸之法仍服逐風濕寒發散等藥則病自愈大抵痹之為病寒多則痛風多則行濕多則著在骨則重而不舉在脈則血凝不流在筋則屈而不伸在肉則不仁在皮則寒逢寒則急逢熱則縱又有血痹以類相從附於此門外有支飲作痹見痰飲門合痹治法附子湯治風濕寒痹骨節疼痛皮膚不仁肌肉重著四肢緩縱附子生去皮臍白芍藥桂心甘草白茯苓人參各三分白朮一兩上為銼散每服四錢水三盞煎七分去滓食前服黃耆五物湯治尊榮人骨弱肌重因疲勞汗出臥不時動搖加以微風遂作血痹脈當陰陽俱微尺中少緊身體如風痹狀黃耆芍藥桂心各等分上為銼散每服四大錢水二盞姜五片棗三枚煎七分去滓食前服黃耆酒治風濕寒痹舉體腫滿疼痹不仁飲食惡冷澀澀惡寒胸中痰滿心下塞方見中風門癧節論夫癧節疼痛不可屈伸身體尫羸其腫如脫其痛如掣流注骨節短氣自汗頭眩溫溫欲吐者皆以風濕寒相搏而成其痛如掣者為寒多腫滿如脫者為濕多癧節黃汗出者為風多顧病源所載飲酒當風汗出入水遂成斯疾原其所因雖涉風濕寒又有飲酒之說自屬不內外因亦有不能飲酒而患此者要當推求所因分其先後輕重為治久而不治令人骨節蹉跌變為癲病不可不知癧節治法芍藥知母湯治諸肢節疼痛身體尫羸腳腫如脫頭眩短氣溫溫欲吐桂心知母防風各四兩芍藥甘草炙麻黃去節附子炮去皮臍各三兩上為銼散每服四錢水一盞半姜五片煎七分去滓空腹服一法有白朮川芎杏仁半夏烏頭湯治病癧節痛不可屈伸烏頭五枚銼以蜜二升煎取一升去烏頭甘草炙麻黃去節芍藥黃耆上為銼散每服四錢水二盞煎至七分去滓投前蜜煎一合空腹溫服千金有老薑桂心大棗無黃耆麻黃治寒疝腹中絞痛賊風入腹攻五臟拘急不得轉側叫呼發作有時使人手足厥冷附子八物湯治風癧節四肢疼痛如槌鍛不可忍附子炮去皮臍乾薑炮芍藥茯苓甘草炙桂心各三兩白朮四兩人參三兩上為銼散每服四大錢水二盞煎七分去滓食前服一方去桂心用乾地黃二兩獨活寄生湯最治癧節風近人用之甚效亦治腰背痛及腳氣流注方見腰痛門敘腳氣論夫中風寒暑濕與腳氣皆漸頓淺深之不同中風寒暑濕得之頓而淺腳氣得之漸而深以其隨臟氣虛實寒熱發動故得氣名其如循經絡入腑臟證候雖不一然三陽多熱躁三陰多熱煩亦可類推但腳氣不專主一氣亦不專在一經故與中風寒暑濕為異耳兼有續生諸病混雜多端未易分別治之須尋其經絡病證所在去處然後以脈察其虛實淺深為治假如三陽經其診多在足外踝及手背三陰經其診多在足內踝及臂內以此粗分陰陽可知大概矣其如風寒暑濕性用各各不同所謂風為行寒為痛暑為頑濕為著乃不刊之說千金方論與董氏顓門類皆蹈襲舊說似難憑據惟留心斯道者必有至當之論焉敘千金論千金論腳氣皆由感風毒所致多不令人即覺會因他病乃始發動或奄然大悶經三兩日方乃覺之庸醫不識謾作余疾治之莫不盡斃緣始覺甚微食飲嬉戲氣力如故惟卒起腳屈弱為異耳及論風毒相貌云夫有腳未覺異而頭項臂膊已有所苦諸處皆悉未知而心腹五內已有所困或見食嘔吐憎聞食臭或腹痛下利或大小便祕澀或胸中衝悸不欲見光明或精神昏憒語言錯亂或壯熱頭痛或身體酷冷疼煩或覺轉筋或腫或䏶腿頑痹或時緩縱不隨或復百節攣急或小腹不仁皆謂腳氣狀貌也乃至婦人産後取涼多中此毒其熱悶掣縱驚悸心煩嘔吐氣上臍下冷痞愊愊然不快兼小便淋瀝不同生平皆是腳氣之候頑弱為緩風疼痛為濕痹上件千金節文但備敘諸證不說陰陽經絡所受去處亦不分風濕寒熱四氣及內臟虛實所因後學從何為治若一向信書不若無書為愈此之謂也腳氣脈證腳氣證狀固多但當以脈診分其陰陽使無差互所謂脈浮為風緊為寒緩細為濕洪數為熱見於諸陽病在外宜發散之愈沉而弦者亦為風沉而緊者為寒沉細為濕沉數為熱見諸陰病在裡宜溫利之愈外證自汗走疰為風勝無汗疼痛攣急為寒勝腫滿重著為濕勝煩渴熱頑為暑勝四氣兼有但推其多者為勝治之當以諸證互辨而分表裡寒則溫之熱則寒之在表則散在裡則下若太虛氣乏間作補湯隨病冷熱而用之不可拘不得服補藥敘太陽經腳氣證病者頭痛目脫項強腰脊連體樞循髀外出外踝之後循京骨至小指外側皆痛者乃足太陽膀胱經為風寒暑濕流注自汗者為風勝無汗疼痛為寒勝熱頑為暑勝重著腫滿為濕勝諸經皆當如此推凡太陽經宜隨四氣發散愈太陽經腳氣治法麻黃左經湯治風寒暑濕流注足太陽經手足攣痹行步艱難憎寒發熱無汗惡寒或自汗惡風頭疼眩暈腰重關節痛麻黃去節乾葛細辛白朮切米泔浸茯苓防己桂心不見火羌活防風甘草炙各等分上為粗末每服四錢水二盞姜三片棗一個煎七分去滓空腹服自汗去麻黃加桂芍藥重著加朮橘皮無汗減桂加杏仁澤瀉所加並等分陽明經腳氣證病者悽悽寒熱呻缺口鼻乾腹脹髀膝臏中循胻外廉下足跗入中指內間皆痛者乃足陽明胃經為風寒暑濕流注之所為四氣偏勝並如上說治之宜隨四氣微利之陽明經腳氣治法大黃左經湯治風寒暑濕流注足陽明經使腰腳痹痛行步艱難涎潮昏塞大小便祕澀腹痛嘔吐或復下利惡聞食氣喘滿肩息或自汗譫妄大黃蒸細辛去苗茯苓防己羌活黃芩前胡枳殼麩炒去瓤厚朴去皮銼薑製炒甘草炙杏仁麩炒去皮尖別研各等分上銼散每服四大錢水盞半姜三片棗一個煎七分去滓空腹熱服腹痛加芍藥祕結加阿膠喘加桑白皮紫蘇小便祕加澤瀉四肢瘡癢浸淫加升麻所加並等分荷葉藁本湯治腳脛生瘡浸淫腿膝膿汁淋漓熱痹痛癢乾荷葉四張藁本一分上為銼散以水二斗煎減五升去滓溫暖得所淋泄仍服前大黃左經湯佳少陽經腳氣證病者口苦善太息脅痛面垢體無膏澤頭頷目兌皆痛缺盆並腋下馬刀腫自汗振寒發熱胸中脅肋髀膝外至胻絶骨外踝及諸節指皆痛者乃足少陽膽經為風寒暑濕流注之所為四氣偏勝例如前說治之宜隨四氣和解少陽經腳氣治法半夏左經湯治足少陽經為風寒暑濕流注發熱腰脅痛頭疼眩暈嘔吐宿汁耳聾驚悸熱悶心煩氣上喘滿肩息腿痹緩縱不隨半夏湯去滑乾葛細辛白朮茯苓桂心不見火防風乾薑炮黃芩小草甘草炙柴胡麥門冬去心各三分上銼散每服四大錢水一盞半姜三片棗一個煎七分去滓空腹服熱悶加竹瀝每服半合喘滿加杏仁桑白皮料簡三陽併合腳氣證三陽經有並有合如太陽並少陽少陽並陽明陽明並太陽三陽合病皆於經絡中推考其診隨證治之所謂並者二經相併合者三經會合以此強分使名義易曉不必論其一二也三陽併合腳氣證治法病者憎寒壯熱自汗惡風或無汗惡寒暈眩重著關節掣痛手足拘攣疼痛冷痹緩縱不隨心躁氣上嘔吐下利此皆三陽經中風寒暑濕其脈必浮弦緊數大料神祕左經湯治風寒暑濕流注足三陽經手足拘攣疼痛行步艱難憎寒發熱自汗惡風頭眩腰重關節掣痛或卒中昏塞大小便祕澀或腹痛嘔吐下利惡聞食臭髀腿頑痹緩縱不隨熱悶驚悸心煩氣上臍下冷痹喘滿肩息麻黃去節乾葛細辛厚朴薑製炒茯苓防己枳殼麩炒去瓤桂心羌活防風去叉柴胡黃芩小草即遠志苗白姜炮半夏湯洗去滑甘草麥門冬去心各等分上銼散每服四大錢水盞半姜三片棗一個煎七分去滓空腹服自汗加牡蠣白朮去麻黃腫滿加澤瀉木通熱甚無汗減桂加橘皮前胡升麻腹痛吐利去黃芩加芍藥附子炮大便祕加大黃竹瀝喘滿加杏仁桑白皮紫蘇所加並等分凡有此病詳認證狀逐一加減無不愈者常服下氣消痰散風濕退腫進飲食令人不虛江南諸師固祕此方雖父子兄弟不傳學者當敬用之加味敗毒散治三陽經腳氣流注腳踝上焮熱赤腫寒熱如瘧自汗惡風或無汗惡寒羌活獨活前胡柴胡枳殼麩炒去瓤桔梗甘草炙人參茯苓川芎大黃蒸蒼朮米泔浸各等分上銼散每服四大錢水盞半姜三片薄荷一頭煎七分去滓熱服不過二服愈皮膚瘙癢赤疹加蟬蛻煎太陰經腳氣證兼治法病者腹滿夾咽連舌系急胸膈痞滿循胻骨下股膝內前廉內踝過核骨後連足大指之端內側皆痛者乃足太陰脾經為四氣流注之所為也四氣偏勝並如前說治之各隨其氣所中輕重溫散之六物附子湯治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利惡風怯寒頭面手足時時浮腫附子炮去皮臍桂心各四兩白朮三兩甘草炙二兩防己四兩茯苓三兩上銼散每服四錢水二盞姜七片煎七分去滓溫服少陰經腳氣證兼治法病者腰脊痛小指之下連足心循內踝入跟中上腨內出膕中內廉股內皆痛上衝胸咽飢不能食面黑小便淋閉咳唾不已善恐心惕惕若人將捕之狀小腹不仁者難治足少陰腎經為四氣流注之所為也四氣偏勝並如前說治之各隨其氣所中輕重而溫之八味丸治少陰腎經腳氣入腹小腹不仁上氣喘急嘔吐自汗此證最急以腎乘心水剋火死不旋踵牡丹皮澤瀉茯苓各三兩附子炮去皮臍桂心各二兩山茱萸山藥各四兩熟地黃八兩上為末煉蜜丸梧子大每服五十丸溫酒米湯食前任下厥陰經腳氣證兼治法病者腰脅偏疼從足大指連足跗上廉上膕至內廉循股環陰氣抵小腹夾臍諸處脹痛兩腳攣急嗌乾嘔逆洞泄者足厥陰肝經為四氣流注之所為也四氣偏勝並如前說治之各隨其氣所中輕重調理之神應養真丹治厥陰肝經為四氣進襲肝臟左癱右瘓涎潮昏塞半身不遂手足頑麻語言謇澀頭旋目眩牙關緊急氣喘自汗心神恍惚肢體緩弱上攻頭目下注腳膝榮氣凝滯遍身疼痛兼治婦人産後中風角弓反張墮車落馬打撲傷損瘀血在內當歸酒浸天麻川芎羌活白芍藥熟地黃各等分一法無羌活入木瓜熟阿膠等分上為末蜜丸如雞子黃大每服一丸木瓜菟絲子浸酒下腳痹薏苡仁浸酒下中風溫酒米湯下料簡三陰併合腳氣證傷寒三陽有併合三陰無併合臟腑不同故也亦自不妨傳變腳氣則不然以久滯臟氣隨其虛實寒熱而流注故病多併合不可不知三陰併合腳氣治法抱龍丸治肝腎臟虛風濕進襲流注腿膝行步艱難漸成風濕腳氣足心如火上氣喘急小腹不仁全不進食赤小豆四兩略炒五靈脂白膠香破故紙炒狗脊火去毛木鱉子去殼海桐皮威靈仙地龍炒草烏米泔浸三日淨洗去皮尖上各一兩為末酒糊為丸如梧子大辰砂為衣每服五十丸空心鹽酒任下川膝煎治肝腎虛為風寒濕毒所中流注腿膝癧節疼痛如錐刀鍛刺不可名狀大烏頭十個端正者槌破以紙袋盛用烏豆一斗藉覆蒸一日取出去豆不用去皮尖牛膝二兩去蘆穰干上二味並不得見銅鐵器及火與日木臼搗碎牛膝同入石磨中磨為末酒糊丸梧子大每服四十丸用無灰酒一瓶中樣木瓜一個切作片入瓶中煨木瓜爛為度用此酒下不拘時候然肝氣惡鐵忌則有之不見火日此好事者妄忌且如烏頭牛膝採時豈一向陰乾也十全丹治腳氣上攻心腎相系足心隱痛小腹不仁煩渴小便或祕或利關節攣痹疼痛神效不可具述蓯蓉酒浸石斛酒浸狗脊火去毛萆薢茯苓牛膝酒浸地仙子遠志去心炒各一兩熟地黃三兩杜仲去皮銼炒三兩上為末蜜丸梧子大每服五十丸溫酒鹽湯任下乳香宣經丸治體虛為風濕寒襲四氣相搏半身不遂手足頑麻骨節煩疼足脛浮腫惡寒發熱漸成腳氣肝腎不足四肢攣急遍身攻注或閃肭打撲內傷筋骨及風邪內搏男子疝氣婦人經脈不調常服活血止痛補虛壯筋骨威靈仙去蘆洗烏藥去木茴香炒川楝子銼炒牽牛子炒橘皮去白萆薢防風各二兩五苓脂乳香各半兩草烏黑豆一合同煮竹刀切看透黑為度去皮焙稱半兩上為末酒糊丸梧子大每服五十丸鹽酒鹽湯任下婦人醋湯下食前服大犀角丸治脾腎經腳脛腫痹小腹頑麻上攻頭面通身洪腫小便不利上氣喘滿悶絶欲死犀角鎊黃芩旋覆花白朮桂心不焙防己各二兩香豉略炒橘皮茯苓各三兩前胡桑白皮炙四兩紫蘇莖葉四兩上為銼散每服四錢水一盞半姜五片棗兩枚煎七分去滓食前喘加杏仁四蒸木瓜丸治肝腎脾三經氣虛為風寒濕搏著流注經絡愒日曠歲治療不痊凡遇六化更變七情不寧必至發動或腫滿或頑痹憎寒壯熱嘔吐自汗威靈仙苦葶藶同入黃耆續斷同入蒼朮橘皮同入烏藥去木與黃松節同入上各半兩以大木瓜四個切蓋去瓤入前件藥仍用蓋簪定酒灑蒸熟三蒸三曬取藥出焙乾為末研瓜為膏搜和搗千杵丸如梧子大每服五十丸空心溫酒鹽湯任下世傳木瓜丸最多惟此方有效當敬之黃松節即茯苓中木迮毒湯治肝脾腎三經為風濕寒熱毒氣上攻陰陽不和四肢拘攣上氣喘滿小便祕澀心熱煩悶遍身浮腫腳弱半夏四兩湯洗黃耆甘草炙當歸人參厚朴薑汁製獨活橘皮各一兩熟地黃芍藥枳實麩炒去瓤麻黃去節湯各二兩桂心不焙三兩貝子二十一個上為銼散每服四錢水一盞半姜七片棗三個煎七分去滓空心溫服日三夜一腳氣總治千金腳氣論在諸風之前良有以也方論雖多識病者少或覺之傷晚或狐疑不決枉死者半信不誣矣凡有此證最宜急治緩則入腹攻五臟雖神丹亦無如之何又久患續生諸病如大小便不利腫滿飲食傷等不妨分別為治所謂先去新病病當在後若總而治之則亦庶乎其可也烏藥平氣湯治腳氣上攻喘滿及五臟偏勝諸氣不和喘咳奔沖坐臥不安頭暈腳弱上實下虛烏藥去木人參白朮川芎當歸茯神去木甘草炙白芷木瓜干五味子紫蘇子各等分上為銼散每服四錢水一盞半姜五片棗兩枚煎七分去滓溫服或作細末湯點下紫蘇子湯治腳弱上氣陰陽交錯清濁不分上重下虛中滿喘急嘔吐自汗無復紀律千金云宋湘王在南州患腳氣困篤服此得效紫蘇子略炒半夏湯洗各五兩前胡去苗厚朴去皮製甘草炙當歸各二兩桂心不見火橘皮各三兩上為銼散每服四錢水二盞姜七片棗兩個煎七分去滓食後服人謂俞山人降氣湯是也好事者復加附子黃耆又改其分兩亦班入太醫方用者宜知之木瓜牛膝丸治寒濕腳氣冷濕下注腳弱無力或腫急疼痛兼治婦人血風大固腎氣活血壯筋絡木瓜大者三四個切開蓋去瓤先用糯米漿過鹽焙乾為末卻將鹽末入瓜內令滿仍用蓋針定蒸三次爛研作膏川烏大者去皮尖用無灰酒一升浸薄切酒煮乾研為膏三兩牛膝酒浸萆薢茴香炒羌活青皮青鹽別研入狗脊燎去毛巴戟海桐皮九件各一兩上為末入青鹽和勻將前二膏搜為丸如硬再入酒杵數千下丸梧子大每服五十丸食前鹽湯鹽酒任下茱萸丸治腳氣入腹腹脹不仁喘悶欲死吳茱萸湯洗木瓜去瓤切作干上等分為末酒糊丸如梧子大每服五十丸至百丸酒飲任下或以木瓜蒸爛研膏為丸尤妙黑附丸治乾溼腳氣附子八錢重去皮臍黑豆半斤入瓷瓶內慢火煮以附子爛為度上熟豆一合同附子研為餅焙乾為末煉蜜為丸如皂角子大每服兩丸空心麝香酒嚼下木通散治腳氣服補藥太過小便不通淋閉臍下脹當歸梔子仁炒赤芍藥赤茯苓甘草生各一兩上為散每服三錢水一盞煎七分去滓服白皮小豆散治腳氣小便澀兩腳腫氣脹赤小豆半升桑白皮二兩紫蘇一握生薑半兩上銼散水三升煮豆熟取豆食去滓仍取余汁飲之勝駿丸治元氣不足真氣虛弱及諸虛寒濕氣進襲手足拳攣腳指連腳面拘急走注疼痛筋脈不伸行步不隨常服益真氣壯筋骨黑髭鬚滑皮膚一切足弱鶴膝諸風附子一枚炮去皮臍當歸酒浸一宿天麻酒浸牛膝酒浸酸棗仁炒熟地黃酒浸防風去叉各二兩木瓜四兩乳香半兩別研麝香一分別研全蠍去毒木香沒藥別研羌活甘草炙各一兩上件為細末用生地黃三斤淨洗研爛如泥入無灰酒四升煮爛如膏以前藥勻和杵令堅每兩作十丸每服一丸細嚼臨睡酒下地黃膏春夏極多遇冬或無地黃只煉蜜為丸如梧子大每服五十丸鹽湯溫酒下加減法檳榔萆薢肉蓯蓉酒浸破故紙炒巴戟去木上五味各添一兩內熟地黃當歸各減一兩尤妙如服此藥五七日或半月日見效甚速行步如飛千里可至乃名勝駿換腿丸治足三陰經虛為風寒暑濕進襲攣痹緩弱上攻胸脅肩背下注腳膝疼痛漸成風濕腳氣行步艱難足心如火上氣喘急全不進食石南天南星炮石斛酒浸牛膝酒浸羌活薏苡仁炒防風去叉蘆萆薢黃耆蜜炙天麻當歸酒浸續斷各兩半木瓜四兩檳榔二兩半上為末酒煮麵糊為丸如梧子大每服五十丸空心溫酒鹽湯任下
