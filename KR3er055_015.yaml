body:
  text: 卷之十五瘰癧證治夫九漏形疹皆瘰癧於項腋之間發作寒熱其根在臟腑千金所敘雖名九漏別録方證其名更多狼漏根於肝得之憂怒鼠漏根於胃得之食鼠毒螻蛄漏根於大腸得之食果蜂漏根於脾得之飲流水有蜂毒蚍蜉漏根於腎得之食中有蚍蜉毒蠐螬漏根於心得之喜怒哭泣浮蛆漏根於膽得之思慮瘰癧漏根於腎得之新沐發轉脈漏根在小腸得之驚臥失枕此等因證文義不明未知所始若以理例較之怒根在肝鼠毒在胃食瓜果在大腸蜂水在脾姑且通俗易曉如轉脈因驚根當在膽卻云在小腸浮蛆因思慮根當在脾卻云在膽瘰癧因沐發亦不當在腎名義不通似難考據又況哭泣得蠐螬之名思慮則浮蛆之名此尤不可曉也其外更有風漏冷漏蠍漏蟻漏蜣螂漏蚯蚓漏蝦蟆漏等名狀不一諒皆出於土俗隨象命名耳難以考據治之法觀其未著於肌肉而外為膿血者從本引末可使衰去針之灸之敷之角之從其所因宣通本臟皆有成法千金又有決死生反其目視其中有赤脈從上下貫瞳子見一脈一歲死見一脈半一歲半死二脈二歲死三脈三歲死赤脈不下貫瞳子可治雖有是説驗之病者少有是證亦難考據此往往是三陽傳諸陰經方有之若本髒髮未必有是學者知之必勝丸治瘰癧不以年深日近及腦後兩邊有小結連復數個兼勞瘵腹內有塊鯽魚一個去腸肚並子入雄黃一粒雞子大硇砂一錢在腹內仰安魚於炭火上燒煙盡取出以全蜈蚣一條蓬朮半兩梔子五個皂角二挺並燒萆麻子五個去皮燈上燒更用黃明膠三文皂角二挺去皮酥炙上為末別用皂角二挺去皮捶碎以水三碗揉汁去滓煮精羊肉四兩爛軟入輕粉五匣男子乳汁半兩同研成膏和藥末丸如緑豆大硃砂為衣溫酒侵晨下十丸日一服至晚下肉疙瘩子若項有五個則以五服藥取之視其所生多少以為服數既可更進數服如熱毒瘡癤未有頭腦者一服亦須消散白花蛇散治九漏瘰癧發於項腋之間憎寒發熱或痛或不痛白花蛇酒浸軟去皮骨焙乾稱二兩生犀鎊半錢黑牽牛半兩半生半炒青皮半兩上為末每服二錢膩粉半錢研勻五更糯米飲調下巳時利下惡物乃瘡之根也更候十餘日再進一服忌發風壅熱物如已成瘡一月可效用之神驗四聖散治瘰癧用花蛇散取轉後須用此補之永去根本海藻洗石決明煅羌活瞿麥穗各等分上為末每服二錢米湯調下日三服下清水盡為妙蝸牛散治瘰癧潰與未潰皆可貼蝸牛不拘多少以竹索串瓦上曬乾燒存性上為末入輕粉少許豬骨髓調用紙花量病大小貼之一法以帶殼蝸牛七個生取肉入丁香七枚於七殼內燒存性與肉同研成膏用紙花貼之旱蓮子丸治少長臟氣不平憂怒驚恐諸氣抑鬱結聚瘰癧滯留項腋及外傷風寒燥濕飲食百毒結成諸漏發作寒熱遍於項腋無問久近悉主之旱蓮子連翹子威靈仙何首烏蔓荊子三稜醋浸濕紙裹煨赤芍藥各一兩木香二兩大皂角三挺刮去皮酥炙無酥用羊脂炙上為末糊丸梧子大建茶清下三十丸至五十丸日三服小兒量與之食後服癭瘤證治夫血氣凝滯結癭瘤者雖與癰疽不同所因一也癭多著於肩項瘤則隨氣凝結此等皆年數深遠浸大浸長堅硬不可移者名曰石癭皮色不變即名肉癭筋脈露結者名筋癭赤脈交絡者名血癭隨憂愁消長者名氣癭五癭皆不可妄決破決破則膿血崩潰多致夭枉瘤則有六骨瘤脂瘤肉瘤膿瘤血瘤亦不可決潰肉瘤尤不可治治則殺人唯脂瘤破而去其脂粉則愈破結散治石癭氣癭勞癭土癭憂癭等證海藻洗龍膽海蛤通草昆布洗礬石枯松羅各三分麥曲四分半夏上為末酒服方寸匕日三忌鯽魚豬肉五辛生菜諸雜毒物十日知二十日愈白膏治一切風熱毒腫及臟氣鬱結丹石發動結為癰疽瘰癧諸瘡腫未破即令消散九漏浸淫膿汁淋漓諸治不瘥者悉主之白蘞白薇白芨白芷薤白各半兩銼洗以清油一斤煎至半斤濾去滓入黃耆甘松藿香零陵香防風當歸各半兩再入前油煎十上火綿濾去滓入定粉二兩黃蠟三兩寒水石煅水飛過二兩研細上再煎滴水成珠為度瓷器盛之以腦子少許糝其上煎時忌鐵器以柳枝攪附骨疽證治附骨疽與白虎飛尸癧節風皆相類癧節則走注不定白虎飛尸痛淺按之則便附骨疽痛深按之無益又一説白虎飛尸亦能作膿著骨而生及其腐潰碎骨出盡方愈如是則附骨疽與白虎飛尸是一病但深淺不同耳白虎飛尸又俗名風煞然病附骨疽少有骨出者宣拔毒熱不可一向泥五香連翹漏蘆之屬當先溫腎如靈寶膏乃神藥唯在針烙淺深刺拔其毒根則易愈不爾則順脈流走遍體洪腫卒致不救蟾蜍膏治附骨疽久不瘥膿汁敗壞或骨從瘡孔出大蝦蟆一枚亂髮一塊雞子大豬脂油一斤上同煎二物略盡濾去滓凝如膏貼之凡欲貼瘡須先以桑白皮烏豆煎湯淋洗拭乾以龍骨煆為粉糝瘡四邊令易收然後方用貼藥黑鯽膏治附骨疽腫熱未破已破或膿出不愈黑色鯽魚一個去腸肚入白鹽令滿線縫定上銅石器中煮一盞水盡魚乾焦為末脂油調敷已破則干糝少痛勿怪赤朮丸治附骨疽膿出淋漓久久不瘥已破未破皆可服赤朮一斤米泔浸三宿取出洗淨曬乾再以大麻腐汁浸術上餘二寸許入川椒二十一粒蔥白七根煮黑油出洗淨焙乾稱破故紙炒川楝銼炒茯苓舶上茴香炒杜茴香白芷桃仁去皮尖炒各半斤上為末煉蜜丸梧子大每服五十丸溫酒鹽湯任下又方二一方用槲樹皮燒灰為末飲方寸匕一方用蜜陀僧為末以豬脊骨髓調敷之兼治痔漏不愈疔腫證治世醫謂傷寒在諸風之上癰疽冠雜病之先言此二病重大急切然方論疔腫又在癰疽之前其意謂急切甚矣但江左少見此病醫者不以為事病源既有不可不知且依千金類例具列於後既不能究其源亦不敢妄有改作一曰麻子疔肉上起頭如黍米色稍黑四邊微赤多癢忌食麻子及麻衣併入麻田中行二曰石疔皮肉相連色烏黑如黑豆甚硬刺之不入肉陰陰微疼忌瓦礫磚石之屬三曰雄疔疱頭黑黶四畔仰瘡疱漿起有水出色黃大如錢孔忌房事四曰雌疔瘡頭稍黃向里黶亦似灸瘡四畔疱漿起如錢孔心凹色赤忌房事五曰火疔狀如湯火燒灼瘡頭黑黶四邊有疱漿起如赤粟米忌火灸爍六曰爛疔色稍黑有白斑瘡中潰潰有膿水流出瘡形大小如匙面忌沸熱食爛帛物七曰三十六疔頭黑浮起形如黑豆四畔起大赤色今日生一明日生二三日生三若滿三十六藥所不治俗名黑疱忌嗔怒蓄積愁恨八曰蛇眼疔瘡頭黑皮上浮生形如小豆狀似蛇眼大體硬忌惡眼看之並嫉妒人見及毒藥九曰鹽膚疔狀如匙面四邊皆赤有黑粟粒起忌鹹食十曰水洗疔形如錢或如錢孔大瘡頭白里黑黶汁出中硬忌飲漿水水洗渡河十一曰刀鐮疔瘡闊狹如薤葉大長一寸左側肉黑如燒爍忌刺及刀鐮切割鐵刃所傷可以藥治十二曰浮漚疔瘡體曲圓少許不合長而狹如薤葉大內黃外黑黑處刺不痛內黃處刺之則痛十三曰牛拘疔肉疱起掐不破此十三證初發必先癢後痛先寒後熱熱定則寒四肢沉重頭痛心驚眼花大重者嘔逆嘔逆則難治麻子疔始末唯癢所録忌者不得犯犯即難治浮嘔疔牛拘疔無忌縱不治亦不殺人欲知犯觸但脊強瘡痛極甚不可忍者是犯之狀也治十三種疔皆以此方治之以緋帛一片裹藥取匝為限亂髮雞子大攤布帛上牛黃如梧子大反鉤棘針二十一枚赤小豆七粒為末並布發上卷緋帛作團外以發作繩十字縛之尉斗中急火燒灰研篩細以枸杞或子或根皮枝葉隨得為末用枸杞末二匕緋帛灰一匕共成三匕研勻分二服空腹酒調下蒼耳散治一切疔腫神良方蒼耳根莖苗子但取一色便可用上燒為灰醋泔澱和如泥塗上干即易之不過十度即拔根出腸癰證治癰疽初無定處隨其所發即命名在外則為發背發腦在內則為腸癰內癰心癰腎癰肺癰臍癰等治得其法則生失法則死外證易識內證難明不可不備述也腸癰為病身甲錯腹皮急按之濡如腫狀腹無聚積身無熱脈數此為腸內有膿久積陰冷所成也故金匱用附子溫之小腹腫痞按之痛如淋小便自調發熱身無汗復惡寒其脈遲緊者膿未成可下之當有血洪數者膿已成不可下此以內結熱所成也故金匱用大黃利之甚者腹脹大轉側聞水聲或繞臍生瘡或膿從臍出或大便出膿血不治必死其如五內生瘡亦止分陰陽利而已不比外癰須依四節八事之次第也千金引官羽林婦病醫診之其脈滑數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為敗濁少腹痞堅小便或澀或復汗出或復惡寒膿為已成設脈遲緊即為瘀血血下即愈更內經所載有瘜積病比見有得之二三年遍身微腫續乃大腸與臍連日出膿遂致不救此亦腸癰之類也不可不審薏苡仁附子敗醬散治脈數身無熱腹無積聚按之濡此為腸癰薏苡仁二兩半附子炮半兩敗醬一兩一分上銼散每服四錢水一盞半煎七分去滓空心服小便利為效大黃牡丹湯治腸癰小腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下大黃半兩蒸牡丹皮一錢一字桃仁半兩去皮尖瓜子三分芒硝二錢上為銼散作一服以水三盞煎取八分盞去滓入芒硝再煎沸頓服不以時薏苡仁湯治腸癰腹中㽱痛煩熱不安或脹滿不食小便澀婦人産後虛熱多有此病縱非癰但疑是便可服就有差互亦無害薏苡仁五兩牡丹皮桃仁各三兩瓜瓣仁四兩上為銼散每服四大錢水一盞半煎七分去滓不以時五痔證治經云腸癖為痔如大澤中有小山突出為峙入於九竅中凡有小肉突出者皆曰痔不特於肛門邊生亦有鼻痔眼痔牙痔等肛門中證狀不一方書分出五種曰牡曰牝曰脈曰腸曰氣牡痔者肛邊腫痛突出一枚五六日後潰出膿血自愈牝痔者肛邊發㿔數個如鼠乳狀脈痔者無頭脈中迸小竅注下清血腸痔者生在腸內更衣時非挪搦不入氣痔者遇憂怒則發肛門腫疼氣散則愈治之之法切勿用生砒毒氣入腹反至奄忽近見貴人遭此痛不忍言因書以戒後學五灰散治五痔不問內外牡牝寒溫勞濕悉主之鱉甲治牡痔蝟皮治牝痔豬左足懸蹄甲治腸痔蜂房治脈痔蛇蛻治氣痔各等分上燒存性隨證倍一分為末井花水調二錢空心臨臥時一服熏法蝟皮方三指大切熏黃棗大研熟艾雞子大上為末用瓶器以灰實一半如燒香法安長桶內坐其上熏之煙氣從口出為佳凡三度熏永瘥勿犯風冷忌雞肉毒物洗法海桐皮銼蛇床子各一兩香南藤銼蔥白切各三兩上用水一斗入藥五兩煎減半去滓候溫著手輕輕洗以絹拭乾一法止用槐白皮煎湯淋泄最佳貼藥蜀葵子半兩蟬蛻五個檳榔一個併為末上用棗三枚取肉研細搜和藥末如覺硬滴少蜜研成膏量大小貼於病處辨腸風論夫有五痔人奏圊則下血或點滴或洴箭或清或濁面黃唇白心忪腳弱頭目眩暈此因飽食坐久腸癖所為亦有飲酒房室過度所致世醫多指此為腸風臟毒然腸風臟毒自屬滯下門臟毒即是臟中積毒腸風即是邪入臟純下清血謂之風利今五痔下血乃是酒痔脈痔其血自肛門邊別有一竅如針孔大滴淋而下與泄物不共道不可不知烏連湯治脈痔下血不止量冷熱加減法黃連去須烏頭炮去皮尖各等分上為銼散每服二錢水一盞半煎七分去滓空心服熱則加黃連冷則加烏頭酒連丸治酒痔下血伏暑久治不效黃連不以多少燎去須酒浸銀器中重湯煮漉出曬乾添酒煮七次止上為末以余酒為丸如梧子大每服五十丸米湯下加味四君子湯治五痔下血面色萎黃心忪耳鳴腳弱氣乏口淡食不知味人參茯苓白朮甘草炙黃耆白扁豆蒸各等分上為末每服二錢匕湯點服此方人未之信服者頗效所謂看不上手面自有奇功荊芥散治脈痔下血荊芥穗槐花炒焦各一兩石菖蒲一兩半上為末米飲調下二錢食前服日二服白玉丹治久年腸痔下血服百藥不效者凝水石不以多少煅紅研細水飛再入煅窩中煅上糯米糊丸如梧子大陳米飲下五十丸只一服愈又方單服白梅亦效瘡瘍證治瘡疥雖不至害人浸淫不已亦有數年不愈者多因心腎不寧傷神失志或飲食不節積滯腸胃致氣血凝留發於肌肉皮膜之間色目極異所謂馬疥惡露反花瘑瘡種狀不同或癢或痛汁水淋漓愈而復發諸治不瘥要當調養心腎去腸間苑莝理無不愈升麻和氣飲治瘡疥發於四肢臀髀痛癢不常甚致憎寒發熱攻刺疼痛浸淫浮腫及癩風入臟陰下濕癢耳鳴眼痛者蒼朮二兩米泔浸三宿桔梗升麻乾葛各一兩陳皮六錢甘草芍藥各三分半夏湯七次當歸白芷茯苓各二錢枳殼厚朴薑製炒乾薑各半錢大黃蒸半兩上為銼散每服四大錢水一盞半薑三片燈芯十五莖煎七分去滓食前服天麻煎治風毒入胃及心腎經絡攻注百節疼痛頭目虛腫痰涎不利下注腰腳緩弱生瘡婦人血風男子㿗風及風濕腳氣攻注皮膚瘙癢癮疹偏正頭風川烏頭洗淨灰炒裂去皮尖草烏頭水浸三日洗去皮各四兩荊芥穗半斤干薄荷五兩杜當歸水浸三日曬乾一斤切上為末醋糊丸梧子大茶清下三十丸此方與癮疹門加味烏荊丸相類但此方入草烏並制過不同爾殺疥藥羊蹄根生切一兩薑一分礬半錢硫黃一錢草烏頭一個上以米泔淹一宿研極細入釅醋和勻入浴時抓破瘡敷之遲頃以溫湯洗去絶妙百草膏治一切惡瘡不問乾溼痛癢日近年深百藥不瘥羊屎不拘多少上一味上下以瓦盛蓋柴木燒令煙盡末之麻油調敷癢者入輕粉少許痛者入麝香少許神效一法用杏仁輕粉最殺蟲㿗風證治男子精血不調外為風冷所襲致陰下濕癢搔之不已流注於腳悉生瘡瘍名曰㿗風世謂腎臟風者乃認㿗為腎也㿗屬宗筋繫於肝胃陽明養之陽明主肌肉循經流入四肢故使四肢生瘡正謂之㿗風非腎臟風也四生散治㿗風上攻下注耳鳴目癢鼻赤齒浮或作口瘡下注陰濕四肢搔癢遍體生瘡及婦人血風白附子沙苑蒺藜黃耆羌活各等分上為末每服二錢鹽酒調下有人將豬腎破開入鹽糝藥於其間煨服亦佳㿗屬宗筋胃陽明養之故有是證烏頭煮鹽丸治元臟氣虛㿗風入胃上攻頭疼眼赤眵淚昏澀口乾咽燥下注四肢疼痛癧節重著陰下濕癢足脛腰膝遍生瘡瘍及風水浮腫川烏頭洗淨大者破開小者全用蒼朮吳茱萸各四兩京三稜半兩白鹽十二兩用水煮四味候烏頭透控乾洗淨鹽上為末米糊丸梧子大每服五十丸空腹溫酒鹽湯任下凡水病必忌鹽此藥用鹽無所忌升麻和氣飲治如前方見瘡瘍門天麻煎治如前方見瘡瘍門癬證治凡癬種類亦多所謂苔癬瓦癬荷葉癬雖以皮膚氣血凝滯所為或有風濕搏成者或為人傳染得之者種狀不同治之各有方昨葉荷草散治一切癬無問風濕氣血與夫相染而生者昨葉荷草即瓦松曬乾一兩枯礬一錢雄黃半錢上為末以羊蹄菜根先蘸醋揩癬上令癢破即以藥末乘濕塗敷不過三兩次即愈妒精瘡證治夫邏欲人多患妒精瘡者以婦人陰中先有宿精男子與之交接虛熱即成初發在陰頭如粟拂之則痛甚矣兩日出清膿作臼孔蝕之大痛婦人亦有此病生在玉門內正似疳蝕瘡不痛為異耳麝香散治妒精瘡麝香黃礬青礬各等分上為末小便後敷之白散子治妒精瘡癢不可忍者及皮膚諸瘡手抓疽瘡晉礬不拘多少煅輕粉每服入少許上研勻摻瘡上立瘥如治漏瘡每挑一錢入黃柏末一錢輕粉半錢津調散治妒精瘡膿汁淋漓臭爛黃連款冬花各等分上為末以地骨皮蛇床子煎湯洗用軟帛挹干以津調藥敷之最忌不得用生湯洗諸瘡皆然蒲黃散治陰蝕瘡蒲黃三兩水銀一兩上研勻先以豬肉湯浸洗挹干以藥摻之一方治男女陰瘡以硫黃末敷之大風敘論經所載癘風者即方論中所謂大風惡疾癩是也雖名曰風未必皆因風大率多是嗜欲勞動氣血熱發汗泄不避邪風冷濕使淫氣與衛氣相干致肌肉憤䐜氣有所凝則肌肉不仁榮氣泣濁則胕熱不利故色敗皮膚瘍潰鼻梁塌壞千金所謂自作不仁極猥之業雖有悔言而無悔心良得其情然亦有傳染者又非自致此則不謹之故氣血相傳豈宿業緣會之所為也原其所因皆不內外涉外所因而成也證候多端並見諸後大風治法凡治大風須推其所因凡因風寒濕熱勞逸飲食與夫傳染不可混濫散寒濕風濕清熱調和氣血穎然不同若例以瀉風藥治之則失其機要矣昔見一僧得病狀如白癩卒不成瘡但每旦起白皮一升許如蛇蛻醫者謂多啖炙爆所致與局方解毒雄黃丸三四服而愈豈非得其因邪治之第一浴法麻黃根地骨皮草烏頭各二兩上為銼散研朴硝二兩勻和每用藥二兩水一桶椒一合蔥三十莖艾葉一兩同煎十沸入米醋一中盞打勻去滓坐溫室中且用手巾搭四肢候湯可浴即浴令汗透面上如珠流更坐室中或睡片時尤佳候汗解方著衣避風而出五日再浴如此兩上浴便服換骨丹換骨丹九肋鱉甲去裙海蜈蚣細銼各半兩上以鹽泥固濟候乾火煅存二分性為末巴豆半兩去皮膜順手研青州棗七個去核入巴豆膏在棗中火燒令焦存巴豆五分性將棗巴豆爛研如泥入前二味末同研勻以醋煮糊為丸如緑豆大每服七丸虛者四五丸用溫薺汁下候利惡物如膿血爛魚腸即住即此三兩服未利更加一二丸次服遇仙丹遇仙丹人參紫參各一兩苦參白殭蠶去觜各二兩上為末白麵糊丸梧子大每服三十丸溫鹽湯吞下食前日二次服疏風散疏風散山梔子仁一兩半大黃白滑石熟地黃懸豆酥炙焦黃各二兩上為末入朴硝半兩令勻每服一錢食後淡茶清調下次以佛手膏去瘡佛手膏去黑紫瘡核斑蝥七個去翅足巴豆七粒去皮杏仁二七粒去皮尖紅娘子二七個去翅足砒霜一錢別研盆硝一錢黃蠟半兩韶粉半兩瀝青研半兩硫黃黃丹各三錢膩粉炒十錢緑豆一合槐角三條麻油四兩亂髮雞子大一兩上用油煎令發化次下紅娘子次下巴豆槐角等逐味下焦者漉出方下硫黃盆硝及丹粉等以箄子不住手攪令勻滴水成珠為度用時先將針輕手刺瘡核用藥一粟米大放針處次日擠瘡有黑臭膿血出三兩日血漸少次服去毒丹去毒丹赤芍藥甘草滑石各半兩巴豆去皮炒別研後入黑牽牛一兩半生半炒朴硝大黃各一分上為末麵糊丸緑豆大臨臥時服十五丸金銀薄荷湯下加至二十丸次服甘草散甘草散甘草滑石各半兩山豆根一兩生大黃一分生上為末每服一錢蜜熟水調下日二服次服解毒丸解毒丸栝蔞根三兩甘草半兩炒大黃一分生朴硝一分別研上為末麵糊丸如緑豆大每服二十丸至三十丸白湯下次服福神丹福神丹訶子四個炮巴戟炒黑牽牛生各半兩甘草三錢生赤小豆四十九粒生上為末麵糊丸如緑豆大每服十丸至十五丸薄荷湯下次用水膏藥水膏藥敷貼破處及面腳上瘡令生肉陳皮去灰土半斤炒紫色陳麥米半升炒紫藿香馬蹄香各一兩麝香一錢別研上同為末入麝香用冷水調掃敷瘡上有膿處如損破即煎槐枝湯洗再上藥此十方乃倪處士祕傳曾用有驗大要病人須能如法將息理會敬而信之通天再造散治大風惡疾鬱金半兩生大黃一兩炮白牽牛六錢半生半炒皂角刺一兩炮經年黑大者上為末每服五錢日未出面東以無灰酒下儘量為度晚利黑頭小蟲病稍輕者止利如魚腸臭穢物忌毒半月但食稠粥軟飯漸生眉毛皮膚如常甚者不過三兩次須將理不可妄有勞動及終身不得食牛馬騾驢等肉犯者死不救三濟丸治如前當歸熟地黃川芎荊芥穗各二兩防風細辛各一兩桂心一分上為銼散先以醋一升浸一宿漉出焙乾再以生地黃一斤搗汁浸一宿焙乾酒一升浸一宿焙乾旋入乳香半兩以余酒醋地黃汁釋蒸餅為丸如梧子大用好川烏頭一個炮裂銼荊芥穗半兩浸酒三升旋溫下藥五十丸八葉湯淋泄大風瘡桑葉荷葉地黃葉皂角葉蒻葉蒼耳葉菖蒲葉何首烏葉上等分曬乾燒存性為末如面藥洗手面身體料簡大風惡疾瘡痍荼毒膿汁淋漓眉鬢墮落手足指脫頑痹痛癢顏色枯瘁鼻塌眼爛齒豁唇揭病證之惡無越於斯負此病者百無一生猶且愛戀妻孥復著名利不仁之行仍欲更作死而無悔深可悲傷凡遇此疾切須斷鹽及一切口味公私世務悉宜屏置能不交俗事絶慶弔幽隱林下依法治療非但愈疾亦能因是而致神仙所謂因禍而得福也
