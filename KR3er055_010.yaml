body:
  text: 卷之十勞瘵敘論夫骨蒸殗殜復連尸疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰等皆曰傳尸者以疰者注也病自上注下與前人相似故曰疰其變有二十二種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺泄白濁發乾而聳或腹中有塊或腦後兩邊有小結核連復數個或聚或散沉沉默默咳嗽痰涎或咯膿血如肺痿肺癰狀或復下利羸瘦困乏不自勝持積月纍年以至於死死後乃疰易傍人乃至滅門者是也更有蜚尸遁尸寒尸喪尸尸注等謂之五尸及大小附著等證不一知其所苦無處不惡乃挾諸鬼邪而害人以三因收之內非七情所忤外非四氣所襲雖若麗乎不內外因奈其證多端傳變遷移難以推測故自古及今愈此病者十不得一所謂貍骨獺肝天靈蓋銅鑑鼻徒有其說未嘗見效唯膏肓俞崔氏穴若聞早灸之可否幾半晚亦不濟也近集得經效方有人服之頗驗謾録於下餘缺以俟明哲勞瘵諸證病者憎寒發熱自汗面白目干口苦精神不守恐畏不能獨臥其傳在肝病者憎寒發熱面黑鼻燥忽忽喜忘大便苦難或復泄瀉口瘡其傳在心病者憎寒發熱面青唇黃舌本強不能咽飲食無味四肢羸瘦吐涎沫傳在脾病者憎寒發熱面赤鼻白乾燥毛折咯嗽喘急時吐白涎或有血線傳在肺病者憎寒發熱面黃耳輪焦枯胻骨痠痛小便白濁遺瀝胸痛傳在腎所謂勞蒸者二十四種隨證皆可考尋毛折發焦肌膚甲錯其蒸在皮外人覺熱自反惡寒身振瞤劇其蒸在肉發焦鼻衄或復尿血其蒸在血身熱煩躁痛如針刺其蒸在脈爪甲焦枯眼昏兩脅急痛其蒸在筋板齒黑燥大杼痠疼其蒸在骨背膂疼痛胻骨酸𤺊其蒸在髓頭眩熱悶口吐濁涎眼多眵淚其蒸在腦男子失精女子白淫其蒸在玉房乍寒乍熱中脘與膻中煩悶其蒸在三焦小便赤黃凝濁如膏其蒸在膀胱傳道不均或祕或泄腹中雷鳴其蒸在小腸大腹隱痛右鼻乾疼其蒸在大腸口鼻乾燥腹脹睡臥不安白汗出其蒸在胃口苦耳聾脅下痛其蒸在膽裡急後重肛門澀閉其蒸在回腸小腹㽲痛筋脈縱緩陰器自強其蒸在宗筋眼昏淚下時復眩暈躁怒不常其蒸在肝舌焦黑氣短煩悶灑灑淅淅其蒸在心唇乾口瘡胸腹脹悶畏寒不食其蒸在脾咳嗽喘滿咯痰吐血聲嘶音遠其蒸在肺耳輪焦枯腳氣痠疼起居不得其蒸在腎情想不寧無故精泄白物綿綿而下其蒸在右腎心主胞絡心膈噎塞攻擊疼痛俯仰煩冤其蒸在膈諸證雖曰不同其根多有蟲齧其心肺治之不可不絶其根也勞瘵治法取勞蟲方青桑枝柳枝石榴皮桃枝梅枝各七莖每長四寸許青蒿一小握上用童子小便一升半蔥白七莖去頭葉煎及一半去滓別入安息香阿魏各一分再煎至一盞濾去滓調辰砂末半錢檳榔末一分麝香一字分作二服調下五更初一服五更三點時一服至巳牌時必取下蟲色紅者可救青者不治見有所下即進軟粥飯溫暖將息不可用性及食生冷毒物合時須擇良日不得令貓犬孝服穢惡婦人見神授散治諸傳尸勞氣殺蟲方得之清源郡王府川椒二斤擇去子併合口者炒出汗上為末每服二錢空心米湯調下須痹暈悶少頃如不能禁即以酒糊為丸如梧子大空心服三五十丸昔人嘗與病勞婦人交婦人死遂得疾遇一異人云勞氣已入臟遂與此方令急服二斤其病當去如其言服之幾盡大便出一蟲狀如蛇自此遂安續有人服之獲安濟者多矣潤神散治勞瘵憎寒發熱口乾咽燥自汗疲劇煩躁人參黃耆甘草炙桔梗麥門冬各等分上為末每服二錢水一盞煎七分不以時自汗入淡竹葉小麥同煎溫金散治積勞咳嗽喘悶咯痰中有血甘草生用黃芩桑白皮防風去叉杏仁去皮尖以五味各一兩米泔浸一宿取出握干略炒麥門冬一分去心茯神半兩上為末每服二大錢水一盞入黃蠟一片如指大同煎至七分食後熱服蛤蚧散治積勞久咳失音方蛤蚧一對去口足溫水浸去膜颳了血脈用好醋炙訶子煨去核阿膠炒熟地黃麥門冬去心細辛去苗甘草炙各半兩上為末蜜丸如皂子大每服一丸含化不拘時候服蘇合香丸治傳尸骨蒸殗殜肺痿疰忤鬼氣心痛霍亂時氣瘴瘧等方方見九痛門此方盛行於世大能安氣卻外邪凡病自內作不曉其名者服之皆效最治氣厥氣不和吐利榮衛關格甚有神效疰忤中惡證治病者卒心腹脹滿吐利不行如干霍亂狀世所謂沖惡是也由人精神不全心志多恐遂為邪鬼所擊或復附著沉沉默默寢言譫語誹謗罵詈訐露人事不避譏嫌口中好言未然禍福及至其時毫髮無失人有起心已知其肇登高涉險如履平地或悲泣呻吟不欲見人其狀萬端如醉如狂不可概舉此皆鬼神及諸精魅附著惑人或復觸犯忌諱土地神靈為其所作非有真實但隨方俗考驗治之方列於後還魂湯治卒中惡感忤鬼擊飛尸諸奄忽氣絶無復覺知或已死絶口噤不開去齒下湯或湯入口不下者分病人發左右捉踏肩引之藥下復增取盡一升須臾立蘇麻黃去節湯三兩桂去皮二兩甘草一兩杏仁去皮尖二百一十粒上銼散每服四大錢水一盞半煎七分去滓不以時服桃奴丸治心氣虛有熱恍惚不常言語錯亂尸疰客忤厭夢不祥小兒驚癇並宜服之桃奴七枚別研為末辰砂半兩別研桃仁十四枚去皮麩炒別研為末生玳瑁鎊過為末一兩牛黃別研碎一分龍腦別研一分雄黃用桃葉煮水研飛取三分黑犀石上以水磨澄去水取細末半兩麝香別研一分安息香一兩以無灰酒斟酌多少研飛去砂土銀器中入桃仁琥珀熬成膏琥珀別研三分上為細末和入前膏丸如雞頭大陰乾密器封閉淨室安置煎人參湯研下一丸食後臨臥服蘇合香丸治卒中惡忤疰方見九痛門蠱毒敘論江南閩中山間人以蛇虺蜈蚣蜒蚰蝦蟆等百蟲同器畜之使其自相食啖勝者為靈以事之取其毒雜以菜果飲食之類以害人妄意要福以圖富貴人或中之證狀萬端廣如治百蠱說或年歲聞人多死又有人家香火伏事如家先者亦謂之蠱能病人世謂之蠱注以姓類屬五音謂之五蠱此皆邊鄙邪僻之地多有此事中都則蔑聞也中蠱證治夫中蠱毒者令人心腹絞痛如有物齧吐下血皆如爛肉若不即治食人五臟即死驗之令病人唾水沉即是蠱有人行蠱毒以病人若欲知其姓名者以敗鼓皮燒作末飲服方寸匕須臾自呼蠱家姓名可語令呼喚將去則愈治之亦有方丹砂丸治蠱毒從酒食中著者方端午日合辰砂別研雄黃別研水飛赤腳蜈蚣續隨子各一兩麝香一分上為末糯米飲為丸如雞頭大若覺中毒即以酒下一丸蛇蠍所螫醋磨塗之凡例凡諸蠱多皆是假毒藥以投之知時宜煮大豆甘草薺苨汁飲之通除諸藥毒礬灰散治中諸毒物晉礬建茶各等分上同為末每服三錢新汲水調下得吐即效未知再作解毒丸治誤食毒草並百物毒救人於必死板藍根四兩乾者淨洗日乾貫衆一兩銼去土青黛研甘草生各一兩上為末蜜丸梧子大以青黛別為衣如稍覺精神恍惚噁心即是誤中諸毒急取藥十五丸爛嚼用新汲水送下即解此方傳得異人京師陳道士用水浸炊餅為丸尤妙如常服可三五丸大解暑毒凡中毒嚼生黑豆不腥嚼白礬味甘者皆中毒無疑青黛雄黃散凡始覺中毒及蛇蟲咬癰疽才作即服此令毒氣不聚上好青黛雄黃等分上為細末新汲水調下二錢蛇蟲傷治法白芷散治惡蛇咬傷頓僕不可療者香白芷上一味為末水調下頃刻咬處出黃水盡腫消皮合白礬半夏散治蠍螫痛不可忍白礬半夏各等分上為細末釅醋調貼之五絶治法凡魘寐産乳自縊壓溺五者令人卒死謂之五絶半夏散治魘寐卒死及為牆壁竹木所壓水溺金瘡卒致悶絶産婦惡血衝心諸暴絶證半夏七次湯洗去滑不拘多少上為末每一大豆許吹鼻中即活但心頭溫者一日可治牡丹散治産乳血暈悶絶狼狽若口噤則拗開灌之必效方見婦人門救自縊法徐徐抱解不得截繩上下安被臥之一人以腳踏其兩肩手少挽其發常弦弦勿縱之一人以手按據胸上數動之一人摩捋臂脛屈伸之若已強但漸屈之並按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須臾可少桂湯及粥清含與之令濡喉漸漸能咽乃稍稍止耳內令兩人以管吹其兩耳彌好此法最善無不活者自旦至暮雖冷亦可暮至旦少難救壓死方以死人安著將手袖掩其口鼻眼上一食頃活眼開仍與熱小便若初覺氣絶而不能言可急劈口開以熱小便灌之打撲悶絶者亦用此夫壓死折傷唯禮法君子守巖牆垂堂之戒固無是事然安車良馬時有跌足奔輪步砌臨流未免虛舟飄瓦況行商徵賈捕獵魚人歷涉既多不測尤甚其如冤仇加害凶險劫持打撲金瘡皆致枉夭治之不可不急也雞鳴散治從高墜下及木石所迮凡是傷損血瘀凝積氣絶欲死並久積瘀血煩躁疼腫叫呼不得並以此藥利去瘀血即愈此藥能推陳致新方見折傷門太嶽活血丹治男子婦人外傷內損狗咬蟲傷驢馬撲墜手足傷折一切疼痛腹中瘀血刺脅築心及左攤右緩走注疼痛癰腫痔漏婦人冷氣入腹血脈不通産後敗血灌注四肢吹奶腫痛並宜服之花桑枝取如臂大者以炭火煅赤煙盡淬於米醋中取出焙乾一斤栗揳一斤栗蒲中心扁薄者薄切曬乾皂角刺一斤燒通赤米醋內淬殺焙乾細墨半斤一半用萆麻三兩乳鉢內細研塗墨上塗盡用薄紙裹黃泥固濟令乾以火五七斤煅通赤冷地上盆蓋兩炊久一半用醋化硇砂二兩塗盡炙乾大黑豆一斤濕布揩去垢黑皮焙乾稱亂髮二斤皂角水淨洗用油二斤炒頻捻看脆即止乳香四兩須滴乳通明者細研入米醋一碗熬熟上六味為末入乳香膏內和杵三千下丸如彈子大如乳香少更入醋糊痛者一服一丸輕者半丸以無灰酒一盞乳香一豆大先磨香盡次磨藥盡煎三五沸臨臥時溫服以痛處就床臥如欲出汗以衣被覆仍用藥塗摩損處忌一切動風物應婦人諸疾服者更用當歸末一錢依法煎服有孕不得服接骨散治跌撲腳手脛骨脆折水蛭不拘多少上於新瓦上熬令香熟勿令太過為末每服一錢熱酒調仍入麝香半錢服折處不可手觸藥行良久覺痛折處漸癢如蟻噆之遂要人捻揉骨折處相接即用杉木皮夾縛兩三日去之骨全矣花蕊石散治一切金瘡打撲傷損貓犬咬傷方見失血門救溺死法灶中灰兩石上以灰堆聚急將溺者埋灰中從頭至足水出七孔即活驚悸證治夫驚悸與忪悸二證不同驚悸則因事有所大驚或聞虛響或見異相登高涉險夢寐不祥驚忤心神氣與涎郁遂使驚悸名曰心驚膽寒在心膽經屬不內外因其脈必動忪悸則因汲汲富貴戚戚貧賤久思所愛遽失所重觸事不意氣鬱涎聚遂致忪悸在心脾經意思所主屬內所因或冒寒暑濕塞閉諸經令人忽忽若有所失恐恐如人將捕中脘忪悸此乃外邪非因心病況五飲停蓄閉於中脘最使人忪悸治屬飲家除飲悸與外內因所治各見本門驚悸治方備列於後溫膽湯治心膽虛怯觸事易驚或夢寐不祥或異象惑遂致心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或復自汗四肢浮腫飲食無味心虛煩悶坐臥不安半夏湯洗七次竹茹枳實麩炒去瓤各二兩橘皮三兩去白甘草炙一兩白茯苓一兩半上為銼散每服四大錢水一盞半姜五片棗一個煎七分去滓食前服鎮心丹大治驚悸方見狂證門小定志丸治心驚膽懾方見健忘門寒水石散治因驚心氣不行鬱而生涎涎結為飲遂為大疾忪悸愪㦜不自勝持少小遇驚尤宜服之但中寒者不宜服寒水石煅滑石水飛各一兩甘草生一分上為末每服二錢熱則新汲水下怯寒則煎薑棗湯下入龍腦少許尤佳小兒量歲與之自汗證治夫自汗多因傷風傷暑及喜怒驚恐房室虛勞皆能致之無問昏醒浸浸自出者名曰自汗或睡著汗出即名盜汗或云浸汗若其飲食勞役負重涉遠登高疾走因動汗出非自汗也人之氣血猶陰陽之水火平則寧偏則病陰虛陽必湊故發熱自汗如水熱自湧陽虛陰必乘故發厥自汗如水溢自流考其所因風暑涉外喜怒驚恐涉內房室虛勞涉不內外理亦甚明其間如癧節腸癰腳氣産蓐等病皆有自汗治之當推其所因為病源無使混濫如經脈別論所載但原其汗所出處初非自汗證也不可不知正元散治下元氣虛臍腹脹滿心脅刺痛泄利嘔吐自汗陽氣漸微手足厥冷及傷寒陰證霍亂轉筋久下冷利少氣羸困一切虛寒並宜服之常服助陽消陰正元氣溫脾胃進飲食人參白茯苓白朮各三兩黃耆一兩半甘草炙烏藥去木山藥薑汁浸炒附子炮去皮臍川芎乾葛各一兩桂心烏頭炮去皮尖各半兩紅豆炒乾薑炮橘皮各三錢上為末每服二錢水一盞姜三片棗一個鹽少許煎七分食前冷服自汗加浮麥牡蠣散治諸虛不足及新病暴虛津液不固體常自汗夜臥即甚久而不止羸瘠枯瘦心忪驚惕短氣煩倦牡蠣米泔浸去土煅取粉麻黃根黃耆各一兩上為銼散每服三錢水一盞半小麥百餘粒同煎至八分去滓不拘時一方為細末每三錢水三盞蔥白三寸煎一盞半分三服麥煎散治榮衛不調夜多盜汗四肢煩疼飲食進退肌瘦面黃秦艽二兩柴胡去苗二兩大鱉甲二兩醋煮三五十沸淨去裙襴別用醋塗炙黃乾漆炒青煙盡人參茯苓乾葛川烏炮去皮尖各一兩玄參三兩上為末每服二錢先用小麥三七粒煎湯一盞去麥入藥煎七分食後溫服或臨臥服如久患後亦宜服此以退其勞倦調理經絡桂枝湯治傷風自汗方見傷風門卻暑散治傷暑自汗方見傷暑門防己黃耆湯治傷濕自汗方見風濕寒門止汗溫粉用川芎白芷藁本為末各一分入米粉三分綿裹撲體上消渴敘論夫消渴皆由精血走耗津液枯乏引飲既多小便必利寢衰微肌肉脫剝指脈不榮精髓內竭推其所因涉內外與不內外古方不原病本但出禁忌似屬不內外因藥中乃用麻黃遠志得非內外兼併況心虛煩悶最能發渴風寒暑濕病冷作熱入於腎經引水自救皆明文也不知其因施治錯謬醫之大患不可不知三消脈證渴病有三曰消渴消中消腎消渴屬心故煩心致心火散蔓渴而引飲經云脈軟散者當病消渴諸脈軟散皆氣實血虛也消中屬脾疸熱成則為消中消中復有三有寒中熱中強中寒中陰勝陽郁久必為熱中經云脈洪大陰不足陽有餘則為熱中多食數溲為消中陰狂興盛不交精泄則為強中三消病至強中不亦危矣消腎屬腎盛壯之時不自謹惜快情縱欲極意房中年長腎衰多服丹石真氣既喪石氣孤立唇口乾焦精溢自泄不飲而利經云腎實則消不渴而小便自利名曰消腎亦曰內消三消治法真珠丸治心虛煩悶或外傷暑熱內積愁煩酣飲過多皆致煩渴口乾舌燥引飲無度小便或利或不利知母一法一兩一分川連去毛一法一兩苦參一法一兩玄參一法無鐵胤粉各一分研牡蠣煅一兩一分硃砂別研二兩麥門冬去心天花粉各半兩金箔銀箔二百片一法白扁豆煮去皮一兩上為末煉蜜入生栝蔞根汁少許丸如梧桐子大用金銀箔為衣每服二十丸至三十丸先用栝蔞根汁下一服次用麥門冬熟水下病退日二服忌炙爆酒色次投蓯蓉丸補蓯蓉丸蓯蓉酒浸磁石煅碎熟地黃山茱萸桂心山藥炒牛膝酒浸茯苓黃耆鹽湯浸澤瀉鹿茸去毛切醋炙遠志去心炒石斛覆盆子五味子萆薢破故紙炒巴戟酒浸龍骨菟絲子酒浸杜仲去皮銼薑汁製炒絲斷各半兩附子炮去臍一個重六錢上為末蜜丸如梧子大每服五十丸空腹米飲下姜粉散治消中多因外傷疸熱內積憂思喜啖鹹食及面致脾胃乾燥飲食倍常不為肌膚大便反堅小便無度生薑研汁控粉輕粉上搜勻每服二錢匕長流水調下齒浮是效次投豬肚丸補附子豬肚丸附子炮去皮臍檳榔不焙各一兩鱉甲醋煮各兩半當歸知母木香炮川楝銼炒秦艽去苗土大黃酒蒸龍膽草白芍藥破故紙酒浸炒枳殼麩炒去瓤各半兩上為末分作三分將二分入豬肚內縫定令蜜酒三升童子小便五升同入砂鉢內熬干爛研細入一分末同搜搗為丸如梧子大每服五十丸溫酒米湯下烏金散治熱中多因外傷燥熱內用意傷脾飲啖肥膩熱積胸中致多食數溲小便過於所飲亦有不渴而飲食自消為小便者黃丹炒細墨燒各一兩上研勻每服三錢食後先用水一兩碗嗽口待心中熱索水便以冷水調下爛金丸治熱中消渴止後將補精血益諸虛解勞倦去骨節間熱寧心強志安神定魄固臟腑進飲食免生瘡瘍大豬肚一個黃連三兩蜜生薑各二兩研先將豬肚淨洗復以蔥面醋椒等洗控干用藥同水酒入銀石器內煮半日漉出黃連洗去蜜酒令盡銼研為細末再用酒調成膏入先洗豬肚內縫定入銀石器內水熬爛研為膏搜下項藥人參二兩黃耆四兩五味子山藥山茱萸杜仲去皮銼薑汁淹炒絲斷石斛車前子鱉甲醋炙熟地黃新蓮肉去皮當歸各二兩槐角子炒白茯苓磁石煅碎各一兩川芎一兩沉香半兩不焙麝香一錢別研入菟絲子酒浸濕研五兩上為末用豬肚膏搜和得所膏少則添熟蜜杵數千下丸如梧子大食前溫酒糯米湯任下五十丸一法有白朮二兩陽起石一兩石子薺苨湯治強中多因耽嗜色欲及快意飲食或服丹真氣既脫藥氣陰發致煩渴引水飲食倍常陰器常興不交精出故中焦虛熱注於下焦三焦之中最為難治薺苨石膏各三兩人參茯神栝蔞根磁石煅碎知母乾葛黃芩甘草各二兩上為銼散每用水三盞腰子一個去脂膜黑豆一合煮至盞半去腰子大豆入藥四錢煎至七分去滓食後服下焦熱則夜間服渴止勿服次投補藥黃連豬肚丸治強中消渴服石子薺苨湯差退可服此補養黃連去須粱米栝蔞根茯神各四兩知母麥門冬去心各二兩上為末用大豬肚洗極淨入藥末縫定甑中炊極爛取出藥別研豬肚為膏搜前藥得所干即添少蜜杵數千下丸如梧子大飲服五十丸食前服胡桃丸治消腎亦去內消多因快情縱欲極意房中年少懼不能房多服丹石及失志傷腎遂致唇口乾焦精溢自出或小便赤黃五色浮濁大便燥實小便大利而不甚渴白茯苓胡桃肉湯去薄皮別研附子大者一枚去皮臍切作片生薑汁一盞蛤粉一分同煮乾焙上等分為末蜜丸如梧子大米飲下三五十丸或為散以米飲調下食前服古瓦湯治消腎消中飲水無度小便頻數乾葛天花粉人參雞䏶胵淨洗焙乾各等分上為末每服二大錢用多年古瓦碓碎煎湯調下不以時候服鹿茸丸治失志傷腎腎虛消渴小便無度鹿茸去毛切炙三分麥門冬去心二兩熟地黃黃耆雞䏶胵麩炒蓯蓉酒浸山茱萸破故紙炒牛膝酒浸五味子各三分茯苓玄參地骨皮各半兩人參三分上為末蜜丸如梧子大每服三十丸至五十丸米湯下遠志丸治心腎虛煩渴引飲胸間短氣小便自利白濁泄遺人參白茯苓川薑炮各半兩牡蠣煅取粉遠志去心薑汁製炒各一兩上為末用蓯蓉一兩酒熬成膏丸如梧子大每服五十丸糯米湯下六神湯治三消渴疾蓮房乾葛枇杷葉去毛甘草炙栝蔞根黃耆各等分上為銼散每服四錢水一盞煎七分去滓溫服小便不利加茯苓子童桑白皮湯治三消渴病或飲多利少或不飲自利肌膚瘦削四肢倦怠常服補虛止渴利童根桑白皮即未多成者去粗皮日乾不焙茯苓人參麥門冬去心乾葛乾山藥桂心各一兩甘草半兩生用玄菟丹治三消渴利神藥常服禁精止白濁延年菟絲子酒浸通軟乘濕研焙乾別取末十兩白茯苓干蓮肉各三兩五味子酒浸別為末稱七兩上為末別碾乾山藥末六兩將所浸酒余者添酒煮糊搜和得所搗數千杵丸如梧子大每服五十丸米湯下空心食前服梅花湯治三消渴利神糯谷旋炒作爆蓬桑根白皮厚者切細等分上每用稱一兩許水一大碗煮取半碗渴則飲不拘時豬脊湯治三消渴疾大棗四十九枚去皮核新蓮肉四十九粒去心西木香一錢半甘草二兩炙上用雄豬脊骨一尺二寸同煎藥用水五碗於銀石器煮去肉骨濾滓取汁一碗空服任意呷服忌生冷鹽藏等物以滓減去甘草一半焙乾為末米湯調服不以時八味丸治消渴小便多以飲水一斗利小便反倍之澤瀉茯苓牡丹皮各三兩桂心附子炮去皮臍各一兩山茱萸山藥各四兩熟地黃八兩上為末蜜丸梧子大每服五十丸米湯下食前服文蛤散治渴欲飲水不止文蛤即五倍子最能回津本草在海蛤文甚失其性識者當自知之上一味為末以水飲任調方寸匕不以時烏梅木瓜湯治酒食過度中焦蘊熱煩渴枯燥小便並多遂成消中兼治瘴渴所謂瘴渴者北人往南方瘴地多有此疾木瓜干烏梅打破不去仁麥糵炒甘草草果去皮各半兩上銼散每服四大錢水盞半姜五片煎七分去滓不以時候羊乳丸治嶺南山瘴風熱毒氣入腎中變寒熱腳弱虛滿而渴黃連不拘多少為末生栝蔞根汁生地黃取汁羊乳五羊乳牛乳人乳亦得上以三汁搜和為丸如梧子大每服米飲下三五十丸一法濃煮小麥粥飲下渴疾有人依山谷方單用菟絲子酒浸透直爾抄服甚效亦有將黃耆六兩甘草一兩作六一湯服之尤效又渴人病愈須預防發癰疽宜服忍冬丸忍冬丸忍冬草不以多少根莖花朵皆可用一名老翁須一名蜜啜花一名金銀花以洗淨用之上以米麴酒於瓶內浸以糠火煨一宿取出曬乾入甘草少許為末即以所浸酒為糊丸如梧子大每服五十丸至百丸酒飲任下不以時此藥不特治癰亦能止渴並五痔諸漏麥門冬煎治諸渴麥門冬去心人參黃耆各二兩白茯苓山茱萸山藥桂心各一兩半黑豆三合煮去皮別研上為末地黃自然汁二碗牛乳二盞熬為膏丸如梧子大麥煮飲下五十丸竹龍散治消渴五靈脂半兩黑豆半兩生去皮上為末煎冬瓜子湯調下二錢澄源丹治三消渴疾神妙牡蠣粉苦參蜜陀僧知母水銀以白蠟半分結砂五味各一兩栝蔞根一兩半黃丹一兩與水銀砂同研上為末男子用雌豬肚一個女人用雄豬肚一個入藥在內以線縫定用繩縛在新磚上別用生栝蔞根半斤切碎同煮早辰至午時取藥出不用栝蔞根只爛研豬肚和藥為丸如梧子大每服三十粒食前米湯下日三服十日可去病根料簡或云渴無外所因且傷寒脈浮而渴屬太陽有汗而渴屬陽明自利而渴屬少陰及陽毒傷寒倍重燥盛而渴甚者有中暑伏熱纍取不瘥而渴者有瘴毒氣染寒熱而渴者得非外因治法如傷寒論中不復繁引酒煮黃連丸治中暑熱渴最妙又有婦人産蓐去血過多而渴者名曰血渴非三消類不可不審五疸敘論古方敘五種黃病者即黃汗黃疸谷疸酒疸女勞疸是也觀別録則不止於斯然疸與黃其實一病古今立名異耳黃汗者以胃為脾表屬陽明陽明蓄熱喜自汗汗出因入水中熱必郁故汗黃也黃疸者此由暴熱用冷水洗浴熱留胃中所致以與諸疸不同故用黃字目之又云因食生黃瓜氣上熏所致人或疑其不然古賢豈妄詮也必有之矣谷疸者由夫肌發熱大食傷胃氣沖郁所致酒疸者以酒能發百脈熱由大醉當風入水所致女勞疸者由大熱交接竟入水水流濕入於脾因腎氣虛勝以所勝克入致腎氣上行故有額黑身黃之證世謂脾腎病者即此證也其間兼渴與腹脹者並難治發於陰必嘔發於陽則振寒面微熱雖本於胃氣鬱發土色上行然發於脾則為肉疸發於腎則為黑疸若論所因外則風寒暑濕內則喜怒憂驚酒食房勞三因悉備世醫獨麗於傷寒論中不亦濫矣學者宜識之黃汗證治病者身體腫發熱不渴狀如風水汗出染衣色正黃如蘖汁名曰黃汗桂枝加黃耆五兩湯治黃汗身腫汗出出已輒輕久久必身瞤胸中痛腰以下無汗腰臗弛痛如有物在皮中劇者不能食煩躁小便不利桂枝去皮芍藥各三兩甘草二兩炙黃耆五兩上為銼散每服四錢水盞半姜五片棗三枚煎七分去滓溫服仍飲熱粥以助藥力溫覆取微汗未汗又服黃耆苦酒湯治身體洪腫發熱自汗汗如蘖汁其脈沉黃耆五兩芍藥三兩桂心三兩上為銼散每服四錢苦酒三合水一盞半煎至七分去滓不以時服初服當心煩以苦酒阻故也至六七日稍自愈黃疸證治病者發黃身面眼悉黃如金色小便如濃煮蘖汁名曰黃疸麻黃醇酒治傷寒瘀血不解郁發於表發為黃疸其脈浮緊者以汗解之麻黃三兩去節上一味以醇酒五升煮取二升每服一盞溫服汗出愈秋冬用酒煮春夏用水煮谷疸證治病者發黃內熱食則腹滿眩暈穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸谷疸丸治胃蓄瘀熱氣濁食谷不消大小便不利脹滿不下食趺陽脈緊而數亦治因勞發熱熱鬱發黃苦參三兩龍膽草一兩梔子去皮炒半兩人參三分上為末以豬膽汁入熟蜜少許搜和丸如梧子大以大麥煮飲下五十丸日三不知稍加之紅丸子最治谷疸以生薑甘草湯下方見霍亂門酒疸證治五疸唯酒疸變證最多蓋酒之為物隨人性量不同有盈石而不醉者有濡吻而輒亂者以醞釀而成有大熱毒滲入百脈為病則不特發黃溢於皮膚為黑為腫流於清氣道中則眼黃鼻癰種種不同故方論中酒疸外有肉疸黑疸癖疸勞溢乃至令人恍惚失常等數證不同半夏湯治酒疸發黃身無熱靖言了了腹滿欲嘔心煩足熱或成癥癖心中懊憹其脈沉弦或緊細半夏洗去滑茯苓白朮各三兩前胡枳殼麩炒去瓤甘草炙大戟炒各二兩黃芩茵陳當歸各一兩上銼散每服四大錢水一盞半姜三片煎七分去滓空腹服二石散治肉疸飲少小便多如白泔色因酒所致其脈弦滑凝水石煅水飛白石脂煅栝蔞根桂心各一兩一分菟絲子酒浸別研知母各三分上為末每服二錢大麥飲調下桂術湯治酒疸因下後久久為黑疸目青面黑心中如啖韭齏狀大便正黑皮膚不仁其脈微而數桂心白朮各一兩枳實麩炒去瓤京豉乾葛杏仁甘草各半兩上為銼散每服四錢水一盞煎七分去滓食前服當歸白朮湯治酒疸發黃結飲癖在心胸間心下縱橫堅滿骨肉沉重逆害飲食小便赤黃此由本虛飲食生冷與脾胃痰結所致其脈弦澀方白朮茯苓各三兩當歸黃芩茵陳各一兩前胡枳實麩炒去瓤甘草炙杏仁麩炒去皮尖各二兩半夏湯洗七次二兩半上為銼散每服四大錢水二盞姜七片煎七分去滓食前服人參飲治飲酒房勞酒入百脈令人恍惚失常人參白芍藥栝蔞根枳殼麩炒去瓤茯神酸棗仁甘草炙各一兩熟地黃二兩上銼散每服四大錢水一盞煎七分去滓食後臨臥溫服如神散治酒毒不散發黃久久浸漬流入清氣道中宜引藥納鼻滴出黃水愈苦瓠子去皮苦葫蘆子去皮各三七個黃黍米三百粒安息香二皂子大上為末以一字搐入鼻中滴出黃水一二升忌勿吹或過多即以黍瓤燒灰麝香末各少許搐鼻立止女勞疸證治夫交接輸瀉必動三焦上焦屬心中焦屬脾下焦屬腎動則熱熱則欲火熾因入水中中焦熱鬱故能發黃下焦氣勝故額黑上焦走血隨瘀熱行大便溏黑貴勝人有男女同室而浴者多成此病攝生之人不可不知滑石石膏散治女勞疸身黃額黑日晡發熱惡寒小腹急足下熱其脈浮緊腹或滿者難治滑石石膏煅各等分上為細末以大麥粥飲調下二錢匕日三四小便極利則瘥硝石礬石散治女勞疸其腹臚脹膀胱急欲作水狀大便黑者非水其脈滑腹滿者難治硝石煅汁盡礬石煅汁盡上為末每服二大錢大麥汁調下日三重衣覆取汗病隨大小便出大便黑小便黃是效雜勞疸證治五疸之外有時行瘴瘧風寒暑濕等證疸不同茵陳梔子丸治時行病急黃及瘴瘧疫癘茵陳梔子去皮尖芒硝杏仁去皮尖炒各三分豆豉二分半湯浸軟別研恆山鱉甲醋炙各半兩巴豆去皮壓去油一分大黃蒸一兩一分上為末餳飴為丸如梧子大每服三丸飲下吐利為效未知加一丸覺體氣有異急服之妙艾煎丸治因傷風瘀熱不解發為風疸舉身皆黃小便或黃或白寒熱好臥不欲動其脈陽浮陰弱生艾三月採一束搗取汁銅器煎如膏大黃蒸黃連炒栝蔞根凝水石煅苦參葶藶紙隔炒各等分上為末以艾膏和得所丸如梧子大初服六七丸漸加至二十丸有熱加苦參渴加栝蔞根小便澀加葶藶小便多加凝水石小便白加黃連大便難加大黃所加並倍之五苓散治伏暑郁發黃小便不利煩渴用茵陳煎湯調下方見傷暑門礬石滑石散治濕疸始得之一身盡疼發熱面色黑黃七八日後壯熱熱在裡有血下如肫肝狀小腹滿者急下之身目盡黃小便不利其脈沉細礬石煅滑石各等分上為末每服二大錢大麥粥飲調下日三服食前便利如血者效或汗愈苦參散治人無漸忽然振寒皮膚麴塵出小便赤澀大便時祕氣無異飲食不妨服諸湯不除因為久黃方苦參黃連瓜蒂黃柏去皮大黃蒸各一分葶藶炒半兩上為細末每服一大錢飲調服當吐下隨時消息加減小半夏湯治黃疸小便色不異欲自利腹滿而喘者不可除熱熱去必噦半夏湯洗七次上為銼散每服三錢水二盞姜十片煎七分去滓不拘時養榮湯治五疸腳弱心忪口淡耳響微寒發熱氣急小便白濁當作虛勞治之方見虛損門
