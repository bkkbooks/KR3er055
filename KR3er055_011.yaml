body:
  text: 卷之十一脹滿敘論內經有鼓脹太素作谷脹治法雖詳而不論其所因原其脹滿之端皆胃與大腸二陽明為二太陰之表大抵陰為之主陽與之正或臟氣不平勝克乘克相感相因致陰陽失序遂有此證假如怒傷肝肝克脾脾氣不正必脹於胃名曰勝克或怒乘肺肺氣不傳必脹於大腸名曰乘克憂思聚結本臟氣鬱或實或虛推其感涉表裡明之皆內所因或冒寒暑風濕隨其經絡傳至陽明致脹滿者屬外所因飲食飢飽生冷甜膩聚結不散或作痞塊膨脹滿悶屬不內外因當知脹滿該涉三因須以人迎氣口分其內外脈息虛實審其溫利詳而調之無失機要不爾則為腹心痼疾坐受困踣不可不謹脹滿證治論云五積久而必心腹脹滿且五積以五臟氣不平肝為肥氣心為伏梁肺為息奔脾為痞氣腎為奔豚皆聚結痞塊隨所生所成之日分推而究之皆喜怒憂思乘克勝克相因相感如斯等類從五積法治之可也但內所因不待成積即為脹滿亦當隨其臟氣而平治之所謂虛實補瀉太過不及以經調治大半夏湯治肝氣不平勝克於脾脾郁不行結聚涎沫閉於臟氣腑氣不舒胃則脹滿其脈弦遲故知中虛胃冷脹滿可服此下氣進食半夏洗七次湯去滑桂心各五兩附子炮去皮臍人參甘草炙厚朴薑製炒當歸茯苓枳實麩炒去瓤各三兩川椒炒出汗去合口者八百粒上為銼散每服四大錢水一盞半姜五片棗三枚煎七分去滓食前服千金溫胃湯治憂思聚結脾肺氣凝陽不能正大腸與胃氣不平脹滿沖咳食不得下脈虛而緊澀附子炮去皮臍當歸厚朴去皮生用人參橘皮白芍藥甘草炙各一兩乾薑一兩一分川椒炒出汗去合口者三分上為銼散每服四大錢水二盞煎七分去滓食前服附子粳米湯治憂怒相乘神志不守思慮兼併擾亂臟氣不主傳導使諸陽不舒反順為逆中寒氣脹腸鳴切痛胸脅逆滿嘔吐不食附子一個生去皮臍虛人略炮半夏湯洗七次粳米各三錢半字甘草炙一錢一字乾薑一分千金方如此上銼散每服四大錢水二盞棗三個煎七分去滓食前服七物厚朴湯治腹滿發熱以陽並陰則陽實而陰虛陽盛生外熱陰虛生內熱脈必浮數浮則為虛數則為熱陰虛不能宣導飲食如故致脹滿者為熱脹厚朴薑製炒一兩甘草炙大黃蒸各三錢三字枳實麩炒去瓤半兩桂心一分上為銼散每服四大錢水盞半姜七片棗三個煎七分去滓食前服嘔者加半夏一分利者去大黃寒多加生薑十片煎麝香綿灰散治腹虛脹滿朝緩暮急服諸藥不瘥惡風不能宣泄彭彭鼓脹寒蠶綿燒灰半兩麝香半錢別研上研細令勻每服一大錢匕濃煎薄荷湯調下酒服尤佳不以時一法有乾漆炒大煙出量虛實用之虛則不可用溫中湯治虛人老人飲啖生冷多致腹脹心下痞滿有妨飲食或刺痛泄利氣痞滯悶厚朴去皮細銼甘草銼細生薑洗切青州棗切各等分上二件搗令得所方入生薑又杵令勻取出同棗焙令浥浥微燥卻入鍋內慢火炒至紫色又焙乾為細末每服一大錢擦生薑少許沸湯點空腹服以知為度氣味殊美兼能愈疾又易修合料簡上件諸方如內因與不內外因皆可選用若外因傷風傷寒傳至陽明經腹脹可以大承氣杏子湯等各見本門濕脹朮附湯加茯苓桂心暑脹黃龍丸皆良藥也更有腳氣支滿脾橫泄及五疸石水婦人腸覃血膨或單單腹脹之證治之各見本門學者當審詳為治無致混濫失其機要也霍亂敘論夫霍亂之病為卒病之最者以人起居無他揮霍之間便至變亂悶絶不救甚為可畏臨深履危不足以諭有生之流不可不達其旨趣蓋其病因涉於內外不內外三種具備而讀傷寒論者見有本是霍亂今是傷寒之說便謂霍亂即傷寒殊不知因傷寒致霍亂只是外因一證爾況風暑濕皆有此證殊不知喜怒憂思飲食飢飽皆能致霍亂之證故不得不備論霍亂諸證霍亂者心腹卒痛嘔吐下利增寒發熱頭痛眩暈先心痛則先吐先腹痛則先下心腹俱痛吐利並作甚則轉筋入腹則斃霍亂惡證無越於斯此蓋陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞隔上下奔逸扶救不先治之唯宜溫暖更詳別三因隨內外以調之不爾則坐視困踣也霍亂外因證治諸惡風惡寒有汗無汗重著煩毒皆外所因蓋傷風則惡風有汗傷寒則惡寒無汗冒濕則重著傷暑則熱煩此雖常論揮霍之間倉卒不辨遂致錯誤亂經反常為害不淺豈止本為霍亂今是傷寒而已哉當隨外所因治之乃可理中湯治霍亂吐下脹滿食不消心腹痛人參乾薑炮白朮甘草炙各三兩上為銼散每服四大錢水一盞煎七分去滓食前遠行防霍亂煉蜜和丸如梧子大每服三五十丸如作散每服方寸匕酒調下亦得若轉筋者加石膏煅三兩若臍上築者腎氣動也去朮加桂心四兩腎惡燥故去朮恐作奔豚故加桂吐多者去朮加生薑三兩下多者復用術悸者加茯苓二兩渴欲得水加朮合前成四兩半腹中痛加人參合前成四兩半若寒者加乾薑合前成四兩半腹滿者去朮加附子服藥後食頃食熱粥一杯微自溫覆勿發揭衣被噦則加丁香吐利止身體痛不休者審其原因以和解之如初因傷風用桂枝之類所謂治有本也外因料簡凡外所因必自經絡傳入臟腑須以脈證推其所因隨經調之則盡善矣假如傷寒在太陰經當用四逆湯少陰經當用附子麻黃湯厥陰經當用理中湯若在太陽經還用麻黃湯陽明經養胃湯少陽經小柴胡湯風暑濕亦然風則桂枝湯暑則香薷飲五苓散濕則苓朮湯滲濕湯皆可於諸門隨證檢用不復繁引霍亂內因證治諸大喜傷心則氣散大怒傷肝則氣激憂傷肺則氣聚思傷脾則氣結恐傷腎則氣卻驚傷膽則氣亂臟氣既郁聚結涎飲痞隔不通遂致滿悶隨其勝復必作吐利當從外所因治之七氣湯治喜怒憂思悲恐驚七氣鬱發致五臟互相刑剋陰陽反戾揮霍變亂吐利交作寒熱眩暈痞滿咽塞半夏湯洗五兩厚朴薑製桂心各三兩茯苓白芍藥各四兩紫蘇葉橘皮各二兩人參一兩上為銼散每服四錢水盞半姜七片棗一個煎七分去滓空腹服胃氣丸治憂思過度脾肺氣閉聚結涎飲留滯腸胃氣鬱於陰凝寒於陽陰陽反戾吐利交作四肢厥冷頭目眩暈或復發熱兼治老人胃寒大便反祕妊娠惡阻全不納食硫黃不拘多少豬臟內縛兩頭以米泔酒童子小便各一碗煮乾一半取出洗斷穢氣控干稱十兩半夏湯洗去滑稱五兩白茯苓人參各一兩石膏一分煅一法同硫黃煮上為末生薑自然汁釋炊餅糊為丸如梧子大每服五十丸至百丸空腹米湯入少生薑汁下真珠散治喜怒不常憂思兼併致臟氣鬱結留積涎飲胸腹滿悶或復㽲痛憎寒發熱吐利交作附子一個一生一炮各去皮臍半夏湯二十一次洗去滑一兩半滑石成煉鍾乳各半兩辰砂三分別研上為末每服二錢水二盞姜七片藿香兩三葉蜜半匙煎七分食前冷服小便不利加木通茅根煎不內外因證治諸飽食膾炙恣飧乳酪水陸珍品脯醢雜淆快飲寒漿強進旨酒耽縱情欲不節以胃為五臟海因脾氣以運行胃既䐜脹脾臟停凝臟氣不行必致郁發遂成吐利當從不內外因治之紅丸子治脾胃虛冷飲食不節宿食留飲聚癖腸胃或因氣不調沖冒寒濕忽作霍亂吐利並作心腹絞痛腸胃纏刺疲苶不勝蓬朮銼三稜銼各二兩同以米醋煮一伏時胡椒一兩青皮三兩炒阿魏一分上為末醋化阿魏入陳米粉為糊丸如梧子大礬朱為衣每服一百丸至二百丸煎生薑甘草湯下胡椒湯治霍亂吐利為佳胡椒七粒緑豆三七粒上為末煎木瓜湯調下訶子散治老幼霍亂吐利一服取效方見九痛門霍亂凡例轉筋者以陽明養宗筋屬胃與大腸令暴下暴吐津液頓亡外傷四氣內積七情飲食甜膩攻閉諸脈枯削於筋宗筋失養必致攣急甚則卵縮舌卷為難治木瓜湯治霍亂吐下不已舉體轉筋入腹則悶絶木瓜干一兩吳茱萸半兩湯七次茴香一分甘草炙一錢上為銼散每服四大錢水一盞半姜三片紫蘇十葉煎七分去滓食前服煩渴者以陰陽反戾清濁相干清氣干濁水與谷並小便祕澀既走津液腎必枯燥引水自救煩渴必矣茯苓澤瀉湯治霍亂吐利後煩渴欲飲水茯苓八兩澤瀉四兩甘草炙二兩桂心二兩白朮三兩上為銼散每服四大錢水一盞姜三片煎七分去滓食前服一方有小麥五兩水浸丹治伏暑傷冷冷熱不調霍亂吐利口乾煩渴黃丹一兩一分炒巴豆二十五個去皮心上同研勻用黃蠟熔作汁和為丸如梧子大每服五丸以水浸少頃別以新汲水吞下不以時候乾霍亂者忽然心腹脹滿絞刺痛疼蠱毒煩冤欲吐不吐欲利不利狀若神靈所附頃刻之間便致悶絶亦涉三因或臟虛或腸胃素實故吐利不行鹽湯治乾霍亂及蠱毒宿食不消積冷心腹煩滿鬼氣至鹹鹽湯三升熱飲一升刺口令吐宿食使盡不吐更服吐訖復飲三吐乃止此法大勝諸治俗人以為田舍淺近鄙而不用守死而已凡有此病即先用之嘔吐敘論嘔吐雖本於胃然所因亦多端故有寒熱飲食血氣之不同皆使人嘔吐據論云寒氣在上憂氣在下二氣並爭但出不入此亦一塗未為盡論且如氣屬內因則有七種不同寒涉外因則六淫分異皆作逆但鬱於胃則致嘔豈拘於憂氣而已況有宿食不消中滿溢出五飲聚結隨氣番吐痼冷積熱及瘀血凝閉更有三焦漏氣走哺吐利泄血皆有此證不可不詳辨也寒嘔證治病者胃中寒心下淡淡四肢厥冷食既嘔吐名曰寒嘔或因傷食多致傷胃氣或因病曾經汗下致胃氣虛冷之所為也四逆湯治寒嘔脈弱小便復利身有微熱見厥者難治甘草一錢炙乾薑三錢三字附子六錢重生去皮臍上為銼散每服三錢重水二盞煎七分去滓食前溫服生硫黃丸治同前硫黃不拘多少上一味以柳木槌研細生薑汁釋炊餅糊為丸如梧子大每服五十丸米湯下食前靈液丹治胃中虛寒聚積痰飲食飲不化噫醋停酸大便反堅心胸脹滿惡聞食氣婦人妊娠惡阻嘔吐不納食者硫黃打碎附子去皮臍切如緑豆大各一兩緑豆四兩用水一碗煮乾焙上為末生薑自然汁煮麵糊為丸如梧子大每服五十丸米湯下食前服熱嘔證治病者胃中挾熱煩躁聚結涎沫食入即吐名曰熱嘔或因胃熱伏暑及傷寒伏熱不解濕疸之類皆熱之所為也小柴胡湯治熱嘔方見傷寒門治法曰病者常發汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故吐當作寒嘔治之不可用此痰嘔證治病者素盛今瘦腸中瀝瀝有聲食入即嘔食與飲並出名曰痰嘔或因氣鬱涎結於胃口或因酒食甜冷聚飲之所為也大半夏湯治心氣不行郁生涎飲聚結不散心下痞硬腸中瀝瀝有聲食入即吐半夏二兩湯洗十次完用人參三錢三字切上分四服每服水三盞蜜二錢重和水揚令勻入藥煎至六分去滓溫服一法有生薑七片治法曰嘔家先渴今反不渴者以心下有支飲故也治屬支飲茯苓澤瀉湯治同前方見霍亂門食嘔證治病者胸腹脹悶四肢厥冷惡聞食臭食入即嘔朝食暮吐暮食朝吐名曰食嘔此由飲食傷脾宿穀不化之所為也大養胃湯治飲食傷脾宿穀不化朝食暮吐暮食朝吐上氣復熱四肢冷痹三焦不調及胃虛寒氣在上憂氣在下二氣並爭但出不入嘔不得食厚朴去皮生薑各二兩肥棗三兩銼同上三味炒白朮山藥炒人參川芎橘皮當歸五味子藿香甘草炙枇杷葉刷毛姜炙黃耆各一兩上為銼散每服四錢水一盞半姜三片棗一個煎七分去滓空腹服或為細末米湯調下亦快治中湯治同前兼治中寒飲食不化吞酸哯啘食則膨亨脹滿嘔逆人參白朮乾薑炮甘草炙青皮陳皮各等分上為銼散每服四大錢水一盞半煎七分去滓大便祕入大黃棋子大兩枚血嘔證治病者心下滿食入即嘔血隨食出名曰血嘔此由瘀蓄冷血聚積胃口之所為也茯苓湯治憂怒兼併氣攻血溢停留胃管噯聞血腥嘔吐食飲及妊娠中脘宿冷冷血侵脾惡聞食氣病名惡阻半夏三兩湯洗十次茯苓熟地黃各一兩八錢橘皮細辛人參芍藥川芎旋覆花桔梗甘草炙各一兩二錢上為銼散每服四大錢水二盞姜七片煎七分去滓空腹服有客熱煩渴口瘡者去橘皮細辛加前胡知母腸冷下利者去地黃入桂心炒胃中虛熱大便祕小便澀去地黃加大黃一兩八錢黃芩六錢當歸湯治三焦虛損或上下發泄吐唾血皆從三焦起或因熱損發或因酒發悉主之當歸乾薑炮熟地黃柏皮小薊羚羊角鎊阿膠炒各三錢三字白朮芍藥各半兩黃芩甘草炙各一分上為銼散每服三錢水二盞竹茹一塊如指大煎至八分去滓入伏龍肝半錢匕頭髮灰半錢匕蒲黃半錢匕又煎至七分不以時候服氣嘔證治病者心膈脹滿氣逆於胸間食入即嘔嘔盡卻快名曰氣嘔胃者足陽明合榮於足今隨氣上逆結於胃口故生嘔病也茱萸人參湯治氣嘔胸滿不納食嘔吐涎沫頭疼吳茱萸湯洗數次五兩人參三兩上為銼散每服四大錢水一盞半姜五片棗三枚煎七分去滓不以時服藿香湯治心下虛滿飲食不入時時嘔吐惙惙短氣或大病將理不復胃氣無以養日漸羸弱藿香人參桂心桔梗木香白朮各半兩茯苓半兩枇杷葉十片去毛半夏一兩湯洗用薑汁製上為銼散每服五錢水二盞入炒薑絲一分煎七分去滓食前服漏氣證治病者身背皆熱肘臂攣痛其氣不續膈間厭悶食入則先吐而後下名曰漏氣此因上焦傷風開其腠理上焦之氣剽悍滑疾遇開即出經氣失道邪氣內著故有是證麥門冬湯治上焦伏熱腹滿不欲食食入胃未定汗出身背皆熱或食入先吐而後下名曰漏氣麥門冬去心生蘆根竹茹白朮各五兩甘草炙茯苓各二兩橘皮人參葳蕤各三兩上為銼散每服四大錢水一盞半姜五片陳米一撮煎七分去滓熱服走哺證治病者下焦實熱大小便不通氣逆不續嘔逆不禁名曰走哺此下焦氣起於胃下口別入回腸注於膀胱並與胃傳糟粕而下大腸令大小便不通故知下焦實熱之所為也人參湯治下焦伏熱氣逆不續大小便不通嘔吐不禁名曰走哺人參葳蕤黃芩知母茯苓各三錢白朮橘皮生蘆根梔子仁各半兩石膏煅一兩上為銼散每服四錢水一盞半煎七分去滓溫服厚朴湯治乾嘔嘔而不逆熱少冷多好唾白沫清涎噫氣吞酸此由上焦閉塞厚朴薑製白茯苓川芎白朮玄參吳茱萸湯洗各半兩桔梗附子炮去皮臍人參橘皮各三錢三字上為銼散每服四大錢水一盞半姜五片煎七分去滓溫服三物豬苓散治嘔吐病在膈上思水者是欲解也豬苓去皮白茯苓白朮各等分上三味末之飲服方寸匕凡例凡先嘔卻渴者此為欲解先渴卻漚者為水停心此屬飲家又傷寒瘥後餘熱在胃嘔者依傷寒後證治之若腳弱脾疼而嘔者此腳氣內攻宜急依腳氣門治之更有婦人懷娠惡阻嘔吐亦各從其門類或中毒而嘔以解毒藥解之酒家嘔吐當以解醒藥解之其如三焦漏氣走哺嘔吐則見上門泄利則見下利門各從其類也然嘔不得輕用利藥唯腹滿則視其前後何部不利利之即愈噦逆論證噦者咳逆也古方則謂之噦凡吐利後多作噦大率胃實即噫胃虛則噦此由胃中虛膈上熱故噦或至八九聲相連收氣不回至於驚人者若傷寒久病得此甚惡內經所謂壞府者是也楊上善釋云津泄者知鹽器之漏聲嘶者知琴絃之絶葉落者知槁木之摧舉此三物衰壞之微以比噦故知是病深之候也亦有噦而心下堅痞眩悸者以膈間有痰水所為其他病則各有治法噦治法橘皮竹茹湯治咳逆嘔噦胃中虛冷每一噦至八九聲相連收氣不回至於驚人橘皮二兩人參一兩甘草炙半兩上為銼散每服四錢水一盞半竹茹一小塊姜五片棗二個煎七分去滓不以時服羌活散止咳逆羌活附子炮去皮臍茴香炒各半兩木香乾薑炮丁香各一兩上為末每服二錢水七分盞鹽少許煎數沸空腹服丁香散治咳逆噎汗丁香柿蒂各一錢甘草炙良薑各半錢上為末用熱湯點二錢乘熱服不以時又一方産後咳逆方見婦人門醋咽證治夫中脘有飲則嘈有宿食則酸食後噫醋吞酸皆宿食證俗謂之咽酸是也曲術丸治中脘有宿食留飲酸蜇心痛口吐清水噯宿腐氣者神麯炒三兩蒼朮泔浸三宿洗淨曬乾炒一兩半陳皮一兩上為末生薑汁別煮神麯末糊為丸如梧子大每服三五十丸薑湯下不以時服五百丸治宿食留飲聚積中脘噫臭吞酸心腹疼痛並療中虛積聚及臟腑飧泄赤白痢下丁香巴豆去皮別研縮砂仁胡椒烏梅去核上件各一百個為細末炊餅糊為丸如緑豆大每服五七丸熟水下食後臨臥服㯏氣敘論夫谷飪之邪從口入者宿食也蓋五味入口所以滋養五臟得之則生不得則死傷之則反為生害所以宿食為雜病之先若五臟不平食不輸化血凝氣滯群證蜂起皆宿食所為也治之當量其臟腑虛實淺深為治養生方戒不得用巴豆令服青木香丸如有食癖非巴豆不克所謂擾乎可擾擾亦無擾木香丸用牽牛牽牛最瀉人腎不徒不能消食積而又害於元精識者知之其病頭痛惡風憎寒心腹脹滿下利不欲食吞酸噫宿腐氣若胃實熱食反留滯其脈數而滑宜下之愈若脾虛其脈浮大按之反澀尺中亦微澀宜溫藥消導穀氣治法如神木香丸治穀氣聚結癥瘕胸脅悶痛或吐酸水食後噫作生熟氣腹脹泄瀉及四肢浮腫木香硇砂滴淋控干蓬朮炮胡椒半夏漿水煮乾漆炒大煙盡各半兩縮砂仁桂心青皮各三兩附子炮去皮臍三稜醋煮一宿各一兩白姜炮一兩上為末蜜丸如梧子大每服三五十丸生薑橘皮湯下空心服感應丸太乙神明再造治虛中積冷氣弱有傷不能傳化心下堅滿兩脅膨脹心腹疼痛噫宿腐氣及霍亂吐瀉或復遲澀久利赤白膿血相雜米穀不消久病形羸面黃口淡不能飲食肉豆蔻川薑炮百草霜各二兩木香一兩半蓽澄茄京三稜炮各一兩巴豆一百粒去皮心別研杏仁一百粒去皮尖別研酒蠟四兩油一兩丁香一兩上除巴豆杏仁外併為細末次下巴豆杏仁等和勻先將油煎蠟令熔化傾在藥末內和成劑入臼內杵千餘下旋丸如緑豆大每服三五丸熟水吞下食後臨臥服小兒如黍米大二三丸泄瀉敘論方書所載瀉利與經中所謂洞泄飧泄溏泄溢泄濡泄水穀注下等其實一也仍所因有內外不內外差殊耳經云寒甚為泄春傷風夏飧泄論云熱濕之氣久客腸胃滑而利下皆外所因喜則散怒則激憂則聚驚則動臟氣隔絶精神奪散必致溏泄皆內所因其如飲食生冷勞逸所傷此不內外因以此類推隨證主治則不失其病源也虛寒泄瀉治法桂香丸治臟腑虛為風濕寒所搏冷滑注下不禁老人虛人危篤纍效附子炮去皮臍肉豆蔻炮白茯苓各一兩桂心白姜炮木香炮各半兩丁香一分上為末糊丸如梧子大米湯下五十丸空腹服香朴丸治腸胃虛冷泄瀉注下無度脾虛氣閉不進飲食厚朴五兩薑汁製炒白朮三兩茴香炒陳皮各三兩訶子炮去核赤石脂煅各一兩半上為末麵糊丸如梧子大空服米湯下五十丸常服暖腸胃建脾丸治虛勞羸瘦身重胃冷飲食不消泄瀉不止或作滯下久變五色穢臭鍾乳粉赤石脂煅各一兩半枯礬乾薑炮蓯蓉酒浸石斛酒浸五味子桂心澤瀉桑生寄生遠志去心炒人參柏子仁當歸酸石榴皮龍骨煅天雄炮去皮臍牡蠣粉白頭翁去苗甘草炙各一兩上為末蜜丸梧子大米湯下三十丸空腹服豆蔻分氣飲治臟腑虛寒泄瀉瘦極及婦人産後洞泄危篤者藿香葉草豆蔻仁青皮各四兩甘草炙丁香各半兩肉豆蔻炮十兩烏梅五十個去仁上銼散每服四錢水二盞糯米一撮煎七分去滓空腹服羊肉扶羸丸治脾胃不和不進飲食臟腑虛滑老人虛人尤宜服之精羊肉一斤半微斷血脈焙乾取末四兩白姜炮一兩川椒去目炒出汗肉豆蔻煨各一兩木香一分附子炮去皮臍神麯炒各半兩上為末煮粟米飲為丸如梧子大食前米湯下五十丸川椒丸治臟虛泄瀉無度黃連炒烏梅肉當歸川椒炒出汗桂心乾薑炮各等分上為末糊丸梧子大每服三五十丸米湯空腹服實熱泄瀉治法小承氣湯治下利譫語者有燥屎故也方見傷寒門夫泄瀉卻用大黃者乃通因通用也非大實熱勿輕用之冷熱泄瀉治法博濟香姜散治久患脾泄瀉生薑四兩黃連一兩上皆銼如豆大一處慢火炒令姜焦赤去姜碾黃連為細末每服二錢空腹臘茶清調下或將姜為末米飲調治白痢亦效建脾散治五泄或青白五色雜下休作無時烏頭炮去皮尖三分厚朴去皮銼薑製炒甘草炙乾薑炮各一分上為末每服二錢水一盞姜三片煎七分熱服止瀉如神丸川烏頭四兩米泔浸軟去皮切片用鹽四兩炒黃去鹽不用半夏湯洗七次去滑蒼朮各半斤米泔浸淨洗上為末薑汁糊為丸梧子大空腹米湯下五六十丸戊己丸治脾胃受濕泄利不止及米穀不化小兒疳痢並宜服之黃連吳茱萸湯洗白芍藥各等分上三味同炒為細末米糊丸如梧子大每服三五十丸米湯空腹下小兒量與之補脾散治脾泄不止食積不消癥瘕塊結大腸滑泄臟毒下利腹痛腸鳴麥糵炒三兩神麯炒二兩茴香炒草果逐個用麵裹煨熟厚朴制乾薑炮陳皮各一兩木香生半兩甘草炙半兩上為末脾泄瀉訶子湯入鹽調下二錢脾虛腸鳴氣不和瀉不止炒姜酒調下常服鹽湯點空心食前服料簡凡治瀉須理中焦如理中湯丸等是也次即分利水穀如五苓散等是也治中不效然後斷下即用禹餘糧赤石脂等是也玉機真臟論云五虛死謂脈細皮寒少氣前後泄利飲食不入得此必死其有生者漿粥入胃泄注止則活也又金匱云六腑氣絶於外者手足寒上氣腳縮五臟氣絶於內者下利不禁甚者手足不仁脈沉弦者為下重脈大者為未止泄利手足厥冷無脈灸之不溫脈不還微喘者死有微熱而渴自汗脈或微弦數弱法並當自愈或脈沉遲而面少赤身微熱鬱冒汗出而解必微厥所以然者以其面戴陽下虛故也泄利後腹脹滿身體疼痛者先溫其里宜四逆湯後攻其表宜桂枝湯上件金匱節文雖於三因不甚分明其脈不可不究即用四逆治傷寒不妨用桂枝加附子治傷風朮附加桂治傷濕五苓散治傷暑皆可類推又古方泄利與滯下共為一門千金又以宿食不消在熱利類門類混濫後學難明不可甄別也
