body:
  text: 卷之十八蓐勞證治婦人因産理不順疲極筋力憂勞心慮致虛羸喘乏寒熱如瘧頭痛自汗肢體倦怠咳嗽痰逆腹中絞刺名曰蓐勞石子湯治蓐勞豬腎一對去脂膜四破無則以羊腎代之香豉蔥白粳米當歸芍藥各二兩上為銼散分兩劑每一劑用水三升煮取一小碗去滓分三服任意服陰脫證治婦人趣産勞力努咽太過致陰下脫若脫肛狀及陰下挺出逼迫腫痛舉重房勞皆能發作清水續續小便淋露硫黃散治産後勞陰脫硫黃烏賊魚骨各半兩五味子一分上為末糝患處當歸散治陰下脫當歸黃芩各二兩芍藥一兩一分蝟皮燒存性半兩牡蠣煅二兩半上為末每服二錢溫酒米湯任意調下忌登高舉重尉法單炒蛇床子乘熱布裹尉患處亦治産後陰痛桃仁膏治産後陰腫妨悶桃仁去皮尖枯礬五倍子各等分上以下二味為末研桃仁膏拌勻敷之硫黃湯治産勞玉門開而不閉硫黃四兩吳茱萸菟絲子蛇床子各一兩半上為銼散每服四錢水一碗煎數沸濾滓洗玉門日再洗下乳治法産婦有三種乳脈不行有氣血盛而壅閉不行者有血少氣弱澀而不行者虛當補之盛當疏之盛者當用通草漏蘆土瓜根輩虛者當用成煉鍾乳粉豬蹄鯽魚之屬概可見矣漏蘆散治乳婦氣脈壅塞乳汁不行及經絡凝滯乳內脹痛留蓄邪毒或作癰腫此藥服之自然內消乳汁通行漏蘆二兩半蛇蛻炙十條栝蔞十枚急火燒存性上為末每服二錢溫酒調下不以時仍吃熱羹湯助之成煉鍾乳散治乳婦氣少血衰脈澀不行乳汁絶少成煉鍾乳粉上研細每抄二錢濃煎漏蘆湯調下母豬蹄湯治如前母豬蹄一隻治如食法通草四兩上以水一斗浸煮熟得四五升取汁飲不下更作青桑膏治乳硬作痛嫩桑葉上採研細上米飲調攤紙花貼病處千金云凡患乳癰四十以下可治五十以上不可治治之則死不治自得終其天年惡露證治産後兒枕不散乃血瘕堅聚按之攫手日晡增劇疼痛淋露不快上攻心胸困頓狼狽宜服黑龍丹當歸湯奪命丹治之黑龍丹治産後一切血疾垂死者但灌藥無有不效者神驗不可言當歸五靈脂川芎高良薑乾地黃生者各一兩並細銼入一椽頭沙合內赤石脂泥縫紙筋鹽泥固濟封合炭火十斤煅通紅去火候冷開取合子看成黑糟乃取出細研入後藥百草霜別研五兩硫黃乳香各錢半花乳石琥珀各一錢上為細末米醋煮糊丸如彈子大每服一丸炭火燒通紅生薑自然汁與無灰酒各一合小便半盞研開頓服立效當歸湯治産後敗血不散兒枕硬痛或發或止及新産乘虛風寒內搏惡露不快臍腹堅脹當歸微炒鬼箭取羽用紅藍花各一兩上為銼散每服三錢酒一大盞煎七分去滓食前溫服奪命丹方見前第二論虛煩證治産蓐最難調理所以忌問男女及不許見穢惡者皆古人預防其妄念也每見婦人以得男則喜得女則憂憂喜太早致心虛煩悶多自此始蓋去血過多血虛則陰虛陰虛生內熱內熱曰煩其證心胸煩滿吸吸短氣頭痛悶亂骨節疼痛晡時輒甚與大病後虛煩相類人參當歸湯治産後煩悶不安人參當歸麥門冬去心乾地黃桂心各一兩芍藥二兩上為銼散每服四大錢水二盞先將粳米一合淡竹葉十片煎至一盞去米葉入藥並棗三枚煎七分去滓食前服地黃宜用生乾者虛甚則用熟蒲黃散治産後虛煩必效蒲黃不以多少紙上炒上一味每服一錢匕東流水調下不以時候虛渴證治産後去血過多津液不回腎氣虛弱多使人煩渴引飲無度雖非三消其證頗同治之當養血通氣回津補腎方效熟地黃湯治産後虛渴不止少氣腳弱眼昏頭眩飲食無味熟乾地黃一兩人參三兩麥門冬二兩栝蔞根四兩甘草半兩上為銼散每服四錢水二盞糯米一撮生薑三片棗三枚煎七分去滓食前服六氣經緯丸治同前方見前妊娠腹痛下利門當歸芍藥散淋閉證治諸治産前後淋閉其法不同産前當安胎産後當去血如其冷熱膏石氣淋等為治則一但量其虛實而用之瞿麥蒲黃最為産後要藥唯當尋其所因則不失機要矣茅根散治産後諸淋無問冷熱膏石結氣悉主之白茅根八兩生瞿麥穗白茯苓各四兩蒲黃桃膠滑石甘草炙各一兩子貝十個燒葵子人參各二兩石首魚腦骨二十個燒上為銼散每服四大錢水一盞半薑三片燈芯二十莖煎七分去滓溫服亦可為末煎木通湯調下二錢如氣壅閉木通橘皮煎湯調下産後雜病治法當歸養血丸治産後惡血不散發渴疼痛及惡露不快臍腹堅脹兼室女經候不勻赤白帶下心腹腰腳疼痛當歸赤芍藥牡丹皮延胡索各二兩炒桂心一兩上為末蜜丸如梧子大溫酒米飲下三五丸食前溫服痛甚細嚼咽下四神散治産後留血不消積聚作塊急切疼痛猶如遁尸及心腹絞痛下利當歸芍藥川芎乾薑炮各等分上為末每服方寸匕溫酒調下丁香散治産後咳逆石蓮肉十個去心炒丁香十枚上為末水半盞煎數沸服當歸黃耆湯治産後腰腳疼痛不可轉側壯熱自汗身體強氣短黃耆二兩當歸三兩芍藥二兩上銼散每服四大錢水一盞半薑五片煎七分去滓食前溫服竹葉湯治産後傷風發熱面正赤喘而頭痛乾葛三分防風桔梗桂心人參甘草炙各一分附子炮去皮臍半兩上為銼散每服四錢水一盞半薑五片棗三個竹葉十片煎七分去滓空腹服嘔者加半夏神授散治婦人産後一切疾病不問大小以至危篤不能者牡丹皮白芍藥桂心陳皮青皮各半兩當歸百合水浸川芎甘草炙乾薑炮各一兩人參神麯麥糵炒各三錢紅花一錢半上為末每服二錢水一盞薑三片棗一枚煎七分空腹服孕婦不得服調補法産後血氣既衰五臟俱損唯得將補不可轉利雖惡血未盡亦不可便服補藥須俟七日外臍下塊散方可投之若痛甚切者或崩傷泄利虛羸喘乏別生他疾帶起宿患宜尋閲諸方審詳調理不必拘以日數也如黑神散卻不妨黑神散治産後諸疾當歸白芍藥甘草炙白薑炮桂心黑豆炒去皮蒲黃熟地黃各等分上為末溫酒或小便任意調下空心服忌如常一法去蒲黃加附子四順理中丸治新産血氣俱傷五臟暴虛肢體羸乏少氣多汗才産直至百晬每日常服壯氣補虛調養臟氣蠲除余疾消穀嗜食兼治産後臟虛嘔吐不止甘草炙二兩人參白朮乾薑炮各一兩上末煉蜜丸如梧子大每服三十丸溫米飲下空心食前服當歸建中湯治産後勞傷虛羸不足腹中㽱痛吸吸少氣小腹拘急痛連腰背時自汗出不思飲食産訖直至滿月每日三服令人丁壯強健當歸四兩桂心三兩白芍藥六兩甘草炙二錢上銼散每服四大錢水一盞半薑三片棗二枚煎七分去滓入飴糖一塊再煎消服崩傷內衄加阿膠地黃煎濟陰丹治産後百疾百日內常服除宿血養新血方見後人參養血丸治産後出月羸瘦不復常方見後羊肉湯治産後腹中疼痛虛勞不足裡急脅痛並治寒疝當歸三錢生薑一兩一分精羊肉四兩橘皮半兩上銼散水三碗酒少許煎至一碗去滓分二服或少加蔥鹽亦佳婦人女子衆病論證治法婦人三十六病未論所述名品不同或云七癥八瘕九痛十二帶下共三十六雖有名數不見證狀又論云十二癥者是所下之物不同一如清血二黑血三紫汁四赤肉五膿痂六豆汁七葵羹八凝血九清血十米泔十一如月浣十二經不應期九痛者熱傷痛冷澀痛淋瀝痛小便時痛經來時痛脅脹痛汁出如蟲齧痛脅下分痛腰胯折痛七害者竅孔不利陰中寒熱小腹急堅臟內不仁子門揭瞤洞泄惡吐五傷者兩脅支滿心引脅痛氣結不通邪思泄利前後痼寒三痼者羸瘦不生肌斷緒不乳産經水閉塞亦名三十六病名品雖殊無非血病多因經脈失於將理産蓐不善調護內作七情外感六淫陰陽勞逸飲食生冷遂致榮衛不輸新陳干忤隨經敗濁淋露凝滯為癥為瘕流溢穢惡痛害傷痼犯時微若秋毫作病重如山嶽古人所謂婦人之病十倍男子雖言之太過亦明戒約之切也白堊丹治婦人三十六病崩中漏下身瘦手足熱惡風怯寒咳逆煩滿拘急短氣心脅腰背腹肚與子臟相引痛溺下五色心常恐懼遇恚怒憂勞即發皆是內傷所致白堊煅白石脂煅禹餘糧煅醋淬烏賊魚骨牡蠣煅龍骨煅細辛各一兩半當歸芍藥黃連白茯苓乾薑炮桂心人參石葦去毛一兩瞿麥穗白芷附子炮去皮臍白蘞甘草炙各一兩川椒炒去汗半兩上為末蜜丸梧子大空心酒下三十丸至五十丸濟陰丹治婦人久冷無子及數經墮胎皆因衝任之脈虛冷胞內宿挾疾病經水不時暴下不止月內再行或前或後或崩中漏下三十六疾積聚癥瘕臍下冷痛小便白濁以上疾證皆令孕育不成以至絶嗣此藥治産後百病百日內常服除宿血生新血令人有孕及生子充實亦治男子亡血諸疾木香炮茯苓京墨燒桃仁炒去皮尖各一兩秦艽甘草炙人參桔梗炒石斛酒浸蠶布燒藁本各二兩當歸桂心乾薑炮細辛牡丹皮川芎各一兩半川椒炒山藥各三分澤蘭熟地黃香附各四兩蒼朮八兩大豆卷炒半升糯米炒一升上為末蜜丸每兩作六丸每一丸嚼細食前溫酒醋湯任下烏雞煎治婦人百病吳茱萸醋煮良薑白薑炮當歸赤芍藥延胡索炒破故紙炒川椒炒生乾地黃劉寄奴蓬莪朮橘皮青皮川芎各一兩荷葉灰四兩白熟艾用糯米飲調餅二兩上為末醋糊丸如梧子大每服三五十丸具湯使如後月經不通紅花蘇木酒下白帶牡蠣粉調酒下子宮久冷白茯苓煎湯下赤帶建茶清下血崩豆淋酒調綿灰下胎不安蜜和酒下腸風陳米飲調百草霜下心疼菖蒲煎酒下漏阻下血烏梅溫酒下耳聾蠟點茶湯下胎死不動斑蝥二十個煎酒下腰腳痛當歸酒下胞衣不下蕓薹研水下頭風薄荷點茶下血風眼黑豆甘草湯下生瘡地黃湯下身體疼痛黃耆末調酒下四肢浮腫麝香湯下咳嗽喘痛杏仁桑白皮湯下腹痛芍藥調酒下産前後痢白者白薑湯下赤者甘草湯下雜者二宜湯下常服溫酒醋湯任下並空心食前服延齡丹治婦人衆病無所不治熟地黃川芎防風檳榔蕪荑炒蟬蛻洗柏子仁別研馬牙硝燒人參黃耆白薇川椒各半兩鯉魚鱗燒晚蠶砂炒當歸木香炮附子炮去皮臍石膏煅澤蘭各一兩藁本厚朴薑製炒甘草炙白薑炮各一兩半紅花炒吳茱萸洗各一分上為末煉蜜搜和杵數千下丸如彈子大每服一丸具湯使如後血瘕塊痛綿灰酒下催生溫酒細嚼下血勞血虛桔梗酒下血崩棕櫚灰酒下血氣痛炒白薑酒下血風荊芥酒下血暈悶絶胎死腹中胞衣不下並用生地黃汁童子小便酒各一盞煎二沸調下常服醋湯溫酒化下並空心食前服交感地黃煎丸治婦人産前産後眼見黑花或即發狂如見鬼狀胞衣不下失音不語心腹脹滿水穀不化口乾煩渴寒熱往來口內生瘡咽中腫痛心虛忪悸夜不得眠産後中風角弓反張面赤牙關緊急崩中下血如豚肝狀臍腹㽱痛血多血少結為癥瘕恍惚昏迷四肢腫滿産前胎不安産後血刺痛生地黃二斤研以布裂取汁留滓當歸一兩延胡索糯米內炒赤色去米一兩生薑二斤洗研如上法以生薑汁炒地黃滓地黃汁炒生薑滓各至干堪為末則止蒲黃四兩炒香南番琥珀二兩別研上為末蜜為丸彈子大當歸湯化下一丸食前服皺血丸調補衝任溫暖血海治胞絡傷損宿瘀乾血不散受胎不牢多致損墮常服去風冷益血當歸牛膝酒浸延胡索炒芍藥茴香蒲黃紙炒香附去毛蓬朮煨菊花熟地黃桂心各二兩為末烏豆一升醋煮為末上用醋煮烏豆干取豆為末再入二碗煮至一碗留在作糊為丸如梧子大酒飲任下五十丸人參養血丸治女人稟受怯弱血氣虛損常服補衝任調血脈宣壅破積退邪熱除寒痹緩中下堅脹安神潤顏色通氣散悶兼治婦人懷身腹中絞痛口乾不食崩傷眩暈及産出月羸瘦不復常者人參赤芍藥川芎菖蒲各一兩炒當歸二兩熟地黃五兩烏梅肉三兩上為末蜜搜杵數千下丸如梧子大每服五十丸至百丸溫酒米湯任下食前服四物湯調益榮衛滋養氣血治衝任虛損月水不調臍腹㽱痛崩中漏下血瘕塊硬發歇疼痛妊娠宿冷將理失宜胎動不安血下不止及産後乘虛風寒內搏惡露不下結生瘕聚小腹堅痛時作寒熱又治血臟虛冷崩中去血熟地黃當歸酒浸洗川芎白芍藥各等分上為銼散每服四錢水一盞半煎七分去滓空心服忌蔥蘿蔔溫經湯治衝任虛損月候不勻或來多不斷或過期不來或崩中去血過多不止及治曾經損墮損妊娠瘀血停留小腹中痛發熱下利手心煩熱唇口乾燥及小腹有寒久不受胎半夏湯七次去滑當歸酒浸一宿川芎人參白芍藥牡丹皮桂心阿膠蛤粉炒甘草炙各二兩吳茱萸湯洗炒三兩麥門冬去心五兩上為銼散每服三錢水一盞半生薑五片煎八分去滓熱服空心食前牡丹散治血虛勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發熱盜汗減食嗜臥及血熱相搏月水不利臍腹脹痛寒熱如瘧又治室女血弱陰虛榮衛不和痰嗽潮熱肌體羸瘦漸成骨蒸牡丹皮芍藥甘草一半鹽湯浸炙一半生用桂心沒藥別研延胡索紅花當歸烏藥各一兩陳皮蘇木鬼箭蓬朮炮各一分乾漆炒二錢上為末每服二錢白水煎七分忌生冷伏龍肝散治氣血勞傷衝任脈虛經血非時忽然崩下或如豆汁或成血片或五色相雜或赤白相兼臍腹冷痛經久未止令人黃瘦口乾飲食減少四肢無力虛煩驚悸使人無子伏龍肝赤石脂煅醋淬牡蠣煅取粉烏賊骨取粉禹餘糧煅醋淬桂心各等分上為細末空腹酒飲任下二錢白多者加牡蠣烏賊骨赤多者加赤石脂禹餘糧黃多者加伏龍肝桂心隨病加之一法有龍骨艾煎丸治崩傷淋瀝小腹滿痛常服補榮衛固經脈食茱萸湯洗當歸各七錢半熟地黃白芍藥各一兩半石菖蒲炒川芎人參各一兩熟艾四兩用糯米飲調作餅焙上為末酒煮糊為丸梧子大每服五十丸酒飲任下滋血湯治婦人血風血熱血虛經候澀滯經脈不通四肢麻木肌體渾身疼痛倦怠將成勞瘵馬鞭草取穗荊芥穗各四兩桂心當歸枳殼湯浸麩炒赤芍藥川芎各二兩牡丹皮一兩上粗為末每服四大錢水一盞半烏梅一枚煎七分去滓空心服抵當湯治婦人經水不利水蛭銼炒虻蟲去翅足各炒三十個桃仁三十七個炒去皮尖大黃蒸三錢三字上為粗末每服四錢水一盞半煎七分去滓溫服血未利更服亦治男子有瘀血膀胱痛萬病丸治室女月經不通臍下堅結大如杯升發熱往來下痢羸瘦此為血瘕若生肉癥不可為也血瘕一作氣瘕此即石瘕證也乾漆杵細炒令火煙出煙頭青白一時久牛膝酒浸一宿各一兩六錢生地黃四兩八錢取汁上以地黃汁入下二味為末慢火熬俟可丸即丸如梧子大空心米飲或溫酒下二丸日再勿妄加病去止藥婦人氣血虛經不行若服破血行經藥是殺之也謹之礬石兌丸治婦人經水閉不利臟堅癖不止中有乾血下白物礬石三分燒杏仁一分去皮尖炒上研杏仁細入礬灰加少蜜丸如棗大綿裹納陰中未知再作三稜煎治婦人血癥血瘕食積痰滯三稜蓬朮各四兩青皮半夏湯洗七次麥糵各三兩上用好醋六升煮乾焙為末醋糊丸梧子大醋湯下三四十丸痰積薑湯下烏金散治婦人血氣血癥血風勞心煩躁筋骨疼痛四肢困瘦好黑豆十兩沒藥當歸各半兩洗焙乾為末上先將黑豆不犯水淨拭用沙瓶一隻入豆在內以瓦片蓋鹽泥固濟留觜通氣炭火二斤煅煙盡存性以鹽泥塞瓶觜退火次日取出豆如鴉翼研細方入後末研勻不拘時候溫酒調下二錢重者不過三五服忌鯉魚毒肉水母之類烏喙丸治腸覃病因寒氣客於腸外與胃氣相搏正氣不榮系瘕內著惡氣乃起其生也始如雞卵久久乃成狀如懷胎按之堅推即移月事時下故曰腸覃亦治乳余疾大小便不利並食有伏蟲臚脹癰疽毒腫久寒邪氣烏喙炮去皮尖一錢半夏湯洗七次四錢石膏煅藜蘆炒牡蒙蓯蓉酒浸各一錢桂心乾薑炮各一錢三字巴豆六七個研膏上末蜜丸如緑豆大每服三五丸食後酒飲任下治男子疝痛木香散治婦人脾氣血氣血蠱氣蠱水蠱石蠱木香沉香乳香研甘草炙各一分川芎胡椒陳皮人參晉礬各半兩桂心乾薑炮縮砂各一兩茴香炒一兩半天茄五兩赤小者日乾稱上洗焙為末空心日午溫陳米飲調下二錢忌羊肉石莖散治婦人血結胞門或為癥瘕在腹脅間心腹脹滿腫急如石水狀俗謂之血蠱石莖一兩當歸尾馬鞭草各半兩紅花炒半兩烏梅肉各半兩蓬朮炮三稜炮蘇木節沒藥琥珀別研各一分甘草一錢上為末濃煎蘇木酒調下二錢不飲酒薑棗煎湯調亦得大腹皮飲治婦人血癭單單腹腫大腹皮防己木通厚朴薑製栝蔞黃耆枳殼麩炒桑白皮炙大黃蒸陳皮青皮五味子各等分上銼散每服稱一兩水一碗煎至六分盞去滓入酒一分溫服不以時候大黃甘遂湯治婦人小腹滿如敦狀小便微難而不渴産後者為水與血並結在血室也大黃四兩蒸甘遂炮阿膠炒各二兩上銼散每服三錢水一盞煎七分去滓溫服其血當下小柴胡湯治婦人傷風七八日續得寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時方見少陽經傷風傷寒門云傷風必須有汗宜加桂心小麥湯治婦人臟躁喜悲傷欲哭狀若神靈所作數欠呻小麥一升甘草三兩上為銼散每服半兩水二盞棗四枚煎至六分去滓空心溫服亦補脾氣牡丹丸治婦人月病血刺疼痛方見疝氣門黃耆五物湯治婦人血痹方見痹門竹茹湯治婦人汗血吐血尿血下血竹茹熟地黃各三兩人參白芍藥桔梗川芎當歸甘草炙桂心各一兩上為銼散每服四錢水一大盞煎七分去滓不以時候膏發煎治婦人穀氣實胃氣下泄陰吹而正喧頭髮灰豬脂上調勻綿裹如棗核大納陰中𧈟瘡證治凡婦人少陰脈數而滑者陰中必生瘡名曰𧈟瘡或痛或癢如蟲行狀淋露膿汁陰蝕幾盡皆由心神煩郁胃氣虛弱致氣血留滯故經云諸痛癢瘡皆屬心又云陽明主肌肉痛癢皆屬心治之當補心養胃外以熏洗坐導藥治之乃可補心湯方見心臟虛實門狼牙湯治婦人陰中蝕瘡爛潰膿水淋漓臭穢狼牙一味銼濃煎汁以綿纏箸頭大如繭浸濃汁瀝陰中日數次雄黃兌散方見狐惑門凡蝕於肛者單燒雄末熏之蝕於下部則咽乾苦參湯洗養胃湯方見五痿門小兒論凡小兒病與大人不殊唯回氣臍風夜啼重舌變蒸客忤積熱驚癇解顱魃病疳病不行數證大人無之其如傷風傷寒斑瘡下痢用藥則一但多少異耳諸方前已類編可披而得故不重引然養小之書隋唐間猶未甚該博吾宋則有錢氏要方張氏妙選胡王備録幼幼新書及單行小集方論證狀動計千百不勝備矣今略取保生要方具前數證以防緩急之需博雅君子不妨廣覽小兒初生回氣法小兒初生氣欲絶不能啼者必是難産或冒寒所致急以綿絮包裹抱懷中未可斷臍帶且將胞衣置炭火爐中燒之仍捻大紙捻蘸油點燈於臍帶上往來遍帶燎之蓋臍帶連兒臍得火氣由臍入腹更以熱醋湯蕩洗臍帶須臾氣回啼哭如常方可浴洗了即斷臍帶小兒初生所服藥法小兒初生急以綿裹指拭盡口中惡血若不急拭啼聲一出即入腹成百病矣亦未須與乳且先與拍破黃連浸湯取濃汁調硃砂細末抹兒口中打盡腹中舊屎方可與乳兒若多睡聽之勿強與乳則自然長而少病小兒初生通大小便法小兒初生大小便不通腹脹欲絶者急令婦人以溫水先漱口了吸咂兒前後心並臍下手足心共七處每一處凡三五次漱口吸咂取紅赤為度須臾自通不爾無生意有此證遇此方可謂再生小兒臍風撮口證小兒初生一七日內忽患臍風撮口百無一活坐視其斃者皆是良可憫有一法極驗世罕有知者凡患此兒齒齦上有小泡子如粟米狀以溫水蘸熟帛裹手指輕輕擦破即口開便安不用服藥神效千金變蒸論凡小兒有生三十二日一變再變為一蒸十變而五小蒸又三大蒸積五百七十六日大小蒸都畢乃成人小兒所以變蒸者是榮其血脈改其五臟變者上氣蒸者體熱其輕者體熱而微驚耳冷尻冷上唇頭白泡起如魚目珠子微汗出其重者體壯熱而脈亂或汗或不汗不欲食食輒吐哯目白睛微赤黑睛微白變蒸畢自明矣此其證也單變小微兼蒸小劇凡蒸平者五日而衰遠者十日而衰先期五日後之五日為十日之中熱乃除耳或違日數不除切不可妄治及灸刺但少與紫丸微下之熱歇便止若身熱耳熱尻亦熱此乃他病可作別治紫丸治小兒變蒸發熱不解並挾傷寒溫壯汗後熱不歇及腹中有痰癖哺乳不進乳則吐哯食癇先寒後熱者代赭石赤石脂各一兩巴豆三十粒去殼壓油杏仁五十粒去皮尖上以上二味為末別研巴豆杏仁為膏相和更搗一二千杵當自相得若硬入少蜜同杵之密器中收三十日兒服如麻子大一粒與少乳汁令下食頃後與少乳勿令多至日中當小下熱除若未全除明日更與一粒百日兒服如小豆一粒以此準定增減夏月多熱喜令發疹二三十日輒一服佳紫丸無所不治雖下不虛人夜啼四證小兒夜啼有四證一曰寒二曰熱三曰重舌口瘡四曰客忤寒則腹痛而啼面青白口有冷氣腹亦冷曲腰而啼此寒證也熱則心躁而啼面赤小便赤口中熱腹暖啼時或有汗仰身而啼此熱證也若重舌口瘡則要乳不得口到乳上即啼身額皆微熱急取燈照口若無瘡舌必腫也客忤者見生人氣忤犯而啼也蒜丸治冷證腹痛夜啼大蒜一顆慢火煨香熟取出細切稍研日中或火上焙半乾研乳香半錢別研上研勻丸如芥子大每服七粒以乳汁送下燈花散治熱證心躁夜啼燈花三兩顆上研細用燈芯煎湯調塗口中以乳汁送下日三服蒲黃散治小兒重舌真蒲黃微炒紙鋪地上出火氣上研細每抄些小摻舌下時時摻之自愈更以溫水蘸熟帛裹指輕輕按掠之按罷摻藥牡蠣散治小兒口瘡牡蠣煅通紅取出候冷研細以紙裹了埋一尺土中七日出火氣三錢甘草炙為末一錢匕上和勻時時抄少許摻口中或咽或吐皆無害治客忤夜啼法用本家廚下火柴頭一個火滅者以朱書云吾是天上五雷公將來作神將能收夜啼鬼一縛永不放急急如律令柴頭以火燒焦頭為上書了勿令兒知立在床下倚床前腳里男左女右黃土散治小兒卒客忤灶中黃土蚯蚓屎各等分上研勻和水塗兒頭上及五心良積熱證治小兒積熱者表裡俱熱遍身皆熱頰赤口乾小便赤大便焦黃先以四順清涼飲子利動臟腑熱則去或既去而復熱者內熱已解而表熱未解也當用惺惺散紅綿散加麻黃微發汗表熱乃去表熱去後又發熱者何也世醫到此盡不能曉或再用涼藥或再解表或以謂不可醫誤致夭傷者甚多此表裡俱虛氣不歸元而陽浮於外所以再發熱非熱證也只用六神散入粳米煎和其胃氣則收陽氣歸內身體便涼熱重者用銀白散四順飲子治小兒頭昏頰赤口內熱小便赤大便少此裡熱也大黃當歸洗赤芍藥甘草各等分上為末三歲上小兒每服一大錢水一盞煎至七分作二服食後服一法用芍藥欲利小便則用赤者虛熱者加甘草下利者減大黃冒風邪加麻黃去節中風身體強戴眼者加獨活並於一兩中加減半錢惺惺散桔梗細辛人參甘草炙白茯苓栝蔞根白朮上等分為末每服一錢匕水一小盞薄荷三葉同煎四分溫服不拘時候紅綿散殭蠶炒白朮炒直者天麻一兩生用天南星二兩薄片切油浸黃蘇木節二兩半別研上為末每服一錢水一小盞入紅綿少許同煎至六分溫服凡小兒風熱頭目不清並宜服之若傷寒有表證發熱者每服入去節麻黃末半錢以下有裡熱心躁渴者入滑石末半錢以下同煎服之六神散人參白茯苓乾山藥白朮白扁豆甘草炙各等分上為末每服一大錢水一小盞棗一個生薑二片同煎至五分通口服此藥用處甚多治胃冷加附子治風證加天麻治利加罌粟殼銀白散乾山藥白朮白茯苓各半兩人參白扁豆知母甘草炙升麻各等分上為末每服一錢水一小盞棗一個煎七分溫服不拘時候急慢驚風證治小兒發癇俗云驚風有陰陽二證身熱面赤而發搐搦上視牙關緊硬者陽證也因吐瀉或只吐不瀉日漸困面色白脾虛或冷而發驚不甚搐搦微微目上視手足微動者陰證也陽證用涼藥陰證用溫藥不可一概作驚風治也又有一證欲發瘡疹先身熱驚跳或發搐搦此非驚風當服發散藥陽癇方硃砂一分研膩粉麝香各半錢蘆薈白附子甘草各二錢胡黃連一錢蠍梢七個殭蠶十條金箔七片赤腳蜈蚣一條炙上為末二歲以上服半服匕以金銀薄荷湯調下三歲以上服一錢如口不開灌入鼻中陰癇方黑附子生去皮臍生天南星半夏各二錢白附子一錢半上研細井花水浸七日每日換水浸訖控干入硃砂二錢麝香一錢拌勻每服一字薄荷湯調下量兒加減一方用附子生去皮臍為末每服二錢以水一盞半生薑二片同煎至半盞分三二服量兒加減吐者入丁香五粒同煎乳空時服或用水浸炊餅為丸如粟米大每服二十粒亦可余方見癲癇門解顱治法三辛散治小兒頭骨應合而不合頭骨開解名曰解顱細辛桂心各半兩乾薑七錢半上為末以乳汁和敷顱上干復敷之兒面赤即愈又方蛇蛻炒焦為末上用豬頰車中髓調敷頂上日三四度曾有人作頭巾裹頭遮護之久而自合亦良法也魃病證治魃音技千金論小兒有魃病者是娠婦被惡神導其腹中令兒病也魃亦小鬼也其證微微下利寒熱去來毫毛鬢髮鬡不悅者是也宜服龍膽湯凡婦人先有小兒未能行而母更有娠使兒飲此乳亦作魃也令兒黃瘦骨立發熱發落龍膽湯治嬰兒出腹血脈盛實寒熱溫壯四肢驚掣吐哯者若已能進哺中食實不消壯熱及變蒸不解中客人鬼氣並諸癇驚龍膽草柴胡黃芩桔梗鉤藤皮芍藥甘草炙茯苓各二錢半蜣螂二枚大黃一兩濕紙裹煨上為銼散以水一升煮取五合為一劑十歲以下小兒皆可服若兒生一日至七日分一合為三服八日至十五日分一合半為三服生十六日至二十日分二合為三服二十日至三十日四十日盡以五合為三服皆以得下即止此劑為出腹嬰兒所作若日月長大者以次依此為例必知客忤及有鬼氣可加人參當歸各二錢半一百日兒加一錢一字二百日兒加二錢半一歲兒加半兩余藥皆準此疳病證治小兒疳病者多因闕乳吃食太早所致或因久患臟腑胃虛蟲動日漸羸瘦腹大不能行發豎發熱無精神肥兒丸主之肥兒丸黃連神麯各一兩大麥糵半兩炒木香二錢檳榔二個不見火使君子肉肉豆蔻麵裹煨各半兩上為末麵糊為丸如蘿蔔子大每服三二十丸量兒歲數加減熟水吞下六神丸治如前證丁香木香肉豆蔻去殼各半兩三味用麵裹同入慢灰火煨令面熟為度訶子半兩煨去核使君子蘆薈各一兩細研入上為末以棗肉和丸如麻子大每服五丸至七丸溫米飲下乳食前服龍膽丸治疳病發熱龍膽草黃連使君子肉青橘皮各等分上為末豬膽汁和為丸如梧桐子大每服三十粒以意加減臨臥時熟水下不行證治五加皮散治小兒三歲不能行者由受氣不足體力虛怯腰脊腳膝筋骨軟躄故不能行真五加皮上為末粥飲調滴酒少許每服一栗殼許日三服
